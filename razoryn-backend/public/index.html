            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div class="field"><label>Default category ID</label><input id="set-ebay-cat" placeholder="e.g. 33744"><div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Most-used category. Per-listing override in the modal. Look up at <a href="https://www.isoldwhat.com" target="_blank" rel="noopener" style="color:var(--brand-primary)">isoldwhat.com</a>.</div></div>
              <div class="field"><label>Default condition</label>
                <select id="set-ebay-cond">
                  <option value="1000">New</option>
                  <option value="1500">New other (open box)</option>
                  <option value="1750">New with defects</option>
                  <option value="2000">Refurbished — Manufacturer</option>
                  <option value="2500">Refurbished — Seller</option>
                  <option value="3000">Used</option>
                  <option value="7000">For parts / not working</option>
                </select>
              </div>
            </div>
            <div style="font-weight:600;font-size:13px;margin:14px 0 8px">Item location (where it ships from)</div>
            <div style="display:grid;grid-template-columns:80px 1fr 1fr;gap:8px">
              <div class="field"><label>Country</label><input id="set-ebay-loc-country" value="GB" maxlength="2" style="text-transform:uppercase"></div>
              <div class="field"><label>Postcode</label><input id="set-ebay-loc-postcode" placeholder="e.g. WD24 7TE"></div>
              <div class="field"><label>City / Town</label><input id="set-ebay-loc-city" placeholder="e.g. Watford"></div>
            </div>
          </div>

          <div style="margin-top:14px">
            <button class="btn btn-primary" onclick="saveEbayListingDefaults()">Save eBay defaults</button>
          </div>
        </div>

        <div class="card-body">

          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">
            <button class="btn btn-outline btn-sm" onclick="openNewTemplate()">+ New custom template</button>
          </div>
          <details style="margin-top:14px;font-size:12px;color:var(--ink-soft)">
            <summary style="cursor:pointer;font-weight:500">Available variables</summary>
            <div style="padding:10px 0;line-height:1.7;font-family:ui-monospace,monospace;font-size:11px">
              <code>{customer_name}</code> · <code>{first_name}</code><br>
              <code>{invoice}</code> · <code>{payment_reference}</code> · <code>{order_number}</code><br>
              <code>{total}</code> · <code>{subtotal}</code><br>
              <code>{tracking_number}</code> · <code>{carrier}</code> · <code>{tracking_url}</code><br>
              <code>{item_first}</code> · <code>{item_count}</code> · <code>{item_count_extra}</code><br>
              <code>{company_name}</code> · <code>{company_phone}</code> · <code>{company_website}</code> · <code>{company_email}</code><br>
              <code>{review_url}</code> (Trustpilot or Google based on platform setting)

async function clearCatalogue() {
  if (!confirm('This will permanently delete ALL products, locations, sales, returns, and stock movements from the warehouse database.\n\nUsers, settings, schedule and key information will be kept.\n\nThis is intended to wipe demo/seed data before importing real Shopify data.\n\nContinue?')) return;
  if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
  const out = el('shopify-result');
  if (out) out.innerHTML = 'Clearing…';
  try {
    await Api.post('/api/settings/clear-catalogue');
    await Store.refresh('products');
    await Store.refresh('locations');
    if (out) out.innerHTML = '<strong style="color:var(--green)">Catalogue cleared.</strong> You can now run Import all products to pull a fresh catalogue from Shopify.';
    toast('Catalogue cleared', 'success');
  } catch (e) {
    if (out) out.innerHTML = '<span style="color:var(--red)">Failed: ' + (e.data?.message || e.message) + '</span>';
  }
}

async function importFromShopify() {
  if (!confirm('Pull all products from Shopify into the warehouse? Safe to re-run — existing products will be updated.')) return;
  const out = el('shopify-result');
  if (out) out.innerHTML = 'Importing… this can take a minute for large catalogues.';
  const taskId = Task.start('Importing Shopify catalogue');
  try {
    const r = await Api.post('/api/settings/import-shopify');
    if (out) {
      out.innerHTML = `<strong style="color:var(--green)">Done.</strong> Inserted <strong>${r.inserted}</strong>, updated <strong>${r.updated}</strong>` +
        (r.errors && r.errors.length ? `, <span style="color:var(--red)">${r.errors.length} errors</span>` : '') +
        '. Refresh Inventory to see them.';
    }
    await Store.refresh('products');
    Task.done(taskId, `Imported ${r.inserted + r.updated} products`);
    toast('Shopify import complete', 'success');
  } catch (e) {
    Task.fail(taskId, 'Import failed');
    if (out) out.innerHTML = '<span style="color:var(--red)">Import failed: ' + (e.data?.message || e.message) + '</span>';
  }
}

function renderBarcodeSyncResult(r, isPreview) {

  const sampleHtml = (r.sample || []).slice(0, 10).map(s =>
    `<div style="font-family:ui-monospace,monospace;font-size:11px">${escapeHtml(s.sku)} <span style="color:var(--ink-soft)">(was ${escapeHtml(s.currentBarcode)})</span></div>`).join('');

    out.innerHTML = `<strong>${r.candidates}</strong> of ${r.totalVariants} variants will change (barcode → SKU). ${r.skippedNoSku} skipped (no SKU).` +
      (r.candidates ? `<div style="margin-top:8px">${sampleHtml}${r.candidates > 10 ? `<div style="color:var(--ink-soft)">…and ${r.candidates - 10} more</div>` : ''}</div><div style="margin-top:8px">Click <strong>⬆ Push barcodes to Shopify</strong> to apply.</div>` : ' Nothing to change — all good.');
  } else {
    out.innerHTML = `<strong style="color:var(--green)">Updated ${r.updated}</strong> of ${r.candidates} variants` +
      (r.errorCount ? `, <span style="color:var(--red)">${r.errorCount} errors</span>` : '') +
      `. Now click <strong>⬇ Import all products</strong> above to pull the new barcodes into the warehouse.`;
  }
}

// ──────────────────────────────────────────────────────────────────────────
// Notification sound preference (Settings page)
// ──────────────────────────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────────────────
// Notification sounds — per-event preferences.
// Each event category gets its own dropdown so the user can recognise what's
// happening without looking at the screen. All choices are per-device
// (localStorage), with one shared "custom" upload that any event can use.
// ──────────────────────────────────────────────────────────────────────────
const SOUND_EVENTS = [
  { key: 'sale',          label: 'New sale',                desc: 'A new order has arrived (eBay, Shopify, or manual).', defaultName: 'chaching' },
  { key: 'return',        label: 'New return',              desc: 'A new eBay return request has been opened.',          defaultName: 'chime' },
  { key: 'return_closed', label: 'Return closed',           desc: 'A return case has been resolved / closed.',           defaultName: 'pop' },
  { key: 'low_stock',     label: 'Low / out of stock',      desc: 'A SKU has dropped to its low-stock threshold or zero.', defaultName: 'bell' },
];

// Choices the user can pick from. Same list for every event.
const SOUND_OPTIONS = [
  { value: 'chaching', label: '💰 Cha-ching (cash register)' },
  { value: 'bell',     label: '🔔 Bell — bright single ring' },
  { value: 'chime',    label: '🎵 Chime — two-note descending' },
  { value: 'ding',     label: '🛎️ Ding — short high tone' },
  { value: 'pop',      label: '💧 Pop — subtle click' },
  { value: 'custom',   label: '📁 Custom (uploaded file)' },
  { value: 'none',     label: '🔇 No sound' },
];

// Build a select-dropdown for one event category. The current saved choice
// is pre-selected; if the user hasn't saved one yet, the per-event default
// from SOUND_EVENTS is used (cha-ching for sale, bell for low-stock, etc.).
function renderSoundEventRows() {
  const wrap = el('sound-event-rows');
  if (!wrap) return;
  wrap.innerHTML = SOUND_EVENTS.map(ev => {
    const current = Sounds.getChoice(ev.key);
    const customName = Sounds.getCustomNameFor(ev.key);
    const options = SOUND_OPTIONS.map(o =>
      `<option value="${o.value}" ${o.value === current ? 'selected' : ''}>${escapeHtml(o.label)}</option>`
    ).join('');
    return `
      <div class="field" style="margin:0;padding:12px;background:var(--bg-soft);border-radius:8px">
        <label>${escapeHtml(ev.label)}</label>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select class="sound-event-select" data-event="${ev.key}" onchange="onSoundEventChange('${ev.key}')" style="font-size:14px;flex:1;min-width:200px">${options}</select>
          <button class="btn btn-outline btn-sm" onclick="previewSoundFor('${ev.key}')">▶ Preview</button>
        </div>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">${escapeHtml(ev.desc)}</div>
        <!-- Per-event custom upload — shown only when this event is set to Custom -->
        <div class="sound-custom-panel" data-event="${ev.key}" style="display:${current === 'custom' ? 'block' : 'none'};margin-top:10px;padding:10px;background:var(--white);border:1px solid var(--line);border-radius:6px">
          <div class="sound-custom-current" data-event="${ev.key}" style="display:${customName ? 'flex' : 'none'};align-items:center;gap:8px;font-size:11px;margin-bottom:8px">
            <span style="font-family:ui-monospace,monospace">${customName ? '🎵 ' + escapeHtml(customName) : ''}</span>
            <button class="btn btn-ghost btn-sm" onclick="clearEventCustomSound('${ev.key}')" style="color:var(--red);padding:2px 8px">Remove</button>
          </div>
          <input type="file" class="sound-custom-file" data-event="${ev.key}" accept="audio/mpeg,audio/mp3,audio/wav,audio/ogg,audio/x-m4a,audio/mp4,.mp3,.wav,.ogg,.m4a" onchange="onEventCustomUpload(this,'${ev.key}')" style="font-size:12px;width:100%">
          <div style="font-size:10px;color:var(--ink-soft);margin-top:4px">Upload MP3/WAV/OGG/M4A, max ~1 MB. This sound is for this event only and syncs to all devices.</div>
        </div>
      </div>
    `;
  }).join('');
}

// Preview the dropdown's currently-selected value for an event (may be unsaved).
function previewSoundFor(eventKey) {
  const select = document.querySelector(`.sound-event-select[data-event="${eventKey}"]`);
  if (!select) return;
  const choice = select.value;
  if (choice === 'custom') {
    // Prefer a freshly-staged upload, else the already-saved custom sound.
    const staged = (window._stagedCustomSounds || {})[eventKey];
    const url = staged || Sounds.getCustomFor(eventKey);
    if (!url) { toast('Upload a sound file for this event first', 'warn'); return; }
    Sounds.previewEvent(eventKey, 'custom', url);
    return;
  }
  Sounds.previewEvent(eventKey, choice);
}

// When an event's dropdown changes: show/hide its custom-upload panel.
function onSoundEventChange(eventKey) {
  const select = document.querySelector(`.sound-event-select[data-event="${eventKey}"]`);
  const panel = document.querySelector(`.sound-custom-panel[data-event="${eventKey}"]`);
  if (select && panel) panel.style.display = select.value === 'custom' ? 'block' : 'none';
}

// Stage an uploaded custom sound for an event (held in memory until Save).
async function onEventCustomUpload(input, eventKey) {
  const file = input.files?.[0];
  if (!file) return;
  const MAX_BYTES = 1_000_000;
  if (file.size > MAX_BYTES) {
    toast(`File too big — ${(file.size/1024/1024).toFixed(1)} MB. Max 1 MB.`, 'error', 7000);
    input.value = ''; return;
  }
  if (!/^(audio\/|.*\.(mp3|wav|ogg|m4a)$)/i.test(file.type) && !/\.(mp3|wav|ogg|m4a)$/i.test(file.name)) {
    toast('Unsupported file type. Use MP3, WAV, OGG, or M4A.', 'error');
    input.value = ''; return;
  }
  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error || new Error('Read failed'));
      reader.readAsDataURL(file);
    });
    window._stagedCustomSounds = window._stagedCustomSounds || {};
    window._stagedCustomSoundNames = window._stagedCustomSoundNames || {};
    window._stagedCustomSounds[eventKey] = dataUrl;
    window._stagedCustomSoundNames[eventKey] = file.name;
    // Update the "current" indicator
    const cur = document.querySelector(`.sound-custom-current[data-event="${eventKey}"]`);
    if (cur) {
      cur.style.display = 'flex';
      cur.querySelector('span').textContent = '🎵 ' + file.name + ' (unsaved)';
    }
    toast(`"${file.name}" ready — press ▶ Preview to test, then Save all sounds.`, 'success', 5000);
  } catch (e) {
    toast('Could not read file: ' + e.message, 'error');
  }
}

// Remove an event's custom sound (staged or saved).
function clearEventCustomSound(eventKey) {
  if (window._stagedCustomSounds) delete window._stagedCustomSounds[eventKey];
  if (window._stagedCustomSoundNames) delete window._stagedCustomSoundNames[eventKey];
  // Also clear from loaded prefs so Save persists the removal
  if (Sounds._prefs[eventKey]) { delete Sounds._prefs[eventKey].customDataUrl; delete Sounds._prefs[eventKey].customName; }
  const cur = document.querySelector(`.sound-custom-current[data-event="${eventKey}"]`);
  if (cur) cur.style.display = 'none';
  const fileInput = document.querySelector(`.sound-custom-file[data-event="${eventKey}"]`);
  if (fileInput) fileInput.value = '';
  toast('Removed — pick a built-in sound or upload a new file, then Save.', 'info');
}

// Save every event's selection + any staged custom uploads to the SERVER so it
// syncs across all devices.
async function saveSoundPrefs() {
  const prefs = {};
  const staged = window._stagedCustomSounds || {};
  const stagedNames = window._stagedCustomSoundNames || {};
  let missingCustom = null;
  document.querySelectorAll('.sound-event-select').forEach(sel => {
    const key = sel.dataset.event;
    const choice = sel.value;
    const entry = { choice };
    if (choice === 'custom') {
      // Use a freshly-staged upload if present, else the already-saved one.
      const url = staged[key] || Sounds.getCustomFor(key);
      const name = stagedNames[key] || Sounds.getCustomNameFor(key);
      if (!url) { missingCustom = key; return; }
      entry.customDataUrl = url;
      entry.customName = name || 'custom.audio';
    }
    prefs[key] = entry;
  });
  if (missingCustom) {
    const ev = SOUND_EVENTS.find(e => e.key === missingCustom);
    toast(`Upload a sound file for "${ev ? ev.label : missingCustom}" first — it's set to Custom.`, 'warn', 6000);
    return;
  }
  try {
    const r = await Api.put('/api/settings/sound-prefs', { soundPrefs: prefs });
    Sounds._prefs = r.soundPrefs || prefs;
    Sounds._customAudio = {};
    window._stagedCustomSounds = {};
    window._stagedCustomSoundNames = {};
    toast('Notification sounds saved — synced to all devices', 'success', 5000);
    renderSoundEventRows();
  } catch (e) {
    if (e.data?.error === 'audio_too_large') toast(e.data.message, 'error', 7000);
    else toast('Failed to save: ' + (e.data?.message || e.message), 'error');
  }
}

// ──────────────────────────────────────────────────────────────────────────
// eBay listing defaults — Settings card UI helpers.
// Hydrates from the same /pricing-config payload used by everything else, and
// renders per-store policy override rows for multi-store brands (Calibre).
// ──────────────────────────────────────────────────────────────────────────
function hydrateEbayDefaults(cfg) {
  // Brand-wide / default-store policies
  const setVal = (id, val) => { const e = el(id); if (e) e.value = val || ''; };
  setVal('set-ebay-policy-payment',  cfg.ebayPolicyPayment);
  setVal('set-ebay-policy-shipping', cfg.ebayPolicyShipping);
  setVal('set-ebay-policy-return',   cfg.ebayPolicyReturn);
  setVal('set-ebay-cat',             cfg.ebayDefaultCategoryId);
  setVal('set-ebay-loc-country',     cfg.ebayLocationCountry || 'GB');
  setVal('set-ebay-loc-postcode',    cfg.ebayLocationPostcode);
  setVal('set-ebay-loc-city',        cfg.ebayLocationCity);
  const condSel = el('set-ebay-cond');
  if (condSel) condSel.value = cfg.ebayDefaultConditionId || '1000';

  // Per-store overrides — only render if the brand has more than one eBay store
  const stores = (State.brand?.stores || []).filter(s => s.channelCode && s.channelCode.startsWith('ebay_'));
  const wrap = el('ebay-per-store-policies');
  const defaultSuffix = el('ebay-policy-default-suffix');
  if (!wrap) return;
  if (stores.length <= 1) {
    wrap.style.display = 'none';
    if (defaultSuffix) defaultSuffix.textContent = '';
    return;
  }
  // Multi-store: relabel "Default" card as fallback, render per-store rows below
  if (defaultSuffix) defaultSuffix.textContent = '(fallback if a store row is empty)';
  wrap.style.display = '';
  const perStore = cfg.ebayPerStorePolicies || {};
  wrap.innerHTML = stores.map(s => {
    const pol = perStore[s.code] || {};
    return `
      <div style="padding:12px;background:var(--bg-soft);border-radius:8px;margin-bottom:10px">
        <div style="font-weight:600;font-size:13px;margin-bottom:8px">${escapeHtml(s.name)} ${s.primary ? '<span style="font-size:10px;color:var(--ink-soft);font-weight:400">(primary)</span>' : ''}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div class="field"><label>Payment ID</label><input class="ps-pay"  data-store="${escapeAttr(s.code)}" value="${escapeAttr(pol.payment  || '')}" placeholder="leave empty to use default"></div>
          <div class="field"><label>Shipping ID</label><input class="ps-ship" data-store="${escapeAttr(s.code)}" value="${escapeAttr(pol.shipping || '')}" placeholder="leave empty to use default"></div>
          <div class="field"><label>Return ID</label><input class="ps-ret"  data-store="${escapeAttr(s.code)}" value="${escapeAttr(pol.return   || '')}" placeholder="leave empty to use default"></div>
        </div>
      </div>
    `;
  }).join('');
}

async function saveEbayListingDefaults() {
  const getStr = id => (el(id)?.value || '').trim();
  // Gather per-store policy overrides (multi-store brands only)
  const perStore = {};
  document.querySelectorAll('#ebay-per-store-policies input[data-store]').forEach(inp => {
    const code = inp.dataset.store;
    if (!perStore[code]) perStore[code] = {};
    if (inp.classList.contains('ps-pay'))  perStore[code].payment  = inp.value.trim();
    if (inp.classList.contains('ps-ship')) perStore[code].shipping = inp.value.trim();
    if (inp.classList.contains('ps-ret'))  perStore[code].return   = inp.value.trim();
  });
  const payload = {
    ebayPolicyPayment:      getStr('set-ebay-policy-payment'),
    ebayPolicyShipping:     getStr('set-ebay-policy-shipping'),
    ebayPolicyReturn:       getStr('set-ebay-policy-return'),
    ebayDefaultCategoryId:  getStr('set-ebay-cat'),
    ebayDefaultConditionId: getStr('set-ebay-cond'),
    ebayLocationCountry:    getStr('set-ebay-loc-country').toUpperCase() || 'GB',
    ebayLocationPostcode:   getStr('set-ebay-loc-postcode'),
    ebayLocationCity:       getStr('set-ebay-loc-city'),
  };
  if (Object.keys(perStore).length) payload.ebayPerStorePolicies = perStore;
  try {
    await Api.post('/api/settings/pricing-config', payload);
    toast('eBay defaults saved', 'success');
    // Refresh the cached config so the Create-eBay modal picks them up immediately
    State.pricingConfig = await Api.get('/api/settings/pricing-config');
  } catch (e) {
    toast('Save failed: ' + (e.data?.message || e.message), 'error');
  }
}

// ──────────────────────────────────────────────────────────────────────────
// LOGO UPLOAD — base64 data URL stored in app_settings.
// File is read client-side as data URL, validated, then POSTed to the
// backend which stores it. Same data URL is then used inline on invoices
// (no follow-up HTTP request from the print/email template).
// ──────────────────────────────────────────────────────────────────────────
async function hydrateDesktopInfo() {
  const status = el('desktop-status'), btns = el('desktop-buttons'), help = el('desktop-help');
  if (!status) return;
  let info;
  try { info = await Api.get('/api/desktop/info'); }
  catch (e) { status.textContent = 'Could not check for a desktop build right now.'; return; }
  if (!info.available) {
    status.innerHTML = 'No desktop build has been published yet. An admin can produce one from GitHub → <strong>Actions</strong> → <strong>Build desktop app</strong> → <strong>Run workflow</strong> (no command line needed). It appears here automatically once built.';
    return;
  }
  status.innerHTML = `Latest build: <strong>${escapeHtml(info.version || '')}</strong>${info.publishedAt ? ' · ' + new Date(info.publishedAt).toLocaleDateString('en-GB') : ''}`;
  btns.style.display = 'flex';
  const show = (id, on) => { const a = el(id); if (a) a.style.display = on ? 'inline-flex' : 'none'; };
  show('desktop-win', info.win); show('desktop-mac', info.mac); show('desktop-linux', info.linux);
  if (help) { help.style.display = 'block'; help.textContent = 'Tip: on first run Windows/Mac may warn about an unidentified developer — choose “Run anyway” / “Open”. The app updates itself after that.'; }
}

function hydrateLogoUI(cfg) {
  const fill = (prefix, dataUrl, filename) => {
    const wrap = el(prefix + 'current-wrap');
    const img = el(prefix + 'current-img');
    const nameEl = el(prefix + 'current-name');
    const removeBtn = el(prefix + 'remove-btn');
    if (!wrap || !img) return;
    if (dataUrl) {
      img.src = dataUrl;
      if (nameEl) nameEl.textContent = filename || '';
      wrap.style.display = '';
      if (removeBtn) removeBtn.style.display = '';
    } else {
      wrap.style.display = 'none';
      if (removeBtn) removeBtn.style.display = 'none';
    }
  };
  fill('logo-', cfg.logoDataUrl, cfg.logoFilename);
  fill('logo-dark-', cfg.logoDarkDataUrl, cfg.logoDarkFilename);
  // Topbar logo — swap to the uploaded ones (theme-aware), on EVERY page.
  applyTopbarLogo(cfg.logoDataUrl, cfg.logoDarkDataUrl);
}

// Swap the light/dark logo imgs to the uploaded versions (theme-aware) without
// a reload. Safe to call multiple times.
function applyTopbarLogo(lightDataUrl, darkDataUrl) {
  if (lightDataUrl) document.querySelectorAll('[data-brand-logo-light]').forEach(img => { img.onerror = null; img.src = lightDataUrl; });
  if (darkDataUrl) document.querySelectorAll('[data-brand-logo-dark]').forEach(img => { img.onerror = null; img.src = darkDataUrl; });
}

async function onLogoUpload(input, variant) {
  const file = input.files?.[0];
  if (!file) return;
  // Size cap: 500KB raw. Base64 inflates ~33%, so the stored data URL is
  // ~700KB — safe to inline in every invoice without bloating things.
  const MAX_BYTES = 500_000;
  if (file.size > MAX_BYTES) {
    toast(`File too big — ${(file.size / 1024).toFixed(0)} KB. Max 500 KB. Try resizing or compressing the image.`, 'error', 8000);
    input.value = '';
    return;
  }
  // Type check — be permissive since browsers report MIME types inconsistently
  if (!/^image\//.test(file.type) && !/\.(png|jpe?g|gif|webp|svg)$/i.test(file.name)) {
    toast('Unsupported file type. Use PNG, JPG, GIF, WEBP, or SVG.', 'error');
    input.value = '';
    return;
  }
  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error || new Error('Read failed'));
      reader.readAsDataURL(file);
    });
    const r = await Api.post('/api/settings/logo', { dataUrl, filename: file.name, variant: variant === 'dark' ? 'dark' : 'light' });
    toast(`${variant === 'dark' ? 'Dark-mode logo' : 'Logo'} uploaded (${r.sizeKb} KB)`, 'success');
    // Refresh cached config + UI
    State.pricingConfig = await Api.get('/api/settings/pricing-config');
    hydrateLogoUI(State.pricingConfig);
    input.value = '';
  } catch (e) {
    const msg = e.data?.message || e.message || 'Unknown error';
    toast('Upload failed: ' + msg, 'error');
    input.value = '';
  }
}

async function deleteUploadedLogo(variant) {
  if (!confirm('Remove the uploaded logo? The brand-default logo will be used instead.')) return;
  try {
    await Api.delete('/api/settings/logo' + (variant === 'dark' ? '?variant=dark' : ''));
    toast('Logo removed', 'success');
    State.pricingConfig = await Api.get('/api/settings/pricing-config');
    hydrateLogoUI(State.pricingConfig);
  } catch (e) {
    toast('Remove failed: ' + (e.data?.message || e.message), 'error');
  }
}

// ──────────────────────────────────────────────────────────────────────────
// STOCK-CHECK REMINDER — once-per-month banner on the dashboard.
// Backend stores the day-of-month + enabled flag. Frontend checks every
// time the app boots / refreshes whether today is the configured day, and
// fires the banner if the user hasn't already dismissed it this month
// (tracked per-device in localStorage: rwh_stockcheck_dismissed_YYYY-MM).
// ──────────────────────────────────────────────────────────────────────────
function hydrateStockCheckUI(cfg) {
  const cb = el('set-stockcheck-enabled');
  const day = el('set-stockcheck-day');
  if (cb) cb.checked = !!cfg.stockCheckEnabled;
  if (day) day.value = cfg.stockCheckDay ? String(cfg.stockCheckDay) : '';
}

async function saveStockCheckReminder() {
  const enabled = !!el('set-stockcheck-enabled')?.checked;
  const dayStr = (el('set-stockcheck-day')?.value || '').trim();
  const day = parseInt(dayStr);
  if (enabled && (!Number.isFinite(day) || day < 1 || day > 31)) {
    toast('Pick a day of the month (1–31) before enabling', 'warn'); return;
  }
  try {
    await Api.post('/api/settings/pricing-config', {
      stockCheckEnabled: enabled,
      stockCheckDay: enabled ? day : null,
    });
    toast(enabled ? `Stock-take reminder set for day ${day} of each month` : 'Stock-take reminder disabled', 'success');
    State.pricingConfig = await Api.get('/api/settings/pricing-config');
  } catch (e) {
    toast('Save failed: ' + (e.data?.message || e.message), 'error');
  }
}

// Check whether the stock-take reminder should fire today. Called on every
// app boot + page route change. The banner is rendered into a fixed slot at
// the top of the dashboard; dismissing it stores the current YYYY-MM in
// localStorage so it doesn't re-fire this month.
//
// Edge case: user picks day 31 but the current month only has 28/29/30 days.
// We fire the banner on the LAST day of the month in that case, so an
// "always on the 31st" reminder still hits every month.
function checkStockTakeReminder() {
  const cfg = State.pricingConfig;
  if (!cfg?.stockCheckEnabled || !cfg.stockCheckDay) return;
  const now = new Date();
  const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const dismissedKey = `rwh_stockcheck_dismissed_${monthKey}`;
  if (localStorage.getItem(dismissedKey)) return;
  // Days in current month — last-day-of-month trick using day 0 of the next month
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  // Effective trigger day = min(configured day, days-in-month)
  const triggerDay = Math.min(cfg.stockCheckDay, daysInMonth);
  if (now.getDate() < triggerDay) return;
  // Today is on or past the trigger day for this month — show the banner.
  // (We show on or past, not just exactly equal, so a person who only opens
  // the app a few times a week doesn't miss the reminder if they skip the day.)
  showStockTakeBanner(cfg.stockCheckDay, monthKey, dismissedKey);
}

function showStockTakeBanner(day, monthKey, dismissedKey) {
  // Avoid duplicate banners if already rendered
  if (document.getElementById('stocktake-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'stocktake-banner';
  banner.style.cssText = 'background:#fff8e6;border:1px solid #f0d171;color:#5a4400;padding:14px 18px;border-radius:8px;margin:0 0 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:13px;line-height:1.5';
  banner.innerHTML = `
    <div style="font-size:22px">📋</div>
    <div style="flex:1;min-width:200px">
      <strong>Monthly stock-take reminder</strong>
      <div style="font-size:12px;margin-top:2px;color:#7a5a00">You scheduled a physical stock check for day ${day} of each month. Start the guided checklist and tick off each item as you count it.</div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="routeTo('stocktake'); dismissStockTakeBanner('${dismissedKey}');" style="background:#5a4400;color:#fff;border:0">Start stock-take</button>
    <button class="btn btn-ghost btn-sm" onclick="dismissStockTakeBanner('${dismissedKey}')" style="color:#5a4400">Dismiss for this month</button>
  `;
  // Insert at the top of the main content area. The dashboard has an outer
  // container — we just prepend.
  const main = document.querySelector('.main, main, #content, #app-content, .content') || document.body;
  main.insertBefore(banner, main.firstChild);
}

function dismissStockTakeBanner(dismissedKey) {
  localStorage.setItem(dismissedKey, new Date().toISOString());
  const b = document.getElementById('stocktake-banner');
  if (b) b.remove();
}

// ──────────────────────────────────────────────────────────────────────────

async function loadTemplatesEditor() {

function paintTemplatesEditor() {

        <div class="field"><label>Body</label><textarea class="tpl-body" rows="10" style="font-family:ui-monospace,monospace;font-size:12px;line-height:1.5">${escapeHtml(t.body)}</textarea></div>

function getTemplateRowFields(id) {
  const row = document.querySelector(`.tpl-row[data-id="${id}"]`);

    label: row.querySelector('.tpl-label')?.value || '',

    body: row.querySelector('.tpl-body')?.value || '',
    defaultChannel: row.querySelector('.tpl-channel')?.value || 'email',
  };
}

async function saveTemplate(id) {
  const fields = getTemplateRowFields(id);
  if (!fields) return;
  try {
    await Api.patch(`/api/messages/templates/${id}`, fields);
    toast('Template saved', 'success');
    await loadTemplatesEditor();
  } catch (e) {
    toast('Save failed: ' + (e.data?.message || e.message), 'error');

}

async function resetTemplate(id) {
  if (!confirm('Reset this template to its original built-in version? Your edits will be lost.')) return;
  try {
    await Api.post(`/api/messages/templates/${id}/reset`);
    toast('Template reset', 'success');
    await loadTemplatesEditor();
  } catch (e) {
    toast('Reset failed: ' + (e.data?.message || e.message), 'error');

async function deleteTemplate(id) {
  if (!confirm('Delete this custom template? This cannot be undone.')) return;
  try {
    await Api.delete(`/api/messages/templates/${id}`);
    toast('Template deleted', 'success');
    await loadTemplatesEditor();
  } catch (e) {
    toast('Delete failed: ' + (e.data?.message || e.message), 'error');

}

// ── Pricing sync (#5): fixed Shopify↔eBay price link ─────────────────────────
let PsyncPreview = [];
async function psyncPreview() {
  const direction = el('psync-direction')?.value || 'ebay_to_shopify';
  const pct = parseFloat(el('psync-pct')?.value);
  const status = el('psync-status');
  if (isNaN(pct) || pct < 0 || pct >= 100) { toast('Enter a valid % gap (0–99)', 'warn'); return; }
  if (status) status.textContent = 'Calculating…';
  try {
    const r = await Api.post('/api/pricing/link/preview', { direction, pct });
    PsyncPreview = (r.items || []).map(it => ({ ...it, selected: true }));
    if (status) status.textContent = `${PsyncPreview.length} product${PsyncPreview.length === 1 ? '' : 's'} would change.`;
    el('psync-wrap').style.display = PsyncPreview.length ? 'block' : 'none';
    psyncPaint();
    // Persist the gap % as the saved default (fire-and-forget).
    Api.post('/api/settings/pricing-config', { priceLinkPct: pct }).then(() => { if (State.pricingConfig) State.pricingConfig.priceLinkPct = pct; }).catch(() => {});
  } catch (e) {
    if (status) status.textContent = 'Failed: ' + (e.data?.message || e.message);
  }
}
function psyncPaint() {
  const tb = el('psync-tbody');
  if (!tb) return;
  tb.innerHTML = PsyncPreview.map((it, i) => `<tr>
    <td><input type="checkbox" ${it.selected ? 'checked' : ''} onchange="PsyncPreview[${i}].selected=this.checked"></td>
    <td><div style="font-weight:600">${escapeHtml(it.title)}</div><div style="color:var(--ink-soft);font-family:ui-monospace,monospace">${escapeHtml(it.sku || '')}</div></td>
    <td>£${(it.masterPrice).toFixed(2)}</td>
    <td style="color:var(--ink-soft)">${it.currentPrice != null ? '£' + it.currentPrice.toFixed(2) : '—'}</td>
    <td style="color:var(--green);font-weight:600">£${(it.newPrice).toFixed(2)}</td>
    <td>${escapeHtml(it.channel)}</td>
  </tr>`).join('');
}
function psyncToggleAll(on) { PsyncPreview.forEach(it => { it.selected = on; }); psyncPaint(); }
async function psyncApply() {
  const direction = el('psync-direction')?.value || 'ebay_to_shopify';
  const chosen = PsyncPreview.filter(it => it.selected);
  if (!chosen.length) { toast('Nothing selected', 'warn'); return; }
  if (!confirm(`Push new prices to the live ${chosen[0].channel} listing(s) for ${chosen.length} product(s)?`)) return;
  const taskId = Task.start(`Updating ${chosen.length} prices…`);
  try {
    const r = await Api.post('/api/pricing/link/apply', { direction, items: chosen.map(it => ({ id: it.id, newPrice: it.newPrice })) });
    Task.done(taskId, `Applied ${r.applied}/${r.total}`);
    const failed = (r.results || []).filter(x => !x.ok);
    toast(`Updated ${r.applied}/${r.total} prices` + (failed.length ? ` · ${failed.length} failed` : ''), failed.length ? 'warn' : 'success', 6000);
    if (failed.length) console.warn('[psync] failures:', failed);
  } catch (e) {
    Task.fail(taskId, 'Failed');
    toast('Apply failed: ' + (e.data?.message || e.message), 'error');

    companyPhone: getStr('set-phone'),
    companyEmail: getStr('set-email'),
    companyWebsite: getStr('set-website'),
    companyRegNo: getStr('set-regno'),
    bankAccountName: getStr('set-bankname'),

    bankAccountNumber: getStr('set-bankacc'),
    socialInstagram: getStr('set-social-instagram'),
    socialTiktok:    getStr('set-social-tiktok'),

    ebayMarkupPct: getNum('set-ebay-markup'),
    ebayCountryOfOrigin:    getStr('set-ebay-coo'),
    ebayVatPercent:         getNum('set-ebay-vat'),
    ebayDefaultStoreCategoryId: getStr('set-ebay-store-cat'),
    ebayPromoteDefault:     !!el('set-ebay-promote-default')?.checked,
    ebayPromotePercent:     getNum('set-ebay-promote-pct'),
    // (eBay description templates are saved separately via the dedicated
    //  "Save templates" button so the big save can never wipe them.)
    ebayDefaultConditionId: getStr('set-ebay-condition'),
    ebayLocationCountry:    getStr('set-ebay-country'),
    ebayLocationCity:       getStr('set-ebay-city'),
    ebayLocationPostcode:   getStr('set-ebay-postcode'),
    ebayPolicyPayment:      getStr('set-ebay-pol-payment'),
    ebayPolicyShipping:     getStr('set-ebay-pol-shipping'),

  };
  // Collect per-store policies (multi-store brands only). Inputs are named
  // set-ebay-pol-{storeCode}-{kind}; absent if the brand has only one store.
  const perStore = {};

// Bulk delete selected sales rows. Inspects the selection to figure out what
// confirmation prompts to show — estimates are simple, paid invoices need a
// restore-stock decision (applied uniformly to the whole batch).
async function bulkDeleteSales() {
  const ids = Array.from(State.salesSelected || []);
  if (!ids.length) { toast('Nothing selected', 'warn'); return; }

  // Partition the selection so we can use the right prompts and the right
  // ?restoreStock flag per row. Estimates never touch stock; paid invoices do.
  const selectedSales = State.sales.filter(s => ids.includes(s.id));
  const estimates = selectedSales.filter(s => s.isEstimate);
  const invoices = selectedSales.filter(s => !s.isEstimate);

  // Build a clear summary so staff understand exactly what's about to happen
  const lines = [`Permanently delete ${ids.length} row${ids.length === 1 ? '' : 's'}?`];
  if (estimates.length) lines.push(`• ${estimates.length} estimate${estimates.length === 1 ? '' : 's'} / pro-forma${estimates.length === 1 ? '' : 's'} (no stock impact)`);
  if (invoices.length) lines.push(`• ${invoices.length} paid invoice${invoices.length === 1 ? '' : 's'}`);
  lines.push('', 'This cannot be undone.');
  if (!confirm(lines.join('\n'))) return;

  // For paid invoices, ask about stock restore once for the whole batch
  let restoreStock = false;
  if (invoices.length) {
    restoreStock = confirm(
      `Restore stock for the ${invoices.length} paid invoice${invoices.length === 1 ? '' : 's'}?\n\n` +
      `OK = add items back to inventory\nCancel = delete without changing stock`
    );
  }

  const taskId = Task.start(`Deleting ${ids.length} sale${ids.length === 1 ? '' : 's'}`);
  let ok = 0, failed = 0;
  const errs = [];
  for (const id of ids) {
    const sale = selectedSales.find(s => s.id === id);
    const isEstimate = !!sale?.isEstimate;
    // Estimates: no stock to restore. Invoices: use the batch decision.
    const restore = !isEstimate && restoreStock;
    const url = '/api/sales/' + id + (restore ? '' : '?restoreStock=false');
    try {
      await Api.delete(url);
      ok++;
    } catch (e) {
      failed++;
      errs.push(`${id}: ${e.data?.message || e.message}`);
    }
  }
  if (failed === 0) Task.done(taskId, `Deleted ${ok}`);
  else Task.fail(taskId, `${ok} deleted · ${failed} failed`);

  const msg = [`Deleted ${ok} of ${ids.length}.`];
  if (restoreStock && invoices.length) msg.push(`Stock restored on invoice rows.`);
  if (failed) msg.push(`⚠ ${failed} failed`);
  toast(msg.join(' '), failed ? 'warn' : 'success', failed ? 8000 : 4000);
  if (failed && errs.length) console.warn('[bulkDeleteSales] errors:', errs);

  State.salesSelected.clear();
  await Store.refresh('sales');
  await Store.refresh('products');
  if (typeof renderSales === 'function' && State.page === 'sales') renderSales();
}

async function openLinkProduct(saleId, itemId, sku, decrementStockEligible) {
  const tail = sku.split(/\s+-\s+|\s+:\s+/).pop().trim();
  const products = State.products || [];
  const tailUpper = tail.toUpperCase();
  const skuUpper = sku.toUpperCase();
  const norm = (s) => (s || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
  const normTail = norm(tail);
  const ranked = products.map(p => {
    const ps = (p.sku || '').toUpperCase();
    const pn = norm(p.sku);
    let score = 0;
    if (ps === skuUpper) score += 100;
    if (ps === tailUpper) score += 90;
    if (pn === normTail && normTail) score += 80;
    if (ps.includes(tailUpper) && tailUpper) score += 50;
    if (tailUpper.includes(ps) && ps.length > 4) score += 40;
    return { ...p, _score: score };
  }).filter(p => p._score > 0).sort((a,b) => b._score - a._score).slice(0, 8);

  modal({
    title: 'Link order item to a warehouse product',
    body: `
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:14px">
        Order SKU: <strong style="font-family:ui-monospace,monospace;color:var(--ink)">${sku}</strong><br>
        Pick the warehouse product that matches.
      </div>
      ${ranked.length ? `
        <div style="margin-bottom:10px;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;font-weight:600">Suggested matches</div>
        <div style="max-height:200px;overflow-y:auto;border:1px solid var(--line);border-radius:6px;margin-bottom:14px">
          ${ranked.map(p => `
            <label style="display:flex;gap:10px;padding:10px;border-bottom:1px solid var(--line);cursor:pointer;align-items:center">
              <input type="radio" name="lp-pick" value="${p.id}" style="margin:0">
              <div style="flex:1">
                <div style="font-size:13px;font-weight:500">${p.title}</div>
                <div style="font-size:11px;color:var(--ink-soft);font-family:ui-monospace,monospace">${p.sku} · ${totalQty(p)} in stock</div>
              </div>
            </label>
          `).join('')}
        </div>
      ` : '<div style="padding:10px;background:var(--amber-light);color:var(--amber);border-radius:6px;font-size:12px;margin-bottom:14px">No close matches found. Search below.</div>'}
      <div class="field">
        <label>Or search all products</label>
        <input id="lp-search" placeholder="Type SKU, title or part number…" autocomplete="off">
        <div id="lp-results" style="max-height:180px;overflow-y:auto;border:1px solid var(--line);border-radius:6px;margin-top:6px;display:none"></div>
      </div>
      ${decrementStockEligible ? `
        <label style="display:flex;align-items:flex-start;gap:8px;padding:10px;background:var(--bg-soft);border-radius:6px;font-size:12px;margin-top:10px;cursor:pointer">
          <input type="checkbox" id="lp-decrement" checked style="margin-top:2px">
          <div>
            <strong>Decrement stock now</strong><br>
            <span style="color:var(--ink-soft)">Order is paid but stock wasn't decremented because the SKU didn't match. Tick to decrement now.</span>
          </div>
        </label>
      ` : ''}
    `,
    actions: [
      { label: 'Cancel', onClick: closeModal },
      { label: 'Link product', primary: true, onClick: async () => {
        const picked = document.querySelector('input[name=lp-pick]:checked')?.value
                    || document.querySelector('input[name=lp-result]:checked')?.value;
        if (!picked) { toast('Pick a product first', 'warn'); return; }
        const decrement = el('lp-decrement')?.checked || false;
        try {
          await Api.post(`/api/sales/${saleId}/items/${itemId}/link-product`, {
            productId: picked, decrementStock: decrement,
          });
          toast('Linked successfully' + (decrement ? ' · stock decremented' : ''), 'success');
          closeModal();
          await Store.refresh('sales');
          await Store.refresh('products');
          openSaleDetail(saleId);
        } catch (e) {
          toast('Link failed: ' + (e.data?.message || e.message), 'error');
        }
      }},
    ],
  });

  const search = el('lp-search');
  const results = el('lp-results');
  if (search) {
    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      if (!q || q.length < 2) { results.style.display = 'none'; return; }
      const matches = products.filter(p =>
        matchesKeywords(q, p.sku, p.title, p.partNumber)
      ).slice(0, 10);
      if (!matches.length) { results.innerHTML = '<div style="padding:10px;font-size:12px;color:var(--ink-soft)">No matches</div>'; results.style.display = 'block'; return; }
      results.innerHTML = matches.map(p => `
        <label style="display:flex;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;align-items:center">
          <input type="radio" name="lp-result" value="${p.id}" style="margin:0" onchange="document.querySelectorAll('input[name=lp-pick]').forEach(r => r.checked = false)">
          <div style="flex:1"><div style="font-size:12px;font-weight:500">${p.title}</div><div style="font-size:10px;color:var(--ink-soft);font-family:ui-monospace,monospace">${p.sku} · ${totalQty(p)} in stock</div></div>
        </label>
      `).join('');
      results.style.display = 'block';
    });
  }
}

async function relinkUnmatchedSales() {
  if (!confirm('Re-scan all unlinked sale items and try to match them to warehouse products using fuzzy SKU matching. Stock is NOT decremented for old orders — review each in the detail modal afterwards. Continue?')) return;
  toast('Re-scanning…', 'info');
  try {
    const r = await Api.post('/api/sales/relink-unmatched');
    toast(`Scanned ${r.scanned} unlinked items, ${r.linked} newly linked.`, 'success', 5000);
    await Store.refresh('sales');
    if (State.page === 'sales' && typeof renderSales === 'function') renderSales();
  } catch (e) {
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function backfillEbayAddresses() {
  if (!confirm('Re-fetch shipping addresses from eBay for all orders missing one. Takes 1-3 minutes depending on how many orders. Continue?')) return;
  toast('Fetching addresses from eBay…', 'info', 5000);
  try {
    const r = await Api.post('/api/sales/backfill-ebay-addresses');
    const lines = [];
    lines.push(`Done — scanned ${r.scanned} eBay orders.`);
    lines.push(`✓ ${r.updated} addresses added`);
    if (r.noAddress) lines.push(`• ${r.noAddress} had no address in eBay`);
    if (r.failed) lines.push(`⚠ ${r.failed} failed (rate-limited?)`);
    toast(lines.join('\n'), 'success', 7000);
    await Store.refresh('sales');
    if (typeof renderSales === 'function' && State.page === 'sales') renderSales();
  } catch (e) {
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

// Recompute VAT + total on all existing sales using the corrected gross-inclusive
// model. Use after the VAT-bug fix is deployed so historical sales reflect the
// new policy (cash = VAT-free, others = VAT portion of gross, never added on top).
async function backfillVat() {
  if (!confirm('Recompute VAT and totals on ALL existing sales.\n\nThe corrected model:\n• Cash sales: zero VAT, total = subtotal + shipping\n• Bank/card/online sales: VAT is the *portion* of the gross subtotal, never added on top\n\nSafe to re-run. Existing line items are not touched.\n\nContinue?')) return;
  const taskId = Task.start('Recomputing VAT on existing sales');
  try {
    const r = await Api.post('/api/sales/backfill-vat');
    Task.done(taskId, `${r.fixed} fixed, ${r.alreadyOk} OK`);
    toast(`Recompute done — fixed ${r.fixed} of ${r.total} sales (${r.alreadyOk} already correct).`, 'success', 6000);
    await Store.refresh('sales');
    if (typeof renderSales === 'function' && State.page === 'sales') renderSales();
  } catch (e) {
    Task.fail(taskId, 'Recompute failed');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function relinkReturns() {
  if (!confirm('Run full returns repair? This will:\n\n1. Re-sync statuses from eBay state mapping\n2. Clear any incorrectly-matched products (matched by title similarity)\n3. Re-link unmatched returns using strict SKU/part-number matching\n\nThis is safe to run multiple times.')) return;
  const taskId = Task.start('Repairing returns');
  try {
    const a = await Api.post('/api/returns/resync-statuses');
    const b = await Api.post('/api/returns/unlink-loose-matches');
    const c = await Api.post('/api/returns/relink-unmatched');
    const lines = [];
    if (a.updated) lines.push(`✓ ${a.updated} status fixed`);
    if (b.cleared) lines.push(`✓ ${b.cleared} bad links cleared`);
    if (c.linked) lines.push(`✓ ${c.linked} newly linked`);
    if (!lines.length) lines.push('Already clean — nothing to repair.');
    const total = (a.updated || 0) + (b.cleared || 0) + (c.linked || 0);
    Task.done(taskId, total ? `${total} fix${total === 1 ? '' : 'es'}` : 'Already clean');
    toast(lines.join('\n'), 'success', 7000);
    await Store.refresh('returns');
    if (State.page === 'returns') {
      const active = document.querySelector('[data-rfilter].active')?.dataset.rfilter || 'open';
      filterReturns(active);
    }
  } catch (e) {
    Task.fail(taskId, 'Repair failed');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function syncEbayReturns() {
  const taskId = Task.start('Pulling returns from eBay');
  try {
    const r = await Api.post('/api/returns/sync-ebay', { days: 90 });
    const lines = [];
    lines.push(`Fetched ${r.fetched} return${r.fetched === 1 ? '' : 's'} from eBay.`);
    if (r.created) lines.push(`✓ ${r.created} new`);
    if (r.updated) lines.push(`↻ ${r.updated} updated`);
    if (r.notifications) lines.push(`🔔 ${r.notifications} notification${r.notifications === 1 ? '' : 's'}`);
    if (r.noLocalSale) lines.push(`• ${r.noLocalSale} unmatched (not in our DB)`);
    if (!r.created && !r.updated) lines.push('Everything up to date.');
    Task.done(taskId, r.created || r.updated ? `${(r.created || 0) + (r.updated || 0)} return${(r.created || 0) + (r.updated || 0) === 1 ? '' : 's'}` : 'Up to date');
    toast(lines.join('\n'), 'success', 7000);
    await Store.refresh('returns');
    await Store.refresh('notifications');
    if (State.page === 'returns') {
      const active = document.querySelector('[data-rfilter].active')?.dataset.rfilter || 'open';
      filterReturns(active);
    }
  } catch (e) {
    Task.fail(taskId, 'Returns pull failed');
    if (e.data?.error === 'post_order_api_unavailable') {
      toast(e.data.message, 'error', 10000);
    } else {
      toast('Failed: ' + (e.data?.message || e.message), 'error');
    }
  }
}

async function pullEbayStock() {
  if (!confirm('Read live quantities from eBay for every linked product and update the warehouse to match?\n\nThis fixes products showing the wrong stock (e.g. 0 in the app when eBay has stock). Uses one eBay lookup per linked item — may take a minute. Quota permitting.')) return;
  const taskId = Task.start('Pulling live stock from eBay…');
  try {
    const r = await Api.post('/api/products/pull-ebay-stock');
    Task.done(taskId, `${r.updated} updated`);
    const fatal = (r.errors || []).find(e => e.fatal);
    if (fatal) {
      toast(fatal.fatal, 'error', 9000);
    } else {
      toast(`✓ Checked ${r.checked} linked items · updated ${r.updated} · ${r.unchanged} already correct${r.errors?.length ? ` · ${r.errors.length} errors` : ''}`, r.errors?.length ? 'warn' : 'success', 8000);
    }
    await Store.refresh('products');
    if (State.page === 'inventory') renderInventory();
    if (State.page === 'mirror') { await loadLinkStatus?.(); renderLinkStatus?.(); }
  } catch (e) {
    Task.fail(taskId, 'Failed');
    if (/usage limit|exceeded|21917/i.test(e.data?.message || e.message || '')) {
      toast('eBay API quota is exhausted — wait for the daily reset (≈7am UK), then try again.', 'error', 8000);
    } else {
      toast('Failed: ' + (e.data?.message || e.message), 'error');
    }
  }
}

async function hydrateEbayPrices() {
  if (!confirm('This will fetch all active eBay listings (~1-2 minutes) and update eBay prices on your warehouse products. Continue?')) return;
  const taskId = Task.start('Fetching eBay listings & updating prices');
  try {
    const r = await Api.post('/api/listings/hydrate-ebay-prices');
    // Per-store errors → open the diagnostic modal instead of pretending success
    if (r.storeErrors && r.storeErrors.length) {
      Task.fail(taskId, `${r.storeErrors.length} store error${r.storeErrors.length === 1 ? '' : 's'}`);
      showEbayErrorsModal(r.storeErrors, r);
      return;
    }
    Task.done(taskId, `Updated ${r.updated} products`);
    // Build a detailed result so the user can see which match strategy fired
    const lines = [`Done. ${r.updated} products updated from ${r.listingsFound} eBay listings.`];
    if (r.matchedViaLink)         lines.push(`✓ ${r.matchedViaLink} via mirror links`);
    if (r.matchedViaSku)          lines.push(`✓ ${r.matchedViaSku} via exact SKU`);
    if (r.matchedViaNormalizedSku) lines.push(`✓ ${r.matchedViaNormalizedSku} via normalised SKU`);
    if (r.unmatched)              lines.push(`• ${r.unmatched} unmatched (no product in DB)`);
    // Special-case: 0 listings + 0 errors + stores configured = something else off
    if (r.listingsFound === 0 && r.stores?.length) {
      lines.push('');
      lines.push(`⚠ 0 listings returned even though ${r.stores.length} store${r.stores.length === 1 ? ' is' : 's are'} configured. Click 🩺 Test eBay connection to diagnose.`);
    }
    toast(lines.join('\n'), 'success', 6000);
    await Store.refresh('products');
  } catch (e) {
    Task.fail(taskId, 'Hydrate failed');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

  // In production mode this is disabled — wiping a real DB requires using
  // psql or running `npm run seed -- --force` from the server.
  toast('Reset disabled in production. Use server-side scripts.', 'warn');
}

/* ==========================================================
   UTILITIES
   ========================================================== */
function el(id) { return document.getElementById(id); }
async function syncNow() {
  const taskId = Task.start('Syncing orders & stock');
  try {
    const result = await Api.post('/api/settings/sync-now');
    const r = result.result || {};
    const lines = [];
    if (r.shopify) {
      const s = r.shopify;
      if (s.skipped) lines.push('• Shopify orders: not configured (set SHOPIFY env vars)');
      else if (s.inserted > 0) lines.push(`✓ ${s.inserted} new Shopify order${s.inserted === 1 ? '' : 's'} imported`);
      else lines.push('• Shopify: no new orders since last sync');
    }
    if (r.ebay) {
      const e = r.ebay;
      if (e.skipped) lines.push('• eBay orders: not configured');
      else if (e.inserted > 0) lines.push(`✓ ${e.inserted} new eBay order${e.inserted === 1 ? '' : 's'} imported`);
      else lines.push('• eBay: no new orders since last sync');
    }
    if (r.shopifyStock && !r.shopifyStock.skipped) {
      const ss = r.shopifyStock;
      lines.push(`✓ Stock pushed to Shopify: ${ss.pushed} of ${ss.total} products`);
    }
    const newCount = (r.shopify?.inserted || 0) + (r.ebay?.inserted || 0);
    const msg = lines.length
      ? 'Sync complete:\n' + lines.join('\n')
      : 'Sync complete. No new data.';
    Task.done(taskId, newCount ? `${newCount} new order${newCount === 1 ? '' : 's'}` : 'Sync complete');
    toast(msg, 'success', 6000);
    await Store.refreshAll();
    if (typeof renderDashboard === 'function' && State.page === 'dashboard') renderDashboard();
    if (State.page === 'sales' && typeof renderSales === 'function') renderSales();
  } catch (e) {
    Task.fail(taskId, 'Sync failed');
    toast('Sync failed: ' + (e.data?.message || e.message), 'error', 6000);
  }
}
/* ==================== TASK PROGRESS BAR ====================
   A tiny module that shows a global progress indicator while long-running
   operations are in flight (mirror, pull, hydrate, sync). Each operation
   calls `Task.start('Pulling eBay listings')` to begin and `Task.done(id)`
   or `Task.fail(id, message)` to end. Supports multiple concurrent tasks —
   the bar stays active while any task is open, and the most recent task's
   label is shown.

   Usage:
     const taskId = Task.start('Pulling eBay listings');
     try { ...await something...; Task.done(taskId); }
     catch (e) { Task.fail(taskId, e.message); }

   Optional progress percentage:
     Task.update(taskId, 'Pulling… 23 of 180', 12); // 12 = 12% complete
*/
const Task = {
  _active: new Map(),
  _nextId: 1,
  _flashTimeout: null,
  start(label) {
    const id = this._nextId++;
    this._active.set(id, { label: label || 'Working…', pct: null });
    this._render();
    return id;
  },
  update(id, label, pct) {
    const t = this._active.get(id);
    if (!t) return;
    if (label != null) t.label = label;
    if (pct != null) t.pct = pct;
    this._render();
  },
  done(id, label) {
    if (id == null) return;
    const t = this._active.get(id);
    if (!t) return;
    this._active.delete(id);
    // If no other tasks are running, briefly flash the success state.
    // Otherwise just re-render to show the next active task's label.
    if (!this._active.size) this._flash('success', label || t.label, 1500);
    else this._render();
  },
  fail(id, label) {
    if (id == null) return;
    const t = this._active.get(id);
    if (!t) return;
    this._active.delete(id);
    if (!this._active.size) this._flash('fail', label || t.label, 3000);
    else this._render();
  },
  _flash(state, label, duration) {
    const bar = document.getElementById('task-bar');
    const lab = document.getElementById('task-bar-label');
    if (!bar || !lab) return;
    bar.classList.remove('active', 'determinate', 'success', 'fail');
    bar.classList.add(state);
    lab.textContent = (state === 'success' ? '✓ ' : '✗ ') + (label || (state === 'success' ? 'Done' : 'Failed'));
    if (this._flashTimeout) clearTimeout(this._flashTimeout);
    this._flashTimeout = setTimeout(() => {
      if (!this._active.size) {
        bar.classList.remove('success', 'fail');
        lab.textContent = '';
      } else this._render();
    }, duration);
  },
  _render() {
    const bar = document.getElementById('task-bar');
    const lab = document.getElementById('task-bar-label');
    if (!bar || !lab) return;
    if (this._flashTimeout) { clearTimeout(this._flashTimeout); this._flashTimeout = null; }
    if (!this._active.size) {
      bar.classList.remove('active', 'determinate', 'success', 'fail');
      lab.textContent = '';
      return;
    }
    bar.classList.remove('success', 'fail');
    bar.classList.add('active');
    // Show the most-recently-started task's label (last one in insertion order).
    const tasks = [...this._active.values()];
    const latest = tasks[tasks.length - 1];
    let label = latest.label;
    if (tasks.length > 1) label += ` · ${tasks.length} running`;
    if (latest.pct != null) {
      bar.classList.add('determinate');
      bar.style.setProperty('--task-pct', Math.max(0, Math.min(100, latest.pct)) + '%');
      label += ` · ${Math.round(latest.pct)}%`;
    } else {
      bar.classList.remove('determinate');
    }
    lab.textContent = label;
  },
};

function toast(msg, type='', duration=3000) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  // Support multi-line toasts
  if (msg.includes('\n')) {
    t.style.whiteSpace = 'pre-line';
    t.style.lineHeight = '1.5';
  }
  t.textContent = msg;
  el('toast-host').appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),200); }, duration);
}
function modal({ title, body, actions=[] }) {
  el('modal-title').textContent = title;
  el('modal-body').innerHTML = body;
  el('modal-foot').innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn ' + (a.primary ? 'btn-primary' : 'btn-outline');
    b.textContent = a.label;
    b.onclick = a.onClick;
    el('modal-foot').appendChild(b);
  });
  el('modal-overlay').classList.add('open');
  // Label any tables in the modal so they stack cleanly on mobile.
  try { if (typeof labelizeTables === 'function') labelizeTables(el('modal-body')); } catch (_) {}
}
function closeModal() { el('modal-overlay').classList.remove('open'); }
el('modal-close').addEventListener('click', closeModal);
el('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });

// Boot
init();
</script>
