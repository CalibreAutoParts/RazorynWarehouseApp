      <div style="padding:10px;background:var(--line-2);border-radius:8px"><div style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;font-weight:600">Location</div><div style="font-size:13px;font-weight:600;margin-top:2px">${p.location||'—'}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-success" onclick="adjustStock('${p.id}', 'check')">✓ Stock matches</button>
      <button class="btn btn-outline" onclick="adjustStock('${p.id}', 'adjust')">Adjust qty</button>
      <button class="btn btn-outline" onclick="adjustStock('${p.id}', 'damaged')">Mark damaged</button>
      <button class="btn btn-outline" onclick="adjustStock('${p.id}', 'sold')">Mark sold (cash)</button>
    </div>
  `;
}
function adjustStock(id, action) {
  const p = State.products.find(x => x.id == id);
  if (action === 'check') { toast('✓ ' + p.sku + ' confirmed', 'success'); return; }
  if (action === 'adjust') {
    modal({
      title: 'Adjust stock — ' + p.sku,
      body: `
        <div class="field"><label>Current stock</label><div style="padding:10px;background:var(--line-2);border-radius:8px">${totalQty(p)}</div></div>
        <div class="field"><label>New stock count</label><input id="adj-qty" type="number" value="${totalQty(p)}"></div>
        <div class="field"><label>Reason</label><select id="adj-reason"><option>Stock count correction</option><option>Damaged</option><option>Lost</option><option>Cash sale</option><option>Bank transfer sale</option><option>Replacement</option><option>Other</option></select></div>
        <div class="field"><label>Notes (optional)</label><textarea id="adj-notes" rows="2"></textarea></div>`,
      actions: [
        { label: 'Save', primary: true, onClick: async () => {
          const newQ = +el('adj-qty').value;
          const reason = el('adj-reason').value;
          const delta = newQ - (p.qtyOnHand ?? totalQty(p));
          if (delta === 0) { closeModal(); return; }
          try {
            const r = await Api.post('/api/products/' + p.id + '/adjust-stock', {
              delta, reason: reason.toLowerCase().replace(/\s+/g, '_'),
              notes: el('adj-notes').value,
            });
            // Track for later "print labels from this stock-check session"
            State.recentStockCheckProducts = State.recentStockCheckProducts || [];
            if (!State.recentStockCheckProducts.includes(p.id)) State.recentStockCheckProducts.push(p.id);
            await Store.refresh('products');
            const updated = State.products.find(x => x.id === p.id);
            closeModal();
            const pushMsg = r.channelPush ? ' · ' + summarizeChannelPush(r.channelPush).replace(/^[✓⚠]\s*/, '') : '';
            toast(`Updated ${p.sku} → ${newQ}${pushMsg}`, r.channelPush && pushResultHasError(r.channelPush) ? 'warn' : 'success', 6000);
            if (updated) showProductScanCard(updated);
            refreshNavCounts();
            if (updated && delta > 0) {
              setTimeout(() => promptPrintLabels(updated, 'stock_added', delta), 300);
            }
          } catch (e) { toast('Failed: ' + e.message, 'error'); }
        }},
        { label: 'Cancel', onClick: closeModal }
      ]
    });
  }
  if (action === 'damaged') {
    modal({
      title: 'Mark as damaged — ' + p.sku,
      body: `<div class="field"><label>How many damaged?</label><input id="dmg-qty" type="number" value="1" min="1" max="${totalQty(p)}"></div><div class="field"><label>Notes</label><textarea id="dmg-notes" rows="2" placeholder="Where on the part is the damage? Cause?"></textarea></div>`,
      actions: [
        { label: 'Mark damaged', primary: true, onClick: async () => {
          const q = +el('dmg-qty').value;
          try {
            await Api.post('/api/products/' + p.id + '/adjust-stock', {
              delta: -q, reason: 'damage', notes: el('dmg-notes').value,
            });
            await Store.refresh('products');
            const updated = State.products.find(x => x.id === p.id);
            closeModal();
            toast(`Marked ${q} damaged. Stock reduced.`, 'warn');
            if (updated) showProductScanCard(updated);
          } catch (e) { toast('Failed: ' + e.message, 'error'); }
        }},
        { label: 'Cancel', onClick: closeModal }
      ]
    });
  }
  if (action === 'sold') {
    modal({
      title: 'Cash sale — ' + p.sku,
      body: `
        <div class="field"><label>Channel</label><select id="sold-ch"><option value="direct_cash">Cash on collection</option><option value="direct_bank">Bank transfer</option></select></div>
        <div class="field"><label>Amount (£)</label><input id="sold-amt" type="number" step="0.01" value="${(p.priceEbay/0.9).toFixed(2)}"></div>
        <div class="field"><label>Customer name / reference</label><input id="sold-cust" placeholder="Walk-in / company name"></div>`,
      actions: [
        { label: 'Record sale', primary: true, onClick: async () => {
          try {
            const channel = el('sold-ch').value;
            const unit = +el('sold-amt').value;
            // Backend computes VAT itself; pass unit price and let it derive subtotal/vat.
            // Quick path: send the unit price as ex-VAT and let backend add 20%.
            // For simplicity, treat the entered amount as inc-VAT and back out the subtotal.
            const vatRate = (State.settings.vatRate ?? 20) / 100;
            const subtotalUnit = +(unit / (1 + vatRate)).toFixed(2);
            await Api.post('/api/sales', {
              channel,
              customerName: el('sold-cust').value || 'Walk-in',
              items: [{ productId: p.id, qty: 1, unitPrice: subtotalUnit }],
              shipping: 0,
            });
            await Store.refresh('products');
            await Store.refresh('sales');
            const updated = State.products.find(x => x.id === p.id);
            closeModal();
            toast('Sale recorded · stock decremented · syncing', 'success');
            if (updated) showProductScanCard(updated);
          } catch (e) { toast('Failed: ' + (e.data?.error || e.message), 'error'); }
        }},
        { label: 'Cancel', onClick: closeModal }
      ]
    });
  }
}

// Render the item grid, scoped to the currently-selected area filter.
function paintLocItems() {
  const grid = el('loc-grid');
  if (!grid) return;
  const q = (el('loc-search')?.value || '').toLowerCase();
  const filter = State.locFilter || 'all';

  let items = State.products;
  // Scope to selected area — this is the "load only from that area" behaviour:
  // we filter to just that area's products so big areas like Ground Floor
  // don't render the whole catalogue.
  if (filter === 'none') {
    items = items.filter(p => !p.locationId);
  } else if (filter !== 'all') {
    items = items.filter(p => String(p.locationId) === String(filter));
  }
  if (q) {
    items = items.filter(p => matchesKeywords(q, p.title, p.sku, p.location, p.brand, p.model));
  }

  // Title reflects the active filter
  const titleEl = el('loc-items-title');
  const subEl = el('loc-items-sub');
  if (titleEl) {
    if (filter === 'all') { titleEl.textContent = 'All items'; }
    else if (filter === 'none') { titleEl.textContent = 'Unassigned items'; }
    else {
      const loc = (State.locations || []).find(l => String(l.id) === String(filter));
      titleEl.textContent = loc ? loc.name : 'Items';
    }
  }
  if (subEl) subEl.textContent = `${items.length} item${items.length === 1 ? '' : 's'} · tap to change location`;

  // Paginate to 50 cards, appending more on scroll (same pattern as Inventory).
  // Photos lazy-load from the per-product endpoint, so even a big area renders
  // only ~50 small image requests instead of inlining hundreds of base64 blobs.
  State._locItems = items;
  State._locShown = 0;
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><div class="t">No items in this area</div></div>';
    return;
  }
  grid.innerHTML = '';
  locRenderChunk();
  requestAnimationFrame(locFillToViewport);

  if (State._locObserver) State._locObserver.disconnect();
  const sentinel = el('loc-sentinel');
  if (sentinel) {
    State._locObserver = new IntersectionObserver((entries) => {
      if (entries.some(en => en.isIntersecting)) locFillToViewport();
    }, { rootMargin: '300px' });
    State._locObserver.observe(sentinel);
  }
}

// Pick the thumbnail for the Locations grid card — the slot the user marked as
// main, falling back item → location → location2.
function productThumb(p) {
  const byKey = { item: p.itemPhoto, location: p.locationPhoto, location2: p.locationPhoto2 };
  return byKey[p.primaryPhoto] || p.itemPhoto || p.locationPhoto || p.locationPhoto2 || null;
}

function locCardHtml(p) {
  const thumb = productThumb(p);
  return `
    <div class="loc-card" onclick="openLocationModal('${p.id}')">
      <div class="loc-img" style="${thumb ? `background-image:url(${thumb})` : ''}">
        ${!thumb ? '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' : ''}
      </div>
      <div class="loc-meta">
        <div class="loc-title">${escapeHtml(p.title)}</div>
        <div class="loc-desc">${p.location ? escapeHtml(p.location) : '<span style="color:var(--amber)">No location set</span>'}</div>
      </div>
    </div>
  `;
}

function locRenderChunk() {
  const grid = el('loc-grid');
  const list = State._locItems || [];
  const shown = State._locShown || 0;
  if (!grid || shown >= list.length) return;
  const slice = list.slice(shown, shown + 50);
  grid.insertAdjacentHTML('beforeend', slice.map(locCardHtml).join(''));
  State._locShown = shown + slice.length;
}

function locFillToViewport() {
  const s = el('loc-sentinel');
  const list = State._locItems || [];
  if (!s || (State._locShown || 0) >= list.length) return;
  if (s.getBoundingClientRect().top < window.innerHeight + 300) {
    locRenderChunk();
    requestAnimationFrame(locFillToViewport);
  }
}

function setLocFilter(filter) {
  State.locFilter = filter;
  // Re-render the area cards (to show selected state) + the item list
  renderLocAreaCards();
  paintLocItems();
}

// Live preview when a photo file is chosen in a location modal.
// Downscale an image file in the browser before upload. Modern phones produce
// 4–10 MB photos straight from the camera; uploading those is slow on cellular
// AND fails the server-side size guards. We draw the image onto a canvas at a
// max dimension of 1600px (plenty for warehouse reference photos) and re-encode
// as JPEG. Typical result: 3 MB phone photo → ~400 KB JPEG, still sharp.
//
// Returns a Blob with the downscaled image, or the original file if it's
// already small (<400 KB) so we don't re-encode for no benefit.
async function downscaleImage(file, opts = {}) {
  const maxDim = opts.maxDim || 1600;
  const quality = opts.quality || 0.82;
  const skipBelowBytes = opts.skipBelowBytes || 400_000;
  if (!file || !/^image\//.test(file.type)) return file;
  if (file.size <= skipBelowBytes) return file;  // small already — skip re-encode
  try {
    // createImageBitmap is faster than <img> + onload and handles EXIF orientation
    // correctly. Fall back to the <img> path if a browser doesn't support it.
    let bitmap;
    if (typeof createImageBitmap === 'function') {
      try { bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' }); }
      catch { bitmap = await createImageBitmap(file); }
    } else {
      bitmap = await new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = () => rej(new Error('image decode failed'));
        img.src = URL.createObjectURL(file);
      });
    }
    const srcW = bitmap.width || bitmap.naturalWidth;
    const srcH = bitmap.height || bitmap.naturalHeight;
    const scale = Math.min(1, maxDim / Math.max(srcW, srcH));
    const dstW = Math.round(srcW * scale);
    const dstH = Math.round(srcH * scale);
    const canvas = document.createElement('canvas');
    canvas.width = dstW;
    canvas.height = dstH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0, dstW, dstH);
    if (bitmap.close) bitmap.close();
    const blob = await new Promise((res) => canvas.toBlob(b => res(b), 'image/jpeg', quality));
    if (!blob) return file;  // toBlob failed (rare) — fall back to original
    // If somehow the "downscaled" version is larger than the original (already-
    // compressed source like a tiny PNG), keep the original.
    return blob.size < file.size ? blob : file;
  } catch (e) {
    console.warn('[downscaleImage] failed, using original:', e.message);
    return file;
  }
}

// Read a Blob or File as a data URL. Returns a promise.
function readAsDataUrl(blob) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result);
    reader.onerror = () => rej(reader.error || new Error('read failed'));
    reader.readAsDataURL(blob);
  });
}

async function locPreviewPhoto(input, previewId, placeholderId) {
  const file = input.files?.[0];
  if (!file) return;
  // Allow up to 12 MB raw from the camera; we'll downscale it ourselves so the
  // upload is always reasonable. Anything above 12 MB is almost certainly a RAW
  // file or video and we shouldn't try to handle it.
  if (file.size > 12 * 1024 * 1024) {
    toast(`Photo is ${(file.size/1024/1024).toFixed(1)} MB — too big even after compression. Max 12 MB. Try the standard camera setting (not RAW).`, 'warn', 7000);
    input.value = '';
    return;
  }
  const previewEl = el(previewId);
  const ph = el(placeholderId);
  if (previewEl) previewEl.style.opacity = '0.5';  // brief dim while we process
  try {
    const blob = await downscaleImage(file);
    // Stash the processed blob on the input so the submit handler uses the
    // downscaled version, not the raw camera file. We do this with a non-
    // enumerable property to avoid surprising anything else.
    input._processedBlob = blob;
    input._processedName = (file.name || 'photo').replace(/\.[^.]+$/, '') + '.jpg';
    const dataUrl = await readAsDataUrl(blob);
    if (previewEl) {
      previewEl.style.backgroundImage = `url(${dataUrl})`;
      previewEl.style.opacity = '1';
    }
    if (ph) ph.style.display = 'none';
    // If we actually shrank it, let the user know — reassuring on slow connections.
    if (blob.size < file.size * 0.7) {
      toast(`Photo compressed to ${(blob.size/1024).toFixed(0)} KB — uploading…`, 'info', 2500);
    }
  } catch (e) {
    if (previewEl) previewEl.style.opacity = '1';
    toast('Could not process photo: ' + e.message, 'error');
  }
}

// Per-product photo slot (item / location / location2): downscale + preview +
// stash as a data URL in window._lmPhotos[key]. Same downscaling as the area
// photos — phone cameras produce 4-10 MB JPEGs we shrink to ~400 KB without
// losing detail needed to identify a part or find it on a shelf.
async function lmPreviewSlot(input, key) {
  const file = input.files?.[0];
  if (!file) return;
  if (file.size > 12 * 1024 * 1024) {
    toast(`Photo is ${(file.size/1024/1024).toFixed(1)} MB — too big even after compression. Max 12 MB.`, 'warn', 7000);
    input.value = '';
    return;
  }
  const preview = el('lm-preview-' + key);
  const ph = el('lm-preview-ph-' + key);
  if (preview) preview.style.opacity = '0.5';
  try {
    const blob = await downscaleImage(file);
    const dataUrl = await readAsDataUrl(blob);
    window._lmPhotos[key] = dataUrl;
    if (preview) {
      preview.style.backgroundImage = `url(${dataUrl})`;
      preview.style.opacity = '1';
    }
    if (ph) ph.style.display = 'none';
    const rm = el('lm-remove-' + key);
    if (rm) rm.style.display = '';
    if (blob.size < file.size * 0.7) {
      toast(`Photo compressed to ${(blob.size/1024).toFixed(0)} KB — will save on next Save.`, 'info', 2500);
    }
  } catch (e) {
    if (preview) preview.style.opacity = '1';
    toast('Could not process photo: ' + e.message, 'error');
  }
}

function lmClearSlot(key) {
  window._lmPhotos[key] = null;  // explicit clear
  const preview = el('lm-preview-' + key);
  const ph = el('lm-preview-ph-' + key);
  if (preview) preview.style.backgroundImage = '';
  if (ph) { ph.style.display = ''; ph.textContent = 'No photo yet'; }
  const rm = el('lm-remove-' + key);
  if (rm) rm.style.display = 'none';
}

// Mark a slot as the main thumbnail (★). Records the choice in window._lmPrimary
// and repaints the star buttons; persisted as primary_photo on Save.
function lmSetMain(key) {
  window._lmPrimary = key;
  document.querySelectorAll('.lm-main-btn').forEach(b => {
    const on = b.getAttribute('data-key') === key;
    b.textContent = on ? '★ Main' : '☆ Set as main';
    b.style.color = on ? 'var(--amber)' : 'var(--ink-soft)';
  });
}
function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function labelsAdd(productId) {
  const p = State.products.find(x => x.id == productId);
  if (!p) return;
  State.labels = State.labels || [];
  const existing = State.labels.find(l => l.productId === p.id);
  if (existing) { existing.qty++; }
  else { State.labels.push({ productId: p.id, sku: p.sku, title: p.title, barcode: p.barcode || p.sku, partNumber: p.partNumber || p.sku, qty: 1 }); }
  el('lab-search').value = '';
  el('lab-suggest').innerHTML = '';
  paintLabelsList();
}

  State.labels.splice(idx, 1);
  paintLabelsList();

  State.labels[idx].qty = Math.max(1, (State.labels[idx].qty || 1) + delta);

        <label>Size</label>
        <select id="ppl-size">
          <option value="100x150">Large 4×6 inch (recommended)</option>
          <option value="50x25">Small 50×25 mm</option>
          <option value="25x50">Tall 25×50 mm</option>
        </select>
      </div>
    `,
    actions: [
      { label: 'Skip', onClick: closeModal },
      { label: '🏷 Print labels', primary: true, onClick: () => {
        const qty = +el('ppl-qty').value || 1;
        const size = el('ppl-size').value;
        // Queue the product and route to Labels
        State.labels = State.labels || [];
        const existing = State.labels.find(l => l.productId === product.id);
        if (existing) existing.qty += qty;
        else State.labels.push({
          productId: product.id, sku: product.sku, title: product.title,
          barcode: product.barcode || product.sku, partNumber: product.partNumber || product.sku, qty,
        });
        closeModal();
        routeTo('labels');
        // After the Labels page renders, set the size selector
        setTimeout(() => {
          const sel = el('lab-size');
          if (sel) { sel.value = size; sel.dispatchEvent(new Event('change')); }
        }, 100);
      }},
    ],
  });
}

function labelsMatchStock(idx) {
  const label = State.labels[idx];
  if (!label) return;
  const p = State.products.find(x => x.id === label.productId);
  if (!p) { toast('Product not found', 'warn'); return; }
  const qty = totalQty(p);
  if (qty < 1) { toast(`${p.sku} has no stock`, 'warn'); return; }
  State.labels[idx].qty = qty;
  paintLabelsList();
  toast(`${p.sku} → ${qty} labels`, 'success');
}

function labelsMatchAllStock() {
  if (!State.labels?.length) return;
  let total = 0;
  for (const l of State.labels) {
    const p = State.products.find(x => x.id === l.productId);
    if (p) { l.qty = Math.max(1, totalQty(p)); total += l.qty; }
  }
  paintLabelsList();
  toast(`Matched ${State.labels.length} item${State.labels.length === 1 ? '' : 's'} to stock — ${total} labels`, 'success');
}

function paintLabelsList() {
  const list = el('lab-list');
  if (!list) return;
  const items = State.labels || [];
  // Toggle orientation selector visibility — only meaningful for 4x6
  const sizeEl = el('lab-size');
  const orientWrap = el('lab-orient-wrap');
  if (sizeEl && orientWrap) orientWrap.style.display = sizeEl.value === '100x150' ? '' : 'none';
  if (!items.length) {
    list.innerHTML = '<div class="empty"><div class="t">No labels queued</div><div style="font-size:12px;color:var(--ink-soft);margin-top:6px">Search above to add products to the print queue.</div></div>';
    return;
  }
  const total = items.reduce((a, b) => a + (b.qty || 1), 0);
  list.innerHTML = `
    <div class="card">
      <div class="card-head"><h3>Queue (${items.length} item${items.length === 1 ? '' : 's'} · ${total} label${total === 1 ? '' : 's'})</h3></div>
      <div style="overflow-x:auto">
        <table class="table">
          <thead><tr><th style="width:45%">Item</th><th>SKU</th><th>In stock</th><th class="num">Qty</th><th></th></tr></thead>
          <tbody>
            ${items.map((it, i) => {
              const p = State.products.find(x => x.id === it.productId);
              const stockQty = p ? totalQty(p) : '?';
              return `
              <tr>
                <td><div style="font-weight:500">${escapeHtml(it.title)}</div></td>
                <td style="font-family:ui-monospace,monospace;font-size:12px">${escapeHtml(it.sku)}</td>
                <td><span class="pill ${stockQty>0?'green':'red'}" style="font-size:10px">${stockQty}</span></td>
                <td class="num" style="white-space:nowrap">
                  <button class="btn btn-ghost btn-sm" onclick="labelsQty(${i},-1)">−</button>
                  <strong style="margin:0 6px;display:inline-block;min-width:24px;text-align:center">${it.qty}</strong>
                  <button class="btn btn-ghost btn-sm" onclick="labelsQty(${i},1)">+</button>
                  <button class="btn btn-ghost btn-sm" onclick="labelsMatchStock(${i})" title="Set qty = current stock on hand" style="margin-left:6px">⚖️ Match</button>
                </td>
                <td><button class="btn btn-ghost btn-sm" onclick="labelsRemove(${i})" style="color:var(--red)">🗑</button></td>
              </tr>
            `}).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function labelsPrint(itemsArg) {
  // itemsArg lets other features (e.g. Listing Mirror "Print label") print a
  // one-off label set without touching the Labels page list. Each item:
  // { sku, title, partNumber, barcode, qty }.
  const items = Array.isArray(itemsArg) && itemsArg.length ? itemsArg : (State.labels || []);
  if (!items.length) { toast('Add at least one product first', 'warn'); return; }
  const size = el('lab-size').value;
  // For 4x6 the user can choose landscape (default) or portrait.
  // Other sizes have fixed orientation (50x25 is always landscape, 25x50 is always portrait).
  const orient = size === '100x150' ? (el('lab-orient').value || 'landscape') : (size === '25x50' ? 'portrait' : 'landscape');

  // Build size config — for 4x6 we swap w/h based on orientation.
  let s;
  if (size === '50x25') {
    s = { w: 50, h: 25, name: '50×25 mm', barW: 1.5, barH: 28, fontTitle: 7, fontSku: 6.5, fontBar: 7, layout: 'small' };
  } else if (size === '25x50') {
    s = { w: 25, h: 50, name: '25×50 mm', barW: 1.2, barH: 55, fontTitle: 6, fontSku: 5.5, fontBar: 6, layout: 'tall' };
  } else {
    // 4×6 inch = 101.6×152.4 mm. Use exact 4x6 inch dimensions for thermal printers.
    if (orient === 'landscape') {
      s = { w: 152.4, h: 101.6, name: '4×6 inch (landscape)', barW: 3.5, barH: 110, fontTitle: 22, fontSku: 16, fontBar: 13, layout: 'large-landscape', logoSize: '34mm' };
    } else {
      s = { w: 101.6, h: 152.4, name: '4×6 inch (portrait)', barW: 3, barH: 130, fontTitle: 20, fontSku: 15, fontBar: 12, layout: 'large-portrait', logoSize: '28mm' };
    }
  }

  // Expand by qty
  const expanded = [];
  for (const it of items) for (let i = 0; i < (it.qty || 1); i++) expanded.push(it);

  const w = window.open('', '_blank', 'width=900,height=700');

  // Branding — driven by the active brand (Calibre vs Razoryn vs any future

  } else if (s.layout === 'tall') {

  function generate() {

function renderReturns() {
  el('content').innerHTML = `
    <div class="page">
      <div class="page-head">
        <div><h1>Returns</h1><div class="desc">Auto-synced from eBay every 15 min. New cases &amp; state changes appear in 🔔 notifications. Click any card for details.</div></div>
        <div class="actions">
          <button class="btn btn-outline" onclick="relinkReturns()" title="Fix wrong product matches, re-link unmatched returns, and re-sync open/closed statuses">🔧 Repair</button>
          <button class="btn btn-outline" onclick="syncEbayReturns()" title="Pull return cases from eBay right now">↩️ Pull from eBay</button>
          <button class="btn btn-primary" onclick="openReturnModal()">+ Log return</button>
        </div>
      </div>
      <div id="ret-stats" class="grid-4" style="margin-bottom:14px"></div>
      <div class="seg" style="margin-bottom:14px">
        <button class="active" data-rfilter="open">Open</button>
        <button data-rfilter="received">Received</button>
        <button data-rfilter="processed">Processed</button>
        <button data-rfilter="closed">Closed</button>
        <button data-rfilter="all">All</button>
      </div>
      <div id="ret-list"></div>
    </div>
  `;
  document.querySelectorAll('[data-rfilter]').forEach(b => b.addEventListener('click', () => filterReturns(b.dataset.rfilter)));
  filterReturns('open');
}

function paintReturnStats() {
  const counts = State.returns.reduce((acc, r) => { acc[r.status] = (acc[r.status]||0) + 1; return acc; }, {});
  const overdue = State.returns.filter(r => r.status === 'open' && r.respondBy && new Date(r.respondBy) < new Date()).length;
  const dueSoon = State.returns.filter(r => {
    if (r.status !== 'open' || !r.respondBy) return false;
    const h = (new Date(r.respondBy) - new Date()) / 3600000;
    return h >= 0 && h < 48;
  }).length;
  el('ret-stats').innerHTML = `
    <div class="stat"><div class="label">Open cases</div><div class="value">${counts.open || 0}</div><div class="delta">${overdue ? overdue + ' overdue' : 'On track'}</div></div>
    <div class="stat"><div class="label">Due within 48h</div><div class="value">${dueSoon}</div><div class="delta">Action soon</div></div>
    <div class="stat"><div class="label">Received</div><div class="value">${counts.received || 0}</div><div class="delta">Awaiting decision</div></div>
    <div class="stat"><div class="label">Closed (30d)</div><div class="value">${(counts.closed || 0) + (counts.processed || 0)}</div><div class="delta">Resolved</div></div>
  `;
}

function deadlineBadge(respondBy) {
  if (!respondBy) return '';
  const ms = new Date(respondBy).getTime() - Date.now();
  const hours = ms / 3600000;
  const days = Math.floor(hours / 24);
  if (hours < 0) {
    const overH = Math.abs(Math.floor(hours));
    const label = overH >= 24 ? `${Math.floor(overH/24)}d overdue` : `${overH}h overdue`;
    return `<span class="pill red" style="font-weight:600">⚠ ${label}</span>`;
  }
  if (hours < 24) return `<span class="pill red" style="font-weight:600">⏰ ${Math.max(1, Math.floor(hours))}h to reply</span>`;
  if (hours < 48) return `<span class="pill amber" style="font-weight:600">⏰ ${days}d to reply</span>`;
  return `<span class="pill blue">⏰ ${days}d to reply</span>`;
}

function filterReturns(f) {
  document.querySelectorAll('[data-rfilter]').forEach(b => b.classList.toggle('active', b.dataset.rfilter === f));
  paintReturnStats();
  const items = f === 'all' ? State.returns : State.returns.filter(r => r.status === f);
  if (!items.length) {
    el('ret-list').innerHTML = `<div class="empty"><div class="t">No ${f === 'all' ? '' : f + ' '}returns</div><div style="font-size:12px;color:var(--ink-soft);margin-top:6px">${f === 'open' ? 'Hit "↩️ Pull from eBay" to refresh.' : ''}</div></div>`;
    return;
  }
  const statusPill = (s) => s === 'open' ? 'amber' : s === 'received' ? 'blue' : s === 'processed' ? 'green' : '';
  const statusLabel = (s) => s === 'open' ? 'Open' : s === 'received' ? 'Received' : s === 'processed' ? 'Processed' : 'Closed';

  el('ret-list').innerHTML = items.map(r => {
    const overdue = r.respondBy && r.status === 'open' && new Date(r.respondBy) < new Date();
    const itemLabel = r.title || '(item not linked)';
    const skuLabel = r.sku ? ` · <span style="font-family:ui-monospace,monospace;font-size:11px">${escapeHtml(r.sku)}</span>` : '';
    return `
    <div class="card return-card" style="margin-bottom:10px;cursor:pointer;${overdue ? 'border-left:3px solid var(--red)' : ''}" onclick="openReturnDetail(${r.id})">
      <div class="card-body" style="padding:14px">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
              ${channelPill(r.channel)}
              <span class="pill ${statusPill(r.status)}">${statusLabel(r.status)}</span>
              ${deadlineBadge(r.respondBy)}
              ${r.photoCount ? `<span class="pill" style="background:var(--bg-soft);color:var(--ink-soft)">📷 ${r.photoCount}</span>` : ''}
              <span style="font-size:11px;color:var(--ink-soft);margin-left:auto">${fmtDate(r.date)}</span>
            </div>
            <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(itemLabel)}</div>
            <div style="color:var(--ink-soft);font-size:12px;margin-top:2px">
              ${skuLabel ? skuLabel : ''}
              ${r.buyerUsername ? ` ${skuLabel ? '·' : ''} buyer <strong style="color:var(--ink)">${escapeHtml(r.buyerUsername)}</strong>` : ''}
              ${r.externalOrderId ? ` · order <span style="font-family:ui-monospace,monospace;font-size:11px">${escapeHtml(r.externalOrderId)}</span>` : ''}
            </div>
            <div style="margin-top:6px;font-size:13px"><strong>Reason:</strong> ${escapeHtml(r.reason || '—')}</div>
            ${r.refundAmount > 0 ? `<div style="font-size:12px;margin-top:2px"><strong>Refund:</strong> ${gbp(r.refundAmount)}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">

}

async function saveReturnDetail(id) {
  const notes = el('rd-notes')?.value || '';
  const resolution = el('rd-resolution')?.value || 'pending';
  try {
    await Api.patch('/api/returns/' + id, { notes, resolution });
    toast('Saved', 'success');
    closeModal();
    await Store.refresh('returns');
    if (State.page === 'returns') {
      const active = document.querySelector('[data-rfilter].active')?.dataset.rfilter || 'open';
      filterReturns(active);
    }
  } catch (e) { toast('Save failed: ' + (e.data?.message || e.message), 'error'); }
}

function updateResolutionHint() {
  const sel = el('rd-resolution');
  const hint = el('rd-resolution-hint');
  if (!sel || !hint) return;
  const messages = {
    restock: '✓ When you mark this return <strong>Processed</strong>, the item qty will be added back to your warehouse stock automatically.',
    relist_used: 'No stock change. Create a new listing for the used/damaged item manually on eBay/Shopify with the appropriate condition (Used, Refurbished, For Parts).',
    dispose: 'No stock change. Item is treated as scrap. Logged in the return record only.',
    refund: 'No stock change. Buyer keeps the item — typically used for low-value items where return shipping costs more than the item.',
    replacement: 'No stock change. A separate replacement order will need to be created if not already done.',
    pending: 'Awaiting your decision. Make a choice before marking Processed.',
  };
  hint.innerHTML = messages[sel.value] || '';
}

async function advanceReturn(id, status, saveFirst) {
  try {
    if (saveFirst) {
      const notes = el('rd-notes')?.value;
      const resolution = el('rd-resolution')?.value;
      await Api.patch('/api/returns/' + id, { status, notes, resolution });
    } else {
      await Api.patch('/api/returns/' + id, { status });
    }
    toast(`Marked ${status}`, 'success');
    closeModal();
    await Store.refresh('returns');
    if (State.page === 'returns') {
      const active = document.querySelector('[data-rfilter].active')?.dataset.rfilter || 'open';
      filterReturns(active);
    }
  } catch (e) { toast('Update failed: ' + (e.data?.message || e.message), 'error'); }
}

async function uploadReturnPhotos(id, files) {
  if (!files || !files.length) return;
  toast(`Uploading ${files.length} photo${files.length > 1 ? 's' : ''}…`, 'info');
  try {
    for (const f of files) {
      const fd = new FormData();
      fd.append('photo', f);
      const r = await fetch('/api/returns/' + id + '/photos', { method: 'POST', body: fd, credentials: 'include' });
      if (!r.ok) throw new Error(`Upload failed (${r.status})`);
    }
    toast(`Uploaded ${files.length} photo${files.length > 1 ? 's' : ''}`, 'success');
    await Store.refresh('returns');
    openReturnDetail(id); // reopen with the new photos visible
  } catch (e) { toast('Upload failed: ' + e.message, 'error'); }
}
function openReturnModal() {
  modal({
    title: 'Log return',
    body: `
      <div class="field"><label>Item (search)</label><input id="r-search" placeholder="SKU or part #" list="r-products"><datalist id="r-products">${State.products.map(p=>`<option value="${p.sku}">${p.title}</option>`).join('')}</datalist></div>
      <div class="field"><label>Channel</label><select id="r-ch"><option value="shopify">Shopify</option><option value="ebay">eBay</option><option value="cash">Cash / walk-in</option></select></div>
      <div class="field"><label>Customer</label><input id="r-cust"></div>
      <div class="field"><label>Reason</label><select id="r-reason"><option>Damaged in transit</option><option>Wrong fitment</option><option>Defective part</option><option>Customer changed mind</option><option>Wrong item shipped</option><option>Other</option></select></div>
      <div class="field"><label>Notes</label><textarea id="r-notes" rows="2"></textarea></div>
      <div class="field"><label>Photos</label><input type="file" id="r-photos" accept="image/*" capture="environment" multiple></div>
    `,
    actions: [
      { label: 'Log return', primary: true, onClick: async () => {
        const sku = el('r-search').value;
        const p = State.products.find(x => x.sku === sku);
        // Map UI channel ('cash' / 'shopify' / 'ebay') to API channel
        const chMap = { shopify: 'shopify', ebay: 'ebay_em', cash: 'direct_cash' };
        try {
          const created = await Api.post('/api/returns', {
            productId: p?.id || null,
            channel: chMap[el('r-ch').value] || 'direct_cash',
            qty: 1,
            reason: el('r-reason').value,
            notes: el('r-notes').value,
          });
          // Upload photos one by one
          const files = el('r-photos').files;
          for (const f of files) {
            const fd = new FormData();
            fd.append('photo', f);
            try { await Api.postForm('/api/returns/' + created.return.id + '/photos', fd); }
            catch (e) { console.warn('photo upload failed:', e.message); }
          }
          await Store.refresh('returns');
          closeModal();
          toast('Return logged', 'success');
          renderReturns();
          refreshNavCounts();
        } catch (e) { toast('Failed: ' + e.message, 'error'); }
      }},
      { label: 'Cancel', onClick: closeModal }
    ]
  });
}

/* ==========================================================
   DISPATCH
   ==========================================================
   The "what's still to do" worklist for the warehouse.

   Three sections:
   • Awaiting dispatch — paid Shopify/eBay/bank orders that need a tracking
     number and a shipping label. Sorted oldest-first so nothing slips through.
   • Awaiting collection — paid cash-on-collection orders, waiting for the
     customer to walk in and pick the part up.
   • Recent — last 14 days of dispatches/collections, for verification and
     fixing typos.

   Mark dispatched flow:
     1. Click the row (or "📦 Mark dispatched")
     2. Modal opens with carrier dropdown + tracking input + notes
     3. Submit — saves to DB, status → 'dispatched'
     4. Optionally pushes back to eBay/Shopify (best-effort, async)

   Channel push uses eBay's CompleteSale (Trading API) and Shopify's
   Fulfillment API. Both are wrapped in services/ebay.js and services/shopify.js
   — if those service helpers don't exist yet, the backend records the dispatch
   locally and surfaces "channel push not implemented" as a non-fatal warning.
*/
function renderDispatch() {
  if (!State.dispatchSelected) State.dispatchSelected = new Set();
  el('content').innerHTML = `
    <div class="page">
      <div class="page-head">
        <div>
          <h1>Dispatch</h1>
          <div class="desc">Outstanding orders waiting to ship or be collected. Oldest first — clear them in order.</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <label style="font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:6px">
            Show last
            <select id="dispatch-days" onchange="loadDispatch()" style="padding:4px 8px;font-size:12px">
              <option value="3">3 days</option>
              <option value="7">7 days</option>
              <option value="10" selected>10 days</option>
              <option value="14">14 days</option>
              <option value="30">30 days</option>
              <option value="90">90 days</option>
            </select>
          </label>
          <button class="btn btn-outline btn-sm" onclick="syncDispatchFromEbay(this)" title="Check eBay for orders already marked dispatched there (tracking uploaded) and clear them from this worklist. Runs automatically every 30 min.">⟳ Sync from eBay</button>
          <button class="btn btn-outline btn-sm" onclick="loadDispatch()" title="Refresh">↻ Refresh</button>
        </div>
      </div>
      <div id="dispatch-content">
        <div class="empty"><div class="t">Loading…</div></div>
      </div>
    </div>
  `;
  loadDispatch();
}

// Fetch the worklist and re-render. Called on page open, after every action,
// and when the sidebar polls for the dispatch count badge.
// #11 — manually pull eBay-fulfilled orders so they drop off the worklist.
async function syncDispatchFromEbay(btn) {
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
  try {
    const r = await Api.post('/api/dispatch/sync-ebay', {});
    if (r.skipped === 'ebay_not_configured') toast('eBay isn’t configured', 'warn');
    else if (r.error) toast('eBay sync issue: ' + r.error, 'warn', 6000);
    else toast(r.dispatched ? `${r.dispatched} order(s) marked dispatched from eBay` : 'No new eBay dispatches found', r.dispatched ? 'success' : 'info', 4000);
    await loadDispatch();
  } catch (e) {
    toast('Sync failed: ' + (e.data?.message || e.message), 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
  }
}

async function loadDispatch() {
  try {
    const daysSelect = el('dispatch-days');
    const days = daysSelect ? parseInt(daysSelect.value, 10) : 10;
    const data = await Api.get(`/api/dispatch/outstanding?days=${days}`);
    State.dispatch = data;
    paintDispatch();
    // Update sidebar badge using the actual worklist count (respects the cutoff).
    // Doesn't poll for warehouse-only users since they don't see this page anyway.
    const total = (data.summary?.toShip || 0) + (data.summary?.toCollect || 0);
    const badge = el('nav-dispatch-count');
    if (badge) {
      badge.textContent = total;
      badge.style.display = total > 0 ? 'inline-block' : 'none';
    }
  } catch (e) {
    const c = el('dispatch-content');
    if (c) c.innerHTML = `<div class="empty"><div class="t">Failed to load</div><div style="font-size:12px;color:var(--ink-soft)">${escapeHtml(e.data?.message || e.message)}</div></div>`;
  }
}

  el('dispatch-content').innerHTML = `

      <button class="btn btn-primary btn-sm" onclick="bulkMarkAlreadyShipped()" title="Mark all selected as 'already shipped on the channel' — no tracking, no push, clears the worklist">✓ Mark as already shipped elsewhere</button>

          ? '<div class="empty" style="padding:30px 16px"><div class="t">Nothing in the last 14 days</div></div>'

              </tr></thead>

}

function renderDispatchRow(s, kind) {
  const ref = s.invoice_number || s.payment_reference || s.external_order_id || '#' + s.id;
  const itemLabel = s.first_item_title
    ? (s.item_count > 1 ? `${escapeHtml(s.first_item_title)} <span style="color:var(--ink-soft)">+${s.item_count - 1}</span>` : escapeHtml(s.first_item_title))
    : '(no items)';
  const ageBadge = describeAge(s.age_hours, /*withClass=*/true);
  const isChecked = State.dispatchSelected.has(String(s.id));
  // Checkbox cell — clicking just the checkbox toggles selection without firing the row click.
  const checkboxCell = `<td onclick="event.stopPropagation()" style="width:32px"><input type="checkbox" class="dispatch-row-check" data-sid="${s.id}" ${isChecked ? 'checked' : ''} onchange="dispatchToggleRow('${s.id}', this.checked)"></td>`;

  if (kind === 'ship') {

          <div style="font-family:ui-monospace,monospace;font-size:12px">${escapeHtml(ref)}</div>
          ${s.order_number && s.order_number !== ref ? `<div style="font-size:10px;color:var(--ink-soft)">${escapeHtml(s.order_number)}</div>` : ''}
        </td>
        <td>${channelPill(s.channel)}</td>
        <td>${escapeHtml(s.customer_name || '—')}</td>
        <td><div style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${itemLabel}</div></td>
        <td class="num"><strong>${gbp(s.total)}</strong></td>
        <td>${ageBadge}</td>
        <td onclick="event.stopPropagation()" style="white-space:nowrap">
          <button class="btn btn-primary btn-sm" onclick="openDispatchModal('${s.id}')">📦 Mark dispatched</button>
        </td>
      </tr>
    `;
  } else {
    // collect
    return `
      <tr style="cursor:pointer" onclick="if(!event.target.closest('button,input'))openCollectModal('${s.id}')">
        ${checkboxCell}
        <td>
          <div style="font-family:ui-monospace,monospace;font-size:12px">${escapeHtml(ref)}</div>
          ${s.order_number && s.order_number !== ref ? `<div style="font-size:10px;color:var(--ink-soft)">${escapeHtml(s.order_number)}</div>` : ''}
        </td>
        <td>${escapeHtml(s.customer_name || '—')}<div style="font-size:11px;color:var(--ink-soft)">${escapeHtml(s.customer_phone || '')}</div></td>
        <td><div style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${itemLabel}</div></td>
        <td class="num"><strong>${gbp(s.total)}</strong></td>

          <button class="btn btn-primary btn-sm" onclick="openCollectModal('${s.id}')">✓ Mark collected</button>
        </td>

}

function renderRecentRow(s) {
  const ref = s.invoice_number || s.payment_reference || s.external_order_id || '#' + s.id;
  const isCollected = !!s.collected_at;
  const when = isCollected ? s.collected_at : s.dispatched_at;
  const whenDate = when ? new Date(when) : null;
  // Channel-push state badge — only shown for orders that needed a channel push
  let pushBadge = '';
  if (s.channel_push_state === 'ok')      pushBadge = '<span class="pill green" style="font-size:9px;margin-left:4px" title="Tracking pushed to channel">✓ Pushed</span>';
  else if (s.channel_push_state === 'pending') pushBadge = '<span class="pill amber" style="font-size:9px;margin-left:4px" title="Push in progress">⋯ Pushing</span>';
  else if (s.channel_push_state === 'error')   pushBadge = '<span class="pill" style="font-size:9px;margin-left:4px;background:var(--red-light);color:var(--red)" title="' + escapeAttr(s.channel_push_error || 'Push failed') + '">⚠ Push failed</span>';
  return `
    <tr>
      <td><div style="font-family:ui-monospace,monospace;font-size:12px">${escapeHtml(ref)}</div></td>
      <td>${channelPill(s.channel)}</td>
      <td>${escapeHtml(s.customer_name || '—')}</td>
      <td>${isCollected ? '💰 Cash collection' : (s.carrier ? `<div style="font-size:12px">${escapeHtml(s.carrier)}</div>${s.tracking_number ? `<div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--ink-soft)">${escapeHtml(s.tracking_number)}</div>` : ''}` : '—')}</td>
      <td><div style="font-size:12px">${whenDate ? whenDate.toLocaleDateString('en-GB', { day:'2-digit', month:'short' }) : '—'}</div><div style="font-size:10px;color:var(--ink-soft)">${whenDate ? whenDate.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }) : ''}</div></td>
      <td>${isCollected ? '<span class="pill green" style="font-size:10px">✓ Collected</span>' : '<span class="pill green" style="font-size:10px">✓ Dispatched</span>'}${pushBadge}</td>
      <td style="white-space:nowrap">
        ${!isCollected && s.tracking_number && s.carrier ? `<a class="btn btn-ghost btn-sm" href="${dispatchTrackingUrl(s.carrier, s.tracking_number) || '#'}" target="_blank" rel="noopener" title="Open tracking">↗ Track</a>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="openEditDispatch('${s.id}')" title="Edit tracking">✏</button>
        ${s.channel_push_state === 'error' ? `<button class="btn btn-ghost btn-sm" onclick="retryChannelPush('${s.id}')" style="color:var(--amber)" title="Retry channel push">↻</button>` : ''}
      </td>
    </tr>
  `;
}

// Compose tracking URL on the frontend, mirrors backend logic so we don't
// need an extra round-trip just to render a link.
function dispatchTrackingUrl(carrier, tracking) {
  if (!carrier || !tracking) return null;
  const t = encodeURIComponent(tracking);
  const templates = {
    'Royal Mail':   `https://www.royalmail.com/track-your-item#/tracking-results/${t}`,
    'Parcelforce':  `https://www.parcelforce.com/portal/pw/track?trackNumber=${t}`,
    'DPD':          `https://www.dpd.co.uk/apps/tracking/?reference=${t}`,
    'Evri':         `https://www.evri.com/track/parcel/${t}`,
    'UPS':          `https://www.ups.com/track?tracknum=${t}`,
    'DHL':          `https://www.dhl.com/gb-en/home/tracking.html?tracking-id=${t}`,
    'FedEx':        `https://www.fedex.com/fedextrack/?trknbr=${t}`,
    'Tuffnells':    `https://www.tuffnells.co.uk/track-a-parcel?consignment=${t}`,
    'Yodel':        `https://www.yodel.co.uk/tracking/${t}`,
    'APC Overnight': `https://apc-overnight.com/customers/tracking-customer-portal?jobref=${t}`,
  };
  return templates[carrier] || null;
}

// Human-friendly age — "2 hr", "1 day", "3 days". Optional pill formatting:
// green ≤24h, amber 24-72h, red >72h. Helps staff spot stale orders.
function describeAge(hours, withClass) {
  if (hours == null) return '—';
  let label, cls;
  if (hours < 1)       { label = '<1 hr';                              cls = 'green'; }
  else if (hours < 24) { label = `${Math.round(hours)} hr`;            cls = 'green'; }
  else if (hours < 72) { label = `${Math.round(hours/24)} day${Math.round(hours/24)===1?'':'s'}`; cls = 'amber'; }
  else                 { label = `${Math.round(hours/24)} days`;       cls = 'red'; }
  if (!withClass) return label;
  return `<span class="pill ${cls}" style="font-size:10px">${label}</span>`;
}

// ──────────────────────────────────────────────────────────────────────────
// Bulk selection — toggles for the worklist tables
// ──────────────────────────────────────────────────────────────────────────
function dispatchToggleRow(id, on) {
  if (on) State.dispatchSelected.add(String(id));
  else State.dispatchSelected.delete(String(id));
  dispatchUpdateBulkBar();
}
function dispatchToggleAll(section, on) {
  // section: 'ship' | 'collect'
  const src = section === 'ship' ? (State.dispatch?.toShip || []) : (State.dispatch?.toCollect || []);
  for (const s of src) {
    if (on) State.dispatchSelected.add(String(s.id));
    else State.dispatchSelected.delete(String(s.id));
  }
  // Reflect new state on the per-row checkboxes too
  document.querySelectorAll('.dispatch-row-check').forEach(cb => {
    if (src.some(s => String(s.id) === cb.dataset.sid)) cb.checked = on;
  });
  dispatchUpdateBulkBar();
}
function dispatchSelectAllOutstanding() {
  for (const s of (State.dispatch?.toShip || [])) State.dispatchSelected.add(String(s.id));
  for (const s of (State.dispatch?.toCollect || [])) State.dispatchSelected.add(String(s.id));
  paintDispatch();
}
function dispatchClearSelection() {
  State.dispatchSelected.clear();
  paintDispatch();
}
function dispatchUpdateBulkBar() {
  const bar = el('dispatch-bulk-bar');
  const count = State.dispatchSelected.size;
  if (bar) bar.style.display = count > 0 ? 'flex' : 'none';
  const cEl = el('dispatch-bulk-count'); if (cEl) cEl.textContent = count;
}

// One-click bulk action: "these were all already shipped via eBay/Shopify before
// this app existed, just mark them dispatched so they leave the worklist".
// No tracking number, no channel push.
async function bulkMarkAlreadyShipped() {
  const ids = Array.from(State.dispatchSelected);
  if (!ids.length) { toast('Nothing selected', 'warn'); return; }
  if (!confirm(`Mark ${ids.length} order${ids.length === 1 ? '' : 's'} as "already shipped on channel"?\n\nThis clears them from the worklist without tracking and without pushing to eBay/Shopify. Use this for legacy orders that were shipped before this app's dispatch tracking existed.\n\nCash-on-collection orders in your selection will be marked as collected instead.`)) return;

  const taskId = Task.start(`Clearing ${ids.length} order${ids.length === 1 ? '' : 's'}`);
  try {
    const r = await Api.post('/api/dispatch/bulk-mark-dispatched', {
      saleIds: ids,
      carrier: 'Already shipped (channel)',
      notes: 'Bulk-cleared — already shipped on source channel',
      pushToChannel: false,
    });
    Task.done(taskId, `${r.dispatched + r.collected} cleared`);
    const lines = [];
    if (r.dispatched) lines.push(`✓ ${r.dispatched} marked dispatched`);
    if (r.collected) lines.push(`✓ ${r.collected} marked collected`);
    if (r.skipped) lines.push(`• ${r.skipped} skipped (already done or invalid)`);
    toast(lines.join('\n'), 'success', 6000);
    State.dispatchSelected.clear();
    await loadDispatch();
    await Store.refresh('sales');
  } catch (e) {
    Task.fail(taskId, 'Failed');
    toast('Bulk action failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function undoDispatch(saleId) {
  if (!confirm('Undo dispatch and return this order to the worklist?\n\nThis only updates our records — if you already pushed tracking to eBay/Shopify, you\'ll need to unmark "shipped" there manually.')) return;
  const taskId = Task.start('Undoing dispatch');
  try {
    await Api.post(`/api/dispatch/${saleId}/undo`);
    Task.done(taskId, 'Undone');
    toast('Dispatch undone — order is back on the worklist', 'success');
    closeModal();
    await loadDispatch();
    await Store.refresh('sales');
  } catch (e) {
    Task.fail(taskId, 'Undo failed');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function retryChannelPush(saleId) {
  const taskId = Task.start('Retrying channel push');
  try {
    await Api.post(`/api/dispatch/${saleId}/retry-push`);
    Task.done(taskId, 'Queued');
    toast('Retry queued — refreshing in a few seconds', 'success');
    setTimeout(loadDispatch, 3000);
  } catch (e) {
    Task.fail(taskId, 'Retry failed');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

// Shortcuts from Sales tab — we may not have the dispatch cache loaded yet,
// so these wrappers fetch it (which gives us the carrier list) and then
// look up the sale from the freshly-fetched outstanding list before opening
// the modal. If the sale isn't in the outstanding list (e.g. it's already
// dispatched), we synthesise a minimal sale object from State.sales so the
// edit modal still works.
async function openDispatchModalShortcut(saleId) {
  if (!State.dispatch) await loadDispatch();
  const inOutstanding = (State.dispatch?.toShip || []).find(s => String(s.id) === String(saleId));
  if (inOutstanding) return openDispatchModal(saleId);
  // Not in outstanding — synthesise from sales list so the modal can still open
  const sale = State.sales.find(s => String(s.id) === String(saleId));
  if (!sale) { toast('Order not found', 'error'); return; }
  // Push a temporary row into the toShip list so openDispatchModal can find it
  if (!State.dispatch) State.dispatch = { toShip: [], toCollect: [], recent: [], carriers: [] };
  State.dispatch.toShip.push({
    id: sale.id, customer_name: sale.customer, total: sale.amount,
    channel: sale.apiChannel, invoice_number: sale.invoice, payment_reference: sale.paymentReference,
    external_order_id: sale.externalOrderId, shipping_address: sale.shippingAddress,
  });
  openDispatchModal(saleId);
}
async function openCollectModalShortcut(saleId) {
  if (!State.dispatch) await loadDispatch();
  const inOutstanding = (State.dispatch?.toCollect || []).find(s => String(s.id) === String(saleId));
  if (inOutstanding) return openCollectModal(saleId);
  const sale = State.sales.find(s => String(s.id) === String(saleId));
  if (!sale) { toast('Order not found', 'error'); return; }
  if (!State.dispatch) State.dispatch = { toShip: [], toCollect: [], recent: [], carriers: [] };
  State.dispatch.toCollect.push({
    id: sale.id, customer_name: sale.customer, customer_phone: sale.customerPhone,
    total: sale.amount, invoice_number: sale.invoice, payment_reference: sale.paymentReference,
  });
  openCollectModal(saleId);
}

    else if (filter === 'ebay') list = State.sales.filter(s => (s.channel || '').startsWith('ebay') && !s.isEstimate);

  function paintTable(filter='all') {
    const subset = applyFilter(filter);
    State._salesFiltered = subset;
    el('sales-tbody').innerHTML = subset.length ? subset.map(s => {
      // Pro-forma badge for estimates that have a payment method (created via Quote Builder)
      // vs vanilla "ESTIMATE" for legacy estimates without one. Either way payment method
      // is locked — staff can't change it via the UI once the row exists.

      const pmLabel = pmLabels[s.paymentMethod] || (s.paymentMethod || '').toUpperCase();
      const estimateBadge = s.isEstimate
        ? (s.paymentMethod ? ` <span class="pill amber" style="font-size:10px;margin-left:4px" title="Payment method locked: ${pmLabel}">PRO FORMA · ${escapeHtml(pmLabel)}</span>`
                           : ` <span class="pill amber" style="font-size:10px;margin-left:4px">ESTIMATE</span>`)
        : '';
      // Dispatch state: shows green pill when shipped/collected; empty otherwise.
      // Helps staff scan the Sales tab without having to click into each row.
      const dispatchBadge = !s.isEstimate && (s.dispatchedAt || s.collectedAt)
        ? ` <span class="pill green" style="font-size:10px;margin-left:4px" title="${s.collectedAt ? 'Collected ' + new Date(s.collectedAt).toLocaleDateString() : 'Dispatched ' + new Date(s.dispatchedAt).toLocaleDateString()}">${s.collectedAt ? '✓ Collected' : '✓ Shipped'}</span>`
        : '';
      const unpaidBadge = s.unpaid ? ` <span class="pill amber" style="font-size:10px;margin-left:4px" title="Parts given, payment not received yet">⏳ Unpaid</span>` : '';
      // Quick "Mark dispatched" shortcut: shows for paid non-cash orders that haven't shipped yet
      // AND fall within the dispatch worklist's 10-day cutoff. Older orders are assumed to have
      // been handled on the source channel before this app's dispatch tracking existed.
      // Cash orders get the same shortcut wired to the collect modal.
      const TEN_DAYS_MS = 10 * 24 * 60 * 60 * 1000;
      const isFresh = new Date(s.date).getTime() >= Date.now() - TEN_DAYS_MS;
      const canDispatch = !s.isEstimate && !s.dispatchedAt && !s.collectedAt
                       && s.status !== 'dispatched' && s.status !== 'refunded' && s.status !== 'cancelled'

      const isCashOrder = s.paymentMethod === 'cash';

        ? (isCashOrder

          <button class="btn btn-ghost btn-sm" onclick="emailSingleInvoice('${s.id}')" title="Email this invoice to the customer">✉</button>
          <button class="btn btn-ghost btn-sm" onclick="openMessageModal('${s.id}')" title="Message the customer (email / eBay / WhatsApp)">💬</button>
          <button class="btn btn-ghost btn-sm" onclick="openEditSale('${s.id}')" title="Edit customer / reg / VIN / notes">✏️</button>
          ${s.isEstimate ? `<button class="btn btn-ghost btn-sm" onclick="convertEstimateToInvoice('${s.id}')" title="Mark payment received → decrements stock, generates paid invoice using locked payment method" style="color:var(--green)">✓ Mark paid</button>` : ''}
          ${s.unpaid ? `<button class="btn btn-ghost btn-sm" onclick="markSalePaid('${s.id}')" title="Record that payment has now been received (stock already given)" style="color:var(--green)">✓ Mark paid</button>` : ''}

    salesUpdateBulkBar();

  let currentFilter = 'all';
  paintStats(); paintTable();

    document.querySelectorAll('[data-sf]').forEach(x => x.classList.remove('active'));

// #12 — sales date-period filter. Computes a from/to window and re-fetches.
function salesSetPeriod(v) {
  State.salesPeriod = v;
  const custom = el('sales-custom-range');
  if (custom) custom.style.display = v === 'custom' ? 'inline-flex' : 'none';
  if (v === 'custom') return; // wait for the Apply button
  salesReload();
}
function salesPeriodRange() {
  const v = State.salesPeriod || 'all';
  const now = new Date();
  const iso = d => d.toISOString();
  if (v === 'custom') {
    const f = (el('sales-from')?.value || State.salesFrom || '');
    const t = (el('sales-to')?.value || State.salesTo || '');
    State.salesFrom = f; State.salesTo = t;
    return { from: f || null, to: t ? t + 'T23:59:59' : null };
  }
  if (v === 'all') return { from: null, to: null };
  const d = new Date(now);
  if (v === '7d') d.setDate(d.getDate() - 7);
  else if (v === '1m') d.setMonth(d.getMonth() - 1);
  else if (v === '3m') d.setMonth(d.getMonth() - 3);
  else if (v === '6m') d.setMonth(d.getMonth() - 6);
  else if (v === 'year') return { from: iso(new Date(now.getFullYear(), 0, 1)), to: null };
  return { from: iso(d), to: null };
}
async function salesReload() {
  const { from, to } = salesPeriodRange();
  const qs = new URLSearchParams({ pageSize: '2000' });
  if (from) qs.set('from', from);
  if (to) qs.set('to', to);
  try {
    const r = await Api.get('/api/sales?' + qs.toString());
    State.sales = (r.sales || []).map(adaptSale);
    renderSales();
  } catch (e) {
    toast('Failed to load sales: ' + (e.data?.message || e.message), 'error');
  }
}

// #13 — record payment for an issued-but-unpaid invoice (stock already given).
async function markSalePaid(id) {
  if (!confirm('Mark this invoice as PAID? (Stock was already given when it was issued — this only records the payment.)')) return;
  try {
    await Api.post('/api/sales/' + id + '/mark-paid', {});
    toast('Marked as paid', 'success');
    const sale = (State.sales || []).find(s => String(s.id) === String(id));
    if (sale) { sale.unpaid = false; sale.isPaid = true; sale.status = sale.status === 'pending' ? 'paid' : sale.status; }
    renderSales();
  } catch (e) {
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

function salesToggleRow(id, on) {
  if (on) State.salesSelected.add(id); else State.salesSelected.delete(id);
  salesUpdateBulkBar();
}
function salesToggleAll(on) {
  const subset = State._salesFiltered || State.sales;
  for (const s of subset) {
    if (on) State.salesSelected.add(s.id); else State.salesSelected.delete(s.id);
  }
  document.querySelectorAll('.sale-row-check').forEach(cb => { cb.checked = on; });
  salesUpdateBulkBar();
}
function salesSelectAll() { salesToggleAll(true); const ca = el('sales-check-all'); if (ca) ca.checked = true; }
function salesClearSelection() {
  State.salesSelected.clear();
  document.querySelectorAll('.sale-row-check').forEach(cb => { cb.checked = false; });
  const ca = el('sales-check-all'); if (ca) ca.checked = false;
  salesUpdateBulkBar();
}
function salesUpdateBulkBar() {
  const bar = el('sales-bulk-bar');
  if (!bar) return;
  const n = State.salesSelected.size;
  bar.style.display = n > 0 ? 'flex' : 'none';
  const count = el('sales-bulk-count'); if (count) count.textContent = `${n} selected`;
}

function printSingleInvoice(id) {
  // Use backend's per-sale invoice route which uses real DB data + invoice number
  const url = '/api/sales/' + id + '/invoice.html';
  const w = window.open(url, '_blank');
  if (!w) toast('Pop-up blocked. Allow pop-ups to print invoices.', 'error');
}

// #7 — log a return against an existing sale: pick items, refund amount, restock.
async function openReturnFromSale(saleId) {
  let data;
  try { data = await Api.get('/api/sales/' + saleId); }
  catch (e) { toast('Failed to load sale: ' + e.message, 'error'); return; }
  const s = data.sale, items = data.items || [];
  if (!items.length) { toast('This sale has no line items to return', 'warn'); return; }
  const rows = items.map((it, i) => `
    <tr>
      <td><input type="checkbox" class="rfs-pick" data-i="${i}" checked></td>
      <td><div style="font-weight:600;font-size:13px">${escapeHtml(it.title)}</div><div style="font-size:11px;color:var(--ink-soft);font-family:ui-monospace,monospace">${escapeHtml(it.sku || '')}</div></td>
      <td><input type="number" class="rfs-qty" data-i="${i}" min="1" max="${it.qty}" value="${it.qty}" style="width:64px"></td>
      <td><input type="number" class="rfs-refund" data-i="${i}" min="0" step="0.01" value="${parseFloat(it.line_total||0).toFixed(2)}" style="width:90px"></td>
    </tr>`).join('');
  // Stash items so submit can read productId per row.
  State._rfsItems = items.map(it => ({ productId: it.product_id || null }));
  modal({
    title: '↩ Log return — #' + (s.invoice_number || s.payment_reference || s.id),
    body: `
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px">Tick the items returned, set quantity and the refund amount for each, then choose whether to put them back into stock.</div>
      <div class="table-wrap" style="max-height:300px;overflow:auto">
        <table class="table" style="font-size:12px">
          <thead><tr><th style="width:26px"></th><th>Item</th><th>Qty</th><th>Refund £</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox" id="rfs-restock" checked> Put returned items back into stock</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox" id="rfs-mark-refunded"> Mark whole order as refunded</label>
        <div class="field"><label>Reason / notes (optional)</label><input id="rfs-reason" placeholder="e.g. wrong part, faulty, changed mind"></div>
      </div>
    `,
    actions: [
      { label: 'Cancel', onClick: closeModal },
      { label: 'Log return', primary: true, onClick: () => submitReturnFromSale(saleId) },
    ],
  });
}
async function submitReturnFromSale(saleId) {
  const picks = [...document.querySelectorAll('.rfs-pick:checked')].map(c => parseInt(c.getAttribute('data-i')));
  if (!picks.length) { toast('Pick at least one item', 'warn'); return; }
  const items = picks.map(i => ({
    productId: State._rfsItems?.[i]?.productId || null,
    qty: parseInt(document.querySelector(`.rfs-qty[data-i="${i}"]`)?.value) || 1,
    refundAmount: document.querySelector(`.rfs-refund[data-i="${i}"]`)?.value || null,
  }));
  const payload = {
    saleId,
    items,
    restock: !!el('rfs-restock')?.checked,
    markSaleRefunded: !!el('rfs-mark-refunded')?.checked,
    reason: el('rfs-reason')?.value || null,
  };
  const taskId = Task.start('Logging return…');
  try {
    const r = await Api.post('/api/returns/from-sale', payload);
    Task.done(taskId, 'Return logged');
    toast(`Return logged · ${r.created} item(s)${r.restocked ? ', ' + r.restocked + ' restocked' : ''}${r.totalRefund ? ', £' + r.totalRefund.toFixed(2) + ' refunded' : ''}`, 'success', 6000);
    closeModal();
    await Store.refresh('sales'); await Store.refresh('products');
    renderSales();
  } catch (e) {
    Task.fail(taskId, 'Failed');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function openSaleDetail(id) {
  let data;
  try {
    data = await Api.get('/api/sales/' + id);
  } catch (e) { toast('Failed to load: ' + e.message, 'error'); return; }
  const s = data.sale;
  const items = data.items || [];
  const fmt = (n) => '£' + parseFloat(n || 0).toFixed(2);
  const channelLabel = (s.channel || '').replace(/_/g, ' ');
  const escape = (v) => v == null ? '' : String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const paymentLabel = (() => {
    const pm = s.payment_method;
    if (pm === 'shopify') return 'Shopify Payment';

async function emailSingleInvoice(id) {
  const sale = State.sales.find(s => s.id == id);
  const defaultEmail = sale?.customerEmail || '';
  const isEbay = (sale?.apiChannel || sale?.channel || '').startsWith('ebay');
  let templates = [];
  try { templates = (await Api.get('/api/sales/email-templates')).templates || []; } catch (_) {}
  const defaultKey = isEbay ? 'ebay_convert' : 'standard';
  const opts = templates.map(t => `<option value="${escapeAttr(t.key)}" ${t.key === defaultKey ? 'selected' : ''}>${escapeHtml(t.name)}</option>`).join('');
  modal({
    title: '✉ Email invoice',
    body: `
      <div class="field"><label>Send to</label><input id="em-to" type="email" value="${escapeAttr(defaultEmail)}" placeholder="customer@example.com"></div>
      <div class="field"><label>Message template</label>
        <select id="em-template">${opts || '<option value="standard">Standard</option>'}</select>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Pick the tone for this customer — e.g. plain note for a private buyer, trade pitch for a business, or DropFleet direct delivery for local orders. Edit templates in Settings.</div>
      </div>
    `,
    actions: [
      { label: 'Cancel', onClick: closeModal },
      { label: 'Send', primary: true, onClick: () => submitEmailInvoice(id) },
    ],
  });
}
async function submitEmailInvoice(id) {
  const to = (el('em-to')?.value || '').trim();
  if (!to) { toast('Enter an email address', 'warn'); return; }
  const templateKey = el('em-template')?.value || 'standard';
  const taskId = Task.start('Sending email…');
  try {
    await Api.post('/api/sales/' + id + '/email', { to, templateKey });
    Task.done(taskId, 'Sent');
    toast('Email sent to ' + to, 'success');
    closeModal();
  } catch (e) {
    Task.fail(taskId, 'Failed');
    if (e.data?.error === 'email_not_configured') alert('Email sending not configured.\n\n' + e.data.message);
    else toast('Email failed: ' + (e.data?.message || e.message), 'error');
  }
}
