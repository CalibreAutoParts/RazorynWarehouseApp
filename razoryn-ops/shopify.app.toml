# Razoryn Ops — Shopify app config.
# `client_id` is filled by `shopify app config link`. Keep this in sync with
# the Partner dashboard. Webhook topics below drive the dashboard + retention.

name = "razoryn-ops"
application_url = "https://your-host"
embedded = true

[access_scopes]
# read_orders + read_products power the fitment dashboard; write_products lets
# the eBay sync write reviews.* metafields; read_inventory drives back-in-stock.
scopes = "read_orders,read_products,write_products,read_inventory,read_customers"

[auth]
redirect_urls = [
  "https://your-host/auth/callback",
  "https://your-host/auth/shopify/callback",
  "https://your-host/api/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["orders/create", "orders/fulfilled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["checkouts/create", "checkouts/update"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

[pos]
embedded = false
