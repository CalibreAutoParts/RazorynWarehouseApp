async function init() {
  // Load brand (logo, colours, title) FIRST so even the login screen is correctly branded.
  await loadBrand();

  // PWA: register the service worker + brand the manifest/theme + install prompt.
  registerPwa();

  // Theme: load saved preference or fall back to system preference
  await loadTheme();

  // Try to restore an existing session via the API. If we have a token saved
  // OR the cookie is still valid, /me will return the user and we can skip login.
  try {
    // Prefer the persistent localStorage token; fall back to window.storage;
    // either way /me also works via the httpOnly cookie if a token isn't present.
    API_TOKEN = loadStoredToken();
    if (!API_TOKEN) {
      const saved = await window.storage.get('rzn_token').catch(() => null);
      if (saved && saved.value) API_TOKEN = saved.value;
    }
    const me = await Api.auth.me();
    State.user = me;
    await Store.refreshAll();
    try { State.pricingConfig = await Api.get('/api/settings/pricing-config'); } catch (e) {}
    try { await Sounds.loadPrefs(); } catch (e) {}
    enterApp();
    return;
  } catch (e) {
    // Not logged in — show login screen
  }

  bindLogin();
}

/* ==================== PWA ==================== */
// Service worker (static caching only) + brand-aware theme-color + a clean,
// dismissible install affordance. Never nags once dismissed.
function registerPwa() {
  // Brand the browser/OS chrome from the active brand.
  try {
    const c = State.brand?.primaryColor;
    if (c) document.querySelector('meta[name="theme-color"]')?.setAttribute('content', c);
    const title = State.brand?.appTitle || State.brand?.name;
    if (title) {
      document.querySelector('meta[name="apple-mobile-web-app-title"]')?.setAttribute('content', State.brand?.name || title);
      document.title = title;
    }
  } catch (e) {}

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    // When the app is OPEN and a push arrives, the service worker forwards it
    // here so we can play the user's CUSTOM notification sound (the OS uses its
    // own sound on a background push — that can't be overridden). Also surface a
    // toast so the alert is visible in-app.
    navigator.serviceWorker.addEventListener('message', (e) => {
      const m = e.data || {};
      if (m.type !== 'push-notification') return;
      try { if (m.category && window.Sounds) Sounds._playDebounced(m.category); } catch (_) {}
      try { if (m.title) toast(m.body ? `${m.title} — ${m.body}` : m.title, 'info', 6000); } catch (_) {}
    });
  }

  // Install affordance — only if not already installed and not dismissed before.
  try { if (localStorage.getItem('pwa-install-dismissed') === '1') return; } catch (e) {}
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  if (isStandalone) return;

  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallPill(async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      try { await deferredPrompt.userChoice; } catch (_) {}
      deferredPrompt = null;
    });
  });

  // iOS Safari has no beforeinstallprompt — show a one-time Add-to-Home hint.
  const ua = navigator.userAgent;
  const isIOS = /iphone|ipad|ipod/i.test(ua);
  const isSafari = isIOS && /safari/i.test(ua) && !/crios|fxios/i.test(ua);
  if (isIOS && isSafari) showInstallPill(null, 'Install: tap Share, then “Add to Home Screen”.');
}

function showInstallPill(onInstall, iosText) {
  if (document.getElementById('pwa-install-pill')) return;
  const pill = document.createElement('div');
  pill.id = 'pwa-install-pill';
  pill.style.cssText = 'position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:10px;background:var(--brand-primary,#222);color:#fff;padding:10px 14px;border-radius:999px;box-shadow:0 6px 24px rgba(0,0,0,.25);font-size:13px;font-weight:600;max-width:92vw';
  if (iosText) {
    pill.innerHTML = `<span style="font-weight:500">${iosText}</span><button aria-label="Dismiss" style="background:none;border:0;color:#fff;font-size:18px;cursor:pointer;line-height:1;padding:0 2px">×</button>`;
    pill.querySelector('button').onclick = dismissInstallPill;
  } else {
    pill.innerHTML = `<span>📲 Install app</span><button id="pwa-install-go" style="background:#fff;color:#111;border:0;border-radius:999px;padding:5px 12px;font-weight:700;cursor:pointer">Install</button><button aria-label="Dismiss" style="background:none;border:0;color:#fff;font-size:18px;cursor:pointer;line-height:1;padding:0 2px">×</button>`;
    pill.querySelector('#pwa-install-go').onclick = async () => { await onInstall(); dismissInstallPill(); };
    pill.querySelectorAll('button')[1].onclick = dismissInstallPill;
  }
  document.body.appendChild(pill);
}
function dismissInstallPill() {
  document.getElementById('pwa-install-pill')?.remove();
  try { localStorage.setItem('pwa-install-dismissed', '1'); } catch (_) {}
}

/* ==================== THEME ==================== */
// Fetch brand config from /api/brand and apply: page title, logo srcs, brand colour CSS vars.
// Runs before login so the login screen already shows the correct brand.
async function loadBrand() {
  try {
    const r = await fetch('/api/brand', { cache: 'no-cache' });
    if (!r.ok) throw new Error('http_' + r.status);
    const b = await r.json();
    State.brand = b;
    // Page title
    if (b.appTitle) document.title = b.appTitle;
    // Logos — both light and dark variants. Backend serves /logo.png (light) and
    // /logo-dark.png (dark) for Razoryn. Calibre brand uses /logo-calibre.png and
    // /logo-calibre-dark.png. If a dark variant isn't deployed, both fall back to the light one.
    const lightUrl = b.logoUrl || '/logo.png';
    // Prefer the explicit dark URL from the brand config; fall back to deriving
    // it by inserting "-dark" before the extension (legacy convention).
    const darkUrl = b.logoUrlDark || lightUrl.replace(/(\.[a-z]+)$/i, '-dark$1');
    // Logo source order: admin-uploaded logo (via the public route — works even
    // on the login screen) → brand's bundled file → legacy .jpeg. Light and dark
    // have independent chains so each theme stays legible.
    const setWithFallback = (el, urls) => {
      let i = 0;
      el.alt = b.name;
      el.onerror = () => { i++; if (i < urls.length) el.src = urls[i]; else el.onerror = null; };
      el.src = urls[0];
    };
    const uniq = (a) => a.filter((v, i) => v && a.indexOf(v) === i);
    const lightUrls = uniq(['/public-logo', lightUrl, lightUrl.replace(/\.png$/i, '.jpeg')]);
    const darkUrls  = uniq(['/public-logo-dark', darkUrl, darkUrl.replace(/\.png$/i, '.jpeg')]);
    document.querySelectorAll('[data-brand-logo-light]').forEach(el => setWithFallback(el, lightUrls));
    document.querySelectorAll('[data-brand-logo-dark]').forEach(el => setWithFallback(el, darkUrls));
    // Brand colours. The primary is theme-aware (see applyBrandColors) — Calibre
    // navy is invisible on a dark background, so dark mode uses primaryColorDark.
    const root = document.documentElement.style;
    if (b.secondaryColor) root.setProperty('--brand-secondary', b.secondaryColor);
    if (b.supportColor) root.setProperty('--brand-on-primary', b.supportColor);
    document.body.setAttribute('data-brand', b.code);
    applyBrandColors(document.documentElement.getAttribute('data-theme') || 'light');
  } catch (e) {
    console.warn('[brand] failed to load — defaults will be used:', e.message);
  }
}

// Darken a hex colour by N percent (negative) for hover states.
function shadeColor(hex, percent) {
  const c = hex.replace('#', '');
  const num = parseInt(c.length === 3 ? c.split('').map(x => x + x).join('') : c, 16);
  let r = (num >> 16) + Math.round(255 * percent / 100);
  let g = ((num >> 8) & 0xff) + Math.round(255 * percent / 100);
  let b = (num & 0xff) + Math.round(255 * percent / 100);
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// Lighten a hex colour towards white by `amount` (0..1).
function tintColor(hex, amount) {
  const c = hex.replace('#', '');
  const num = parseInt(c.length === 3 ? c.split('').map(x => x + x).join('') : c, 16);
  let r = num >> 16, g = (num >> 8) & 0xff, b = num & 0xff;
  r = Math.round(r + (255 - r) * amount);
  g = Math.round(g + (255 - g) * amount);
  b = Math.round(b + (255 - b) * amount);
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// Scale a hex colour's brightness by `factor` (<1 darkens). Used for the
// dark-mode active-nav tint.
function scaleColor(hex, factor) {
  const c = hex.replace('#', '');
  const n = parseInt(c.length === 3 ? c.split('').map(x => x + x).join('') : c, 16);
  const r = Math.max(0, Math.min(255, Math.round((n >> 16) * factor)));
  const g = Math.max(0, Math.min(255, Math.round(((n >> 8) & 0xff) * factor)));
  const b = Math.max(0, Math.min(255, Math.round((n & 0xff) * factor)));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// Apply the brand primary for the given theme. Dark mode uses primaryColorDark
// (navy reads as black on a dark background) and a dark active-nav tint instead
// of a light one. Called on load AND on theme toggle, so every --brand-primary
// usage stays legible in both themes without touching individual rules.
function applyBrandColors(theme) {
  const b = State.brand || {};
  if (!b.primaryColor) return;
  const isDark = theme === 'dark';
  const base = isDark ? (b.primaryColorDark || b.primaryColor) : b.primaryColor;
  const root = document.documentElement.style;
  root.setProperty('--brand-primary', base);
  root.setProperty('--brand-primary-dark', isDark ? tintColor(base, 0.12) : shadeColor(base, -12));
  root.setProperty('--brand-primary-light', isDark ? scaleColor(base, 0.22) : tintColor(base, 0.92));
}

async function loadTheme() {
  let theme = null;
  try {
    const r = await window.storage.get('theme');
    if (r && r.value) theme = r.value;
  } catch (e) { /* not set yet */ }
  if (!theme) {
    theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  applyTheme(theme);
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', async (e) => {
      try {
        const r = await window.storage.get('theme-user-set');
        if (r && r.value === '1') return;
      } catch (_) {}
      applyTheme(e.matches ? 'dark' : 'light');
    });
  }
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  applyBrandColors(theme);  // re-theme brand primary so dark mode stays legible
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme === 'dark' ? '#0d0f13' : (State.brand?.primaryColor || '#c8202d'));
  const lightIcon = document.querySelector('.theme-icon-light');
  const darkIcon = document.querySelector('.theme-icon-dark');
  if (lightIcon && darkIcon) {
    lightIcon.style.display = theme === 'dark' ? 'none' : '';
    darkIcon.style.display  = theme === 'dark' ? '' : 'none';
  }
}
async function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  try {
    await window.storage.set('theme', next);
    await window.storage.set('theme-user-set', '1');
  } catch (e) { /* non-fatal */ }
}

// All mutations now go through Api directly. persistAll is kept as a stub
// so any legacy callers don't break — it just refreshes from the server.
async function persistAll() {
  await Store.refreshAll();
}

/* ==========================================================
   LOGIN
   ========================================================== */
function bindLogin() {
  const errEl = document.getElementById('login-error');
  async function submit() {
    const username = document.getElementById('username-input').value.trim();
    const pwd = document.getElementById('pwd-input').value;
    if (errEl) errEl.textContent = '';
    if (!username || !pwd) { toast('Username and password required', 'error'); return; }
    const remember = document.getElementById('login-remember')?.checked !== false;
    try {
      const user = await Api.auth.login(username, pwd, remember);
      State.user = user;
      await Store.refreshAll();
      try { State.pricingConfig = await Api.get('/api/settings/pricing-config'); } catch (e) {}
      try { await Sounds.loadPrefs(); } catch (e) {}
      enterApp();
    } catch (e) {
      const msg = e.status === 401 ? 'Invalid username or password' : 'Login failed — check your connection';
      if (errEl) { errEl.textContent = msg; setTimeout(() => { errEl.textContent = ''; }, 3000); }
      else toast(msg, 'error');
    }
  }
  const btn = document.getElementById('login-submit');
  if (btn) btn.addEventListener('click', submit);
  ['username-input', 'pwd-input'].forEach(id => {
    const inp = document.getElementById(id);
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  });
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.body.classList.toggle('is-admin', State.user.role === 'admin');

  document.getElementById('user-avatar').textContent = State.user.name.charAt(0).toUpperCase();
  document.getElementById('user-name').textContent = State.user.name;
  document.getElementById('user-role').textContent = State.user.role === 'admin' ? 'Admin' : 'Warehouse';

  bindNav();
  bindHeader();
  initEditingTracker();
  initTableLabeller();
  routeTo('dashboard');
  refreshNavCounts();

  toast('Welcome, ' + State.user.name + ' 👋', 'success');

  // Auto-refresh: every 60s pull new data and detect new sales for notifications.
  // Repaint visible pages so user sees fresh data without manual refresh.
  if (window._rznRefreshTimer) clearInterval(window._rznRefreshTimer);
  // Try to request notification permission (Web Notifications API)
  try {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().catch(() => {});
    }
  } catch (e) {}

  let lastSalesIds = new Set((State.sales || []).map(s => s.id));
  // Returns tracking — { id → status } so we can detect both new returns *and*
  // status transitions (e.g. an open return becoming closed). On first poll we
  // just snapshot to avoid replaying historical changes as notifications.
  let lastReturnsState = new Map((State.returns || []).map(r => [r.id, r.status]));
  // Low-stock tracking — set of product IDs already known to be ≤ threshold.
  // Only fire the alert when a product *crosses* from healthy → low, not every
  // time we re-paint the list with the same products in the low bucket.
  let lastLowStockIds = new Set(
    (State.products || []).filter(p => (p.qtyOnHand ?? p.qty_on_hand ?? 0) <= (p.lowThresh ?? p.low_stock_threshold ?? 3)).map(p => p.id)
  );
  window._rznRefreshTimer = setInterval(async () => {
    if (!State.user || document.hidden) return;
    try {
      await Store.refresh('notifications');
      if (['dashboard','inventory'].includes(State.page)) await Store.refresh('products');
      if (State.page === 'sales' || State.page === 'dashboard') {
        await Store.refresh('sales');
        // Detect new sales
        const currentIds = new Set((State.sales || []).map(s => s.id));
        const newOnes = (State.sales || []).filter(s => !lastSalesIds.has(s.id));
        if (newOnes.length && lastSalesIds.size > 0) {
          for (const s of newOnes) notifyNewSale(s);
        }
        lastSalesIds = currentIds;
      }
      if (State.page === 'returns') await Store.refresh('returns');
      else { try { await Store.refresh('returns'); } catch (e) {} }  // background refresh so return notifications can fire from any page
      // Returns detection — runs on every poll (regardless of current page)
      // when returns data is in State. Two events fired:
      //   • Brand-new return ID → "new return" sound
      //   • Existing return's status flipped from open-ish to closed → "return closed"
      if (Array.isArray(State.returns) && lastReturnsState.size > 0) {
        const closedStatuses = new Set(['closed', 'resolved', 'completed', 'cancelled']);
        for (const r of State.returns) {
          const prev = lastReturnsState.get(r.id);
          if (prev === undefined) {
            // Brand-new return that wasn't here last poll
            notifyNewReturn(r);
          } else if (prev !== r.status && closedStatuses.has(String(r.status || '').toLowerCase()) && !closedStatuses.has(String(prev || '').toLowerCase())) {
            // Status transitioned into a closed-ish state
            notifyReturnClosed(r);
          }
        }
      }
      lastReturnsState = new Map((State.returns || []).map(r => [r.id, r.status]));
      // Low-stock detection — when a product crosses from healthy → at-or-below
      // its threshold. Fires once per crossing; if it stays low we don't re-alarm.
      if (Array.isArray(State.products)) {
        const currentLow = new Set(
          State.products.filter(p => (p.qtyOnHand ?? p.qty_on_hand ?? 0) <= (p.lowThresh ?? p.low_stock_threshold ?? 3)).map(p => p.id)
        );
        const newlyLow = [...currentLow].filter(id => !lastLowStockIds.has(id));
        if (newlyLow.length && lastLowStockIds.size > 0) {
          // Aggregate notification — one toast + one sound for the batch
          notifyLowStock(newlyLow);
        }
        lastLowStockIds = currentLow;
      }
      if (State.page === 'schedule') await Store.refresh('schedule');
      // Repaint the current page so changes are visible
      const repaintMap = {
        dashboard: typeof renderDashboard === 'function' ? renderDashboard : null,
        inventory: typeof renderInventory === 'function' ? renderInventory : null,
        sales: typeof renderSales === 'function' ? renderSales : null,
        returns: typeof renderReturns === 'function' ? renderReturns : null,
        schedule: typeof renderSchedule === 'function' ? renderSchedule : null,
      };
      if (repaintMap[State.page]) repaintMap[State.page]();
      refreshNavCounts();
    } catch (e) {
      // silent — surfacing every poll failure would be noisy
    }
  }, 60_000);
}

// New-return notification — fires when a return record appears in State.returns
// that we didn't see on the previous poll. Plays the user's "new return" sound.
function notifyNewReturn(returnRow) {
  const sku = returnRow.sku || returnRow.product_sku || '';
  const reason = returnRow.reason || returnRow.reason_code || 'reason unspecified';
  const title = 'New return opened';
  const body = sku ? `${sku} · ${reason}` : reason;
  try {
    if ('Notification' in window && Notification.permission === 'granted') {
      const n = new Notification(title, { body, icon: (State.brand?.logoUrl || '/logo.png'), tag: 'return-' + returnRow.id });
      n.onclick = () => { window.focus(); routeTo('returns'); };
    }
  } catch (e) {}
  Sounds.playForReturn();
  toast(`${title} · ${body}`, 'warn');
}

// Return-closed notification — fires when an existing return transitions to a
// closed/resolved status. Lower-urgency sound by default (pop).
function notifyReturnClosed(returnRow) {
  const sku = returnRow.sku || returnRow.product_sku || '';
  const title = 'Return closed';
  const body = sku ? `${sku} · ${returnRow.status}` : returnRow.status;
  try {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, icon: (State.brand?.logoUrl || '/logo.png'), tag: 'return-closed-' + returnRow.id });
    }
  } catch (e) {}
  Sounds.playForReturnClosed();
  toast(`${title} · ${body}`, 'success');
}

// Low-stock notification — one alert covering all the items that just crossed
// the threshold in this poll cycle (avoids spamming when several drop together).
function notifyLowStock(productIds) {
  const products = (State.products || []).filter(p => productIds.includes(p.id));
  const first = products[0];
  if (!first) return;
  const title = products.length === 1 ? 'Low stock alert' : `Low stock: ${products.length} items`;
  const body = products.length === 1
    ? `${first.sku || ''} — ${first.title || ''}`.trim().replace(/^—\s*/, '')
    : `${first.sku || first.title}${products.length > 1 ? ' + ' + (products.length - 1) + ' more' : ''}`;
  try {
    if ('Notification' in window && Notification.permission === 'granted') {
      const n = new Notification(title, { body, icon: (State.brand?.logoUrl || '/logo.png'), tag: 'lowstock-' + Date.now() });
      n.onclick = () => { window.focus(); routeTo('inventory'); };
    }
  } catch (e) {}
  Sounds.playForLowStock();
  toast(`${title} · ${body}`, 'warn');
}

function notifyNewSale(sale) {
  // `sale` is an *adapted* row from State.sales (via adaptSale), so its fields
  // are camelCase and renamed — not the raw DB column names. Common gotchas:
  //   amount         (not total)
  //   customer       (not customer_name)
  //   invoice        (not invoice_number)
  //   externalOrderId (not external_order_id)
  // Using the wrong names was the cause of the "£0.00 in notification" bug.
  const channel = (sale.channel || '').replace('_', ' ');
  const amount = parseFloat(sale.amount || sale.total || 0);  // fall back to total just in case
  const title = `New ${channel} order · £${amount.toFixed(2)}`;
  const ref = sale.invoice || sale.externalOrderId || sale.paymentReference || '';
  const body = `${sale.customer || sale.customer_name || 'Customer'}${ref ? ' · ' + ref : ''}`;
  // Browser notification
  try {
    if ('Notification' in window && Notification.permission === 'granted') {
      const n = new Notification(title, { body, icon: (State.brand?.logoUrl || '/logo.png'), tag: 'sale-' + sale.id });
      n.onclick = () => { window.focus(); routeTo('sales'); };
    }
  } catch (e) {}
  // Vibrate (mobile)
  try { if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]); } catch (e) {}
  // Play the user's chosen sale sound — debounced to avoid blasting when several
  // orders arrive in the same polling cycle.
  Sounds.playForSale();
  toast(title + ' · ' + body, 'success');
}

/* ==========================================================
   SOUND MODULE
   ==========================================================
   Synthesizes notification sounds with the Web Audio API — no audio files to
   ship. Configurable per-device via localStorage so each workstation can have
   its own preference (the warehouse computer wants loud cha-ching; mobile staff
   want something subtle).

   Sounds:
     • chaching  — Etsy/eBay-style cash register two-tone bell. Default for sales.
     • bell      — single bell ring with bright shimmer.
     • chime     — two-note descending chime.
     • ding      — single high "ding".
     • pop       — subtle click.
     • none      — silent.

   The AudioContext is created lazily on first play because browsers require a
   user gesture before they'll let audio start. The login click satisfies this,
   so by the time the polling timer fires for new sales, audio is ready.

   Debounce: at most one play per ~5 seconds per sound type. Stops the situation
   where 4 orders sync at once and the browser plays cha-ching x4 over each other.
*/
const Sounds = {
  _ctx: null,
  _lastPlay: {},
  // Server-synced preferences, loaded from /api/settings/sound-prefs at startup.
  // Shape: { sale: {choice, customDataUrl?, customName?}, return: {...}, ... }
  // Synced across ALL devices (stored in the DB), unlike the old localStorage.
  _prefs: {},
  _prefsLoaded: false,
  // Cache of <audio> elements per event for custom sounds (keyed by event).
  _customAudio: {},
  _getCtx() {
    if (!this._ctx) {
      try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    if (this._ctx.state === 'suspended') this._ctx.resume().catch(() => {});
    return this._ctx;
  },

  // Per-event defaults used until the server prefs load (or if an event is unset).
  _defaults: { sale: 'chaching', return: 'chime', return_closed: 'pop', low_stock: 'bell' },

  // Load synced preferences from the server. Called at app start + after saving.
  async loadPrefs() {
    try {
      const r = await Api.get('/api/settings/sound-prefs');
      this._prefs = r.soundPrefs || {};
      this._prefsLoaded = true;
      this._customAudio = {};  // invalidate cached audio elements on reload
    } catch (e) {
      console.warn('[sounds] failed to load prefs:', e.message);
      this._prefs = {};
    }
    return this._prefs;
  },

  // The resolved choice for an event (server pref → per-event default → 'ding').
  getChoice(category) {
    const p = this._prefs[category];
    if (p && p.choice) return p.choice;
    return this._defaults[category] || 'ding';
  },
  // The custom data URL for an event, if it has one.
  getCustomFor(category) {
    const p = this._prefs[category];
    return (p && p.choice === 'custom' && p.customDataUrl) ? p.customDataUrl : null;
  },
  getCustomNameFor(category) {
    const p = this._prefs[category];
    return (p && p.customName) || null;
  },

  playForSale() { this._playDebounced('sale'); },
  playForReturn() { this._playDebounced('return'); },
  playForLowStock() { this._playDebounced('low_stock'); },
  playForReturnClosed() { this._playDebounced('return_closed'); },

  _playDebounced(category) {
    const name = this.getChoice(category);
    if (name === 'none') return;
    const now = Date.now();
    if (this._lastPlay[category] && now - this._lastPlay[category] < 5000) return;
    this._lastPlay[category] = now;
    this.playForEvent(category);
  },

  // Preview a specific event's configured sound (used by the settings page).
  previewEvent(category, overrideChoice, overrideDataUrl) {
    const choice = overrideChoice || this.getChoice(category);
    if (choice === 'none') return;
    if (choice === 'custom') {
      const url = overrideDataUrl || this.getCustomFor(category);
      if (url) this._playCustomUrl(category, url);
      return;
    }
    this._playSynth(choice);
  },

  // Play whatever the given event is configured to play.
  playForEvent(category) {
    const choice = this.getChoice(category);
    if (choice === 'none') return;
    if (choice === 'custom') {
      const url = this.getCustomFor(category);
      if (url) this._playCustomUrl(category, url);
      return;
    }
    this._playSynth(choice);
  },

  // Generic preview by synth name (no event context) — for testing built-ins.
  preview(name) {
    if (name === 'none' || name === 'custom') return;
    this._playSynth(name);
  },

  _playCustomUrl(key, dataUrl) {
    try {
      let audio = this._customAudio[key];
      if (!audio || audio.dataset.dataUrl !== dataUrl) {
        audio = new Audio(dataUrl);
        audio.dataset.dataUrl = dataUrl;
        audio.volume = 0.8;
        this._customAudio[key] = audio;
      } else {
        audio.currentTime = 0;
      }
      const p = audio.play();
      if (p?.catch) p.catch(() => {});
    } catch (e) {}
  },

  _playSynth(name) {
    const ctx = this._getCtx();
    if (!ctx) return;
    const fn = this._synths[name];
    if (typeof fn === 'function') fn(ctx, ctx.currentTime);
  },

  // ──────────────────────────────────────────────────────────────────────────
  // Synthesis helpers — these run on the AudioContext clock so timings stay tight.
  // ──────────────────────────────────────────────────────────────────────────

  // Generic note player. ADSR-ish envelope: snap attack, exponential decay.
  // `type` = oscillator wave; `gain` = peak volume (0–1).
  _note(ctx, freq, startTime, duration, gain = 0.2, type = 'sine') {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.connect(env);
    env.connect(ctx.destination);
    env.gain.setValueAtTime(0, startTime);
    env.gain.linearRampToValueAtTime(gain, startTime + 0.008);   // ~8 ms attack
    env.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
  },

  _synths: {
    // Cha-ching — cash register, the headline sound. Built from two phases:
    //   1. "cha"   — a quick percussive lower note (square + triangle blend)
    //   2. "ching" — a bell-like cluster of inharmonic partials with long decay
    //                Inharmonicity (1.5x, 2.4x, 5.4x) gives the metallic bell timbre
    //                that pure-harmonic tones lack.
    chaching(ctx, t0) {
      // Phase 1: "cha" — bright punchy mid note
      Sounds._note(ctx, 660,  t0,        0.10, 0.18, 'square');
      Sounds._note(ctx, 990,  t0,        0.08, 0.10, 'triangle');
      // Phase 2: "ching" — bell cluster starts ~60ms after the cha
      const t1 = t0 + 0.07;
      Sounds._note(ctx, 1320, t1, 0.7, 0.18, 'sine');      // fundamental
      Sounds._note(ctx, 1980, t1, 0.6, 0.12, 'sine');      // 1.5x — perfect fifth
      Sounds._note(ctx, 3168, t1, 0.5, 0.08, 'sine');      // 2.4x — inharmonic shimmer
      Sounds._note(ctx, 7128, t1, 0.4, 0.04, 'sine');      // 5.4x — bell sparkle
      // Tiny shimmer at the very end: a quick high tinkle
      Sounds._note(ctx, 2640, t1 + 0.12, 0.35, 0.06, 'sine');
    },

    // Bell — single bright bell ring. Same bell-partial recipe but no cha phase.
    bell(ctx, t0) {
      Sounds._note(ctx, 1568, t0, 0.9, 0.20, 'sine');
      Sounds._note(ctx, 2352, t0, 0.8, 0.14, 'sine');
      Sounds._note(ctx, 3763, t0, 0.6, 0.09, 'sine');
      Sounds._note(ctx, 8467, t0, 0.4, 0.04, 'sine');
    },

    // Chime — two-note descending, classic notification.
    chime(ctx, t0) {
      Sounds._note(ctx, 1318, t0,        0.45, 0.18, 'sine');  // E6
      Sounds._note(ctx, 988,  t0 + 0.15, 0.55, 0.18, 'sine');  // B5
    },

    // Ding — single bright high note, the existing sound's spiritual successor.
    ding(ctx, t0) {
      Sounds._note(ctx, 1760, t0, 0.35, 0.18, 'sine');  // A6
      Sounds._note(ctx, 2640, t0, 0.30, 0.08, 'sine');  // E7 sparkle
    },

    // Pop — subtle, short, no bell quality. For environments where loud is rude.
    pop(ctx, t0) {
      Sounds._note(ctx, 540, t0, 0.06, 0.18, 'sine');
      Sounds._note(ctx, 880, t0, 0.04, 0.10, 'triangle');
    },
  },
};
// Make sure AudioContext is created on the first user gesture, so it's ready
// when the polling timer fires later. Any click anywhere in the document does it.
window.addEventListener('click', () => { Sounds._getCtx(); }, { once: true, capture: true });

function bindHeader() {
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await Api.auth.logout();
    State.user = null;
    if (window._rznRefreshTimer) clearInterval(window._rznRefreshTimer);
    document.getElementById('app').classList.remove('active');
    document.getElementById('login-screen').style.display = 'flex';
  });
  document.getElementById('notif-btn').addEventListener('click', () => routeTo('notifications'));
  document.getElementById('quick-scan-btn').addEventListener('click', () => routeTo('scan'));
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  // #3 — the mobile menu toggle is bound by DELEGATION on the document, once,
  // so it can never be lost to a re-render or a binding that ran before the
  // element was ready (the old direct binding intermittently failed on first
  // login, needing a sign-out/in). Works regardless of when bindHeader runs.
  if (!window._navDelegationBound) {
    window._navDelegationBound = true;
    document.addEventListener('click', (e) => {
      if (e.target.closest('#menu-toggle')) {
        document.getElementById('sidebar')?.classList.toggle('open');
        document.getElementById('sb-backdrop')?.classList.toggle('open');
      } else if (e.target.closest('#sb-backdrop')) {
        document.getElementById('sidebar')?.classList.remove('open');
        document.getElementById('sb-backdrop')?.classList.remove('open');
      }
    });
  }
}

   ROUTER & PERMISSIONS

function bindNav() {
  document.querySelectorAll('.nav-item').forEach(n => {
    n.addEventListener('click', () => routeTo(n.dataset.page));
  });
}

// ── Edit tracking (#9) ───────────────────────────────────────────────────────
// Navigating to a tab re-renders it with fresh data. To avoid silently throwing
// away an in-progress edit, we track whether the user has typed into a real
// editable field (not a search/filter box) on the current page, and confirm
// before leaving if so. Cleared whenever a page renders or a save completes.
const Editing = { dirty: false };
function markClean() { Editing.dirty = false; }
function isSearchLike(elm) {
  if (!elm) return true;
  if (elm.matches && elm.matches('[data-no-dirty]')) return true;
  const t = (elm.type || '').toLowerCase();
  if (['search', 'checkbox', 'radio', 'button', 'submit', 'range'].includes(t)) return true;
  const hay = ((elm.id || '') + ' ' + (typeof elm.className === 'string' ? elm.className : '') + ' ' + ((elm.getAttribute && elm.getAttribute('placeholder')) || '')).toLowerCase();
  return /search|filter|find/.test(hay);
}
function initEditingTracker() {
  const content = document.getElementById('content');
  if (!content || content._editTrackBound) return;
  content._editTrackBound = true;
  content.addEventListener('input', (e) => {
    const t = e.target;
    if (t && /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName) && !isSearchLike(t)) Editing.dirty = true;
  }, true);
}

// Mobile stacked-table support: copy each column header onto its body cells as
// data-label, so the CSS card layout can show "Header: value" with no sidescroll.
// Runs on every content/table re-render via a debounced MutationObserver.
function labelizeTables(root) {
  (root || document).querySelectorAll('table.table').forEach(tbl => {
    const ths = tbl.querySelectorAll('thead th');
    if (!ths.length) return;
    const labels = [...ths].map(th => (th.textContent || '').trim());
    tbl.querySelectorAll('tbody tr').forEach(tr => {
      const tds = tr.children;
      if (tds.length !== labels.length) return; // skip colspan/empty-state rows
      for (let i = 0; i < tds.length; i++) {
        if (labels[i]) tds[i].setAttribute('data-label', labels[i]);
        else tds[i].removeAttribute('data-label');
      }
    });
  });
}
let _labelizeRaf = null;
function initTableLabeller() {
  const content = document.getElementById('content');
  if (!content || content._tableLabelBound) return;
  content._tableLabelBound = true;
  const obs = new MutationObserver(() => {
    // Setting data-label is an attribute change (not childList) so it won't
    // re-trigger this observer. Debounce to one pass per frame.
    if (_labelizeRaf) return;
    _labelizeRaf = requestAnimationFrame(() => { _labelizeRaf = null; labelizeTables(content); });
  });
  obs.observe(content, { childList: true, subtree: true });
  labelizeTables(content);
}

function hasPerm(page) {
  if (!State.user) return false;
  if (State.user.role === 'admin') return true;
  // Warehouse role: explicitly allow only the operational pages the user needs.
  // Sales / pricing / KB / videos / schedule / notes / labels / mirror / staff /
  // settings are all admin-only — warehouse staff get redirected if they try.
  //
  // The page-→-permission map decides whether a granular permission needs to
  // be checked on the user record. Values:
  //   true            → always allowed (dashboard, notifications, dispatch — operational)
  //   false           → never allowed for warehouse (admin-only by design)
  //   <permission-key>→ check user.permissions[key] === true
  const map = {
    dashboard:     true,
    inventory:    'inventory',
    incoming:     'inventory',
    scan:         'scan',
    stocktake:    'scan',
    locations:    'locations',
    returns:     'returns',
    dispatch:    'dispatch',
    notifications: true,
    // Admin-only pages — no granular permission, hard "false" for warehouse role.
    // The "+ Create on eBay" + Listing Mirror + Settings + Staff + Sales etc.
    // are management functions that aren't part of the warehouse workflow.
    sales:        false,
    pricing:      false,
    schedule:     false,
    videos:       false,
    kb:           false,
    notes:        false,
    labels:       false,
    mirror:       false,
    staff:        false,
    settings:     false,
  };
  const v = map[page];
  if (v === true) return true;
  if (v === false) return false;
  // Backend uses `permissions` (plural). Older code referenced `perms` — keep both
  // for backwards compat in case anything still sets it.
  const perms = State.user.permissions || State.user.perms || {};
  return perms[v] === true;
}

function routeTo(page) {
  if (!hasPerm(page)) { toast('You don\'t have access to this page', 'error'); return; }
  // #9: confirm before leaving a page with unsaved edits (refresh-on-navigate
  // would otherwise discard them). Same-page re-render is always allowed.
  if (Editing.dirty && page !== State.page) {
    if (!confirm('You have unsaved changes on this page. Leave without saving?')) return;
  }
  Editing.dirty = false;
  State.page = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-backdrop').classList.remove('open');

  const pages = {
    dashboard: renderDashboard, inventory: renderInventory, scan: renderScan,
    incoming: renderIncoming,
    stocktake: renderStockTake,
    locations: renderLocations, returns: renderReturns, sales: renderSales,
    pricing: renderQuoteBuilder, schedule: renderSchedule, videos: renderVideos,
    kb: renderKB, notifications: renderNotifications, staff: renderStaff, settings: renderSettings, mirror: renderMirror,
    labels: renderLabels, notes: renderNotes, dispatch: renderDispatch
  };
  try {
    (pages[page] || renderDashboard)();
  } catch (e) {
    console.error('[render] page failed:', page, e);
    el('content').innerHTML = `<div class="page"><div class="card"><div class="card-body" style="padding:24px;text-align:center">
      <h3 style="color:var(--red)">Something went wrong rendering this page</h3>
      <p style="color:var(--ink-soft);font-size:13px">${escapeHtml(e.message || String(e))}</p>
      <button class="btn btn-outline" onclick="routeTo('dashboard')">Back to dashboard</button>
    </div></div></div>`;
  }
  document.getElementById('content').scrollTo(0, 0);
}

// A guided checklist: every item listed, tick each as you physically count it.
// Progress is saved server-side (a stock_checks row per counted item this
// month), so it resumes across reloads and devices.
function renderStockTake() {
  el('content').innerHTML = `
    <div class="page">
      <div class="page-head">
        <div><h1>Monthly stock-take</h1><div class="desc">Walk the warehouse and tick off each item as you count it — progress is saved.</div></div>
        <div class="actions"><button class="btn btn-outline" onclick="routeTo('scan')">← Stock Check</button></div>
      </div>
      <div class="card" style="margin-bottom:14px"><div class="card-body" style="padding:14px 18px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px">
          <span id="st-progress-text">Loading…</span><span id="st-progress-pct" style="font-weight:700"></span>
        </div>
        <div style="height:10px;background:var(--line-2);border-radius:6px;overflow:hidden"><div id="st-progress-bar" style="height:100%;width:0;background:var(--brand-primary);transition:width .25s"></div></div>
      </div></div>
      <div class="toolbar">
        <input type="search" class="search-input" id="st-search" placeholder="Search by name, SKU, part #...">
        <select class="filter-select" id="st-filter">
          <option value="remaining">Remaining to count</option>
          <option value="all">All items</option>
          <option value="counted">Counted ✓</option>
        </select>
      </div>
      <div class="card"><div id="st-list"></div></div>
      <div id="st-sentinel" style="height:1px"></div>
    </div>`;

  State._stChecked = State._stChecked || new Set();
  Api.get('/api/stock-checks/this-month')
    .then(r => { State._stChecked = new Set((r.productIds || []).map(String)); stPaint(); })
    .catch(() => stPaint());

  el('st-list').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    stCount(btn.getAttribute('data-pid'), btn.getAttribute('data-act') === 'adjust');
  });
  if (State._stObserver) State._stObserver.disconnect();
  State._stObserver = new IntersectionObserver((en) => { if (en.some(x => x.isIntersecting)) stFill(); }, { rootMargin: '300px' });
  const s = el('st-sentinel'); if (s) State._stObserver.observe(s);
  ['st-search', 'st-filter'].forEach(id => el(id).addEventListener('input', stPaint));
}
function stFiltered() {
  const q = (el('st-search')?.value || '');
  const filter = el('st-filter')?.value || 'remaining';
  const checked = State._stChecked || new Set();
  return (State.products || []).filter(p => {
    if (q && !matchesKeywords(q, p.title, p.sku, p.partNumber, p.brand, p.model)) return false;
    const isChecked = checked.has(String(p.id));
    if (filter === 'remaining' && isChecked) return false;
    if (filter === 'counted' && !isChecked) return false;
    return true;
  });
}
function stProgress() {
  const total = (State.products || []).length;
  const done = (State.products || []).filter(p => State._stChecked.has(String(p.id))).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  if (el('st-progress-text')) el('st-progress-text').textContent = `${done} of ${total} items counted`;
  if (el('st-progress-pct')) el('st-progress-pct').textContent = pct + '%';
  if (el('st-progress-bar')) el('st-progress-bar').style.width = pct + '%';
}
function stRowHtml(p) {
  const checked = State._stChecked.has(String(p.id));
  return `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line-2);${checked ? 'opacity:.55' : ''}">

      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${escapeHtml(p.title)}</div>
        <div style="color:var(--ink-soft);font-size:12px">${escapeHtml(p.sku)} · ${escapeHtml(p.location || 'No location')}</div>
      </div>
      <div style="text-align:right;font-size:11px;color:var(--ink-soft)">System<br><strong style="font-size:15px;color:var(--ink)">${totalQty(p)}</strong></div>
      <button class="btn btn-ghost btn-sm" data-act="adjust" data-pid="${p.id}">Adjust</button>
    </div>`;
}
function stRenderChunk() {
  const list = State._stItems || [];
  const shown = State._stShown || 0;
  if (shown >= list.length) return;
  const slice = list.slice(shown, shown + 50);
  el('st-list').insertAdjacentHTML('beforeend', slice.map(stRowHtml).join(''));
  State._stShown = shown + slice.length;
}
function stFill() {
  const s = el('st-sentinel'); if (!s) return;
  if ((State._stShown || 0) >= (State._stItems || []).length) return;
  if (s.getBoundingClientRect().top < window.innerHeight + 300) { stRenderChunk(); requestAnimationFrame(stFill); }
}
function stPaint() {
  const list = stFiltered();
  State._stItems = list; State._stShown = 0;
  const wrap = el('st-list');
  if (!wrap) return;
  wrap.innerHTML = list.length ? '' : '<div class="empty" style="padding:24px;text-align:center"><div class="t">Nothing to show</div>All counted, or none match your search.</div>';
  if (list.length) { stRenderChunk(); requestAnimationFrame(stFill); }
  stProgress();
}
async function stCount(pid, adjust) {
  const p = (State.products || []).find(x => String(x.id) === String(pid));
  if (!p) return;
  let actualQty = totalQty(p);
  if (adjust) {
    const v = prompt(`Counted quantity for "${p.title}"?\nThe system shows ${actualQty}.`, String(actualQty));
    if (v === null) return;
    const n = parseInt(v, 10);
    if (isNaN(n) || n < 0) { toast('Enter a valid quantity', 'error'); return; }
    actualQty = n;
  }
  const changed = actualQty !== totalQty(p);
  try {
    await Api.post('/api/stock-checks', { productId: pid, actualQty, reason: 'stock_take' });
    State._stChecked.add(String(pid));
    if (changed) await Store.refresh('products');
    stPaint();
    toast(adjust && changed ? `Counted — adjusted to ${actualQty}` : 'Counted ✓', 'success', 1500);
  } catch (e) {
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

  document.getElementById('nav-ret-count').textContent = returns.filter(r => r.status === 'open' || r.status === 'pending').length;
  const unread = notifications.filter(n => !n.read).length;
  document.getElementById('nav-notif-count').textContent = unread;
  document.getElementById('notif-badge').textContent = unread;
  document.getElementById('notif-badge').style.display = unread ? 'flex' : 'none';
  // Dispatch count: paid non-estimate sales without dispatched_at/collected_at,
  // within the same 10-day cutoff the Dispatch page uses. Skip sales with
  // status='dispatched' too — handles legacy synced rows where the column
  // wasn't filled in but status was set.
  // If the Dispatch page has been opened this session, prefer its live summary
  // since it has the canonical worklist (matches whatever cutoff is selected).
  let outstanding;
  if (State.dispatch?.summary) {
    outstanding = (State.dispatch.summary.toShip || 0) + (State.dispatch.summary.toCollect || 0);
  } else {
    const cutoffMs = Date.now() - 10 * 24 * 60 * 60 * 1000;
    outstanding = sales.filter(s =>
      s && !s.isEstimate
      && !s.dispatchedAt && !s.collectedAt
      && s.status !== 'dispatched'
      && s.status !== 'refunded'
      && s.status !== 'cancelled'
      && new Date(s.date).getTime() >= cutoffMs
    ).length;
  }
  const dispBadge = document.getElementById('nav-dispatch-count');
  if (dispBadge) {
    dispBadge.textContent = outstanding;
    dispBadge.style.display = outstanding > 0 ? 'inline-block' : 'none';
  }
}

function isToday(iso) {
  const d = new Date(iso); const now = new Date();
  return d.toDateString() === now.toDateString();
}
function totalQty(p) { return p.qtyShopify; /* eBay & Shopify share the same physical stock */ }

// Keyword search used by Inventory + Locations. Splits the query into tokens and
// requires EACH token to appear (in any order) within a normalised haystack.
// Normalising strips spaces/punctuation, so "mg4" matches "MG 4", "mg-4", and
// "mg4 headlight" matches "MG 4 2022-2026 LED Right Headlight".
function matchesKeywords(query, ...parts) {
  const norm = s => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
  const hay = norm(parts.join(' '));
  const tokens = (query || '').toLowerCase().split(/\s+/).map(t => t.replace(/[^a-z0-9]+/g, '')).filter(Boolean);
  return tokens.every(t => hay.includes(t));
}

function channelPill(ch) {
  // Map raw channel codes to (colour, label) pairs. eBay store codes look up
  // the human-readable store name from the brand config so e.g. ebay_em →
  // "EVBODYPARTS" for Calibre or "eBay" for Razoryn.
  const stores = (State.brand?.stores || []);
  // Try to find a store whose channelCode matches
  if (ch && ch.startsWith('ebay')) {
    const store = stores.find(s => s.channelCode === ch);
    const label = store ? store.name : 'eBay';
    return `<span class="pill blue"><span class="dot"></span>${escapeHtml(label)}</span>`;
  }
  const map = {
    shopify:      ['green', 'Store'],
    direct_cash:  ['amber', 'Cash'],
    direct_bank:  ['amber', 'Bank'],
    cash:         ['amber', 'Cash'],
    bank:         ['amber', 'Bank'],
  };
  const [c, l] = map[ch] || ['', ch];
  return `<span class="pill ${c}"><span class="dot"></span>${escapeHtml(l)}</span>`;
}

async function loadIncoming() {
  const status = el('incoming-status-filter')?.value ?? 'open';
  const q = (el('incoming-search')?.value || '').trim();
  const qs = new URLSearchParams();
  if (status && status !== 'open') qs.set('status', status);
  if (q) qs.set('q', q);
  try {
    const r = await Api.get('/api/incoming' + (qs.toString() ? '?' + qs.toString() : ''));
    let items = r.items || [];
    if (status === 'open') items = items.filter(i => i.status !== 'received');
    State.incoming = items;
    paintIncomingStats(r.summary || {});
    paintIncoming(items);
    loadIncomingContainers();
    // Nav badge
    const badge = el('nav-incoming-count');
    if (badge) { const n = r.summary?.open_lines || 0; badge.textContent = n; badge.style.display = n ? '' : 'none'; }
  } catch (e) {
    if (el('incoming-tbody')) el('incoming-tbody').innerHTML = `<tr><td colspan="10"><div class="empty"><div class="t">Failed to load: ${escapeHtml(e.data?.message || e.message)}</div></div></td></tr>`;
  }
}
async function loadIncomingContainers() {
  const wrap = el('incoming-containers'); if (!wrap) return;
  try {
    const r = await Api.get('/api/incoming/containers');
    const cs = r.containers || [];
    if (!cs.length) { wrap.innerHTML = ''; return; }
    wrap.innerHTML = `<div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Open containers</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">` + cs.map(c => `
        <div style="border:1px solid var(--line);border-radius:8px;padding:8px 12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div style="min-width:0">
            <div style="font-weight:600;font-size:13px">${escapeHtml(c.ref)}${c.supplier ? ` <span style="font-weight:400;color:var(--ink-soft)">· ${escapeHtml(c.supplier)}</span>` : ''}</div>
            <div style="font-size:11px;color:var(--ink-soft)">${c.lines} line(s) · ${c.units} units${c.expected ? ' · ETA ' + new Date(c.expected).toLocaleDateString('en-GB') : ''}</div>
            ${c.note ? `<div style="font-size:11px;color:var(--ink-soft)">📝 ${escapeHtml(c.note)}</div>` : ''}
          </div>
          <button class="btn btn-primary btn-sm" onclick="receiveContainer('${escapeAttr(c.ref)}')" title="Receive every remaining line on this container and push to Shopify + eBay">📦 Receive all</button>
        </div>`).join('') + `</div>`;
  } catch (e) { wrap.innerHTML = ''; }
}
async function receiveContainer(ref) {
  if (!confirm(`Receive ALL remaining stock on container "${ref}"?\n\nThis adds every line's remaining units to warehouse stock and pushes the new quantities to Shopify + eBay.`)) return;
  const taskId = Task.start('Receiving container…');
  try {
    const r = await Api.post('/api/incoming/receive-container', { containerRef: ref, push: true });
    Task.done(taskId, 'Received');
    toast(`Received ${r.receivedLines} line(s) · ${r.receivedUnits} units · pushed ${r.pushed}`, 'success', 6000);
    loadIncoming();
    Store.refresh('products').catch(() => {});
  } catch (e) { Task.fail(taskId, 'Failed'); toast('Failed: ' + (e.data?.message || e.message), 'error'); }
}
function paintIncomingStats(s) {
  const wrap = el('incoming-stats'); if (!wrap) return;
  wrap.innerHTML = `
    <div class="stat"><div class="label">Open lines</div><div class="value">${s.open_lines || 0}</div></div>
    <div class="stat"><div class="label">Units incoming</div><div class="value">${s.units_incoming || 0}</div><div class="delta">not yet received</div></div>
    <div class="stat"><div class="label">Open containers</div><div class="value">${s.open_containers || 0}</div></div>
    <div class="stat"><div class="label">&nbsp;</div><div class="value"><button class="btn btn-outline btn-sm" onclick="openAddIncoming()">+ Add incoming</button></div></div>`;
}
function paintIncoming(items) {
  const tb = el('incoming-tbody'); if (!tb) return;
  if (!items.length) { tb.innerHTML = '<tr><td colspan="10"><div class="empty"><div class="t">Nothing incoming</div><div style="font-size:12px;color:var(--ink-soft);margin-top:6px">Add stock you\'ve ordered so the team can see what\'s on the way.</div></div></td></tr>'; return; }
  const statusPill = (st) => {
    const c = st === 'received' ? 'green' : st === 'arrived' ? 'amber' : st === 'cancelled' ? '' : '';
    return `<span class="pill ${c}" style="font-size:10px">${INCOMING_STATUS[st] || st}</span>`;
  };
  tb.innerHTML = items.map(i => {
    const remaining = Math.max(0, i.qty_ordered - i.qty_received);
    const onHand = i.product_qty_on_hand != null ? i.product_qty_on_hand : '—';
    const exp = i.expected_date ? new Date(i.expected_date).toLocaleDateString('en-GB') : '—';
    const linked = !!i.product_id;
    return `<tr>
      <td><div style="font-weight:600">${escapeHtml(i.title || i.product_title || '(unnamed)')}</div><div style="font-size:11px;color:var(--ink-soft);font-family:ui-monospace,monospace">${escapeHtml(i.sku || i.part_number || '')}${linked ? '' : ' · <span style="color:var(--amber)">not linked</span>'}</div></td>
      <td class="num">${onHand}</td>
      <td class="num">${i.qty_ordered}</td>
      <td class="num">${i.qty_received}</td>
      <td class="num"><strong>${remaining}</strong></td>
      <td>${escapeHtml(i.container_ref || '—')}</td>
      <td>${escapeHtml(i.supplier || '—')}</td>
      <td style="white-space:nowrap">${exp}</td>
      <td>${statusPill(i.status)}</td>
      <td style="white-space:nowrap">
        ${remaining > 0 ? `<button class="btn btn-primary btn-sm" onclick="openReceiveIncoming(${i.id})" title="Receive units — adds to stock & pushes to channels">📦 Receive</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="printIncomingLabels(${i.id})" title="Print labels for this item (to apply when the goods arrive)">🏷</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditIncoming(${i.id})" title="Edit">✏️</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteIncoming(${i.id})" title="Delete" style="color:var(--red)">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

let _incLines = [];
function incbRenderLines() {
  const wrap = el('incb-lines-wrap'); if (!wrap) return;
  if (!_incLines.length) { wrap.innerHTML = '<div style="font-size:12px;color:var(--ink-soft);padding:8px 0">No lines yet — search a product above or paste a list.</div>'; return; }
  const units = _incLines.reduce((a, l) => a + (parseInt(l.qty) || 0), 0);
  wrap.innerHTML = `<div style="font-size:12px;font-weight:600;margin-bottom:6px">${_incLines.length} line(s) · ${units} units</div>` +
    _incLines.map((l, i) => `<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
      <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(l.title)}</div><div style="font-size:11px;color:var(--ink-soft);font-family:ui-monospace,monospace">${escapeHtml(l.sku || '')}</div></div>
      <input type="number" min="1" value="${escapeAttr(l.qty)}" onchange="_incLines[${i}].qty=parseInt(this.value)||0" style="width:80px">
      <button class="btn btn-ghost btn-sm" onclick="_incLines.splice(${i},1);incbRenderLines()" style="color:var(--red)">×</button>
    </div>`).join('');
}
function incbAddProduct(p, qty) {
  if (!p) return;
  const existing = _incLines.find(l => l.productId === p.id);
  if (existing) existing.qty = (parseInt(existing.qty) || 0) + (qty || 1);
  else _incLines.push({ productId: p.id, sku: p.sku, title: p.title, qty: qty || 1 });
}
function incbSearch(q) {
  const box = el('incb-suggest'); if (!box) return;
  q = (q || '').trim().toLowerCase();
  if (q.length < 2) { box.style.display = 'none'; return; }
  const matches = (State.products || []).filter(p =>
    (p.title || '').toLowerCase().includes(q) || (p.sku || '').toLowerCase().includes(q) || (p.part_number || '').toLowerCase().includes(q)
  ).slice(0, 12);
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = matches.map(p => `<div onclick="incbPick(${p.id})" style="padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--line);font-size:12px" onmouseover="this.style.background='var(--bg-soft)'" onmouseout="this.style.background=''">
    <div style="font-weight:600">${escapeHtml(p.title)}</div><div style="font-size:11px;color:var(--ink-soft);font-family:ui-monospace,monospace">${escapeHtml(p.sku || '')} · on hand ${p.qty_on_hand ?? 0}</div></div>`).join('');
  box.style.display = 'block';
}
function incbPick(id) {
  const p = (State.products || []).find(x => x.id === id);
  incbAddProduct(p, 1);
  if (el('incb-search')) el('incb-search').value = '';
  const box = el('incb-suggest'); if (box) box.style.display = 'none';
  incbRenderLines();
}
function incbParsePaste() {
  const text = el('incb-paste')?.value || '';
  const lines = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  let added = 0; const unmatched = [];
  for (const line of lines) {
    const m = line.split(/[,\t;]+|\s{2,}|\s+(?=\d+$)/).map(s => s.trim()).filter(Boolean);
    // Last token that's a number = qty; the rest = code.
    let qty = NaN, code = '';
    if (m.length >= 2) { qty = parseInt(m[m.length - 1]); code = m.slice(0, -1).join(' '); }
    else { const parts = line.split(/\s+/); qty = parseInt(parts[parts.length - 1]); code = parts.slice(0, -1).join(' '); }
    if (!code || !Number.isInteger(qty) || qty <= 0) { unmatched.push(line); continue; }
    const cl = code.toLowerCase();
    const p = (State.products || []).find(x => (x.sku || '').toLowerCase() === cl || (x.part_number || '').toLowerCase() === cl);
    if (p) { incbAddProduct(p, qty); added++; } else unmatched.push(code + ' (no match)');
  }
  const res = el('incb-paste-result');
  if (res) res.innerHTML = `Added ${added} line(s).` + (unmatched.length ? ` <span style="color:var(--amber)">Couldn't match ${unmatched.length}:</span> ${unmatched.slice(0, 8).map(escapeHtml).join(', ')}${unmatched.length > 8 ? '…' : ''}` : '');
  if (el('incb-paste')) el('incb-paste').value = '';
  incbRenderLines();
}
async function submitBulkIncoming() {
  if (!_incLines.length) { toast('Add at least one line', 'warn'); return; }
  const payload = {
    containerRef: el('incb-container')?.value || null,
    supplier: el('incb-supplier')?.value || null,
    expectedDate: el('incb-expected')?.value || null,
    notes: el('incb-note')?.value || null,
    status: 'on_order',
    lines: _incLines.filter(l => (parseInt(l.qty) || 0) > 0).map(l => ({ productId: l.productId, qty: parseInt(l.qty) })),
  };
  const taskId = Task.start('Adding incoming stock…');
  try {
    const r = await Api.post('/api/incoming/bulk', payload);
    Task.done(taskId, 'Added');
    toast(`Added ${r.created} line(s) · ${r.createdUnits} units` + (r.unmatched?.length ? ` · ${r.unmatched.length} skipped` : ''), 'success', 5000);
    closeModal();
    loadIncoming();
  } catch (e) { Task.fail(taskId, 'Failed'); toast('Failed: ' + (e.data?.message || e.message), 'error'); }
}

async function submitReceiveIncoming(id) {
  const qty = parseInt(el('inc-recv-qty')?.value);
  if (!Number.isInteger(qty) || qty <= 0) { toast('Enter a quantity', 'warn'); return; }
  const push = el('inc-recv-push') ? el('inc-recv-push').checked : false;
  const wantLabels = !!el('inc-recv-labels')?.checked;
  const itForLabels = (State.incoming || []).find(x => x.id === id);
  const taskId = Task.start('Receiving stock…');
  try {
    const r = await Api.post('/api/incoming/' + id + '/receive', { qty, push });
    Task.done(taskId, 'Received');
    let msg = `Received ${r.received}`;
    if (r.notLinked) msg += ' (not linked — stock not changed)';
    else { const cp = r.channelPush || {}; const ebayOk = (cp.ebay || []).filter(x => x.ok).length; msg += ` · stock updated${push ? `, Shopify ${cp.shopify?.ok ? '✓' : '—'}, eBay ${ebayOk}` : ''}`; }
    toast(msg, 'success', 5000);
    closeModal();
    if (wantLabels && itForLabels) labelsPrint(incomingLabelItems(itForLabels, qty));
    loadIncoming();
    Store.refresh('products').catch(() => {});
  } catch (e) { Task.fail(taskId, 'Failed'); toast('Failed: ' + (e.data?.message || e.message), 'error'); }
}

  if (!confirm('Delete this incoming line?')) return;

  catch (e) { toast('Failed: ' + (e.data?.message || e.message), 'error'); }
}

function printIncomingLabels(id) {

function renderInventory() {

        <span id="inv-bulk-count" style="font-weight:600">0 selected</span>

        <button class="btn btn-outline btn-sm" onclick="invClearSelection()">Clear selection</button>
        <button class="btn btn-primary btn-sm admin-only" onclick="bulkDeleteSelected()" style="background:var(--red);border-color:var(--red)">🗑 Delete selected</button>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="table">
            <thead><tr>
              <th style="width:32px"><input type="checkbox" id="inv-check-all" onchange="invToggleAll(this.checked)"></th>
              <th style="width:64px"></th>
              <th>Product</th><th>Part #</th><th>Location</th>
              <th class="num">Stock</th>
              <th class="num">Price</th><th></th>
            </tr></thead>
            <tbody id="inv-tbody"></tbody>
          </table>
        </div>
        <div id="inv-foot" style="padding:10px 14px;color:var(--ink-soft);font-size:12px;text-align:center"></div>
      </div>
      <div id="inv-sentinel" style="height:1px"></div>
    </div>
  `;

  // ---- Paginated render + event delegation (Phase 1B) ----
  // Filtering still scans ALL products; only the DOM is capped at PAGE rows,
  // with more appended on scroll via an IntersectionObserver. Rows carry NO
  // inline handlers — two delegated listeners on the tbody handle every row,
  // so appended rows need no wiring and cost almost nothing to add.
  const PAGE = 50;
  let shown = 0;

  function rowHtml(p) {
    const tq = totalQty(p);
    return `
      <tr>
        <td><input type="checkbox" class="inv-row-check" data-act="check" data-pid="${p.id}" ${State.invSelected.has(p.id)?'checked':''}></td>
        <td>
          ${p.imageUrl
            ? `<img src="${p.imageUrl}" alt="" style="width:48px;height:48px;object-fit:cover;border-radius:6px;background:var(--line-2)">`
            : `<div style="width:48px;height:48px;border-radius:6px;background:var(--line-2);display:flex;align-items:center;justify-content:center;color:var(--ink-soft)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`
          }
        </td>
        <td><div style="font-weight:500">${p.title}</div><div style="color:var(--ink-soft);font-size:11px">${p.sku}</div></td>
        <td style="font-family:ui-monospace,monospace;font-size:12px">${p.partNumber||'—'}</td>
        <td><div style="font-size:12px">${p.location || '—'}</div></td>
        <td class="num">
          <strong>${tq}</strong> ${tq<=p.lowThresh ? `<span class="pill ${tq===0?'red':'amber'}" style="margin-left:6px">${tq===0?'Out':'Low'}</span>`:''}
          ${p.incomingQty > 0 ? `<div style="font-size:11px;margin-top:3px"><span class="pill" style="background:var(--bg-soft);color:var(--brand-primary);font-size:10px">${tq===0?'Pre-order':'+'+p.incomingQty+' incoming'}</span>${p.incomingEta ? `<div style="color:var(--ink-soft);font-size:10px;margin-top:2px">ETA ~${new Date(p.incomingEta).toLocaleDateString('en-GB')}</div>` : ''}</div>` : ''}
        </td>
        <td class="num">${gbp(p.priceShopify)}</td>
        <td style="white-space:nowrap"><button class="btn btn-outline btn-sm" data-act="edit" data-pid="${p.id}">Edit</button> <button class="btn btn-ghost btn-sm" data-act="del" data-pid="${p.id}" style="color:var(--red)" title="Delete product">🗑</button></td>
      </tr>
    `;
  }

  function updateFoot() {
    const total = (State._invFiltered || []).length;
    const foot = el('inv-foot');
    if (foot) foot.textContent = total ? `Showing ${Math.min(shown, total)} of ${total}` : '';
  }

  function renderChunk() {
    const list = State._invFiltered || [];
    if (shown >= list.length) return;
    const slice = list.slice(shown, shown + PAGE);
    el('inv-tbody').insertAdjacentHTML('beforeend', slice.map(rowHtml).join(''));
    shown += slice.length;
    updateFoot();
  }

  // Keep filling while the sentinel sits near the viewport — handles tall
  // screens where one 50-row chunk doesn't reach the fold.
  function fillToViewport() {
    const s = el('inv-sentinel');
    if (!s) return;
    const list = State._invFiltered || [];
    if (shown >= list.length) return;
    if (s.getBoundingClientRect().top < window.innerHeight + 300) {
      renderChunk();
      requestAnimationFrame(fillToViewport);
    }
  }

  function paint() {
    const q = el('inv-search').value.toLowerCase();
    const b = el('inv-brand').value;
    const s = el('inv-stock').value;
    const filtered = State.products.filter(p => {
      if (q && !matchesKeywords(q, p.title, p.sku, p.partNumber, p.brand, p.model)) return false;
      if (b && p.brand !== b) return false;
      const tq = totalQty(p);
      if (s === 'low' && tq > p.lowThresh) return false;
      if (s === 'ok' && tq <= p.lowThresh) return false;
      if (s === 'out' && tq !== 0) return false;
      return true;
    });
    State._invFiltered = filtered;
    shown = 0;
    const tbody = el('inv-tbody');
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty"><div class="t">No products match</div>${q && State.user?.role === 'admin' ? `<div style="margin-top:10px"><button class="btn btn-outline btn-sm" onclick="diagnoseSku('${escapeAttr(el('inv-search').value.trim())}')">🔍 Why isn't "${escapeHtml(el('inv-search').value.trim())}" showing?</button></div>` : ''}</div></td></tr>`;
      updateFoot();
      invUpdateBulkBar();
      return;
    }
    tbody.innerHTML = '';
    renderChunk();
    requestAnimationFrame(fillToViewport);
    invUpdateBulkBar();
  }

  // Event delegation — TWO listeners for the whole table, replacing the ~1,600
  // inline handlers that used to make every keystroke retype 590 KB of DOM.
  const tbody = el('inv-tbody');
  tbody.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    const pid = btn.getAttribute('data-pid');
    if (btn.getAttribute('data-act') === 'edit') {
      openProductModal(pid);
    } else if (btn.getAttribute('data-act') === 'del') {
      const prod = State.products.find(x => String(x.id) === String(pid));
      deleteProduct(pid, prod ? (prod.title || '') : '');
    }
  });
  tbody.addEventListener('change', (e) => {
    const cb = e.target.closest('input[data-act="check"]');
    if (!cb) return;
    invToggleRow(cb.getAttribute('data-pid'), cb.checked);
  });

  // Infinite scroll: append the next chunk when the sentinel scrolls into view.
  if (State._invObserver) State._invObserver.disconnect();
  State._invObserver = new IntersectionObserver((entries) => {
    if (entries.some(en => en.isIntersecting)) fillToViewport();
  }, { rootMargin: '300px' });
  const sentinel = el('inv-sentinel');
  if (sentinel) State._invObserver.observe(sentinel);

  paint();
  ['inv-search','inv-brand','inv-stock'].forEach(id => el(id).addEventListener('input', paint));
}

// Diagnose why a SKU that appears in Listing Mirror doesn't show in inventory.
// Calls the backend tracer and presents a plain-English explanation + 1-click fix.
async function diagnoseSku(sku) {
  if (!sku) return;
  const taskId = Task.start('Tracing "' + sku + '" across the database…');
  let r;
  try {
    r = await Api.get('/api/products/diagnose/' + encodeURIComponent(sku));
    Task.done(taskId, 'Diagnosis ready');
  } catch (e) {
    Task.fail(taskId, 'Failed');
    toast('Diagnostic failed: ' + (e.data?.message || e.message), 'error');
    return;
  }

  // Build a fix button based on what the backend found
  let fixButton = null;
  if (r.fixAvailable === 'reactivate' && r.fixProductId) {
    fixButton = { label: '✓ Reactivate this product', primary: true, onClick: async () => {
      try {
        await Api.post('/api/products/' + r.fixProductId + '/reactivate');
        toast('Product reactivated — it will now show in search', 'success');
        closeModal();
        await Store.refresh('products');
        renderInventory();
      } catch (e) { toast('Reactivate failed: ' + (e.data?.message || e.message), 'error'); }
    }};
  } else if (r.fixAvailable === 'reimport_or_orphan') {
    fixButton = { label: '📥 Import from Shopify', primary: true, onClick: async () => {
      closeModal();
      const t = Task.start('Importing products from Shopify…');
      try {
        await Api.post('/api/settings/import-shopify');
        Task.done(t, 'Import complete');
        toast('Shopify import finished — search for the SKU again', 'success', 6000);
        await Store.refresh('products');
      } catch (e) {
        Task.fail(t, 'Failed');
        toast('Import failed: ' + (e.data?.message || e.message), 'error');
      }
    }};
  }

  // Render details
  const detailRows = [];
  if (r.exactProductMatch?.length) {
    detailRows.push(`<div style="margin:6px 0"><strong>Product table (exact):</strong> ${r.exactProductMatch.map(p => `id ${p.id}, active=${p.active}, qty=${p.qty_on_hand}`).join('; ')}</div>`);
  }
  if (r.fuzzyProductMatch?.length && !r.exactProductMatch?.length) {
    detailRows.push(`<div style="margin:6px 0"><strong>Found a case/space variant:</strong> ${r.fuzzyProductMatch.map(p => `${p.sku_with_brackets} (length ${p.sku_len}, id ${p.id})`).join('; ')}</div>`);
  }
  if (r.mirrorLinkMatch?.length) {
    detailRows.push(`<div style="margin:6px 0"><strong>eBay mirror links:</strong> ${r.mirrorLinkMatch.length} found · ${r.mirrorLinkProductCheck.filter(c => c.productExists).length} have a matching product, ${r.mirrorLinkProductCheck.filter(c => !c.productExists).length} are orphans</div>`);
  }

  modal({
    title: '🔍 Diagnosis: ' + escapeHtml(sku),
    body: `
      <div style="font-size:13px;line-height:1.6">
        <div style="padding:12px;background:var(--bg-soft);border-radius:8px;margin-bottom:12px">${escapeHtml(r.diagnosis || 'No diagnosis available.')}</div>
        ${detailRows.join('')}
      </div>
    `,
    actions: [
      { label: 'Close', onClick: closeModal },
      ...(fixButton ? [fixButton] : []),
    ],
  });
}

async function bulkDeleteSelected() {
  const ids = Array.from(State.invSelected);
  if (!ids.length) return;
  const choice = prompt(
    `Delete ${ids.length} product${ids.length>1?'s':''}?\n\n` +
    `Type one of:\n` +
    `  1 = remove from warehouse only (keep on Shopify)\n` +
    `  2 = remove from BOTH warehouse AND Shopify\n` +
    `  (anything else cancels)`
  );
  if (choice !== '1' && choice !== '2') return;
  const removeFromShopify = choice === '2';
  const ok = confirm(
    removeFromShopify
      ? `Confirm: PERMANENTLY delete ${ids.length} product${ids.length>1?'s':''} from BOTH warehouse and Shopify. This cannot be undone.`
      : `Confirm: remove ${ids.length} product${ids.length>1?'s':''} from the warehouse only. Shopify untouched.`
  );
  if (!ok) return;
  toast(`Deleting ${ids.length} products…`, 'info');
  try {
    const r = await Api.post('/api/products/bulk-delete', { ids, hard: true, shopify: removeFromShopify });
    let msg = `Deleted ${r.deleted} from warehouse`;
    if (removeFromShopify) msg += ` · ${r.shopifyDeleted} from Shopify`;
    if (r.errors?.length) msg += ` · ${r.errors.length} errors`;
    toast(msg, r.errors?.length ? 'warn' : 'success');

    await Store.refresh('products');

    toast('Bulk delete failed: ' + (e.data?.message || e.message), 'error');

}

// Turn a channelPush result from the backend into a human toast message,
// e.g. "✓ Stock pushed: Shopify ✓, EVBODYPARTS ✓" or noting failures.
function summarizeChannelPush(push) {
  if (!push) return 'Saved';
  const parts = [];
  // Shopify
  if (push.shopify?.ok) parts.push('Shopify ✓');
  else if (push.shopify?.error) parts.push('Shopify ✗');
  else if (push.shopify?.skipped) parts.push('Shopify —');
  // eBay (per store)
  for (const e of (push.ebay || [])) {
    if (e.ok) parts.push(`${e.store || 'eBay'} ✓`);
    else if (e.error) parts.push(`${e.store || 'eBay'} ✗`);
    // skipped (no links / unavailable) → don't clutter the toast
  }
  if (parts.length === 0) return 'Saved (no linked channels to push to)';
  const anyErr = pushResultHasError(push);
  return (anyErr ? '⚠ Stock saved, some pushes failed: ' : '✓ Stock synced: ') + parts.join(', ');
}
function pushResultHasError(push) {
  if (!push) return false;
  if (push.shopify?.error) return true;
  return (push.ebay || []).some(e => e.error);
}

// Shopify collections (shop categories) picker inside the product modal.
async function loadProductCollections(productId) {
  const wrap = el('m-collections');
  if (!wrap) return;
  try {
    const [all, mine] = await Promise.all([
      Api.get('/api/products/shopify-collections'),
      Api.get('/api/products/' + productId + '/collections'),
    ]);
    if (mine.notLinked) { wrap.innerHTML = '<span style="color:var(--ink-soft)">Not linked to Shopify — import/link this product first.</span>'; return; }
    const collections = all.collections || [];
    if (!collections.length) { wrap.innerHTML = '<span style="color:var(--ink-soft)">No custom collections found on Shopify. (Smart/auto collections are managed by Shopify rules.)</span>'; return; }
    const inMap = {}; (mine.collects || []).forEach(c => { inMap[c.collectionId] = c.collectId; });
    State._prodCollects = inMap;
    wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;padding:8px">' +
      collections.map(c => {
        const on = inMap[c.id] != null;
        return `<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
          <input type="checkbox" ${on ? 'checked' : ''} onchange="toggleProductCollection('${productId}','${c.id}',this)">
          ${escapeHtml(c.title)}</label>`;
      }).join('') + '</div><div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Changes save to Shopify immediately.</div>';
  } catch (e) {
    wrap.innerHTML = '<span style="color:var(--red)">Couldn’t load collections: ' + escapeHtml(e.data?.message || e.message) + '</span>';
  }
}
async function toggleProductCollection(productId, collectionId, cb) {
  cb.disabled = true;
  const map = State._prodCollects || {};
  try {
    if (cb.checked) {
      const r = await Api.post('/api/products/' + productId + '/collections', { collectionId });
      map[collectionId] = r.collectId;
      toast('Added to collection', 'success', 1500);
    } else {
      const collectId = map[collectionId];
      if (collectId) await Api.delete('/api/products/' + productId + '/collections/' + collectId);
      delete map[collectionId];
      toast('Removed from collection', 'success', 1500);
    }
  } catch (e) {
    cb.checked = !cb.checked;
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  } finally {
    cb.disabled = false;
  }
}

function renderScan() {

  el('content').innerHTML = `

        <div class="card">

function switchScanMethod(m) {
  document.querySelectorAll('.seg button[data-method]').forEach(b => b.classList.toggle('active', b.dataset.method===m));
  el('scan-cam').style.display = m==='cam' ? 'block' : 'none';

  if (m==='usb') setTimeout(()=>el('scan-input').focus(), 100);
  if (m!=='cam') stopCamera();
}
function startCamera() {
  if (typeof Html5Qrcode === 'undefined') { toast('Scanner library not loaded', 'error'); return; }
  if (scanner && scanner.isScanning) return;
  scanner = new Html5Qrcode("scanner-region");
  el('scan-start').style.display='none';
  el('scan-stop').style.display='inline-flex';
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 150 } },
    (decoded) => { handleScan(decoded); },
    () => {}
  ).catch(err => {
    toast('Camera access denied', 'error');
    el('scan-start').style.display='inline-flex';
    el('scan-stop').style.display='none';
  });
}
function stopCamera() {
  if (scanner && scanner.isScanning) scanner.stop().then(()=>scanner.clear()).catch(()=>{});
  el('scan-start').style.display='inline-flex';
  el('scan-stop').style.display='none';
}
// Debounce tracker — html5-qrcode fires onScanSuccess 5-15x for one physical
// scan, which spammed toasts and re-rendered the result card repeatedly.
let _lastScan = { code: null, at: 0 };
function handleScan(code) {
  // Ignore the same code seen again within 2s (the duplicate-fire window).
  const now = Date.now();
  if (code === _lastScan.code && now - _lastScan.at < 2000) return;
  _lastScan = { code, at: now };

  const p = State.products.find(x => x.barcode === code || x.sku === code);
  if (!p) {
    el('scan-result').innerHTML = `<div class="empty"><div class="t">Not found: ${code}</div>No product matches this barcode. <br><br><button class="btn btn-primary admin-only" onclick="openProductModal()">+ Add as new product</button></div>`;
    toast('Barcode not in inventory', 'warn');
    return;
  }
  toast('Found: ' + p.title, 'success');
  showProductScanCard(p);
}
function handleManualSearch(q) {
  q = q.trim().toLowerCase(); if (!q) return;
  const p = State.products.find(x => matchesKeywords(q, x.sku, x.partNumber, x.title));
  if (!p) { toast('No match found', 'warn'); return; }
  showProductScanCard(p);
}
function showProductScanCard(p) {
  el('scan-result').innerHTML = `
    <div style="font-weight:600;font-size:15px;margin-bottom:4px">${p.title}</div>
    <div style="color:var(--ink-soft);font-size:12px;margin-bottom:14px">${p.sku} · ${p.partNumber||''}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
