// Fetches the configured eBay stores' status (token / disabled state) and
// paints a banner into #lm-stores-status. Disabled stores get an explicit
// note + a "Clean up its old links" button. Idempotent — safe to call on
// every re-render.
async function refreshLinkMirrorStoresStatus() {
  const slot = el('lm-stores-status');
  if (!slot) return;
  try {
    const r = await Api.get('/api/listings/stores');
    const stores = r.stores || [];
    const disabled = stores.filter(s => s.disabled);
    const active   = stores.filter(s => !s.disabled && s.hasToken);
    const noToken  = stores.filter(s => !s.disabled && !s.hasToken);
    let html = '';
    if (disabled.length) {
      html += `
        <div style="background:#fff8e6;border:1px solid #f0d171;color:#5a4400;padding:10px 14px;border-radius:6px;font-size:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="font-size:18px">⏸</div>
          <div style="flex:1;min-width:220px">
            <strong>Store${disabled.length === 1 ? '' : 's'} disabled:</strong> ${disabled.map(s => escapeHtml(s.name)).join(', ')}.
            All linking, syncing and force-matching skips ${disabled.length === 1 ? 'this store' : 'these stores'} until re-enabled.
            Use <strong>🗑 Clean stale links</strong> (above) to delete its existing mirror_links rows.
            Re-enable by removing the store code from the <code>EBAY_STORE_DISABLED</code> env var in Railway, then redeploy.
          </div>
        </div>
      `;
    }
    if (noToken.length) {
      html += `
        <div style="background:#fee;border:1px solid #faa;color:#900;padding:8px 12px;border-radius:6px;font-size:12px;margin-top:6px">
          <strong>Store${noToken.length === 1 ? '' : 's'} with no token:</strong> ${noToken.map(s => escapeHtml(s.name)).join(', ')} — set the auth env var in Railway.
        </div>
      `;
    }
    if (active.length && !disabled.length && !noToken.length) {
      html += `<div style="font-size:11px;color:var(--ink-soft)">Active stores: ${active.map(s => escapeHtml(s.name)).join(', ')}.</div>`;
    } else if (active.length) {
      html += `<div style="font-size:11px;color:var(--ink-soft);margin-top:6px">Active: ${active.map(s => escapeHtml(s.name)).join(', ')}.</div>`;
    }
    slot.innerHTML = html;
  } catch (e) {
    slot.innerHTML = '';  // silent fail — non-critical
  }
}

// Deletes mirror_links rows that point to currently-disabled stores. Used to
// clean up after disabling a store (e.g. Evanta) so the listing-mirror counts
// reflect reality. Safe to re-run.
//
// When nothing is currently disabled, the button is still useful — it
// surfaces an instruction modal explaining how to disable a store via the
// EBAY_STORE_DISABLED env var, listing the actual store codes available.
// Resolves NULL-store-code legacy mirror_links. Phase 1 auto-detects each
// link's owning store with a cheap per-item check (not a full scan). Phase 2
// optionally clears any that can't be attributed to an active store — which,
// after disabling Evanta, are almost certainly old Evanta listings.
async function resolveLegacyLinks() {
  // Run phase 1 first (detect-only, no deletes)
  const t1 = Task.start('Detecting stores for legacy links…');
  let r;
  try {
    r = await Api.post('/api/listings/resolve-legacy-links', { clearUnresolved: false });
    Task.done(t1, `${r.resolved} resolved`);
  } catch (e) {
    Task.fail(t1, 'Failed');
    if ((e.data?.message || e.message || '').match(/usage limit|exceeded|21917/i)) {
      toast('eBay API quota is exhausted — wait for the 7am reset, then try again.', 'error', 8000);
    } else {
      toast('Failed: ' + (e.data?.message || e.message), 'error');
    }
    return;
  }

  // If everything resolved, we're done
  if (r.unresolved === 0) {
    toast(`✓ All ${r.resolved} legacy link${r.resolved === 1 ? '' : 's'} resolved — store codes backfilled.`, 'success', 6000);
    await loadLinkStatus();
    renderLinkStatus();
    return;
  }

  // Some couldn't be attributed to an active store. Offer to clear them.
  const sampleList = (r.unresolvedSample || []).map(s =>
    `<li style="margin:3px 0;font-family:ui-monospace,monospace;font-size:11px">${escapeHtml(s.itemId)}${s.sku ? ' · ' + escapeHtml(s.sku) : ''}</li>`
  ).join('');
  modal({
    title: '🔧 Resolve legacy links',
    body: `
      <div style="font-size:13px;line-height:1.6">
        <p><strong>${r.resolved}</strong> link${r.resolved === 1 ? '' : 's'} resolved to ${r.resolved === 1 ? 'its' : 'their'} store. ✓</p>
        <p><strong>${r.unresolved}</strong> couldn't be matched to any active store. These are usually:</p>
        <ul style="margin:8px 0;padding-left:20px;font-size:12px;color:var(--ink-soft)">
          <li>Old <strong>Evanta</strong> listings (now that Evanta is disabled, its items can't be verified)</li>
          <li>Listings that have ended or been deleted on eBay</li>
        </ul>
        ${sampleList ? `<div style="margin:10px 0;padding:10px;background:var(--bg-soft);border-radius:6px"><div style="font-size:11px;color:var(--ink-soft);margin-bottom:4px;font-weight:600">Unresolved items:</div><ul style="margin:0;padding-left:18px">${sampleList}</ul></div>` : ''}
        <p style="font-size:12px;color:var(--ink-soft)">Clearing them removes the stale link rows. If any were valid EVBODY listings, re-enable the relevant store and run Force match to re-link.</p>
      </div>
    `,
    actions: [
      { label: 'Leave them', onClick: closeModal },
      { label: `🗑 Clear ${r.unresolved} unresolved`, primary: true, onClick: async () => {
        closeModal();
        const t2 = Task.start('Clearing unresolved legacy links…');
        try {
          const r2 = await Api.post('/api/listings/resolve-legacy-links', { clearUnresolved: true });
          Task.done(t2, `${r2.cleared} cleared`);
          toast(`✓ Resolved ${r2.resolved}, cleared ${r2.cleared} unresolved link${r2.cleared === 1 ? '' : 's'}.`, 'success', 6000);
          await loadLinkStatus();
          renderLinkStatus();
        } catch (e) {
          Task.fail(t2, 'Failed');
          toast('Failed: ' + (e.data?.message || e.message), 'error');
        }
      }},
    ],
  });
}

// ── Data integrity diagnostics ──────────────────────────────────────────────
let _diScanCancel = false;
function openDataIntegrity() {
  modal({
    title: '🧮 Data integrity',
    body: `
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:10px">Finds duplicate links and duplicate listings. Read-only — nothing is changed.</div>
      <div style="margin-bottom:8px"><button class="btn btn-primary btn-sm" onclick="runIntegrityCheck()">Run link &amp; part-number check</button></div>
      <div id="di-report"></div>
      <hr style="margin:16px 0;border:none;border-top:1px solid var(--line)">
      <div style="font-weight:600;font-size:13px;margin-bottom:4px">Scan descriptions for embedded part numbers</div>
      <div style="font-size:11px;color:var(--ink-soft);margin-bottom:8px">Fetches each listing's description live and flags any that contain <em>another</em> product's part number — a strong duplicate signal. Shopify by default; eBay uses the per-item API (slower, quota-limited). Results may include legitimate fitment/cross-reference mentions, so review before acting.</div>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:8px"><input type="checkbox" id="di-include-ebay"> Scan eBay descriptions instead of Shopify</label>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" id="di-scan-btn" onclick="runDescriptionScan()">Start description scan</button>
        <button class="btn btn-ghost btn-sm" onclick="_diScanCancel=true">Stop</button>
        <span id="di-scan-progress" style="font-size:12px;color:var(--ink-soft)"></span>
      </div>
      <div id="di-scan-report" style="margin-top:10px"></div>
    `,
    actions: [{ label: 'Close', onClick: () => { _diScanCancel = true; closeModal(); } }],
  });
}

function diSection(title, count, innerHtml) {
  const ok = count === 0;
  return `<details ${ok ? '' : 'open'} style="margin-bottom:8px;border:1px solid var(--line);border-radius:8px;padding:8px 10px">
    <summary style="cursor:pointer;font-weight:600;font-size:13px;color:${ok ? 'var(--ink-soft)' : 'var(--ink)'}">
      ${ok ? '✓' : '⚠'} ${escapeHtml(title)} <span style="color:${ok ? 'var(--green)' : 'var(--red)'}">(${count})</span>
    </summary>
    ${ok ? '<div style="font-size:12px;color:var(--ink-soft);padding:6px 0">None found.</div>' : '<div style="padding:6px 0">' + innerHtml + '</div>'}
  </details>`;
}
function diProds(list) {
  return list.map(p => `<div style="font-size:12px"><span style="font-family:ui-monospace,monospace">${escapeHtml(p.sku || '—')}</span> · ${escapeHtml(p.title || '')}</div>`).join('');
}

function renderIntegrityReport(r) {
  const c = r.counts;
  let html = '';
  html += diSection('Shopify product linked to multiple eBay items', c.shopifyLinkedToManyEbay,
    r.shopifyLinkedToManyEbay.map(x => `<div style="margin-bottom:6px;padding:6px;background:var(--bg-soft);border-radius:6px">
      <div style="font-size:11px;color:var(--ink-soft)">Shopify ${escapeHtml(x.shopifyProductId)}</div>
      ${x.ebayItems.map(e => `<div style="font-size:12px">→ eBay <span style="font-family:ui-monospace,monospace">${escapeHtml(e.ebayItemId)}</span>${e.storeCode ? ' ['+escapeHtml(e.storeCode)+']' : ''} · ${escapeHtml(e.title || e.sku || '')}</div>`).join('')}
    </div>`).join(''));
  html += diSection('eBay item linked to multiple Shopify products', c.ebayLinkedToManyShopify,
    r.ebayLinkedToManyShopify.map(x => `<div style="font-size:12px">eBay <span style="font-family:ui-monospace,monospace">${escapeHtml(x.ebayItemId)}</span> → ${x.shopifyProductIds.map(escapeHtml).join(', ')}</div>`).join(''));
  html += diSection('Multiple warehouse products on the same Shopify product', c.productsSharingShopifyId,
    r.productsSharingShopifyId.map(x => `<div style="margin-bottom:6px;padding:6px;background:var(--bg-soft);border-radius:6px"><div style="font-size:11px;color:var(--ink-soft)">Shopify ${escapeHtml(x.shopifyProductId)}</div>${diProds(x.products)}</div>`).join(''));
  html += diSection('Same eBay listing id on multiple warehouse products', c.productsSharingEbayId,
    r.productsSharingEbayId.map(x => `<div style="margin-bottom:6px;padding:6px;background:var(--bg-soft);border-radius:6px"><div style="font-size:11px;color:var(--ink-soft)">eBay ${escapeHtml(x.ebayListingId)}</div>${diProds(x.products)}</div>`).join(''));
  html += diSection('Duplicate listings sharing the same part number', c.duplicatePartNumbers,
    r.duplicatePartNumbers.map(x => `<div style="margin-bottom:6px;padding:6px;background:var(--bg-soft);border-radius:6px"><div style="font-size:11px;color:var(--ink-soft)">Part # <strong>${escapeHtml(x.partNumber)}</strong> — ${x.count} products</div>${diProds(x.products)}</div>`).join(''));
  html += diSection('Part number appearing in another product’s title', c.partNumberInOtherTitle,
    r.partNumberInOtherTitle.map(x => `<div style="margin-bottom:6px;font-size:12px"><strong>${escapeHtml(x.partNumber)}</strong> (${escapeHtml(x.ofProduct.sku)}) found in title of <span style="font-family:ui-monospace,monospace">${escapeHtml(x.foundInProduct.sku)}</span> · ${escapeHtml(x.foundInProduct.title)}</div>`).join(''));
  const totalIssues = Object.values(c).reduce((a, b) => a + b, 0);
  return (totalIssues === 0 ? '<div style="color:var(--green);font-weight:600;margin-bottom:8px">✓ No issues found.</div>' : '') + html;
}

async function runIntegrityCheck() {
  const out = el('di-report');
  if (out) out.innerHTML = '<div style="font-size:12px;color:var(--ink-soft)">Running…</div>';
  try {
    const r = await Api.get('/api/listings/integrity');
    if (out) out.innerHTML = renderIntegrityReport(r);
  } catch (e) {
    if (out) out.innerHTML = '<div style="color:var(--red)">Failed: ' + (e.data?.message || e.message) + '</div>';
  }
}

function renderScanMatches(matches) {
  if (!matches.length) return '<div style="font-size:12px;color:var(--ink-soft)">No embedded part numbers found yet.</div>';
  return matches.map(m => `<div style="font-size:12px;margin-bottom:4px;padding:5px 7px;background:var(--bg-soft);border-radius:6px">
    Part <strong>${escapeHtml(m.partNumber)}</strong> (of <span style="font-family:ui-monospace,monospace">${escapeHtml(m.ofProduct.sku)}</span>) appears in the ${m.source} description of <span style="font-family:ui-monospace,monospace">${escapeHtml(m.foundInProduct.sku)}</span> · ${escapeHtml(m.foundInProduct.title)}
  </div>`).join('');
}

async function runDescriptionScan() {
  const includeEbay = !!el('di-include-ebay')?.checked;
  const btn = el('di-scan-btn'), prog = el('di-scan-progress'), rep = el('di-scan-report');
  if (btn) btn.disabled = true;
  _diScanCancel = false;
  const allMatches = [];
  let offset = 0, total = 0;
  if (rep) rep.innerHTML = '';
  try {
    do {
      const r = await Api.post('/api/listings/integrity/scan-descriptions', { offset, includeEbay });
      total = r.total;
      offset = r.nextOffset;
      allMatches.push(...(r.matches || []));
      if (prog) prog.textContent = `Scanned ${Math.min(offset, total)}/${total} · ${allMatches.length} match${allMatches.length === 1 ? '' : 'es'}`;
      if (rep) rep.innerHTML = renderScanMatches(allMatches);
      if (r.done) { if (prog) prog.textContent += ' — done'; break; }
    } while (!_diScanCancel && offset < total);
    if (_diScanCancel && prog) prog.textContent += ' (stopped)';
  } catch (e) {
    if (prog) prog.textContent = 'Failed: ' + (e.data?.message || e.message);
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function cleanupDisabledStoreLinks() {
  // Check the configured stores first so we can show actionable guidance
  let storeData;
  try {
    storeData = await Api.get('/api/listings/stores');
  } catch (e) {
    toast('Failed to check store status: ' + (e.data?.message || e.message), 'error');
    return;
  }
  const stores = storeData.stores || [];
  const disabled = stores.filter(s => s.disabled);

  // Path 1: nothing disabled — show how-to modal instead of silently confirming
  if (disabled.length === 0) {
    const storeList = stores.map(s =>
      `<li style="margin:4px 0"><code style="background:var(--bg-soft);padding:1px 6px;border-radius:3px">${escapeHtml(s.code)}</code> — ${escapeHtml(s.name)}${s.primary ? ' <span style="color:var(--ink-soft);font-size:11px">(primary)</span>' : ''}</li>`
    ).join('');
    modal({
      title: '🗑 Clean stale links',
      body: `
        <div style="font-size:13px;line-height:1.6">
          <p>Nothing to clean — <strong>no eBay stores are currently disabled</strong>.</p>
          <p>This button removes mirror_links rows tied to <em>disabled</em> stores. To use it, you first need to disable a store:</p>
          <ol style="margin:10px 0;padding-left:20px">
            <li>Open <strong>Railway</strong> → your service → <strong>Variables</strong></li>
            <li>Add a new variable: <code style="background:var(--bg-soft);padding:1px 6px;border-radius:3px">EBAY_STORE_DISABLED</code></li>
            <li>Set its value to the store code(s) you want to disable, comma-separated.</li>
            <li>Save → Railway redeploys → return here and click 🗑 Clean stale links</li>
          </ol>
          <div style="margin-top:12px;padding:10px;background:var(--bg-soft);border-radius:6px">
            <div style="font-size:12px;color:var(--ink-soft);margin-bottom:6px;font-weight:600">Your configured store codes:</div>
            <ul style="margin:0;padding-left:20px;font-size:13px">${storeList || '<li style="color:var(--ink-soft)">(none)</li>'}</ul>
          </div>
          <div style="margin-top:10px;font-size:12px;color:var(--ink-soft)">
            <strong>Example for Calibre:</strong> set <code>EBAY_STORE_DISABLED=evantagrande</code> to disable Evanta Grande temporarily so all linking happens against EVBODYPARTS only.
          </div>
        </div>
      `,
      actions: [
        { label: 'Got it', primary: true, onClick: closeModal },
      ],
    });
    return;
  }

  // Path 2: one or more stores ARE disabled — confirm + delete their links
  if (!confirm(`Delete mirror_links rows pointing to disabled store${disabled.length === 1 ? '' : 's'}: ${disabled.map(s => s.name).join(', ')}?\n\nThis is safe to do — after re-enabling a store and running Force match, the links will be re-created from the live eBay listings.`)) return;
  const taskId = Task.start('Cleaning up disabled-store links…');
  try {
    const r = await Api.post('/api/listings/cleanup-disabled-store-links');
    Task.done(taskId, `${r.deleted} deleted`);
    if (r.deleted === 0) {
      toast('Nothing to clean — no mirror_links rows point to disabled stores.', 'info');
    } else {
      toast(`✓ Cleaned ${r.deleted} stale link${r.deleted === 1 ? '' : 's'} from ${r.disabledStores.join(', ')}`, 'success');
      try { await loadLinkStatus?.(); } catch (e) {}
      renderLinkStatus();
    }
  } catch (e) {
    Task.fail(taskId, 'Failed');
    toast('Cleanup failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function forceMatchLinks() {
  if (!confirm('Pull active eBay listings and auto-match them to warehouse products by SKU, part number, barcode, and title tokens. Continue?')) return;
  const taskId = Task.start('Auto-matching eBay listings to products');
  try {
    const r = await Api.post('/api/listings/link-status/force-match');
    // If eBay calls failed for ANY store, the scan count will be 0 from that
    // store but the endpoint still returns "success" with storeErrors populated.
    // Show the actual error prominently so users don't spin on "0 scanned".
    if (r.storeErrors && r.storeErrors.length) {
      Task.fail(taskId, `${r.storeErrors.length} store error${r.storeErrors.length === 1 ? '' : 's'}`);
      showEbayErrorsModal(r.storeErrors, r);
      return;
    }
    const lines = [];
    lines.push(`Scanned ${r.scanned} eBay listings.`);
    lines.push(`✓ ${r.matched} newly linked`);
    if (r.alreadyLinked) lines.push(`• ${r.alreadyLinked} already linked`);
    if (r.noMatch) lines.push(`• ${r.noMatch} couldn't match`);
    Task.done(taskId, `${r.matched} newly linked`);
    toast(lines.join('\n'), 'success', 8000);
    await loadLinkStatus();
  } catch (e) {
    Task.fail(taskId, 'Match failed');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

// Shared error-surfacing modal for hydrate / force-match / test-connection.
// Shows the per-store error + likely-cause + remediation. Detects the special
// "rate limit" case and shows quota usage + reset-time guidance instead of the
// generic "refresh your token" advice (which wouldn't help for a quota issue).
function showEbayErrorsModal(storeErrors, fullResponse, quota) {
  const quotaError = fullResponse?.quotaError;
  // Detect rate-limit specifically — those need different guidance entirely.
  const isRateLimit = storeErrors.some(e =>
    (e.reason === 'rate_limit') ||
    /usage limit|exceeded usage|call limit|getapiaccessrules|21917/i.test(e.error || '')
  );
  const rows = storeErrors.map(e => `
    <div style="padding:12px;border:1px solid var(--line);border-radius:8px;margin-bottom:10px;background:var(--bg-soft)">
      <div style="font-weight:600;color:var(--red);margin-bottom:6px">⚠ ${escapeHtml(e.store || 'unknown')}</div>
      <div style="font-size:12px;font-family:ui-monospace,monospace;color:var(--ink);padding:8px;background:var(--white);border-radius:4px;word-break:break-word">${escapeHtml(e.error || '(no error message)')}</div>
      ${e.likelyCause ? `<div style="font-size:12px;color:var(--ink-soft);margin-top:8px"><strong>Likely cause:</strong> ${escapeHtml(e.likelyCause)}</div>` : ''}
    </div>
  `).join('');
  // Different remediation block based on whether it's a quota issue or auth issue
  const remediation = isRateLimit ? `
    <div style="font-size:12px;color:#5a4400;background:#fff8e6;border:1px solid #f0d171;padding:12px;border-radius:6px;line-height:1.7;margin-top:8px">
      <strong>This is a quota issue — your tokens are fine.</strong><br><br>
      Your eBay developer app has hit its daily Trading API quota for one or more call-names. The quota is <strong>per-app</strong> (shared across all stores using the same <code>EBAY_CLIENT_ID</code>), not per-store.<br><br>
      <strong>Three options:</strong><br>
      1. <strong>Wait</strong> — daily counters reset at midnight Pacific Time (≈ 8am UK winter / 7am UK BST summer). Don't run Force match / Hydrate again until then.<br>
      2. <strong>Apply for higher limits</strong> via the <a href="https://developer.ebay.com/develop/apis/general/application-growth-check" target="_blank" rel="noopener" style="color:var(--brand-primary)"><strong>Application Growth Check</strong></a> form (free, 3-5 business days, default cap bumps to ~1.5M calls/day after approval).<br>
      3. <strong>Use a different App</strong> for one of your stores so they don't share quota (only worth it if you have two distinct eBay developer accounts).
    </div>
  ` : `
    <div style="font-size:12px;color:var(--ink-soft);margin-top:12px;padding:10px;background:var(--bg-soft);border-radius:6px;line-height:1.6">
      <strong>How to refresh an expired eBay token:</strong><br>
      1. Open <a href="https://developer.ebay.com/my/auth/?env=production" target="_blank" rel="noopener" style="color:var(--brand-primary)">developer.ebay.com/my/auth</a> (production environment)<br>
      2. Sign in to the eBay account for the broken store<br>
      3. Click "Sign in to Production" → grant access → copy the new user token<br>
      4. In Railway → Variables, replace the relevant <code>EBAY_AUTH_TOKEN_*</code> value with the new token<br>
      5. Wait for redeploy, then retry
    </div>
  `;
  modal({
    title: isRateLimit ? 'eBay daily API quota exceeded' : 'eBay connection failed',
    body: `
      <div style="font-size:13px;line-height:1.6;margin-bottom:14px">
        ${isRateLimit
          ? 'Your eBay App has used up its daily API call quota. Scans completed but no listings were returned because the quota was already at the cap.'
          : 'One or more eBay stores returned errors. <strong>The scan completed but no listings were fetched from these stores</strong> — that\'s why you saw "0 listings".'}
      </div>
      ${rows}
      ${(quota && quota.length) || quotaError ? renderQuotaTable(quota, quotaError) : ''}
      ${remediation}
    `,
    actions: [
      { label: 'Close', onClick: closeModal },
      // Show "Run connection test" for both cases. For rate-limit cases the
      // test endpoint uses GetAPIAccessRules to fetch quota — which is exempt
      // from the daily Trading API limit, so it's safe to call even when
      // you're hitting the cap. The result will show exactly which call-name
      // is at its limit and how many calls remain.
      { label: '🩺 Run connection test', primary: true, onClick: async () => { closeModal(); await testEbayConnection(); } },
    ],
  });
}

// Calls /test-ebay-connection and surfaces the result. If everything's fine,
// just shows a success toast. If any store failed, opens the diagnostics modal.
// Always shows quota (when available) since that's frequently what the user
// actually needs to see — even when stores test "OK", you might be 1 call away
// from the daily cap.
async function testEbayConnection() {
  const taskId = Task.start('Testing eBay connectivity per store…');
  try {
    const r = await Api.get('/api/listings/test-ebay-connection');
    const failed = (r.results || []).filter(x => !x.ok);
    const passed = (r.results || []).filter(x => x.ok);
    if (failed.length === 0) {
      Task.done(taskId, `All ${passed.length} store${passed.length === 1 ? '' : 's'} OK`);
      // Always show the quota modal — even when stores test OK you might be 1
      // call away from the cap, and seeing the actual usage table tells you
      // whether to proceed with Hydrate / Force match or wait for the reset.
      if ((r.quota && r.quota.length) || r.quotaError) {
        showQuotaModal(r.quota, passed, r.quotaError);
      } else {
        const summary = passed.map(p => `✓ ${p.name}: ${p.sampleCount} active listings`).join('\n');
        toast(summary || 'All stores responding.', 'success', 8000);
      }
    } else {
      Task.fail(taskId, `${failed.length} failed`);
      const errors = failed.map(f => ({ store: f.name || f.store, error: f.error, likelyCause: f.likelyCause, reason: f.reason }));
      showEbayErrorsModal(errors, r, r.quota);
    }
  } catch (e) {
    Task.fail(taskId, 'Test failed');
    toast('Test failed: ' + (e.data?.message || e.message), 'error');
  }
}

// Renders the quota table — used both standalone (success path) and inside
// the errors modal (when a rate-limit error fires).
function renderQuotaTable(quota, quotaError) {
  // If quota fetch itself failed, show that as a fallback hint
  if ((!quota || !quota.length) && quotaError) {
    return `
      <div style="margin-top:14px;padding:12px;background:var(--bg-soft);border-radius:8px;font-size:12px;line-height:1.6">
        <div style="font-weight:600;margin-bottom:6px">⚠ Couldn't fetch quota data automatically</div>
        <div style="color:var(--ink-soft);font-family:ui-monospace,monospace;font-size:11px;padding:6px 8px;background:var(--white);border-radius:4px;margin-bottom:8px;word-break:break-word">${escapeHtml(quotaError)}</div>
        <div>You can still check your quotas manually in the eBay developer portal:</div>
        <ul style="margin:6px 0 0 0;padding-left:20px">
          <li><a href="https://developer.ebay.com/my/application/check" target="_blank" rel="noopener" style="color:var(--brand-primary)">developer.ebay.com → My Application → App Check / API Reports</a></li>
        </ul>
      </div>
    `;
  }
  if (!quota || !quota.length) return '';
  const rows = quota.map(q => {
    const name = q.callName || '— total —';
    const dailyPct = q.dailyHardLimit > 0 ? Math.round((q.dailyUsage / q.dailyHardLimit) * 100) : 0;
    const barColor = dailyPct >= 90 ? '#dc2626' : dailyPct >= 70 ? '#f59e0b' : '#10b981';
    return `
      <tr>
        <td style="padding:6px 10px;font-family:ui-monospace,monospace;font-size:11px">${escapeHtml(name)}</td>
        <td style="padding:6px 10px;font-size:12px;white-space:nowrap">${q.dailyUsage.toLocaleString()} / ${q.dailyHardLimit.toLocaleString()}</td>
        <td style="padding:6px 10px;font-size:11px;color:${dailyPct >= 90 ? '#dc2626' : 'var(--ink-soft)'}">${dailyPct}%</td>
        <td style="padding:6px 10px;width:100px"><div style="height:6px;background:var(--bg-soft);border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.min(100, dailyPct)}%;background:${barColor}"></div></div></td>
      </tr>
    `;
  }).join('');
  return `
    <div style="margin-top:14px">
      <div style="font-weight:600;font-size:13px;margin-bottom:8px">📊 Today's eBay API quota usage (Trading API)</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;background:var(--bg-soft);border-radius:6px;overflow:hidden">
        <thead><tr style="background:var(--white);font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em">
          <th style="padding:8px 10px;text-align:left">Call name</th>
          <th style="padding:8px 10px;text-align:left">Today's usage</th>
          <th style="padding:8px 10px;text-align:left">%</th>
          <th style="padding:8px 10px;text-align:left">Bar</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="font-size:11px;color:var(--ink-soft);margin-top:8px;line-height:1.5">
        Quota is per-eBay-App (shared across all your stores). Daily counter resets at midnight Pacific Time (≈ 8am UK winter / 7am BST summer).
        To raise the limit permanently, apply for an <a href="https://developer.ebay.com/develop/apis/general/application-growth-check" target="_blank" rel="noopener" style="color:var(--brand-primary)"><strong>Application Growth Check</strong></a> in the eBay developer portal (free, takes 3-5 business days, default bumped to ~1.5M calls/day).
      </div>
    </div>
  `;
}

// Shows quota for the "all stores OK" path — gives the user visibility into
// where they're standing on the cap even when things are working.
function showQuotaModal(quota, passed, quotaError) {
  const sample = passed.map(p => `<div style="font-size:12px;color:var(--ink-soft)">✓ ${escapeHtml(p.name)}: ${p.sampleCount} active listings</div>`).join('');
  modal({
    title: '✓ eBay connection OK',
    body: `
      <div style="font-size:13px;line-height:1.6;margin-bottom:12px">All configured stores responded successfully.</div>
      ${sample}
      ${renderQuotaTable(quota, quotaError)}
    `,
    actions: [{ label: 'Close', primary: true, onClick: closeModal }],
  });
}


async function pullEbayListings() {
  const taskId = Task.start('Pulling eBay listings & photos');
  // Load metafield definitions and delivery profiles in parallel
  Api.get('/api/listings/metafield-definitions').then(r => {
    MirrorState.metafieldDefs = r.definitions || [];
    paintMetafields();
  }).catch(() => {});
  Api.get('/api/listings/delivery-profiles').then(r => {
    MirrorState.deliveryProfiles = r.profiles || [];
    MirrorState.deliveryProfilesHint = r.hint || '';
    populateShippingProfileDropdown();
  }).catch(() => {});
  try {
    const r = await Api.get('/api/listings/ebay-active');
    MirrorState.listings = r.listings || [];
    MirrorState.selected = new Set(MirrorState.listings.map(l => l.itemId));
    MirrorState.selectedImages = {};
    MirrorState.customPrices = {};
    MirrorState.titleOverrides = {};
    MirrorState.skuOverrides = {};

    // Seed in-memory overrides from server-side persisted data
    for (const l of MirrorState.listings) {
      if (l.overrideSku != null) MirrorState.skuOverrides[l.itemId] = l.overrideSku;
      if (l.overrideTitle != null) MirrorState.titleOverrides[l.itemId] = l.overrideTitle;
      if (l.customPrice != null) MirrorState.customPrices[l.itemId] = l.customPrice;
      // Default to importing ALL of the listing's photos (untick any unwanted).
      MirrorState.selectedImages[l.itemId] = new Set(Array.isArray(l.pictureUrls) ? l.pictureUrls : []);
    }
    el('mirror-empty').style.display = 'none';
    el('mirror-toolbar').style.display = 'block';
    el('mirror-list').style.display = 'block';
    paintMirrorList();
    paintMetafields();
    const noPhotos = MirrorState.listings.filter(l => !l.pictureUrls.length).length;
    const onShopify = MirrorState.listings.filter(l => l.existsOnShopify).length;
    let msg = `Loaded ${MirrorState.listings.length} listings`;
    if (onShopify) msg += ` · ${onShopify} already on Shopify`;
    if (noPhotos) msg += ` · ${noPhotos} no photos`;
    Task.done(taskId, `Loaded ${MirrorState.listings.length} listings`);
    toast(msg, 'success');
  } catch (e) {
    Task.fail(taskId, 'Pull failed');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

function resetPhotoSelections(mode) {
  // mode: 'first' | 'all' | 'none'
  for (const l of MirrorState.listings) {
    if (mode === 'first') {
      MirrorState.selectedImages[l.itemId] = new Set(l.pictureUrls.length ? [l.pictureUrls[0]] : []);
    } else if (mode === 'all') {
      MirrorState.selectedImages[l.itemId] = new Set(l.pictureUrls);
    } else {
      MirrorState.selectedImages[l.itemId] = new Set();
    }
  }
  paintMirrorList();
  toast(mode === 'first' ? 'Reset to first photo only' : mode === 'all' ? 'All photos selected' : 'All photos deselected', 'success');
}

function updatePricingMode() {
  MirrorState.pricingMode = el('mr-pricing-mode').value;
  el('mr-percent-wrap').style.display = MirrorState.pricingMode === 'percent' ? '' : 'none';
  paintMirrorList();
}

function repaintPrices() {
  paintMirrorList();
}
function applyDiscount() {
  const val = parseFloat(el('mr-percent').value) || 0;
  MirrorState.percentDiscount = val;
  const applied = el('mr-percent-applied');
  if (applied) applied.textContent = val + '%';
  paintMirrorList();
  toast(`Applied ${val}% discount to all listings`, 'success');
}

function computeShopifyPrice(listing) {
  // Per-item custom price overrides everything (works in both pricing modes)
  if (MirrorState.customPrices[listing.itemId] != null) {
    return MirrorState.customPrices[listing.itemId];
  }
  if (MirrorState.pricingMode === 'manual') {
    return listing.priceEbay;
  }
  const pct = MirrorState.percentDiscount || 0;
  return Math.round((listing.priceEbay * (1 - pct / 100)) * 100) / 100;
}
function isPriceCustom(listing) {
  return MirrorState.customPrices[listing.itemId] != null;
}
function setCustomPrice(itemId, value) {
  const v = parseFloat(value);
  if (isNaN(v)) {
    delete MirrorState.customPrices[itemId];
  } else {
    MirrorState.customPrices[itemId] = Math.round(v * 100) / 100;
  }
  scheduleSaveOverride(itemId);
  // Re-paint just this row's price area
  const row = document.querySelector(`[data-row="${itemId}"]`);
  if (row) {
    const priceCell = row.querySelector('[data-price-cell]');
    if (priceCell) priceCell.outerHTML = renderPriceCell(MirrorState.listings.find(l => l.itemId == itemId));
  }
}
function clearCustomPrice(itemId) {
  delete MirrorState.customPrices[itemId];
  scheduleSaveOverride(itemId);
  paintMirrorList();
}
function renderPriceCell(l) {
  const custom = isPriceCustom(l);
  const price = computeShopifyPrice(l);
  return `<div data-price-cell style="text-align:right;flex-shrink:0">
    <div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Shopify price ${custom?'<span style="color:var(--red)">· custom</span>':''}</div>
    <div style="display:flex;gap:6px;align-items:center;justify-content:flex-end">
      <input type="number" step="0.01" value="${price}" onchange="setCustomPrice('${l.itemId}',this.value)" style="width:110px;text-align:right;font-size:16px;font-weight:600">
      ${custom ? `<button class="btn btn-ghost btn-sm" onclick="clearCustomPrice('${l.itemId}')" title="Reset to ${MirrorState.pricingMode === 'percent' ? 'discount %' : 'eBay price'}">↺</button>` : ''}
    </div>
  </div>`;
}

function updateFilter(text) {
  MirrorState.filterText = (text || '').toLowerCase().trim();
  MirrorState.page = 1;
  paintMirrorList();
}

function addMetafield() {
  MirrorState.metafields.push({ namespace: 'custom', key: '', value: '', type: 'single_line_text_field' });
  paintMetafields();
}

// Convenience: add a multi-line "SEO description" metafield with a sensible token template.
// User can edit before mirroring. Picks an existing definition if "seo_description" exists.
function addSeoDescriptionTemplate() {
  const def = MirrorState.metafieldDefs.find(d =>
    /seo.?description|description|meta.?description/i.test(d.key) ||
    /seo.?description|description|meta.?description/i.test(d.name)
  );
  const namespace = def?.namespace || 'custom';
  const key = def?.key || 'seo_description';
  const type = def?.type || 'multi_line_text_field';
  const value = '{{title}} · Part Number: {{sku}} · Quality aftermarket replacement, primed and ready for paint. Direct fit OEM-equivalent body panel.';
  MirrorState.metafields.push({ namespace, key, value, type });
  paintMetafields();
  if (!def) toast('Tip: define an "seo_description" metafield in Shopify admin first, or change namespace/key above', 'info');
}

async function checkSkuMatches() {
  toast('Comparing SKUs — this may take 1-2 minutes…', 'info');
  try {
    const r = await Api.get('/api/listings/sku-mismatches');
    const lines = [];
    lines.push(`Checked ${r.checked} mirrored listings.`);
    lines.push(`Mismatches found: ${r.mismatchCount}`);
    lines.push('');
    if (r.mismatchCount === 0) {
      lines.push('✓ All SKUs match between eBay and Shopify.');
    } else {
      lines.push('Mismatches:');
      for (const m of r.mismatches.slice(0, 30)) {
        if (m.status === 'sku_mismatch') {
          lines.push(`  eBay ${m.ebayItemId}: eBay="${m.ebaySku}" vs Shopify="${m.shopifySku}"`);
        } else if (m.status === 'ebay_listing_missing') {
          lines.push(`  eBay ${m.ebayItemId}: not active anymore (Shopify SKU "${m.shopifySku}")`);
        } else {
          lines.push(`  eBay ${m.ebayItemId}: Shopify product deleted (was "${m.lastSyncedSku}")`);
        }
      }
      if (r.mismatches.length > 30) lines.push(`  …and ${r.mismatches.length - 30} more.`);
      lines.push('');
      lines.push('Fix: in each mismatched row, edit the SKU and click "↑ Push to eBay".');
    }
    alert(lines.join('\n'));
  } catch (e) {
    toast('Check failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function runShopifyDiag() {

    const lines = [];
    lines.push(`Configured: ${r.isConfigured ? '✓' : '✗'}`);
    lines.push(`Store: ${r.storeDomain || '(missing)'}`);
    lines.push(`Location ID: ${r.locationId || '(missing — set SHOPIFY_LOCATION_ID env var)'}`);

    lines.push(`Sales channels (publications): ${r.publicationCount || 0}`);

      for (const p of r.publications) lines.push(`  · ${p.name} (${p.id})`);
    } else {
      lines.push('  ✗ NONE — your Shopify custom app token is missing the read_publications scope.');
      lines.push('  Fix: Shopify admin → Apps → custom app → Configuration → API access scopes →');

    }
    lines.push('');
    lines.push(`Metafield definitions: ${(r.metafieldDefinitions || []).length}`);

    } else {
      lines.push('  ✗ NONE — token may need read_metafield_definitions scope, or no definitions exist on the store.');
    }
    lines.push('');
    lines.push(`Shipping profiles: ${(r.deliveryProfiles || []).length}`);
    if (r.deliveryProfiles && r.deliveryProfiles.length) {
      for (const p of r.deliveryProfiles) lines.push(`  · ${p.name}`);
    } else {
      lines.push('  ✗ NONE');
      if (r.deliveryProfileHint) lines.push('  Hint: ' + r.deliveryProfileHint);
    }
    if (r.publicationsError) lines.push(`Pub error: ${r.publicationsError}`);
    if (r.metafieldDefError) lines.push(`Metafield def error: ${r.metafieldDefError}`);
    if (r.deliveryProfilesError) lines.push(`Profiles error: ${r.deliveryProfilesError}`);
    alert(lines.join('\n'));
  } catch (e) {
    toast('Diagnostic failed: ' + (e.data?.message || e.message), 'error');
  }
}
// Diagnose why the eBay policy dropdowns (shipping/payment/return) are empty.
// Hits the raw GetUserPreferences debug endpoint per store and explains the
// result in plain English.
async function runEbayPolicyDiag() {
  toast('Checking eBay business policies…', 'info');
  const stores = (State.brand?.stores || []).filter(s => s.channelCode && s.channelCode.startsWith('ebay_'));
  const codes = stores.length ? stores.map(s => s.code) : [''];
  const lines = [];
  for (const code of codes) {
    const label = stores.find(s => s.code === code)?.name || code || 'default store';
    try {
      const r = await Api.get('/api/listings/business-policies-debug' + (code ? '?storeCode=' + encodeURIComponent(code) : ''));
      const counts = r.parsed
        ? `${r.parsed.shipping?.length || 0} shipping · ${r.parsed.payment?.length || 0} payment · ${r.parsed.return?.length || 0} return`
        : '—';
      lines.push(`■ ${label}  [store=${r.store}]`);
      lines.push(`   Store token: ${r.hasStoreToken ? '✓' : '✗ (no Auth’n’Auth token in env)'}`);
      lines.push(`   eBay Ack: ${r.ack || '(none)'}`);
      if (r.errors && r.errors.length) {
        for (const er of r.errors) lines.push(`   ⚠ [${er.code}] ${er.longMessage || er.shortMessage}`);
      }
      lines.push(`   Policies found: ${counts}`);
      if (r.parsed && !((r.parsed.shipping?.length || 0) + (r.parsed.payment?.length || 0) + (r.parsed.return?.length || 0))) {
        lines.push('   → None found. If Ack=Success, this account is NOT opted into Business');
        lines.push('     Policies. Fix on eBay: Account → Business Policies → Opt in, create');
        lines.push('     a Shipping/Payment/Return policy, then re-check here.');
      }
      if (r.error) lines.push('   ✗ ' + r.error);
    } catch (e) {
      lines.push(`■ ${label}: request failed — ${e.data?.message || e.message}`);
    }
    lines.push('');
  }
  alert(lines.join('\n'));
}

// ── Shopify SEO optimiser ───────────────────────────────────────────────────
let SeoPreview = [];

async function seoGeneratePreview() {
  const status = el('seo-status');
  if (status) status.textContent = 'Generating preview (reading live Shopify values)…';
  try {
    const r = await Api.post('/api/products/seo/preview', {});
    SeoPreview = (r.items || []).map(it => ({ ...it, selected: true }));
    if (status) status.textContent = `${SeoPreview.length} product${SeoPreview.length === 1 ? '' : 's'} — review and apply.`;
    el('seo-preview-wrap').style.display = SeoPreview.length ? 'block' : 'none';
    seoPaint();
  } catch (e) {
    if (status) status.textContent = 'Failed: ' + (e.data?.message || e.message);
    toast('SEO preview failed: ' + (e.data?.message || e.message), 'error');
  }
}

function seoPaint() {
  const tb = el('seo-tbody');
  if (!tb) return;
  tb.innerHTML = SeoPreview.map((it, i) => {
    const p = it.proposed, c = it.current || {};
    const changed = (a, b) => (a || '') !== (b || '') ? 'style="color:var(--green);font-weight:600"' : '';
    const catCell = p.categoryName
      ? `<span ${changed(p.categoryName, c.categoryName)}>${escapeHtml(p.categoryName.split('>').pop().trim())}</span>`
      : (it.unrecognisedPartType ? '<span style="color:var(--amber)">part type not recognised</span>' : '<span style="color:var(--ink-soft)">—</span>');
    return `<tr>
      <td><input type="checkbox" ${it.selected ? 'checked' : ''} onchange="SeoPreview[${i}].selected=this.checked"></td>
      <td><div style="font-weight:600">${escapeHtml(it.title)}</div><div style="color:var(--ink-soft);font-family:ui-monospace,monospace">${escapeHtml(it.sku || '')}</div></td>
      <td><div ${changed(p.pageTitle, c.pageTitle)}>${escapeHtml(p.pageTitle)}</div>${c.pageTitle ? `<div style="color:var(--ink-soft);text-decoration:line-through">${escapeHtml(c.pageTitle)}</div>` : ''}</td>
      <td style="max-width:280px"><div ${changed(p.metaDescription, c.metaDescription)}>${escapeHtml(p.metaDescription)}</div></td>
      <td><div ${changed(p.handle, c.handle)} style="font-family:ui-monospace,monospace;font-size:11px">${escapeHtml(p.handle)}</div>${c.handle && c.handle !== p.handle ? `<div style="color:var(--ink-soft);font-family:ui-monospace,monospace;font-size:11px;text-decoration:line-through">${escapeHtml(c.handle)}</div>` : ''}</td>
      <td>${catCell}</td>
    </tr>`;
  }).join('');
}

function seoToggleAll(on) {
  SeoPreview.forEach(it => { it.selected = on; });
  seoPaint();
}

async function seoApplySelected() {
  const inclHandle = el('seo-incl-handle')?.checked;
  const chosen = SeoPreview.filter(it => it.selected);
  if (!chosen.length) { toast('Nothing selected', 'warn'); return; }
  if (!confirm(`Apply SEO changes to ${chosen.length} product${chosen.length === 1 ? '' : 's'} on Shopify?${inclHandle ? '\n\nThis includes rewriting URL handles (old URLs auto-redirect).' : ''}`)) return;
  const items = chosen.map(it => ({
    id: it.id,
    shopifyProductId: it.shopifyProductId,
    pageTitle: it.proposed.pageTitle,
    metaDescription: it.proposed.metaDescription,
    handle: inclHandle ? it.proposed.handle : undefined,
    categoryId: it.proposed.categoryId || undefined,
  }));
  const taskId = Task.start(`Applying SEO to ${items.length} products…`);
  try {
    const r = await Api.post('/api/products/seo/apply', { items });
    Task.done(taskId, `Applied ${r.applied}/${r.total}`);
    const failed = (r.results || []).filter(x => !x.ok);
    toast(`SEO applied to ${r.applied}/${r.total} products` + (failed.length ? ` · ${failed.length} failed` : ''), failed.length ? 'warn' : 'success', 6000);
    if (failed.length) console.warn('[seo] failures:', failed);
  } catch (e) {
    Task.fail(taskId, 'Failed');
    toast('Apply failed: ' + (e.data?.message || e.message), 'error');
  }
}

function removeMetafield(idx) {
  MirrorState.metafields.splice(idx, 1);
  paintMetafields();
}
function updateMetafield(idx, field, value) {
  if (MirrorState.metafields[idx]) MirrorState.metafields[idx][field] = value;
}
function paintMetafields() {
  const wrap = el('mr-metafields');
  if (!wrap) return;
  const defs = MirrorState.metafieldDefs || [];
  const defOptions = defs.length
    ? `<option value="">— pick a defined metafield —</option>` +
      defs.map(d => `<option value="${escapeAttr(d.namespace)}.${escapeAttr(d.key)}|${escapeAttr(d.type)}">${escapeHtml(d.name)} (${d.namespace}.${d.key})</option>`).join('') +
      `<option value="__custom__|single_line_text_field">— Custom (type your own) —</option>`
    : null;
  wrap.innerHTML = MirrorState.metafields.map((mf, i) => {
    const nsKey = `${mf.namespace}.${mf.key}`;
    const matchingDef = defs.find(d => d.namespace === mf.namespace && d.key === mf.key);
    const isCustom = mf.namespace && mf.key && !matchingDef;
    return `
    <div style="display:grid;grid-template-columns:280px 1fr 36px;gap:6px;margin-bottom:6px;align-items:center">
      ${defOptions ? `
        <select onchange="pickMetafieldDef(${i}, this.value)">
          ${defOptions.replace(`value="${escapeAttr(nsKey)}|${escapeAttr(mf.type)}"`, `value="${escapeAttr(nsKey)}|${escapeAttr(mf.type)}" selected`).replace('value="__custom__|single_line_text_field"', `value="__custom__|single_line_text_field"${isCustom?' selected':''}`)}
        </select>
      ` : `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          <input value="${escapeAttr(mf.namespace)}" placeholder="namespace" oninput="updateMetafield(${i},'namespace',this.value)">
          <input value="${escapeAttr(mf.key)}" placeholder="key" oninput="updateMetafield(${i},'key',this.value)">
        </div>
      `}
      <input value="${escapeAttr(mf.value)}" placeholder="value (use {{sku}}, {{title}} for tokens)" oninput="updateMetafield(${i},'value',this.value)">
      <button class="btn btn-ghost btn-sm" onclick="removeMetafield(${i})" style="color:var(--red)">×</button>
    </div>`;
  }).join('');
}

function pickMetafieldDef(idx, value) {
  if (!value) return;
  if (value === '__custom__|single_line_text_field') {
    MirrorState.metafields[idx] = { namespace: '', key: '', value: MirrorState.metafields[idx]?.value || '', type: 'single_line_text_field' };
  } else {
    const [nsKey, type] = value.split('|');
    const [namespace, key] = nsKey.split('.', 2);
    MirrorState.metafields[idx] = { namespace, key, value: MirrorState.metafields[idx]?.value || '', type };
  }
  paintMetafields();
}

            <span style="color:var(--ink-soft)">listings</span>
            <span style="color:var(--ink-soft);margin-left:8px">·</span>
            <span style="color:var(--ink-soft);margin-left:8px">${selectedTotal} selected across all pages</span>
          </div>
          <div style="flex:1"></div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn btn-ghost btn-sm" ${MirrorState.page <= 1 ? 'disabled' : ''} onclick="mirrorGoToPage(${MirrorState.page - 1})">← Prev</button>
            <span style="font-size:12px;color:var(--ink-soft);min-width:80px;text-align:center">Page ${MirrorState.page} of ${totalPages}</span>
            <button class="btn btn-ghost btn-sm" ${MirrorState.page >= totalPages ? 'disabled' : ''} onclick="mirrorGoToPage(${MirrorState.page + 1})">Next →</button>

            <div style="flex:1;min-width:0">
              <div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:8px">
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                    ${l.existsOnShopify ? '<span class="pill green" style="font-size:10px"><span class="dot"></span>On Shopify</span>' : '<span class="pill blue" style="font-size:10px">New</span>'}
                    <select onchange="setItemStatus('${l.itemId}',this.value)" style="font-size:11px;padding:2px 6px;height:auto;line-height:1.4" title="Status on Shopify">
                      <option value="draft" ${(MirrorState.itemStatuses[l.itemId] || MirrorState.productStatus) === 'draft' ? 'selected' : ''}>Draft</option>
                      <option value="active" ${(MirrorState.itemStatuses[l.itemId] || MirrorState.productStatus) === 'active' ? 'selected' : ''}>Active</option>
                    </select>

              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${(l.imageMeta || l.pictureUrls.map(u=>({url:u}))).map((im, i) => {
                  const url = im.url || im;
                  const checked = imgSet.has(url);
                  const tmpl = im.likelyTemplate;
                  return `
                    <label style="position:relative;display:block;cursor:pointer" title="${tmpl ? 'Likely template image' : ''}">

  } else {
    list.innerHTML = renderPager('top') + rowsHtml + renderPager('bottom');
  }
  updateMirrorCounter();
}

// Pagination controls
function mirrorGoToPage(n) {
  MirrorState.page = n;
  paintMirrorList();
  // Scroll to top of the list so user sees the new page
  const list = el('mirror-list');
  if (list) list.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function mirrorSetPageSize(n) {
  MirrorState.pageSize = n;
  MirrorState.page = 1;
  paintMirrorList();
}

function renderMetafieldPanel(l) {
  const expanded = MirrorState.expandedRows.has(l.itemId);
  const defs = MirrorState.metafieldDefs || [];
  const itemMfs = MirrorState.perItemMetafields[l.itemId] || {};
  const computed = metafieldsForListing(l);
  const computedMap = {};
  for (const mf of computed) computedMap[`${mf.namespace}.${mf.key}`] = mf.value;

  const filledCount = computed.length;
  const itemTag = MirrorState.itemTags[l.itemId];
  const itemProfile = MirrorState.itemShippingProfileIds[l.itemId];
  const itemTemplate = MirrorState.itemTemplateSuffixes[l.itemId];
  const overridesCount = (itemTag != null ? 1 : 0) + (itemProfile != null ? 1 : 0) + (itemTemplate != null ? 1 : 0);

  const button = `<button class="btn btn-ghost btn-sm" onclick="toggleMetafieldRow('${l.itemId}')" style="margin-top:10px;font-size:12px;color:var(--ink-soft)">
    ${expanded ? '▾' : '▸'} Per-listing settings & metafields ${filledCount ? `· <span style="color:var(--green);font-weight:600">${filledCount} metafields</span>` : ''} ${overridesCount ? `· <span style="color:var(--red);font-weight:600">${overridesCount} overrides</span>` : ''}
  </button>`;

  if (!expanded) return button;

  const profiles = MirrorState.deliveryProfiles || [];
  const tagVal = itemTag != null ? itemTag : MirrorState.commonTags;
  const profileVal = itemProfile != null ? itemProfile : MirrorState.commonShippingProfileId;
  const templateVal = itemTemplate != null ? itemTemplate : MirrorState.commonTemplateSuffix;

  const settingsBlock = `
    <div style="background:var(--bg-soft);padding:12px;border-radius:6px;margin-top:8px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Per-listing settings (override bulk values for this listing only)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--ink-soft);margin-bottom:4px">Tags ${itemTag != null ? '<span style="color:var(--red)">·override</span>' : ''}</div>
          <input type="text" value="${escapeAttr(tagVal)}" placeholder="${escapeAttr(MirrorState.commonTags || 'no tags')}" oninput="setItemTag('${l.itemId}',this.value)" style="font-size:12px">
        </div>
        <div>
          <div style="font-size:11px;color:var(--ink-soft);margin-bottom:4px">Product template ${itemTemplate != null ? '<span style="color:var(--red)">·override</span>' : ''}</div>
          <select onchange="setItemTemplate('${l.itemId}',this.value)" style="font-size:12px">
            <option value="" ${templateVal === '' ? 'selected' : ''}>Default product</option>
            <option value="large-parts" ${templateVal === 'large-parts' ? 'selected' : ''}>large-parts</option>
          </select>
        </div>
        <div style="grid-column:1 / -1">
          <div style="font-size:11px;color:var(--ink-soft);margin-bottom:4px">Shipping profile ${itemProfile != null ? '<span style="color:var(--red)">·override</span>' : ''}</div>
          <select onchange="setItemProfile('${l.itemId}',this.value)" style="font-size:12px;width:100%">
            <option value="" ${profileVal === '' ? 'selected' : ''}>No override (use bulk setting or Shopify default)</option>
            ${profiles.map(p => `<option value="${escapeAttr(p.id)}" ${profileVal === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      ${overridesCount ? `<button class="btn btn-ghost btn-sm" onclick="clearItemOverrides('${l.itemId}')" style="font-size:11px;margin-top:8px;color:var(--ink-soft)">↺ Clear all per-listing overrides</button>` : ''}
    </div>
  `;

  if (!defs.length) {
    return button + settingsBlock + `<div style="background:var(--bg-soft);padding:12px;border-radius:6px;font-size:12px;color:var(--ink-soft)">No metafield definitions found on Shopify. Add them in Shopify admin → Settings → Custom data → Products, then re-pull.</div>`;
  }

  const rows = defs.map(d => {
    const nsKey = `${d.namespace}.${d.key}`;
    const perItemVal = itemMfs[nsKey];
    const computedVal = computedMap[nsKey] || '';
    const displayVal = perItemVal != null ? perItemVal : computedVal;
    const isOverride = perItemVal != null && perItemVal !== '';
    return `
      <div style="display:grid;grid-template-columns:180px 1fr 36px;gap:8px;align-items:center;margin-bottom:6px">
        <div style="font-size:12px;color:var(--ink-soft)" title="${escapeAttr(d.namespace)}.${escapeAttr(d.key)}">${escapeHtml(d.name)}${isOverride?' <span style="color:var(--red)">·</span>':''}</div>
        <input type="text" value="${escapeAttr(displayVal)}" placeholder="${escapeAttr(computedVal || '(empty — falls back to common metafield)')}" oninput="setItemMetafield('${l.itemId}','${escapeAttr(nsKey)}',this.value)" style="font-size:12px">
        ${isOverride ? `<button class="btn btn-ghost btn-sm" onclick="clearItemMetafield('${l.itemId}','${escapeAttr(nsKey)}')" title="Reset to common metafield value" style="color:var(--ink-soft)">↺</button>` : '<div></div>'}
      </div>
    `;
  }).join('');

  const quickFill = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <button class="btn btn-outline btn-sm" onclick="quickFillFromListing('${l.itemId}','sku')" title="Fill Part Number = SKU">Auto-fill Part Number from SKU</button>
      <button class="btn btn-outline btn-sm" onclick="autoDetectSide('${l.itemId}')" title="Detect Left/Right from title">Auto-detect Side from title</button>
    </div>
  `;

  return button + settingsBlock + `
    <div style="background:var(--bg-soft);padding:12px;border-radius:6px">
      <div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Metafields for this listing</div>
      ${quickFill}
      ${rows}
    </div>
  `;
}

function setItemTag(itemId, value) {
  if (value === MirrorState.commonTags) delete MirrorState.itemTags[itemId];
  else MirrorState.itemTags[itemId] = value;
  scheduleSaveOverride(itemId);
}
function setItemProfile(itemId, value) {
  if (value === MirrorState.commonShippingProfileId) delete MirrorState.itemShippingProfileIds[itemId];
  else MirrorState.itemShippingProfileIds[itemId] = value;
  scheduleSaveOverride(itemId);
}
function setItemTemplate(itemId, value) {
  if (value === MirrorState.commonTemplateSuffix) delete MirrorState.itemTemplateSuffixes[itemId];
  else MirrorState.itemTemplateSuffixes[itemId] = value;
  scheduleSaveOverride(itemId);
}
function clearItemOverrides(itemId) {
  delete MirrorState.itemTags[itemId];
  delete MirrorState.itemShippingProfileIds[itemId];
  delete MirrorState.itemTemplateSuffixes[itemId];
  scheduleSaveOverride(itemId);
  paintMirrorList();
}

function toggleMetafieldRow(itemId) {
  if (MirrorState.expandedRows.has(itemId)) MirrorState.expandedRows.delete(itemId);
  else MirrorState.expandedRows.add(itemId);
  paintMirrorList();
}
function setItemMetafield(itemId, nsKey, value) {
  if (!MirrorState.perItemMetafields[itemId]) MirrorState.perItemMetafields[itemId] = {};
  if (value === '' || value == null) delete MirrorState.perItemMetafields[itemId][nsKey];
  else MirrorState.perItemMetafields[itemId][nsKey] = value;
  scheduleSaveOverride(itemId);
}
function clearItemMetafield(itemId, nsKey) {
  if (MirrorState.perItemMetafields[itemId]) {
    delete MirrorState.perItemMetafields[itemId][nsKey];
    scheduleSaveOverride(itemId);
    paintMirrorList();
  }
}
function quickFillFromListing(itemId, source) {
  const l = MirrorState.listings.find(x => x.itemId === itemId);
  if (!l) return;
  // Find a "Part Number" metafield definition
  const def = MirrorState.metafieldDefs.find(d =>
    /part.?number/i.test(d.name) || /part.?number/i.test(d.key)
  );
  if (!def) { toast('No "Part Number" metafield defined on Shopify', 'warn'); return; }
  const sku = MirrorState.skuOverrides[itemId] || l.sku || '';
  setItemMetafield(itemId, `${def.namespace}.${def.key}`, sku);
  paintMirrorList();
}
function autoDetectSide(itemId) {
  const l = MirrorState.listings.find(x => x.itemId === itemId);
  if (!l) return;
  const title = (MirrorState.titleOverrides[itemId] || l.title || '').toUpperCase();
  let side = '';
  if (/\bLEFT\b|\bN\/?S\b|\bNEARSIDE\b|\bLH\b/.test(title)) side = 'Left';
  else if (/\bRIGHT\b|\bO\/?S\b|\bOFFSIDE\b|\bRH\b/.test(title)) side = 'Right';
  else { toast('Could not detect Left/Right in title', 'warn'); return; }
  // Find a "Position" or "Side" metafield
  const def = MirrorState.metafieldDefs.find(d =>
    /^position$/i.test(d.name) || /^side$/i.test(d.name) || /^position$/i.test(d.key) || /^side$/i.test(d.key)
  );
  if (!def) { toast('No "Position" or "Side" metafield defined on Shopify', 'warn'); return; }
  setItemMetafield(itemId, `${def.namespace}.${def.key}`, side);
  paintMirrorList();
}
function populateShippingProfileDropdown() {

function toggleHideTemplates(on) {
  MirrorState.hideTemplateImages = !!on;
  // Filter listings' picture lists: when hiding, remove TMPL urls; when re-showing, restore from imageMeta
  for (const l of MirrorState.listings) {
    if (!l._originalPictureUrls) l._originalPictureUrls = [...l.pictureUrls];
    if (!l._originalImageMeta) l._originalImageMeta = l.imageMeta ? [...l.imageMeta] : null;
    if (on) {
      const meta = l._originalImageMeta || [];
      l.pictureUrls = l._originalPictureUrls.filter((_, i) => !(meta[i]?.likelyTemplate));
      l.imageMeta = meta.filter(m => !m.likelyTemplate);
    } else {
      l.pictureUrls = [...l._originalPictureUrls];
      l.imageMeta = l._originalImageMeta ? [...l._originalImageMeta] : null;
    }
    // Reset selection to first photo of the (possibly filtered) list
    MirrorState.selectedImages[l.itemId] = new Set(l.pictureUrls.length ? [l.pictureUrls[0]] : []);
  }
  paintMirrorList();
  toast(on ? 'Template images hidden everywhere' : 'Template images visible again', 'success');
}

async function pushToEbay(itemId) {
  const l = MirrorState.listings.find(x => x.itemId === itemId);
  if (!l) return;
  const newSku = MirrorState.skuOverrides[itemId];
  const newTitle = MirrorState.titleOverrides[itemId];
  if (!newSku && !newTitle) {
    toast('No edits to push for this listing', 'warn');
    return;
  }
  const changes = [];
  if (newTitle && newTitle !== l.title) changes.push(`Title:\n  was: ${l.title}\n  new: ${newTitle}`);
  if (newSku && newSku !== l.sku) changes.push(`SKU:\n  was: ${l.sku || '(none)'}\n  new: ${newSku}`);
  if (!changes.length) {
    toast('Edits match the eBay listing already — nothing to push', 'info');
    return;
  }
  const ok = confirm(
    `Push these changes to eBay?\n\n${changes.join('\n\n')}\n\n` +
    `⚠ Each revision counts toward eBay's per-listing edit limit. Major title changes can affect search ranking and watcher notifications.`
  );
  if (!ok) return;
  try {
    await Api.post('/api/listings/push-to-ebay', {
      itemId,
      sku: newSku !== l.sku ? newSku : undefined,
      title: newTitle !== l.title ? newTitle : undefined,
    });
    // Update the in-memory listing so it reflects what's now on eBay
    if (newSku) l.sku = newSku;
    if (newTitle) l.title = newTitle;
    delete MirrorState.skuOverrides[itemId];
    delete MirrorState.titleOverrides[itemId];
    paintMirrorList();
    toast('Pushed to eBay', 'success');
  } catch (e) {
    toast('Push failed: ' + (e.data?.message || e.message), 'error');
  }
}

function escapeHtml(s) { return String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function escapeAttr(s) { return String(s||'').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

}

async function submitStockLabel(o) {
  const q = parseInt(el('sl-qty')?.value);
  if (!Number.isInteger(q) || q < 0) { toast('Enter a valid quantity', 'warn'); return; }
  const taskId = Task.start('Updating stock & pushing to channels…');
  try {
    let r;
    if (o.productId) r = await Api.post('/api/products/' + o.productId + '/set-quantity', { quantity: q, push: true });
    else r = await Api.post('/api/listings/set-stock', { shopifyProductId: o.shopifyProductId, qty: q });
    Task.done(taskId, 'Stock updated');
    const cp = r.channelPush || {};
    const ebayOk = (cp.ebay || []).filter(x => x.ok).length;
    const shopMsg = cp.shopify?.ok ? 'Shopify ✓' : (cp.shopify?.error ? 'Shopify ✗' : 'Shopify —');
    toast(`Stock set to ${q}. ${shopMsg}, eBay ${ebayOk} updated.`, 'success', 5000);
    closeModal();
    if (typeof refreshLinkStatus === 'function') refreshLinkStatus();
  } catch (e) {
    Task.fail(taskId, 'Failed');
    toast('Stock update failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function mirrorSelected() {
  const selected = MirrorState.listings.filter(l => MirrorState.selected.has(l.itemId));
  if (!selected.length) { toast('Nothing selected', 'warn'); return; }

  // Check SKU using overrides
  const effectiveSku = (l) => MirrorState.skuOverrides[l.itemId] != null ? MirrorState.skuOverrides[l.itemId] : l.sku;
  const missingSku = selected.filter(l => !effectiveSku(l));
  if (missingSku.length) {
    if (!confirm(`${missingSku.length} listing(s) have no SKU and will be skipped. Continue with the rest?`)) return;
  }
  const valid = selected.filter(l => effectiveSku(l));

  // Check Shopify for conflicts
  toast('Checking Shopify for existing products…', 'info');
  let conflicts = [];
  try {
    const r = await Api.post('/api/listings/check-conflicts', { skus: valid.map(l => effectiveSku(l)) });
    conflicts = r.conflicts || [];
  } catch (e) {
    toast('Conflict check failed: ' + e.message, 'error');
    return;
  }

  let overwriteConflicts = false;
  if (conflicts.length) {
    overwriteConflicts = confirm(
      `${conflicts.length} of these SKUs already exist on Shopify:\n\n` +
      conflicts.slice(0, 10).map(c => `• ${c.sku} — ${c.title}`).join('\n') +
      (conflicts.length > 10 ? `\n…and ${conflicts.length - 10} more` : '') +
      '\n\nClick OK to OVERWRITE these (replaces title, price, and images).\nClick Cancel to SKIP them and only mirror the new ones.'
    );
  }

  // Build payload — per-item overrides fall back to common bulk values
  const items = valid.map(l => ({
    itemId: l.itemId,
    sku: MirrorState.skuOverrides[l.itemId] != null ? MirrorState.skuOverrides[l.itemId] : l.sku,
    title: MirrorState.titleOverrides[l.itemId] != null ? MirrorState.titleOverrides[l.itemId] : l.title,
    price: computeShopifyPrice(l),
    imageUrls: Array.from(MirrorState.selectedImages[l.itemId] || []),
    status: MirrorState.itemStatuses[l.itemId] || MirrorState.productStatus,
    metafields: metafieldsForListing(l),
    qty: l.quantityAvailable != null ? l.quantityAvailable : null,
    tags: MirrorState.itemTags[l.itemId] != null ? MirrorState.itemTags[l.itemId] : (MirrorState.commonTags || null),
    templateSuffix: MirrorState.itemTemplateSuffixes[l.itemId] != null ? MirrorState.itemTemplateSuffixes[l.itemId] : (MirrorState.commonTemplateSuffix || null),
    shippingProfileId: MirrorState.itemShippingProfileIds[l.itemId] != null ? MirrorState.itemShippingProfileIds[l.itemId] : (MirrorState.commonShippingProfileId || null),
    categoryId: MirrorState.itemCategoryIds?.[l.itemId] != null ? MirrorState.itemCategoryIds[l.itemId] : (MirrorState.commonCategoryId || null),
  }));

  const taskId = Task.start(`Mirroring ${items.length} listings to Shopify`);
  try {
    const r = await Api.post('/api/listings/mirror', { items, overwriteConflicts });
    let msg = `Created: ${r.created}, Updated: ${r.updated}, Skipped: ${r.skipped}`;
    if (r.errors && r.errors.length) msg += `, Errors: ${r.errors.length}`;
    Task.done(taskId, `Mirrored ${r.created + r.updated}`);
    toast(msg, r.errors?.length ? 'warn' : 'success');
    if (r.errors?.length) console.warn('Mirror errors:', r.errors);
  } catch (e) {
    Task.fail(taskId, 'Mirror failed');
    toast('Mirror failed: ' + (e.data?.message || e.message), 'error');
  }
}

            <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px">Add your Trustpilot and/or Google review URLs. Customers see a "Review us" button on every invoice, and the "Feedback request" message template links to whichever platform you pick.</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

              <div class="field" style="grid-column:1/-1">
                <label>Default platform for invoices &amp; feedback emails</label>
                <select id="set-review-platform" style="font-size:14px">

                  <option value="google">Google only</option>
                  <option value="both">Both (show both links)</option>

            </div>
          </div>

          <div style="margin-top:14px;padding:14px;background:var(--bg-soft);border-radius:8px">
            <div style="font-weight:600;margin-bottom:8px">Phone number defaults</div>
            <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px">Used when a customer's phone is in local format (starts with a single 0). International numbers (starting with + or 00) are left alone. Common: 44 = UK, 1 = US/Canada, 353 = Ireland, 49 = Germany.</div>

              <label>Default country code</label>
              <input id="set-default-cc" placeholder="44" maxlength="4">
            </div>
          </div>

          <div style="margin-top:14px">
            <button class="btn btn-primary" onclick="savePricingConfig()">Save company details</button>
          </div>
        </div>

        <div class="card-body">

            <div style="font-weight:600;margin-bottom:8px">Defaults</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div class="field">
                <label>Default category ID</label>
                <input id="set-ebay-category" placeholder="e.g. 33744">
                <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Numeric eBay category. Look up on <a href="https://www.isoldwhat.com" target="_blank" rel="noopener">isoldwhat.com</a>.</div>
              </div>
              <div class="field">
                <label>Default brand (item specific)</label>
                <input id="set-ebay-brand" placeholder="e.g. Unbranded or your company name">
                <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">The eBay "Brand" = who made the part. Use "Unbranded" or your company for aftermarket — not the vehicle make (that goes in "Make"). Overridable per-listing.</div>
              </div>
              <div class="field">
                <label>Default condition</label>
                <select id="set-ebay-condition">
                  <option value="1000">New</option>
                  <option value="1500">New other (open box)</option>
                  <option value="1750">New with defects</option>
                  <option value="2000">Refurbished — Manufacturer</option>
                  <option value="2500">Refurbished — Seller</option>
                  <option value="3000">Used</option>
                  <option value="7000">For parts / not working</option>
                </select>
              </div>
            </div>
            <div class="field" style="margin-top:10px">
              <label>eBay price markup over Shopify (%)</label>
              <input id="set-ebay-markup" type="number" step="0.1" placeholder="e.g. 15">
              <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Used by the "From Shopify +%" button when creating an eBay listing (Shopify price × (1 + this%)).</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px">
              <div class="field"><label>Country of origin (default)</label>

                <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Added as an item specific; editable per listing.</div>
              </div>
              <div class="field"><label>VAT charged (%)</label>
                <input id="set-ebay-vat" type="number" step="0.1" min="0" max="100" placeholder="20">
                <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Default VAT % on new listings. Blank = none.</div>
              </div>
              <div class="field"><label>Default shop category ID</label>
                <input id="set-ebay-store-cat" placeholder="(optional)">
                <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Pre-selected in the listing form's shop-category picker.</div>
              </div>
            </div>
            <div class="field" style="margin-top:10px">
              <label style="display:flex;align-items:center;gap:8px">
                <input type="checkbox" id="set-ebay-promote-default"> Promote new listings by default (Promoted Listings General)
              </label>
              <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
                <span style="font-size:13px">Default ad rate</span>
                <input id="set-ebay-promote-pct" type="number" step="0.1" min="2" max="100" style="width:90px" placeholder="10"> <span style="font-size:13px">%</span>
              </div>
              <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Requires the eBay <code>sell.marketing</code> permission to be granted to the app. If not, the listing is still created and a notice is shown.</div>

            <div style="margin-top:14px">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;flex-wrap:wrap">

                  <button type="button" class="btn btn-primary btn-sm" onclick="ebaySaveTemplates()">Save templates</button>
                </div>
              </div>
              <div style="font-size:11px;color:var(--ink-soft);margin-bottom:8px">Paste your eBay-formatted HTML below, give it a name, and click <strong>Save templates</strong> — they save immediately (separate from the other eBay defaults) and appear in the listing form's template picker. Placeholders: <code>{title} {sku} {mpn} {brand} {make} {model} {year}</code>.</div>
              <div id="set-ebay-templates"></div>
            </div>
          </div>

          <div style="padding:14px;background:var(--bg-soft);border-radius:8px;margin-bottom:14px">
            <div style="font-weight:600;margin-bottom:8px">Listing location</div>
            <div style="display:grid;grid-template-columns:80px 1fr 1fr;gap:10px">
              <div class="field"><label>Country</label><input id="set-ebay-country" placeholder="GB" maxlength="2"></div>
              <div class="field"><label>City / town</label><input id="set-ebay-city" placeholder="Watford"></div>
              <div class="field"><label>Postcode</label><input id="set-ebay-postcode" placeholder="WD24 4QU"></div>
            </div>
          </div>

          <div style="padding:14px;background:var(--bg-soft);border-radius:8px">
            <div style="font-weight:600;margin-bottom:4px">Business policies</div>
            <div style="font-size:11px;color:var(--ink-soft);margin-bottom:10px">eBay requires each new listing to reference saved Payment, Shipping (fulfillment), and Return policies. Find the IDs in <a href="https://www.bizpolicy.ebay.co.uk/businesspolicy/manage" target="_blank" rel="noopener" style="color:var(--brand-primary)">eBay Seller Hub → Business Policies</a> — each policy detail page shows the numeric ID in the URL.</div>
            <div id="set-ebay-policies-wrap">
              <!-- Brand-wide defaults — populated by the JS helper.
                   Per-store overrides are added below if the brand has multiple stores. -->
            </div>
          </div>

          <div style="margin-top:14px">
            <button class="btn btn-primary" onclick="savePricingConfig()">Save eBay defaults</button>
          </div>
        </div>
      </div>

      <!-- Shopify SEO optimiser — clean page title / meta / URL handle / category -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-head">
          <h3>🔎 Shopify SEO optimiser</h3>
          <div class="card-desc">Generates a clean page title, a consistent meta description (part number, business name, UK + Watford-area collection), a tidy URL handle, and the correct product category for your Shopify listings. Preview the proposed changes first, untick anything you don't want, then apply. Rewriting a handle changes the live URL — Shopify auto-creates a redirect from the old one.</div>
        </div>
        <div class="card-body">
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <button class="btn btn-primary" onclick="seoGeneratePreview()">Generate SEO preview</button>
            <span id="seo-status" style="font-size:12px;color:var(--ink-soft)"></span>
          </div>
          <div id="seo-preview-wrap" style="display:none;margin-top:14px">

              <button class="btn btn-outline btn-sm" onclick="seoToggleAll(false)">Select none</button>
              <label style="font-size:12px;display:flex;align-items:center;gap:6px"><input type="checkbox" id="seo-incl-handle" checked> Include URL handle changes</label>

          </div>

        <div class="card-body">
          <div style="font-size:12px;font-weight:600;margin-bottom:8px">Light mode</div>

            <img id="logo-current-img" src="" alt="Current logo" style="max-height:70px;max-width:280px;background:var(--white);padding:8px;border:1px solid var(--line);border-radius:6px;display:block">
            <div id="logo-current-name" style="font-size:11px;color:var(--ink-soft);margin-top:6px;font-family:ui-monospace,monospace"></div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px">
            <input type="file" id="logo-upload-file" accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml,.png,.jpg,.jpeg,.gif,.webp,.svg" onchange="onLogoUpload(this,'light')" style="font-size:12px">
            <button class="btn btn-ghost btn-sm" id="logo-remove-btn" onclick="deleteUploadedLogo('light')" style="display:none;color:var(--red)">Remove</button>

          <div id="logo-dark-current-wrap" style="display:none;margin-bottom:10px;padding:14px;background:#1a1d23;border-radius:8px">

            <div id="logo-dark-current-name" style="font-size:11px;color:#9aa3b2;margin-top:6px;font-family:ui-monospace,monospace"></div>

          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <input type="file" id="logo-dark-upload-file" accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml,.png,.jpg,.jpeg,.gif,.webp,.svg" onchange="onLogoUpload(this,'dark')" style="font-size:12px">
            <button class="btn btn-ghost btn-sm" id="logo-dark-remove-btn" onclick="deleteUploadedLogo('dark')" style="display:none;color:var(--red)">Remove</button>
          </div>
        </div>

            <button class="btn btn-primary btn-sm" onclick="saveStockCheckReminder()">Save reminder</button>

          <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px"><strong>Business policy IDs</strong> come from eBay seller hub → Account → Business policies. They're required — without them eBay rejects new listings. <a href="https://www.ebay.co.uk/sh/settings/business-policies" target="_blank" rel="noopener" style="color:var(--brand-primary)">Open eBay Business Policies ↗</a></div>

            <div style="font-weight:600;font-size:13px;margin-bottom:8px">Default policies <span id="ebay-policy-default-suffix" style="font-weight:400;color:var(--ink-soft);font-size:11px"></span></div>

              <div class="field"><label>Shipping ID</label><input id="set-ebay-policy-shipping" placeholder="e.g. 268523456013"></div>
              <div class="field"><label>Return ID</label><input id="set-ebay-policy-return" placeholder="e.g. 268523456014"></div>
            </div>
          </div>
