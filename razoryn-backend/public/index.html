async function openMessageModal(saleId) {
  // Load templates with sale context pre-rendered. This single round-trip gives
  // us the template list, sale's channel availability, and the rendered preview.
  let data;
  try {
    data = await Api.get(`/api/messages/templates-for-sale/${saleId}`);
  } catch (e) {
    toast('Failed to load templates: ' + (e.data?.message || e.message), 'error');
    return;
  }
  // Stash everything on State so the helpers can find it without props-drilling
  State.messageModal = {
    saleId,
    templates: data.templates,
    channels: data.channels,
    customer: data.customer,
    context: data.context,
    // Pick a default template that has rendered content
    selectedKey: data.templates.find(t => t.key === 'custom')?.key || 'custom',
    // Pick a default channel — first available in priority order
    selectedChannel: data.channels.email    ? 'email'
                   : data.channels.whatsapp ? 'whatsapp'
                   : data.channels.ebay     ? 'ebay'
                   : 'email',
  };

  modal({
    title: 'Message customer',
    body: messageModalBody(),
    actions: [
      { label: 'Cancel', onClick: closeModal },
      { label: 'Send', primary: true, onClick: () => sendMessage() },
    ],
  });
  // Wire up the post-render listeners (modal innerHTML is set after this returns)
  setTimeout(wireMessageModal, 0);
}

// Generates the inner body HTML — re-renderable for tab/template changes
function messageModalBody() {
  const m = State.messageModal;
  const tpl = m.templates.find(t => t.key === m.selectedKey) || m.templates[0];
  const channelTab = (id, icon, label, available) => `
    <button class="msg-tab${m.selectedChannel === id ? ' active' : ''}"
            onclick="selectMessageChannel('${id}')"
            ${available ? '' : 'disabled title="No '+id+' contact info on this order"'}
            style="padding:8px 14px;font-size:13px;border:none;background:${m.selectedChannel === id ? 'var(--brand-primary)' : 'var(--bg-soft)'};color:${m.selectedChannel === id ? 'white' : (available ? 'var(--ink)' : 'var(--ink-soft)')};border-radius:6px;cursor:${available?'pointer':'not-allowed'};opacity:${available?'1':'.5'};font-weight:500">
      ${icon} ${label}
    </button>`;

  // Channel-specific recipient line
  let recipientLine = '';
  if (m.selectedChannel === 'email') {
    recipientLine = `<div class="field"><label>To (email)</label><input id="msg-to" value="${escapeAttr(m.customer.email)}" placeholder="customer@example.com"></div>`;
  } else if (m.selectedChannel === 'whatsapp') {
    recipientLine = `<div class="field"><label>To (WhatsApp)</label><input id="msg-to" value="${escapeAttr(m.customer.phone)}" placeholder="+44 7494 589542"><div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Will open WhatsApp Web/app with the message pre-filled — hit Send there.</div></div>`;
  } else if (m.selectedChannel === 'ebay') {
    recipientLine = `<div class="field"><label>To (eBay buyer)</label><input value="${escapeAttr(m.customer.name || 'eBay buyer')}" disabled style="background:var(--bg-soft)"><div style="font-size:11px;color:var(--ink-soft);margin-top:6px;line-height:1.5"><strong>How this works:</strong> sends a member message via the eBay Trading API. Requires:<br>• eBay tokens set up in Railway env (already done for this brand)<br>• At least one item in the order linked to a live eBay ItemID — run <strong>🔗 Force match all</strong> in Listing Mirror if a send fails with "no item ID"<br>• Order placed within the last ~30 days (after that eBay anonymises the buyer)</div></div>`;
  }

  return `
    <!-- Channel tabs -->
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      ${channelTab('email',    '✉',  'Email',    m.channels.email)}
      ${channelTab('whatsapp', '💬', 'WhatsApp', m.channels.whatsapp)}
      ${channelTab('ebay',     '🟦', 'eBay',     m.channels.ebay)}
    </div>

    <!-- Template picker -->
    <div class="field">
      <label>Template</label>
      <select id="msg-template" onchange="selectMessageTemplate(this.value)">
        ${m.templates.map(t => `<option value="${escapeAttr(t.key)}" ${t.key === m.selectedKey ? 'selected' : ''}>${escapeHtml(t.label)}</option>`).join('')}
      </select>
    </div>

    ${recipientLine}

    ${m.selectedChannel === 'email' ? `
      <div class="field"><label>Subject</label><input id="msg-subject" value="${escapeAttr(tpl.renderedSubject || '')}"></div>
    ` : ''}

    <div class="field">
      <label>Message</label>
      <textarea id="msg-body" rows="10" style="font-family:inherit;font-size:13px;line-height:1.5">${escapeHtml(tpl.renderedBody || '')}</textarea>
      <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">
        Variables in {curly_braces} are auto-filled from the order. You can edit anything before sending.
      </div>
    </div>
  `;
}

// Wire up listeners after the modal mounts. Currently nothing to attach
// beyond the inline onclick / onchange — kept for future hook-in.
function wireMessageModal() {
  // Auto-focus the body so staff can start editing immediately
  const ta = el('msg-body');
  if (ta) ta.focus();
}

function selectMessageChannel(channel) {
  const m = State.messageModal;
  if (!m) return;
  // Don't switch to a disabled channel
  if (!m.channels[channel]) return;
  m.selectedChannel = channel;
  // Re-render the body with the new channel layout
  const body = el('modal-body');
  if (body) body.innerHTML = messageModalBody();
}

function selectMessageTemplate(key) {
  const m = State.messageModal;
  if (!m) return;
  m.selectedKey = key;
  // If the picked template suggests a different channel, switch to it (if available)
  const tpl = m.templates.find(t => t.key === key);
  if (tpl?.defaultChannel && m.channels[tpl.defaultChannel] && m.selectedChannel !== tpl.defaultChannel) {
    m.selectedChannel = tpl.defaultChannel;
  }
  const body = el('modal-body');
  if (body) body.innerHTML = messageModalBody();
}

async function sendMessage() {
  const m = State.messageModal;
  if (!m) return;
  const body = (el('msg-body')?.value || '').trim();
  if (!body) { toast('Write a message first', 'warn'); return; }

  if (m.selectedChannel === 'email') {
    const to = (el('msg-to')?.value || '').trim();
    const subject = (el('msg-subject')?.value || '').trim();
    if (!to)      { toast('Email address required', 'warn'); return; }
    if (!subject) { toast('Subject required', 'warn'); return; }
    const taskId = Task.start('Sending email');
    try {
      await Api.post(`/api/messages/email/${m.saleId}`, { to, subject, body, templateKey: m.selectedKey });
      Task.done(taskId, 'Sent');
      toast(`Email sent to ${to}`, 'success');
      closeModal();
    } catch (e) {
      Task.fail(taskId, 'Failed');
      toast('Send failed: ' + (e.data?.message || e.message), 'error');
    }
    return;
  }

  if (m.selectedChannel === 'whatsapp') {
    // No backend send — just fetch the normalised wa.me link and open it.
    try {
      const r = await Api.get(`/api/messages/whatsapp-link/${m.saleId}?body=${encodeURIComponent(body)}`);
      const w = window.open(r.link, '_blank');
      if (!w) {
        toast('Pop-up blocked — allow pop-ups, then try again', 'error');
        return;
      }
      toast('Opened WhatsApp — hit Send there to deliver', 'success', 6000);
      closeModal();
    } catch (e) {
      toast('Failed: ' + (e.data?.message || e.message), 'error');
    }
    return;
  }

  if (m.selectedChannel === 'ebay') {
    const subject = (el('msg-subject')?.value || '').trim() || 'Update on your order';
    const taskId = Task.start('Sending eBay message');
    try {
      await Api.post(`/api/messages/ebay/${m.saleId}`, { subject, body, templateKey: m.selectedKey });
      Task.done(taskId, 'Sent');
      toast('eBay message sent', 'success');
      closeModal();
    } catch (e) {
      Task.fail(taskId, 'Failed');
      // Special errors with actionable messages
      if (e.data?.error === 'no_item_id_link') {
        toast('No eBay ItemID linked for any item in this order. Run "🔗 Force match all" in Listing Mirror, then retry.', 'error', 8000);
      } else {
        toast('Send failed: ' + (e.data?.message || e.message), 'error');
      }
    }
    return;
  }
}

async function convertEstimateToInvoice(id) {
  // Find the sale in state to read its locked payment method.
  const sale = State.sales.find(s => s.id == id);
  let paymentMethod = sale?.paymentMethod;

  // Legacy estimates (created before Quote Builder) may not have a payment method.
  // Fall back to prompting in that case only.
  if (!paymentMethod || !['cash','bank','card'].includes(paymentMethod)) {
    const typed = prompt('Payment received via — type one of:\ncash, bank, card', 'cash');
    if (!typed || !['cash','bank','card'].includes(typed.toLowerCase())) return;
    paymentMethod = typed.toLowerCase();
  } else {
    // Confirmed sale has locked method → just ask staff to confirm payment was received.
    const labels = { cash: 'Cash on collection', bank: 'Bank transfer', card: 'Card' };
    if (!confirm(`Confirm payment received via ${labels[paymentMethod]}? This will:\n\n• Decrement stock\n• Convert pro-forma to real invoice\n• Lock the payment method permanently`)) return;
  }
  try {
    const r = await Api.post('/api/sales/' + id + '/convert-to-invoice', { paymentMethod });
    toast('Converted to paid invoice — opening…', 'success');
    await Store.refresh('sales');
    await Store.refresh('products');
    renderSales();
    setTimeout(() => window.open('/api/sales/' + id + '/invoice.html', '_blank'), 200);
  } catch (e) {
    if (e.data?.error === 'insufficient_stock') toast('Cannot convert: insufficient stock for ' + e.data.sku, 'error');
    else toast('Convert failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function exportSalesCsv() {
  const active = document.querySelector('[data-sf].active');
  const filter = active?.dataset.sf || 'all';
  const channelMap = { shopify: 'shopify', cash: 'direct_cash', bank: 'direct_bank' };
  let qs = '';
  if (filter !== 'all' && filter !== 'ebay' && filter !== 'estimates') qs = '?channel=' + encodeURIComponent(channelMap[filter] || filter);
  else if (filter === 'ebay') qs = '?channel=ebay_em';
  toast('Generating CSV…', 'info');
  try {
    const r = await fetch('/api/sales/export.csv' + qs, {
      credentials: 'include',
      headers: API_TOKEN ? { Authorization: 'Bearer ' + API_TOKEN } : {},
    });
    if (!r.ok) {
      const text = await r.text();
      throw new Error('Export failed (status ' + r.status + '): ' + text.slice(0, 100));
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `sales-${filter}-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { a.remove(); URL.revokeObjectURL(url); }, 100);
    toast('CSV downloaded', 'success');
  } catch (e) {
    toast(e.message, 'error', 6000);
  }
}

function exportSalesXlsx() {
  modal({
    title: 'Export sales to Excel',
    body: `
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:14px">
        Workbook includes a Summary tab with month-by-month revenue, plus per-channel detail tabs.
      </div>
      <div class="field">
        <label>Channel</label>
        <select id="xls-channel">
          <option value="all" selected>All channels (Summary + Store + eBay + Cash + Bank)</option>
          <option value="shopify">Store (Shopify) only</option>
          <option value="ebay">eBay only</option>
          <option value="cash">Cash only</option>
          <option value="bank">Bank transfer only</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label>From date (optional)</label><input id="xls-from" type="date"></div>
        <div class="field"><label>To date (optional)</label><input id="xls-to" type="date"></div>
      </div>
    `,
    actions: [
      { label: 'Cancel', onClick: closeModal },
      { label: '⬇ Download Excel', primary: true, onClick: async () => {
        const channel = el('xls-channel').value;
        const from = el('xls-from').value;
        const to = el('xls-to').value;
        const qs = new URLSearchParams();
        if (channel && channel !== 'all') qs.set('channel', channel);
        if (from) qs.set('from', from);
        if (to) qs.set('to', to);
        const url = '/api/sales/export.xlsx' + (qs.toString() ? '?' + qs : '');
        closeModal();
        toast('Generating Excel workbook…', 'info');
        try {
          const r = await fetch(url, {
            credentials: 'include',
            headers: API_TOKEN ? { Authorization: 'Bearer ' + API_TOKEN } : {},
          });
          const ct = r.headers.get('content-type') || '';
          if (!r.ok || ct.includes('application/json')) {
            const j = await r.json().catch(() => ({}));
            throw new Error(j.message || j.error || ('Export failed (status ' + r.status + ')'));
          }
          const blob = await r.blob();
          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          // Filename from Content-Disposition or fallback
          const cd = r.headers.get('content-disposition') || '';
          const m = cd.match(/filename="([^"]+)"/);
          a.href = blobUrl;
          a.download = m ? m[1] : `sales-${channel}.xlsx`;
          document.body.appendChild(a); a.click();
          setTimeout(() => { a.remove(); URL.revokeObjectURL(blobUrl); }, 100);
          toast('Excel workbook downloaded', 'success');
        } catch (e) {
          toast(e.message, 'error', 6000);
        }
      }},
    ],
  });
}
async function printSelectedInvoices() {
  const ids = Array.from(State.salesSelected);
  if (!ids.length) return;
  if (ids.length === 1) return printSingleInvoice(ids[0]);
  // Open each invoice in its own tab so they can all be printed
  if (!confirm(`Open ${ids.length} invoice tabs for printing?`)) return;
  let opened = 0;
  for (const id of ids) {
    const w = window.open('/api/sales/' + id + '/invoice.html', '_blank');
    if (w) opened++;
    await new Promise(r => setTimeout(r, 80));
  }
  toast(`Opened ${opened} invoices · use Ctrl+P in each tab`, opened ? 'success' : 'error');
}

function manualSaleAddRow() {
  const wrap = el('ms-items');
  if (!wrap) return;
  const idx = wrap.children.length;
  const rowId = 'ms-row-' + idx + '-' + Date.now();
  const row = document.createElement('div');
  row.style.cssText = 'border:1px solid var(--line);border-radius:6px;padding:8px;margin-bottom:8px;position:relative';
  row.dataset.idx = idx;
  row.dataset.productId = '';
  row.dataset.productSku = '';
  row.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 80px 110px 36px;gap:6px;align-items:center">
      <div style="position:relative">
        <input class="ms-search" placeholder="Search product by SKU / title / part #…" autocomplete="off">
        <div class="ms-suggest" style="position:absolute;top:100%;left:0;right:0;background:var(--white);border:1px solid var(--line);border-radius:6px;max-height:200px;overflow-y:auto;z-index:10;display:none;margin-top:2px;box-shadow:var(--shadow)"></div>
        <div class="ms-picked" style="display:none;font-size:11px;color:var(--green);margin-top:3px"></div>
      </div>
      <input type="number" class="ms-qty" value="1" min="1" step="1">
      <input type="number" class="ms-price" placeholder="Unit £" step="0.01" min="0">
      <button class="btn btn-ghost btn-sm" onclick="this.closest('[data-idx]').remove();manualSaleRecalc()">×</button>
    </div>
    <div class="ms-custom-toggle" style="margin-top:6px;font-size:11px">
      <a href="#" onclick="manualSaleToggleCustom(this);return false" style="color:var(--ink-soft)">+ Custom item (no stock change)</a>
    </div>
    <div class="ms-custom-fields" style="display:none;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)">
      <input class="ms-custom-title" placeholder="Custom item description (e.g. 'Postage', 'Labour')" style="width:100%;font-size:12px">
      <div style="font-size:10px;color:var(--ink-soft);margin-top:4px">Use this for items not in inventory (services, postage, etc.)</div>
    </div>
  `;
  wrap.appendChild(row);

  const searchInput = row.querySelector('.ms-search');
  const suggest = row.querySelector('.ms-suggest');
  const picked = row.querySelector('.ms-picked');
  const qtyInput = row.querySelector('.ms-qty');
  const priceInput = row.querySelector('.ms-price');
  qtyInput.addEventListener('change', manualSaleRecalc);
  priceInput.addEventListener('change', manualSaleRecalc);

  // Live search
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q || q.length < 2) { suggest.style.display = 'none'; return; }
    const matches = (State.products || []).filter(p =>
      matchesKeywords(q, p.sku, p.title, p.partNumber)
    ).slice(0, 12);
    if (!matches.length) {
      suggest.innerHTML = '<div style="padding:8px;font-size:12px;color:var(--ink-soft)">No matches — use "Custom item" below for non-inventory items</div>';
      suggest.style.display = 'block'; return;
    }
    suggest.innerHTML = matches.map(p => `
      <div class="ms-option" data-pid="${p.id}" data-sku="${p.sku || ''}" data-shopify="${p.priceShopify || 0}" data-ebay="${p.priceEbay || 0}" style="padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--line)">
        <div style="font-size:12px;font-weight:500">${p.title}</div>
        <div style="font-size:10px;color:var(--ink-soft);font-family:ui-monospace,monospace">${p.sku} · ${totalQty(p)} in stock</div>
      </div>
    `).join('');
    suggest.style.display = 'block';
    suggest.querySelectorAll('.ms-option').forEach(opt => {
      opt.addEventListener('mouseenter', () => opt.style.background = 'var(--bg-soft)');
      opt.addEventListener('mouseleave', () => opt.style.background = '');
      opt.addEventListener('click', () => {
        row.dataset.productId = opt.dataset.pid;
        row.dataset.productSku = opt.dataset.sku;
        row.dataset.priceShopify = opt.dataset.shopify;
        row.dataset.priceEbay = opt.dataset.ebay;
        searchInput.value = opt.querySelector('div').textContent;
        suggest.style.display = 'none';
        picked.style.display = 'block';

  document.addEventListener('click', (e) => {

  });

function manualSaleToggleCustom(link) {
  const row = link.closest('[data-idx]');
  const fields = row.querySelector('.ms-custom-fields');
  const isOpen = fields.style.display === 'block';
  fields.style.display = isOpen ? 'none' : 'block';
  link.textContent = isOpen ? '+ Custom item (no stock change)' : '− Hide custom item';
  // Mark this row as custom (no product link)
  row.dataset.isCustom = isOpen ? '' : 'true';
}

function manualSalePrefillPrice(row) {
  if (!row.dataset.productId) return;
  const payment = el('ms-payment')?.value || 'cash';
  const cfg = State.pricingConfig || {};
  const shopifyP = parseFloat(row.dataset.priceShopify || 0);
  const ebayP = parseFloat(row.dataset.priceEbay || 0);
  const ebayBasis = ebayP > 0 ? ebayP : shopifyP;
  let suggested = shopifyP;
  if (payment === 'cash' && cfg.cashDiscountPct != null) {
    suggested = +(ebayBasis * (1 - cfg.cashDiscountPct / 100)).toFixed(2);
  } else if (payment === 'bank' && cfg.bankTransferPct != null) {
    suggested = +(ebayBasis * (1 - cfg.bankTransferPct / 100)).toFixed(2);
  } else if (payment === 'card') {
    suggested = shopifyP;
  }
  if (suggested > 0) row.querySelector('.ms-price').value = suggested;
}

function manualSaleRecalc() {
  const rows = document.querySelectorAll('#ms-items > [data-idx]');
  let subtotal = 0;
  for (const r of rows) {
    const qty = parseFloat(r.querySelector('.ms-qty').value) || 0;
    const price = parseFloat(r.querySelector('.ms-price').value) || 0;
    subtotal += qty * price;
  }
  const shipping = parseFloat(el('ms-shipping')?.value || 0);
  const cfg = State.pricingConfig || {};
  const payment = el('ms-payment')?.value || 'cash';
  const isCash = payment === 'cash';
  const vatRegistered = !!cfg.vatRegistered;
  // Cash sales are VAT-free. Otherwise line-item prices are entered GROSS
  // (VAT-inclusive), so VAT is the portion WITHIN the subtotal — never added on
  // top. Total = subtotal + shipping. (Matches the backend exactly.)
  const vatRate = (!isCash && vatRegistered) ? (cfg.vatRate || 20) / 100 : 0;
  const vat = vatRate ? +(subtotal - subtotal / (1 + vatRate)).toFixed(2) : 0;
  const total = +(subtotal + shipping).toFixed(2);
  const sum = el('ms-summary');
  if (sum) {
    sum.innerHTML = `
      <div style="display:flex;justify-content:space-between"><span>Subtotal</span><strong>${gbp(subtotal)}</strong></div>
      ${isCash
        ? '<div style="font-size:11px;color:var(--ink-soft)">Cash sale — VAT-free</div>'
        : vatRate
          ? `<div style="display:flex;justify-content:space-between"><span>incl. VAT (${(vatRate*100).toFixed(0)}%)</span><strong>${gbp(vat)}</strong></div>`
          : '<div style="font-size:11px;color:var(--ink-soft)">(Not VAT-registered — no VAT charged)</div>'}
      <div style="display:flex;justify-content:space-between"><span>Shipping</span><strong>${gbp(shipping)}</strong></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:6px;padding-top:6px;font-size:15px"><span>Total</span><strong>${gbp(total)}</strong></div>
    `;
  }
}

// #14 — saved-buyer autocomplete for the manual-sale form.
let _msCustTimer = null, _msCustList = [], _msPickedId = null;
function msCustomerSearch(q) {
  _msPickedId = null; // editing the name clears any prior pick
  clearTimeout(_msCustTimer);
  const box = el('ms-cust-suggest');
  if (!q || q.trim().length < 2) { if (box) box.style.display = 'none'; return; }
  _msCustTimer = setTimeout(async () => {
    try {
      const r = await Api.get('/api/customers?q=' + encodeURIComponent(q.trim()));
      _msCustList = r.customers || r || [];
      if (!box) return;
      if (!_msCustList.length) { box.style.display = 'none'; return; }
      box.innerHTML = _msCustList.map((c, i) => `<div onclick="msPickCustomer(${i})" style="padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13px" onmouseover="this.style.background='var(--bg-soft)'" onmouseout="this.style.background=''">
        <div style="font-weight:600">${escapeHtml(c.name)}${c.business_name ? ' · ' + escapeHtml(c.business_name) : ''}</div>
        <div style="font-size:11px;color:var(--ink-soft)">${escapeHtml(c.phone || '')}${c.phone && c.email ? ' · ' : ''}${escapeHtml(c.email || '')}${c.order_count ? ' · ' + c.order_count + ' orders' : ''}</div>
      </div>`).join('');
      box.style.display = 'block';
    } catch (e) { if (box) box.style.display = 'none'; }
  }, 250);
}
function msPickCustomer(i) {
  const c = _msCustList[i];
  if (!c) return;
  _msPickedId = c.id;
  if (el('ms-cust')) el('ms-cust').value = c.name || '';
  if (el('ms-phone') && c.phone) el('ms-phone').value = c.phone;
  if (el('ms-email') && c.email) el('ms-email').value = c.email;
  if (el('ms-address') && c.address) el('ms-address').value = c.address;
  if (el('ms-save-customer')) el('ms-save-customer').checked = false; // already saved
  const box = el('ms-cust-suggest'); if (box) box.style.display = 'none';
}

async function submitManualSale() {
  const paymentMethod = el('ms-payment').value;
  const docType = el('ms-doctype').value;
  const isEstimate = docType === 'estimate';
  const isUnpaid = docType === 'unpaid';   // #13: issued invoice, not yet paid
  const channel = paymentMethod === 'cash' ? 'direct_cash' : 'direct_bank';

  const rows = document.querySelectorAll('#ms-items > [data-idx]');
  const items = [];
  for (const r of rows) {
    const qty = parseInt(r.querySelector('.ms-qty').value);
    const unitPrice = parseFloat(r.querySelector('.ms-price').value);
    if (!qty || !unitPrice) continue;
    const productId = r.dataset.productId;
    if (productId) {
      items.push({ productId, qty, unitPrice });
    } else {
      // Custom item — no product link
      const customTitle = r.querySelector('.ms-custom-title')?.value
                       || r.querySelector('.ms-search').value
                       || 'Custom item';
      items.push({ qty, unitPrice, customTitle });
    }
  }
  if (!items.length) { toast('Add at least one line item with qty + price', 'warn'); return; }

  const payload = {
    channel,
    paymentMethod,
    isEstimate,
    customerName: el('ms-cust').value || null,
    customerPhone: el('ms-phone').value || null,
    customerEmail: el('ms-email').value || null,
    shippingAddress: el('ms-address').value || null,
    customerId: _msPickedId || null,
    createCustomer: !_msPickedId && !!el('ms-save-customer')?.checked,
    paid: !isUnpaid,   // #13 — false = issued but awaiting payment
    orderNumber: el('ms-ordernum').value || null,
    vehicleReg: el('ms-reg').value || null,
    vinNumber: el('ms-vin')?.value || null,
    items,
    shipping: parseFloat(el('ms-shipping').value) || 0,
    notes: el('ms-notes').value || null,
  };
  try {
    const r = await Api.post('/api/sales', payload);
    closeModal();
    toast(isEstimate ? 'Estimate saved' : (isUnpaid ? 'Invoice issued — awaiting payment (added to follow-up list)' : 'Sale recorded — opening document…'), 'success');
    await Store.refresh('sales');
    await Store.refresh('products');
    renderSales();
    setTimeout(() => {
      const w = window.open('/api/sales/' + r.sale.id + '/invoice.html', '_blank');
      if (!w) toast('Pop-up blocked — find document in Sales tab', 'warn');
    }, 200);
  } catch (e) {
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

/* ==========================================================
   QUOTE BUILDER
   ==========================================================
   Replaces the old "Phone Pricing" page. Lets staff search for parts,
   build a multi-item quote with a single payment method, then generate
   a pro-forma invoice the customer can pay (Resend email or downloaded).

   State model:
     State.quote = {
       items: [{ productId, qty, title, sku, partNumber }],  // no per-item price
       paymentMethod: 'cash' | 'bank' | null,                // current method
       customer: {}
     }

   UX rules:
   - First click on a Cash or Bank price row adds that item and sets the
     payment method for the whole quote.
   - Subsequent items can be added by clicking the price row of the
     currently-set method. The OTHER method's row remains visible (so
     staff can quote it to the customer) but isn't clickable to add —
     no warning toasts, no friction.
   - Shopify and eBay rows are clickable to COPY the product link to
     clipboard, NOT to add to quote. Customers order those channels
     themselves; this just helps staff share the URL.
   - At the pre-pro-forma stage, staff can switch the payment method
     for the entire quote (final chance before sending to customer).
     This re-prices every item.
   - Once a pro-forma is generated, the payment method is locked on the
     resulting sale. "Mark paid" converts using the locked method without
     prompting.
*/

// Lookup table for the payment methods. Used in labels everywhere.
const QB_PM_LABELS = { cash: 'Cash on collection', bank: 'Bank transfer' };

// Lazy cache for link status (mirror_links data). Populated once per session,
// used by Quote Builder to construct direct eBay URLs and by Link Status itself.
async function loadLinkStatusCache(force = false) {
  if (State.linkStatus && !force) return State.linkStatus;
  try {
    State.linkStatus = await Api.get('/api/listings/link-status');
  } catch (e) {
    State.linkStatus = { products: [], summary: { total: 0, linkedBoth: 0 } };
  }
  return State.linkStatus;
}

// Find the eBay item ID linked to a warehouse product, via mirror_links data.
function ebayItemIdForProduct(productId) {
  const list = State.linkStatus?.products || [];
  const link = list.find(p => String(p.id) === String(productId));
  return link?.ebay_item_id || null;
}

// Find the linked eBay store_code (and look up its full name from the brand config)
// for a warehouse product, given mirror_links data. Returns null when unknown
// (legacy links may not have store_code populated yet — runs hydrate or
// force-match to backfill them).
function ebayStoreForProduct(productId) {
  const list = State.linkStatus?.products || [];
  const link = list.find(p => String(p.id) === String(productId));
  if (!link?.store_code) return null;
  const store = (State.brand?.stores || []).find(s => s.code === link.store_code);
  return store ? { code: store.code, name: store.name } : { code: link.store_code, name: link.store_code };
}

// Returns a 3-6 char uppercase abbreviation of an eBay store name for compact
// display in tables and pills. e.g. "EVBODYPARTS" → "EVBODY", "Evanta Grande"
// → "EVANTA", "Razoryn" → "RAZOR". Strips spaces/punctuation, truncates to 6.
function abbreviateStoreName(name) {
  if (!name) return '?';
  const clean = String(name).replace(/[^A-Za-z0-9]/g, '').toUpperCase();
  return clean.slice(0, 6) || '?';
}

// Copy a URL to the clipboard and toast about it. Falls back to a prompt on
// older browsers that don't expose the Clipboard API.
async function qbCopyUrl(url, label, note) {
  try {
    await navigator.clipboard.writeText(url);
    let msg = `${label} copied — paste into your messaging app`;
    if (note) msg += `\n\n${note}`;
    toast(msg, 'success', note ? 7000 : 4000);
  } catch (e) {
    prompt(`Copy this ${label}:`, url);
  }
}

// Compute the cash + bank price for a product, given the current pricing config.
function qbComputePrices(p) {
  const cfg = State.pricingConfig || { cashDiscountPct: 10, bankTransferPct: 10, ebayBuyerProtectionMarkup: 0, shopifyFreeDeliveryOver: 50 };
  const ebayBasis = (p.priceEbay && p.priceEbay > 0) ? p.priceEbay : (p.priceShopify || 0);
  const fromShopify = !(p.priceEbay && p.priceEbay > 0) && (p.priceShopify || 0) > 0;
  return {
    cash: ebayBasis * (1 - cfg.cashDiscountPct / 100),
    // #6: bank transfer price equals the Shopify price (fall back to the eBay
    // discount only when no Shopify price exists for the product).
    bank: (p.priceShopify && p.priceShopify > 0) ? p.priceShopify : ebayBasis * (1 - cfg.bankTransferPct / 100),
    ebay: ebayBasis * (1 + cfg.ebayBuyerProtectionMarkup / 100),
    shopify: p.priceShopify || 0,
    fromShopify,
    cfg,
  };
}

// Compute the total for a quote at a given payment method.
function qbTotalAt(items, paymentMethod) {
  let total = 0;
  for (const item of items) {
    const p = State.products.find(x => x.id == item.productId);
    if (!p) continue;
    const prices = qbComputePrices(p);
    total += (prices[paymentMethod] || 0) * item.qty;
  }
  return total;
}

// Copy a Shopify or eBay link for the product to the clipboard.
// eBay: uses the actual ebay_item_id from mirror_links (loaded into State.linkStatus)
//       to produce a direct URL like https://www.ebay.co.uk/itm/{id}. If the product
//       isn't linked, we tell the user to link it first.
// Shopify: best-effort. We don't currently store Shopify product handles in the
//       warehouse DB, so we have no direct customer-facing URL. We give the
//       storefront search URL with a clear note about why it's a search.
async function qbCopyChannelLink(productId, channel) {
  const p = State.products.find(x => x.id == productId);
  if (!p) return;
  const domain = (State.brand?.domain || 'razoryn.co.uk').replace(/^https?:\/\//, '');

  if (channel === 'ebay') {
    // Ensure link cache is loaded (no-op if already loaded)
    await loadLinkStatusCache();
    const itemId = ebayItemIdForProduct(productId);
    if (!itemId) {
      toast(
        `${escapeHtml(p.sku || p.title)} isn't linked to an eBay listing yet. ` +
        `Open Listing Mirror → Link Status and use "Force match all" or the per-row "Link to eBay" button.`,
        'warn', 8000
      );
      return;
    }
    const url = `https://www.ebay.co.uk/itm/${itemId}`;
    await qbCopyUrl(url, 'eBay link');
  } else {
    // Shopify — use the product handle for a direct storefront URL like
    // /products/the-product-handle. Handles are populated when staff runs
    // "Import Shopify products" in Settings. If a product was added before
    // handles were tracked (or wasn't imported from Shopify at all), we
    // fall back to a search-by-SKU URL with a hint.
    const handle = (p.shopifyHandle || '').trim();
    if (handle) {
      const url = `https://${domain}/products/${encodeURIComponent(handle)}`;
      await qbCopyUrl(url, 'Shopify link');
    } else {
      const sku = encodeURIComponent(p.sku || '');
      const url = `https://${domain}/search?q=${sku}`;
      await qbCopyUrl(url, 'Shopify search link',
        'No product handle on file — run "Import Shopify products" in Settings to get direct links.');
    }
  }
}

// Add a product to the current quote at the chosen payment method. If no
// method is set yet, this sets it. If a different method is already set,
// this function isn't reachable (the row isn't clickable in that case).
function qbAddToQuote(productId, paymentMethod) {
  if (!State.quote) State.quote = { items: [], paymentMethod: null, customer: {} };
  // Set or confirm the method (caller already filters disallowed clicks).
  State.quote.paymentMethod = paymentMethod;

  const existing = State.quote.items.find(i => i.productId == productId);
  if (existing) {
    existing.qty += 1;
    toast(`Quantity increased — now ${existing.qty}`, 'success');
  } else {
    const p = State.products.find(x => x.id == productId);
    State.quote.items.push({
      productId,
      title: p.title,
      sku: p.sku,
      partNumber: p.partNumber || null,
      qty: 1,
    });
    toast('Added to quote', 'success');
  }
  // Full re-render — clears the search box ready for the next part, updates banner + footer.
  renderQuoteBuilder();
}

function clearQuote() {
  if (State.quote && State.quote.items.length && !confirm('Clear all items from the current quote?')) return;
  State.quote = { items: [], paymentMethod: null, customer: {} };
  renderQuoteBuilder();
}

// Toggle the expanded item list in the footer (qty +/- controls).
function qbToggleDetails() {
  const d = el('qb-footer-details');
  if (!d) return;
  const btn = el('qb-view-btn');
  if (d.style.display === 'block') {
    d.style.display = 'none';
    if (btn) btn.textContent = 'View items';
  } else {
    qbPaintItems();
    d.style.display = 'block';
    if (btn) btn.textContent = 'Hide items';
  }
}

function qbPaintItems() {
  const d = el('qb-footer-details');
  if (!d) return;
  const items = State.quote.items;
  const pm = State.quote.paymentMethod || 'cash';
  d.innerHTML = items.map((item, i) => {
    const p = State.products.find(x => x.id == item.productId);
    const prices = p ? qbComputePrices(p) : null;
    const unitPrice = prices ? (prices[pm] || 0) : 0;
    return `
      <div class="qb-line">
        <div>
          <div style="font-weight:500">${escapeHtml(item.title)}</div>
          <div style="font-size:11px;color:var(--ink-soft)">${escapeHtml(item.sku)} · ${gbp(unitPrice)} each</div>
        </div>
        <div class="qb-qty">
          <button class="btn btn-ghost btn-sm" onclick="qbQtyChange(${i}, -1)">−</button>
          <input type="number" value="${item.qty}" min="1" onchange="qbQtySet(${i}, parseInt(this.value)||1)">
          <button class="btn btn-ghost btn-sm" onclick="qbQtyChange(${i}, 1)">+</button>
        </div>
        <div style="width:80px;text-align:right;font-weight:600">${gbp(unitPrice * item.qty)}</div>
        <button class="btn btn-ghost btn-sm" onclick="qbItemRemove(${i})" style="color:var(--red)">×</button>
      </div>
    `;
  }).join('');
}

function qbQtyChange(idx, delta) {
  const item = State.quote.items[idx];
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  qbPaintItems();
  qbUpdateSummary();
}
function qbQtySet(idx, val) {
  const item = State.quote.items[idx];
  if (!item) return;
  item.qty = Math.max(1, val);
  qbPaintItems();
  qbUpdateSummary();
}
function qbItemRemove(idx) {
  State.quote.items.splice(idx, 1);
  if (!State.quote.items.length) {
    State.quote.paymentMethod = null;
    renderQuoteBuilder();
  } else {
    qbPaintItems();
    qbUpdateSummary();
  }
}
function qbUpdateSummary() {
  const items = State.quote.items;
  const pm = State.quote.paymentMethod || 'cash';
  const total = qbTotalAt(items, pm);
  const cnt = el('qb-item-count');
  const tot = el('qb-total');
  if (cnt) cnt.textContent = items.length;
  if (tot) tot.textContent = gbp(total);
}

// Switch the payment method inside the modal — re-renders totals + re-priced summary.
// Persists field values by reading them before the re-paint and writing them back.
function qbSetModalPm(method) {
  // Snapshot field values before re-render (we paint the same fields).
  State.quote.customer = {
    name: el('pf-name')?.value || '',
    phone: el('pf-phone')?.value || '',
    email: el('pf-email')?.value || '',
    address: el('pf-address')?.value || '',
    reg: el('pf-reg')?.value || '',
    orderNum: el('pf-ordernum')?.value || '',
    notes: el('pf-notes')?.value || '',
  };
  State.quote._modalPm = method;
  el('qb-modal-content').innerHTML = qbRenderProformaModalBody();
}

// Submit the pro-forma as an estimate. Uses the method selected in the modal
// (may differ from the original "current method" if staff toggled).
async function qbSubmitProforma(sendEmail) {
  const name = el('pf-name').value.trim();
  const email = el('pf-email').value.trim();
  if (!name) { toast('Customer name is required', 'warn'); return; }
  if (sendEmail && !email) { toast('Email is required to send via Resend', 'warn'); return; }

  const items = State.quote.items;
  // Use the modal's working copy of payment method — that's the staff's final choice
  // after confirming with the customer.
  const pm = State.quote._modalPm || State.quote.paymentMethod || 'cash';
  State.quote.paymentMethod = pm;
  const channel = pm === 'cash' ? 'direct_cash' : 'direct_bank';

  // Compute per-item prices using the chosen method.
  const lineItems = items.map(i => {
    const p = State.products.find(x => x.id == i.productId);
    const prices = p ? qbComputePrices(p) : { cash: 0, bank: 0 };
    return { productId: i.productId, qty: i.qty, unitPrice: prices[pm] || 0 };
  });

  const payload = {
    channel,
    paymentMethod: pm,
    isEstimate: true,
    customerName: name,
    customerEmail: email || null,
    customerPhone: el('pf-phone').value.trim() || null,
    shippingAddress: el('pf-address').value.trim() || null,
    orderNumber: el('pf-ordernum').value.trim() || null,
    vehicleReg: el('pf-reg').value.trim() || null,
    items: lineItems,
    shipping: 0,
    notes: el('pf-notes').value.trim() || null,
  };

  const taskId = Task.start(sendEmail ? 'Generating pro-forma & emailing' : 'Generating pro-forma');
  try {
    const r = await Api.post('/api/sales', payload);
    if (sendEmail) {
      try {
        await Api.post('/api/sales/' + r.sale.id + '/send-invoice', { to: email });
      } catch (e) {
        Task.fail(taskId, 'Created but email failed');
        toast('Pro-forma saved but email failed: ' + (e.data?.message || e.message), 'warn', 8000);
        closeModal();
        await Store.refresh('sales');
        setTimeout(() => window.open('/api/sales/' + r.sale.id + '/invoice.html?proforma=1', '_blank'), 200);
        clearQuote();
        return;
      }
    }
    Task.done(taskId, sendEmail ? 'Pro-forma emailed' : 'Pro-forma ready');
    toast(sendEmail ? 'Pro-forma emailed to ' + email : 'Pro-forma saved — opening…', 'success');
    closeModal();
    await Store.refresh('sales');
    setTimeout(() => window.open('/api/sales/' + r.sale.id + '/invoice.html?proforma=1', '_blank'), 200);
    clearQuote();
  } catch (e) {
    Task.fail(taskId, 'Failed to generate');
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

  });
  list.innerHTML = filtered.length ? filtered.map(t => `

  try {

async function loadNotes() {
  try {
    const r = await Api.get(`/api/notes?scope=${State.notesScope || 'mine'}&status=${State.notesFilter || 'all'}`);

    paintNotesStats();

  }
}

function fmtNoteDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, '0');
  const mn = String(d.getMinutes()).padStart(2, '0');
  return `${dd}/${mm}/${yy} ${hh}:${mn}`;
}

function fmtNoteDateOnly(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function paintNotesStats() {
  const all = State.notes || [];
  const open = all.filter(n => !n.done_at).length;
  const overdue = all.filter(n => !n.done_at && n.follow_up_date && new Date(n.follow_up_date) < new Date()).length;
  const today = all.filter(n => {
    if (n.done_at || !n.follow_up_date) return false;
    const fu = new Date(n.follow_up_date);
    const now = new Date();
    return fu.getDate() === now.getDate() && fu.getMonth() === now.getMonth() && fu.getFullYear() === now.getFullYear();
  }).length;
  const done = all.filter(n => n.done_at).length;
  el('notes-stats').innerHTML = `
    <div class="stat"><div class="label">Open</div><div class="value">${open}</div><div class="delta">${overdue ? overdue + ' overdue' : 'On track'}</div></div>
    <div class="stat"><div class="label">Due today</div><div class="value">${today}</div><div class="delta">Action needed</div></div>
    <div class="stat"><div class="label">Completed</div><div class="value">${done}</div><div class="delta">Last 31 days</div></div>
    <div class="stat"><div class="label">Total this month</div><div class="value">${all.length}</div><div class="delta">Auto-clears after 31d</div></div>
  `;
}

function paintNotesList() {
  const list = el('notes-list');
  const items = State.notes || [];
  if (!items.length) {
    list.innerHTML = '<div class="empty"><div class="t">No notes</div><div style="font-size:12px;color:var(--ink-soft);margin-top:6px">Click "+ New note" to log a customer call or follow-up.</div></div>';
    return;
  }
  const showAuthor = State.notesScope === 'all';
  list.innerHTML = items.map(n => {
    const overdue = !n.done_at && n.follow_up_date && new Date(n.follow_up_date) < new Date();
    const categoryLabel = ({
      call_back: '📞 Call back',
      quote: '💷 Quote',
      fitment_query: '🔧 Fitment query',
      complaint: '⚠️ Complaint',
      other: '📝 Other',
    })[n.category] || (n.category ? `📝 ${n.category}` : '');
    return `
      <div class="card" style="margin-bottom:10px;${overdue ? 'border-left:3px solid var(--red)' : n.done_at ? 'opacity:.6' : ''}">

                ${n.follow_up_date ? `<span class="pill ${overdue ? 'red' : 'amber'}" style="font-size:10px;font-weight:600">📅 Follow up ${fmtNoteDateOnly(n.follow_up_date)}</span>` : ''}
                ${n.done_at ? `<span class="pill green" style="font-size:10px">✓ Done ${fmtNoteDateOnly(n.done_at)}</span>` : ''}
                <span style="font-size:11px;color:var(--ink-soft);margin-left:auto">${fmtNoteDate(n.created_at)}${showAuthor && n.author_name ? ' · by ' + escapeHtml(n.author_name) : ''}</span>

        </div>
      </div>

  }).join('');
}

async function submitNote(id) {
  const body = el('n-body').value.trim();
  if (!body) { toast('Note can\'t be empty', 'warn'); return; }
  const payload = {
    body,
    customerName: el('n-name').value || null,

    customerEmail: el('n-email').value || null,
    category: el('n-category').value || null,
    followUpDate: el('n-followup').value || null,

function renderKB() {
  const isAdmin = State.user.role === 'admin';
  const canSensitive = isAdmin || State.user.perms?.kbSensitive;
  el('content').innerHTML = `
    <div class="page">
      <div class="page-head">
        <div><h1>Key Information</h1><div class="desc">Couriers, contacts, procedures, logins</div></div>

      <div class="toolbar"><input type="search" class="search-input" id="kb-search" placeholder="Search..."></div>
      <div id="kb-list"></div>
    </div>
  `;
  function paint() {
    const q = el('kb-search').value.toLowerCase();
    const items = State.knowledge.filter(k => {
      if (k.sensitive && !canSensitive) return false;
      return matchesKeywords(q, k.title, k.cat, k.desc);
    });
    const groups = {};
    items.forEach(k => { (groups[k.cat] = groups[k.cat] || []).push(k); });
    el('kb-list').innerHTML = Object.keys(groups).map(cat => `
      <h3 style="font-size:14px;margin:18px 0 10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em">${cat}</h3>
      <div class="grid-2">
        ${groups[cat].map(k => `
          <div class="kb-card" onclick="openKBView('${k.id}')">
            <div class="kb-cat">${k.cat}</div>
            <div class="kb-title">${k.title}</div>
            <div class="kb-desc">${k.desc}</div>
            ${k.sensitive ? '<div class="kb-locked">🔒 Sensitive</div>' : ''}
          </div>
        `).join('')}
      </div>
    `).join('') || '<div class="empty"><div class="t">No entries</div></div>';
  }
  paint();
  el('kb-search').addEventListener('input', paint);
}
function openKBView(id) {
  const k = State.knowledge.find(x => x.id == id);

  const actions = [{ label: 'Close', onClick: closeModal }];

// ── Web Push opt-in (#2) ─────────────────────────────────────────────────────
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
async function enablePushNotifications(btn) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) { toast('This device/browser doesn’t support push notifications', 'warn'); return; }
  const orig = btn ? btn.textContent : '';
  try {
    if (btn) { btn.disabled = true; btn.textContent = 'Enabling…'; }
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { toast('Notification permission was not granted', 'warn'); return; }
    const reg = await navigator.serviceWorker.ready;
    const { key } = await Api.get('/api/notifications/vapid-public-key');
    if (!key) { toast('Push isn’t available on the server yet', 'error'); return; }
    let sub = await reg.pushManager.getSubscription();
    if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(key) });
    await Api.post('/api/notifications/subscribe', { subscription: sub.toJSON ? sub.toJSON() : sub });
    toast('Notifications enabled on this device ✅', 'success');
    await Api.post('/api/notifications/test-push', {}).catch(() => {});
  } catch (e) {
    toast('Couldn’t enable notifications: ' + (e.message || e), 'error', 6000);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
    updatePushButton();
  }
}
async function disablePushNotifications() {
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) { await Api.post('/api/notifications/unsubscribe', { endpoint: sub.endpoint }).catch(() => {}); await sub.unsubscribe(); }
    toast('Notifications disabled on this device', 'success');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
  updatePushButton();
}
function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); }
function isStandalone() { return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches; }
async function sendTestPush(btn) {
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
  try {
    const r = await Api.post('/api/notifications/test-push', {});
    if (r.sent > 0) toast(`Test sent to ${r.sent} device(s) — check your notification tray`, 'success', 5000);
    else if (r.total === 0) toast('No devices subscribed yet — tap “Enable on this device” first', 'warn', 6000);
    else toast('Sent, but the push service didn’t deliver — the device may have revoked it. Re-enable on this device.', 'warn', 8000);
  } catch (e) { toast('Test failed: ' + (e.data?.message || e.message), 'error'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = orig; } }
}
async function updatePushButton() {
  const wrap = el('push-toggle-wrap');
  if (!wrap) return;
  const supported = ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window);
  // iOS only allows web push from a Home-Screen-installed PWA (iOS 16.4+). In
  // Safari (not installed), push is unavailable — guide the user to install.
  if (isIOS() && !isStandalone()) {
    wrap.innerHTML = `<div style="font-size:12px;color:var(--amber);max-width:520px;text-align:right">
      On iPhone/iPad, notifications only work from the installed app. Tap the <strong>Share</strong> icon in Safari → <strong>Add to Home Screen</strong>, then open the app from your Home Screen and enable notifications here.</div>`;
    return;
  }
  if (!supported) {
    wrap.innerHTML = '<span style="font-size:12px;color:var(--ink-soft)">Not supported on this device/browser.</span>';
    return;
  }
  const perm = (typeof Notification !== 'undefined') ? Notification.permission : 'default';
  let subscribed = false;
  try { const reg = await navigator.serviceWorker.ready; subscribed = !!(await reg.pushManager.getSubscription()); } catch (_) {}
  const status = `<span style="font-size:11px;color:var(--ink-soft);margin-right:8px">permission: ${perm}${subscribed ? ' · subscribed' : ''}</span>`;
  if (perm === 'denied') {
    wrap.innerHTML = status + '<span style="font-size:12px;color:var(--amber)">Notifications are blocked in your browser/OS settings — allow them for this site, then reload.</span>';
    return;
  }
  wrap.innerHTML = subscribed
    ? `${status}<button class="btn btn-outline btn-sm" onclick="sendTestPush(this)" style="margin-right:6px">Send test</button><button class="btn btn-ghost btn-sm" onclick="disablePushNotifications()" style="color:var(--ink-soft)">🔕 Disable</button>`
    : `${status}<button class="btn btn-primary btn-sm" onclick="enablePushNotifications(this)">🔔 Enable on this device</button>`;
}
function paintNotifs() {

/* ==========================================================
   LISTING MIRROR — eBay → Shopify
   ========================================================== */
let MirrorState = {
  listings: [],
  selected: new Set(),
  selectedImages: {},
  customPrices: {},
  titleOverrides: {},
  skuOverrides: {},
  itemStatuses: {},
  itemTags: {},                  // itemId -> tag string (overrides commonTags)
  itemShippingProfileIds: {},    // itemId -> profile GID
  itemTemplateSuffixes: {},      // itemId -> 'large-parts' | ''
  metafields: [],
  perItemMetafields: {},
  metafieldDefs: [],
  deliveryProfiles: [],
  expandedRows: new Set(),
  filterText: '',
  statusFilter: 'all',
  pricingMode: 'percent',
  percentDiscount: 0,
  productStatus: 'draft',
  commonTags: '',
  commonShippingProfileId: '',
  commonTemplateSuffix: '',
  hideTemplateImages: false,
  saveTimers: {},
  // Pagination — rendering all listings at once freezes the browser for large
  // catalogues (300+). Render in pages of pageSize, with prev/next controls.
  page: 1,
  pageSize: 30,
};

// Token substitution helpers — values like "{{sku}} {{title}}" get filled per listing
function substituteTokens(template, listing) {
  if (!template) return template;
  const sku = MirrorState.skuOverrides[listing.itemId] || listing.sku || '';
  const title = MirrorState.titleOverrides[listing.itemId] || listing.title || '';
  return String(template)
    .replace(/\{\{\s*sku\s*\}\}/gi, sku)
    .replace(/\{\{\s*title\s*\}\}/gi, title)
    .replace(/\{\{\s*item_id\s*\}\}/gi, listing.itemId || '')
    .replace(/\{\{\s*ebay_price\s*\}\}/gi, String(listing.priceEbay || ''))
    .replace(/\{\{\s*qty\s*\}\}/gi, String(listing.quantityAvailable || 0));
}

// Get the metafields to send for a listing — common (with tokens substituted) + per-item overrides
function metafieldsForListing(listing) {
  const out = [];
  // Common metafields (fixed or token-templated)
  for (const mf of MirrorState.metafields) {
    if (!mf.key) continue;
    const value = substituteTokens(mf.value, listing);
    if (!value) continue;
    out.push({ namespace: mf.namespace || 'custom', key: mf.key, value, type: mf.type || 'single_line_text_field' });
  }
  // Per-item overrides — replace any matching common metafield
  const perItem = MirrorState.perItemMetafields[listing.itemId] || {};
  for (const [nsKey, val] of Object.entries(perItem)) {
    if (val == null || val === '') continue;
    const [namespace, key] = nsKey.split('.', 2);
    // Find the type from definitions or default
    const def = MirrorState.metafieldDefs.find(d => d.namespace === namespace && d.key === key);
    const type = def ? def.type : 'single_line_text_field';
    // Remove any common entry with same ns.key
    const existingIdx = out.findIndex(o => o.namespace === namespace && o.key === key);
    if (existingIdx >= 0) out.splice(existingIdx, 1);
    out.push({ namespace, key, value: substituteTokens(val, listing), type });
  }
  return out;
}

// Debounce-save an override to backend
function scheduleSaveOverride(itemId) {
  clearTimeout(MirrorState.saveTimers[itemId]);
  MirrorState.saveTimers[itemId] = setTimeout(async () => {
    try {
      await Api.post('/api/listings/save-override', {
        itemId,
        overrideSku: MirrorState.skuOverrides[itemId] || null,
        overrideTitle: MirrorState.titleOverrides[itemId] || null,
        customPrice: MirrorState.customPrices[itemId] != null ? MirrorState.customPrices[itemId] : null,
      });
      // small visual indicator: badge on row
      const row = document.querySelector(`[data-row="${itemId}"]`);
      if (row) {
        let saved = row.querySelector('.saved-indicator');
        if (!saved) {
          saved = document.createElement('span');
          saved.className = 'saved-indicator';
          saved.style.cssText = 'font-size:11px;color:var(--green);margin-left:8px;opacity:0;transition:opacity .2s';
          saved.textContent = '✓ Saved';
          const titleField = row.querySelector('input[type="text"]');
          if (titleField && titleField.parentNode) titleField.parentNode.appendChild(saved);
        }
        saved.style.opacity = '1';
        setTimeout(() => { if (saved) saved.style.opacity = '0'; }, 1500);
      }
    } catch (e) {
      console.warn('save override failed', e);
    }
  }, 600);
}

// Debounced search-input handler for Listing Mirror.
// The old `oninput="State.linkSearch = this.value; renderLinkStatus()"` pattern
// re-rendered the entire section synchronously on every keystroke, which blew
// away the live <input> element and lost focus + caret position. Result: staff
// had to click the input again after every single character.
//
// Fix: update State immediately, debounce the re-render by 200ms, then
// restore focus + caret position after the re-render completes. The user can
// type continuously without the input losing focus mid-burst.
let _linkSearchTimer;
function debouncedLinkSearch(value) {
  State.linkSearch = value;
  // Remember whether we currently have focus + where the caret is, so we can
  // restore both after the destructive re-render.
  const currentEl = document.getElementById('links-search');
  const wasFocused = document.activeElement === currentEl;
  const caret = currentEl ? currentEl.selectionStart : null;
  clearTimeout(_linkSearchTimer);
  _linkSearchTimer = setTimeout(() => {
    renderLinkStatus();
    if (wasFocused) {
      const fresh = document.getElementById('links-search');
      if (fresh) {
        fresh.focus();
        try { fresh.setSelectionRange(caret ?? fresh.value.length, caret ?? fresh.value.length); } catch (e) {}
      }
    }
  }, 200);
}

// Shopify data + saved defaults, then POSTs to /api/listings/create-ebay.
//
// Required fields (gathered from settings or per-listing override):
//   • storeCode  — auto-picked for single-store brands; dropdown otherwise
//   • categoryId — eBay numeric category, pre-filled from settings default
//   • condition  — dropdown (New / New other / Used / etc.)
//   • price      — defaults to the product's Shopify price
//   • quantity   — defaults to qty_on_hand
//   • title      — defaults to product title, editable (80-char limit)
//
// Business policies + location come from settings — the modal shows a hint
// pointing the user to Settings if any are missing.

async function openCreateEbayListing(productId) {
  const product = State.linkStatus?.products.find(p => p.id === productId);
  if (!product) { toast('Product not found in list', 'error'); return; }

  // Always pull the latest pricing config so the modal reflects saved templates
  // and defaults — a cached copy can predate the user's most recent Settings
  // save (e.g. newly-added description templates wouldn't otherwise appear).
  let cfg;
  try { cfg = await Api.get('/api/settings/pricing-config'); State.pricingConfig = cfg; }
  catch (e) { cfg = State.pricingConfig || {}; }

  const stores = (State.brand?.stores || []).filter(s => s.channelCode && s.channelCode.startsWith('ebay_'));
  const defaultStoreCode = stores.find(s => s.primary)?.code || stores[0]?.code || '';
  const policies = cfg.ebayPerStorePolicies?.[defaultStoreCode] || {};
  const policiesConfigured = !!(policies.payment || cfg.ebayPolicyPayment) || !!(policies.shipping || cfg.ebayPolicyShipping);

  const storeSelector = stores.length > 1 ? `

  const suggestedPrice = (product.shopify_price || product.price_shopify || 0).toString().replace(/[^\d.]/g, '') || '';

    title: 'Create eBay listing',
    body: `

      </div>

        <label>Category * <span style="font-weight:400;color:var(--ink-soft);font-size:11px">— search by name (vehicle parts)</span></label>

        <div id="ce-cat-suggest" style="position:relative"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field">
          <label>Category ID *</label>
          <input id="ce-category" value="${escapeAttr(cfg.ebayDefaultCategoryId || '')}" placeholder="picked from search, or type" oninput="ceCategoryManual(this.value)">
          <div id="ce-cat-path" style="font-size:11px;color:var(--ink-soft);margin-top:4px"></div>
        </div>
        <div class="field">
          <label>Condition *</label>
          <select id="ce-condition">
            <option value="1000" ${(cfg.ebayDefaultConditionId || '1000') === '1000' ? 'selected' : ''}>New</option>
            <option value="1500" ${cfg.ebayDefaultConditionId === '1500' ? 'selected' : ''}>New other (open box)</option>
            <option value="1750" ${cfg.ebayDefaultConditionId === '1750' ? 'selected' : ''}>New with defects</option>
            <option value="2000" ${cfg.ebayDefaultConditionId === '2000' ? 'selected' : ''}>Refurbished — Manufacturer</option>

// Load the seller's eBay shop categories into the picker (best-effort).
async function ceLoadStoreCategories(selectedId) {
  const sel = el('ce-store-category');
  if (!sel) return;
  try {
    const store = el('ce-store')?.value || '';
    const r = await Api.get('/api/listings/store-categories' + (store ? '?storeCode=' + encodeURIComponent(store) : ''));
    const cats = r.categories || [];
    sel.innerHTML = '<option value="">— None —</option>' +
      cats.map(c => `<option value="${escapeAttr(c.id)}" ${String(c.id) === String(selectedId) ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');
    if (!cats.length) sel.innerHTML = '<option value="">— No shop categories found —</option>';
  } catch (e) {
    sel.innerHTML = '<option value="">— Couldn’t load shop categories —</option>';
  }
}

// Build the description-template picker from saved named templates.
function ceFillTemplatePicker(cfg) {
  const sel = el('ce-template');
  if (!sel) return;
  const tpls = Array.isArray(cfg.ebayDescriptionTemplates) ? cfg.ebayDescriptionTemplates : [];
  // Back-compat: if no named templates but a legacy single template exists, offer it.
  if (!tpls.length && cfg.ebayDescriptionTemplate) tpls.push({ name: 'Default', body: cfg.ebayDescriptionTemplate });
  sel.innerHTML = '<option value="">— No template (use Shopify description) —</option>' +
    tpls.map((t, i) => `<option value="${i}">${escapeHtml(t.name || ('Template ' + (i + 1)))}</option>`).join('');
  State._ceTemplates = tpls;
}

// Apply the currently-selected template to the description box, substituting
// {placeholders} from the product (same tokens as the legacy single template).
function ceApplySelectedTemplate() {
  const sel = el('ce-template');
  const ta = el('ce-desc');
  if (!sel || !ta) return;
  const idx = sel.value;
  if (idx === '') return; // "no template" — leave the box as-is
  const tpl = (State._ceTemplates || [])[parseInt(idx)];
  if (!tpl) return;
  const ctx = State._ceCtx || {};
  const product = ctx.product || {}, cfg = ctx.cfg || {};
  let year = '';
  const m = (product.title || '').match(/((?:19|20)\d{2})\s*[-–]\s*((?:19|20)\d{2})/) || (product.title || '').match(/\b((?:19|20)\d{2})\b/);
  if (m) year = m[2] ? `${m[1]}-${m[2]}` : m[1];
  const vals = {
    title: product.title || '', sku: product.sku || '',
    mpn: product.part_number || '', part_number: product.part_number || '',
    brand: cfg.ebayDefaultBrand || '', make: product.brand || '',
    model: product.model || '', year,
  };
  ta.value = String(tpl.body || '').replace(/\{(\w+)\}/g, (mm, k) => (vals[k] != null ? vals[k] : mm));
}

// Fetch the seller's eBay business policies and fill the listing dropdowns,
// pre-selecting whichever matches the saved Settings default.
async function loadEbayPolicies(saved) {
  const note = el('ce-policy-note');
  let r;
  try { r = await Api.get('/api/listings/business-policies?storeCode=' + encodeURIComponent(el('ce-store')?.value || '')); }
  catch (e) {
    if (note) note.textContent = 'Couldn’t load your eBay policies: ' + (e.data?.message || e.message) + ' — your saved Settings policy will be used.';
    return;
  }
  const n = (r.shipping?.length || 0) + (r.payment?.length || 0) + (r.return?.length || 0);
  if (note) note.textContent = n
    ? 'Pick a per-listing policy for this item, or leave as "Saved default".'
    : 'No business policies found on your eBay account — your saved Settings policy IDs will be used.';
  const fill = (selId, list, savedId) => {
    const sel = el(selId);
    if (!sel) return;
    for (const p of (list || [])) {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = `${p.name} (${p.id})`;
      if (savedId && String(savedId) === String(p.id)) opt.selected = true;
      sel.appendChild(opt);
    }
  };
  fill('ce-policy-shipping', r.shipping, saved?.shipping);
  fill('ce-policy-payment',  r.payment,  saved?.payment);
  fill('ce-policy-return',   r.return,   saved?.return);
}

// Map an eBay specific name to a value we already know from the product.
function cePrefillSpec(name) {
  const ctx = State._ceCtx || {}; const p = ctx.product || {}; const cfg = ctx.cfg || {};
  const n = (name || '').toLowerCase();
  if (n.includes('manufacturer part') || n === 'mpn') return p.part_number || '';
  if (n.includes('oe/oem') || n.includes('oem number') || n.includes('reference oe')) return p.part_number || '';
  if (n === 'brand') return cfg.ebayDefaultBrand || 'Unbranded';
  if (n === 'make') return p.brand || '';
  if (n === 'model') return p.model || '';
  if (n.includes('placement')) return p.position || '';
  return '';
}
// Pre-fill the listing description from the saved eBay template, substituting
// {placeholders} from the product. Leaves the box blank if no template is set

  const ta = el('ce-desc');
  if (!tpl || !ta) return;

  if (m) year = m[2] ? `${m[1]}-${m[2]}` : m[1];
  const vals = {
    title: product.title || '', sku: product.sku || '',
    mpn: product.part_number || '', part_number: product.part_number || '',
    brand: cfg.ebayDefaultBrand || '', make: product.brand || '',
    model: product.model || '', year,
  };
  ta.value = tpl.replace(/\{(\w+)\}/g, (mm, k) => (vals[k] != null ? vals[k] : mm));
}

// Atomic placement values the user can combine (e.g. Front + Left for a fender).
const PLACEMENT_OPTIONS = ['Front', 'Rear', 'Left', 'Right', 'Upper', 'Lower', 'Centre', 'Inner', 'Outer'];
function ceSpecsGrid(specs) {
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' + specs.map(s => {
    const req = s.required ? ' <span style="color:var(--red)">*</span>' : '';
    // Placement on Vehicle → multi-select checkboxes (a part can be e.g. Front
    // AND Left). Pre-checks from the product's saved position.
    if (/placement on vehicle/i.test(s.name)) {
      const pre = (cePrefillSpec(s.name) || '').toLowerCase();
      const boxes = PLACEMENT_OPTIONS.map(opt => {
        const checked = new RegExp('\\b' + opt.toLowerCase() + '\\b').test(pre) ? 'checked' : '';
        return `<label style="display:inline-flex;align-items:center;gap:4px;margin:0 10px 4px 0;font-size:13px">
          <input type="checkbox" class="ce-placement" value="${escapeAttr(opt)}" ${checked}> ${escapeHtml(opt)}</label>`;
      }).join('');
      return `<div class="field" style="grid-column:1 / -1"><label>${escapeHtml(s.name)}${req} <span style="font-weight:400;color:var(--ink-soft);font-size:11px">— tick all that apply</span></label>
        <div style="padding:4px 0">${boxes}</div></div>`;
    }
    const lid = (s.values && s.values.length) ? 'cl' + Math.random().toString(36).slice(2, 8) : '';
    const dl = lid ? `<datalist id="${lid}">${s.values.slice(0, 60).map(v => `<option value="${escapeAttr(v)}">`).join('')}</datalist>` : '';
    return `<div class="field"><label>${escapeHtml(s.name)}${req}</label>
      <input data-spec="${escapeAttr(s.name)}" value="${escapeAttr(cePrefillSpec(s.name))}" ${lid ? `list="${lid}"` : ''} placeholder="${s.required ? 'required' : 'optional'}">${dl}</div>`;
  }).join('') + '</div>';
}
// Standard car-parts item specifics — used when eBay's per-category list can't
// be fetched (their GetCategorySpecifics call is deprecated / OAuth not set up).

const CAR_PART_SPECIFICS = [

  { name: 'Placement on Vehicle', required: false, values: ['Front', 'Rear', 'Left', 'Right', 'Front Left', 'Front Right', 'Rear Left', 'Rear Right', 'Upper', 'Lower', 'Centre'] },

  { name: 'Type', required: false, values: [] },
  { name: 'Reference OE/OEM Number', required: false, values: [] },
  { name: 'Colour', required: false, values: [] },
  { name: 'Surface Finish', required: false, values: ['Primed', 'Painted', 'Unpainted', 'Textured', 'Gloss', 'Matte'] },
  { name: 'Material', required: false, values: ['Plastic', 'ABS Plastic', 'Aluminium', 'Steel', 'Carbon Fibre', 'Glass'] },
  { name: 'Manufacturer Warranty', required: false, values: ['No', '1 Year', '2 Years', '3 Years', 'Lifetime'] },

async function ceLoadSpecifics(categoryId) {
  const wrap = el('ce-specifics');
  if (!wrap) return;
  wrap.innerHTML = '<div style="font-size:12px;color:var(--ink-soft);padding:6px 0">Loading specifics…</div>';
  let specs = [];
  try {
    const store = el('ce-store')?.value || '';
    const r = await Api.get('/api/listings/category-specifics?categoryId=' + encodeURIComponent(categoryId) + (store ? '&storeCode=' + encodeURIComponent(store) : ''));
    specs = r.specifics || [];
  } catch (e) { /* deprecated call / no OAuth — fall back to the standard set */ }

  if (specs.length) {

    if (!have.has('manufacturer part number')) merged.unshift({ name: 'Manufacturer Part Number', required: true, values: [] });

}

// Match the listing quantity to warehouse (master) stock or live Shopify stock.
async function ceMatchQty(source, btn) {
  const ctx = State._ceCtx || {};
  const product = ctx.product || {};
  const qtyInput = el('ce-qty');
  if (!qtyInput) return;
  if (source === 'warehouse') {
    qtyInput.value = product.qty_on_hand ?? 0;
    toast('Quantity matched to warehouse stock', 'success', 1500);
    return;
  }
  // Shopify — fetch live quantity.
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Checking…'; }
  try {
    const r = await Api.get('/api/products/' + product.id + '/shopify-stock');
    if (r.notLinked || r.stock == null) { toast('No Shopify stock found for this product', 'warn'); }
    else { qtyInput.value = r.stock; toast('Quantity matched to Shopify stock (' + r.stock + ')', 'success', 1800); }
  } catch (e) {
    toast('Couldn’t read Shopify stock: ' + (e.data?.message || e.message), 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
  }
}

// Calculate the eBay price from the Shopify price + the saved markup %. The
// product row from Listing Mirror often has no cached Shopify price, so when
// it's missing we fetch the live price from Shopify before calculating.
async function ceCalcEbayPrice(btn) {
  const ctx = State._ceCtx || {};
  const product = ctx.product || {};
  const cfg = ctx.cfg || State.pricingConfig || {};
  const pct = cfg.ebayMarkupPct != null ? parseFloat(cfg.ebayMarkupPct) : 15;
  let shopifyPrice = parseFloat(product.shopify_price || product.price_shopify || 0);

  if (!shopifyPrice && product.id) {
    const orig = btn ? btn.textContent : '';
    if (btn) { btn.disabled = true; btn.textContent = 'Fetching…'; }
    try {
      const r = await Api.get('/api/products/' + product.id + '/shopify-price');
      if (r.price != null) { shopifyPrice = parseFloat(r.price); product.shopify_price = shopifyPrice; }
    } catch (e) { /* handled below */ }
    finally { if (btn) { btn.disabled = false; btn.textContent = orig; } }
  }

  if (!shopifyPrice) { toast('No Shopify price found — this product may not be linked to Shopify. Enter the price manually.', 'warn', 5000); return; }
  const ebayPrice = +(shopifyPrice * (1 + pct / 100)).toFixed(2);
  if (el('ce-price')) el('ce-price').value = ebayPrice;
  toast(`eBay price = £${shopifyPrice.toFixed(2)} + ${pct}% = £${ebayPrice.toFixed(2)}`, 'success', 2500);
}

async function submitCreateEbayListing(productId) {
  const storeCode = el('ce-store')?.value;
  const title     = (el('ce-title')?.value || '').trim();
  const categoryId = (el('ce-category')?.value || '').trim();
  const conditionId = el('ce-condition')?.value;
  const price     = parseFloat(el('ce-price')?.value);
  const quantity  = parseInt(el('ce-qty')?.value);
  const preview = !!el('ce-preview')?.checked;
  const businessPolicies = {
    shippingId: el('ce-policy-shipping')?.value || undefined,
    paymentId:  el('ce-policy-payment')?.value || undefined,
    returnId:   el('ce-policy-return')?.value || undefined,
  };
  // Collect every dynamic item-specific field that has a value.
  const itemSpecifics = [];
  let mpnFilled = false;
  document.querySelectorAll('#ce-specifics [data-spec]').forEach(inp => {
    const name = inp.getAttribute('data-spec');
    const v = (inp.value || '').trim();
    if (name && v) {
      itemSpecifics.push({ name, value: v });
      if (/manufacturer part/i.test(name)) mpnFilled = true;
    }
  });
  // Placement on Vehicle — multi-select checkboxes → array value.
  const placements = [...document.querySelectorAll('.ce-placement:checked')].map(c => c.value);
  if (placements.length) itemSpecifics.push({ name: 'Placement on Vehicle', value: placements });
  // Custom (free-form) specifics added by the user.
  document.querySelectorAll('#ce-custom-list > div').forEach(row => {
    const name = (row.querySelector('.ce-cust-name')?.value || '').trim();
    const value = (row.querySelector('.ce-cust-val')?.value || '').trim();
    if (name && value) {
      itemSpecifics.push({ name, value });
      if (/manufacturer part/i.test(name)) mpnFilled = true;
    }
  });
  const descriptionOverride = (el('ce-desc')?.value || '').trim() || undefined;
  const countryOfOrigin = (el('ce-country-origin')?.value || '').trim();
  const vatRaw = (el('ce-vat')?.value || '').trim();
  const vatPercent = vatRaw === '' ? null : parseFloat(vatRaw);
  const storeCategoryId = el('ce-store-category')?.value || undefined;
  const promote = el('ce-promote')?.checked
    ? { enabled: true, percent: parseFloat(el('ce-promote-pct')?.value) || 0 }
    : { enabled: false };

  if (!storeCode)   { toast('Pick a store', 'warn'); return; }
  if (!title)       { toast('Title required', 'warn'); return; }
  if (!categoryId)  { toast('Category required — search by name or type the ID', 'warn'); return; }
  if (!price || isNaN(price)) { toast('Valid price required', 'warn'); return; }
  if (!mpnFilled && !confirm('No Manufacturer Part Number (MPN) entered. eBay usually rejects car-part listings without it. Continue anyway?')) return;
  if (promote.enabled && (!promote.percent || promote.percent < 2)) { toast('Promoted listing ad rate must be at least 2%', 'warn'); return; }

  const taskId = Task.start(preview ? 'Validating listing…' : 'Creating eBay listing…');
  try {
    const r = await Api.post('/api/listings/create-ebay', {
      productId, storeCode, categoryId, conditionId,
      price, quantity, titleOverride: title,
      useShopifyDescription: !descriptionOverride, descriptionOverride,
      itemSpecifics, businessPolicies, preview,
      countryOfOrigin: countryOfOrigin || undefined,
      vatPercent, storeCategoryId, promote,
    });
    // Preview mode: nothing was listed — show fees, keep the modal open so the
    // user can untick Preview and publish.
    if (r.preview) {
      Task.done(taskId, 'Validated');
      toast(`✓ Preview OK — no live listing created${r.fees ? ` · fees: £${r.fees}` : ''}. Untick "Preview only" to publish.`, 'success', 9000);
      return;
    }
    Task.done(taskId, 'Listed');
    closeModal();
    toast(`✓ Created on eBay — ItemID ${r.itemId}`, 'success', 8000);
    // Surface promoted-listing outcome (best-effort on the server).
    if (r.promotion) {
      if (r.promotion.ok) toast(`✓ Promoted at ${r.promotion.bidPercent}% ad rate`, 'success', 6000);
      else toast(`Listing is live, but promotion didn’t apply: ${r.promotion.message}`, 'warn', 11000);
    }
    // Reload listing mirror to reflect the new link
    if (typeof refreshLinkStatus === 'function') await refreshLinkStatus();
    else if (typeof renderLinkStatus === 'function') renderLinkStatus();
  } catch (e) {
    Task.fail(taskId, 'Failed');
    const msg = e.data?.message || e.message || 'Unknown error';
    if (e.data?.error === 'missing_item_specifics') {
      toast('eBay needs these item specifics: ' + (e.data.missing || []).join(', ') + '. Add them in inventory, or they may need filling per-category.', 'error', 12000);
    } else if (msg.includes('Insufficient permissions') || msg.includes('21916')) {
      toast('Insufficient eBay permissions. Token may have expired or lacks the right scopes. Check Railway env vars.', 'error', 10000);
    } else if (msg.includes('SellerProfile') || msg.includes('20596') || msg.includes('20597') || msg.includes('20598')) {
      toast('Business policy IDs invalid or seller not opted into business policies. Configure in Settings → eBay listing defaults.', 'error', 10000);
    } else {
      toast('Create failed: ' + msg, 'error', 10000);
    }
  }
}
