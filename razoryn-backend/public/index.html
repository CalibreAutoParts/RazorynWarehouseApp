function computeShopifyPrice(listing) {
  // Per-item custom price overrides everything (works in both pricing modes)
  if (MirrorState.customPrices[listing.itemId] != null) {
    return MirrorState.customPrices[listing.itemId];
  }
  if (MirrorState.pricingMode === 'manual') {
    return listing.priceEbay;
  }
  const pct = MirrorState.percentDiscount || 0;
  return Math.round((listing.priceEbay * (1 - pct / 100)) * 100) / 100;
}
function isPriceCustom(listing) {
  return MirrorState.customPrices[listing.itemId] != null;
}
function setCustomPrice(itemId, value) {
  const v = parseFloat(value);
  if (isNaN(v)) {
    delete MirrorState.customPrices[itemId];
  } else {
    MirrorState.customPrices[itemId] = Math.round(v * 100) / 100;
  }
  scheduleSaveOverride(itemId);
  // Re-paint just this row's price area
  const row = document.querySelector(`[data-row="${itemId}"]`);
  if (row) {
    const priceCell = row.querySelector('[data-price-cell]');
    if (priceCell) priceCell.outerHTML = renderPriceCell(MirrorState.listings.find(l => l.itemId == itemId));
  }
}
function clearCustomPrice(itemId) {
  delete MirrorState.customPrices[itemId];
  scheduleSaveOverride(itemId);
  paintMirrorList();
}
function renderPriceCell(l) {
  const custom = isPriceCustom(l);
  const price = computeShopifyPrice(l);
  return `<div data-price-cell style="text-align:right;flex-shrink:0">
    <div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Shopify price ${custom?'<span style="color:var(--red)">· custom</span>':''}</div>
    <div style="display:flex;gap:6px;align-items:center;justify-content:flex-end">
      <input type="number" step="0.01" value="${price}" onchange="setCustomPrice('${l.itemId}',this.value)" style="width:110px;text-align:right;font-size:16px;font-weight:600">
      ${custom ? `<button class="btn btn-ghost btn-sm" onclick="clearCustomPrice('${l.itemId}')" title="Reset to ${MirrorState.pricingMode === 'percent' ? 'discount %' : 'eBay price'}">↺</button>` : ''}
    </div>
  </div>`;
}

function updateFilter(text) {
  MirrorState.filterText = (text || '').toLowerCase().trim();
  paintMirrorList();
}

function addMetafield() {
  MirrorState.metafields.push({ namespace: 'custom', key: '', value: '', type: 'single_line_text_field' });
  paintMetafields();
}

// Convenience: add a multi-line "SEO description" metafield with a sensible token template.
// User can edit before mirroring. Picks an existing definition if "seo_description" exists.
function addSeoDescriptionTemplate() {
  const def = MirrorState.metafieldDefs.find(d =>
    /seo.?description|description|meta.?description/i.test(d.key) ||
    /seo.?description|description|meta.?description/i.test(d.name)
  );
  const namespace = def?.namespace || 'custom';
  const key = def?.key || 'seo_description';
  const type = def?.type || 'multi_line_text_field';
  const value = '{{title}} · Part Number: {{sku}} · Quality aftermarket replacement, primed and ready for paint. Direct fit OEM-equivalent body panel.';
  MirrorState.metafields.push({ namespace, key, value, type });
  paintMetafields();
  if (!def) toast('Tip: define an "seo_description" metafield in Shopify admin first, or change namespace/key above', 'info');
}

async function checkSkuMatches() {
  toast('Comparing SKUs — this may take 1-2 minutes…', 'info');
  try {
    const r = await Api.get('/api/listings/sku-mismatches');
    const lines = [];
    lines.push(`Checked ${r.checked} mirrored listings.`);
    lines.push(`Mismatches found: ${r.mismatchCount}`);
    lines.push('');
    if (r.mismatchCount === 0) {
      lines.push('✓ All SKUs match between eBay and Shopify.');
    } else {
      lines.push('Mismatches:');
      for (const m of r.mismatches.slice(0, 30)) {
        if (m.status === 'sku_mismatch') {
          lines.push(`  eBay ${m.ebayItemId}: eBay="${m.ebaySku}" vs Shopify="${m.shopifySku}"`);
        } else if (m.status === 'ebay_listing_missing') {
          lines.push(`  eBay ${m.ebayItemId}: not active anymore (Shopify SKU "${m.shopifySku}")`);
        } else {
          lines.push(`  eBay ${m.ebayItemId}: Shopify product deleted (was "${m.lastSyncedSku}")`);
        }
      }
      if (r.mismatches.length > 30) lines.push(`  …and ${r.mismatches.length - 30} more.`);
      lines.push('');
      lines.push('Fix: in each mismatched row, edit the SKU and click "↑ Push to eBay".');
    }
    alert(lines.join('\n'));
  } catch (e) {
    toast('Check failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function runShopifyDiag() {
  toast('Running Shopify diagnostic…', 'info');
  try {
    const r = await Api.get('/api/listings/debug-shopify');
    const lines = [];
    lines.push(`Configured: ${r.isConfigured ? '✓' : '✗'}`);
    lines.push(`Store: ${r.storeDomain || '(missing)'}`);
    lines.push(`Location ID: ${r.locationId || '(missing — set SHOPIFY_LOCATION_ID env var)'}`);
    lines.push('');
    lines.push(`Sales channels (publications): ${r.publicationCount || 0}`);
    if (r.publications && r.publications.length) {
      for (const p of r.publications) lines.push(`  · ${p.name} (${p.id})`);
    } else {
      lines.push('  ✗ NONE — your Shopify custom app token is missing the read_publications scope.');
      lines.push('  Fix: Shopify admin → Apps → custom app → Configuration → API access scopes →');
      lines.push('       enable read_publications + write_publications, then reinstall the app.');
    }
    lines.push('');
    lines.push(`Metafield definitions: ${(r.metafieldDefinitions || []).length}`);
    if (r.metafieldDefinitions && r.metafieldDefinitions.length) {
      for (const d of r.metafieldDefinitions) lines.push(`  · ${d.name} (${d.namespace}.${d.key}, type: ${d.type})`);
    } else {
      lines.push('  ✗ NONE — token may need read_metafield_definitions scope, or no definitions exist on the store.');
    }
    lines.push('');
    lines.push(`Shipping profiles: ${(r.deliveryProfiles || []).length}`);
    if (r.deliveryProfiles && r.deliveryProfiles.length) {
      for (const p of r.deliveryProfiles) lines.push(`  · ${p.name}`);
    } else {
      lines.push('  ✗ NONE');
      if (r.deliveryProfileHint) lines.push('  Hint: ' + r.deliveryProfileHint);
    }
    if (r.publicationsError) lines.push(`Pub error: ${r.publicationsError}`);
    if (r.metafieldDefError) lines.push(`Metafield def error: ${r.metafieldDefError}`);
    if (r.deliveryProfilesError) lines.push(`Profiles error: ${r.deliveryProfilesError}`);
    alert(lines.join('\n'));
  } catch (e) {
    toast('Diagnostic failed: ' + (e.data?.message || e.message), 'error');
  }
}
function removeMetafield(idx) {
  MirrorState.metafields.splice(idx, 1);
  paintMetafields();
}
function updateMetafield(idx, field, value) {
  if (MirrorState.metafields[idx]) MirrorState.metafields[idx][field] = value;
}
function paintMetafields() {
  const wrap = el('mr-metafields');
  if (!wrap) return;
  const defs = MirrorState.metafieldDefs || [];
  const defOptions = defs.length
    ? `<option value="">— pick a defined metafield —</option>` +
      defs.map(d => `<option value="${escapeAttr(d.namespace)}.${escapeAttr(d.key)}|${escapeAttr(d.type)}">${escapeHtml(d.name)} (${d.namespace}.${d.key})</option>`).join('') +
      `<option value="__custom__|single_line_text_field">— Custom (type your own) —</option>`
    : null;
  wrap.innerHTML = MirrorState.metafields.map((mf, i) => {
    const nsKey = `${mf.namespace}.${mf.key}`;
    const matchingDef = defs.find(d => d.namespace === mf.namespace && d.key === mf.key);
    const isCustom = mf.namespace && mf.key && !matchingDef;
    return `
    <div style="display:grid;grid-template-columns:280px 1fr 36px;gap:6px;margin-bottom:6px;align-items:center">
      ${defOptions ? `
        <select onchange="pickMetafieldDef(${i}, this.value)">
          ${defOptions.replace(`value="${escapeAttr(nsKey)}|${escapeAttr(mf.type)}"`, `value="${escapeAttr(nsKey)}|${escapeAttr(mf.type)}" selected`).replace('value="__custom__|single_line_text_field"', `value="__custom__|single_line_text_field"${isCustom?' selected':''}`)}
        </select>
      ` : `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          <input value="${escapeAttr(mf.namespace)}" placeholder="namespace" oninput="updateMetafield(${i},'namespace',this.value)">
          <input value="${escapeAttr(mf.key)}" placeholder="key" oninput="updateMetafield(${i},'key',this.value)">
        </div>
      `}
      <input value="${escapeAttr(mf.value)}" placeholder="value (use {{sku}}, {{title}} for tokens)" oninput="updateMetafield(${i},'value',this.value)">
      <button class="btn btn-ghost btn-sm" onclick="removeMetafield(${i})" style="color:var(--red)">×</button>
    </div>`;
  }).join('');
}

function pickMetafieldDef(idx, value) {
  if (!value) return;
  if (value === '__custom__|single_line_text_field') {
    MirrorState.metafields[idx] = { namespace: '', key: '', value: MirrorState.metafields[idx]?.value || '', type: 'single_line_text_field' };
  } else {
    const [nsKey, type] = value.split('|');
    const [namespace, key] = nsKey.split('.', 2);
    MirrorState.metafields[idx] = { namespace, key, value: MirrorState.metafields[idx]?.value || '', type };
  }
  paintMetafields();
}

        (l.itemId || '').toString().includes(filter);
      if (!matchText) return false;
    }

    const sel = MirrorState.selected.has(l.itemId);

                    <select onchange="setItemStatus('${l.itemId}',this.value)" style="font-size:11px;padding:2px 6px;height:auto;line-height:1.4" title="Status on Shopify">
                      <option value="draft" ${(MirrorState.itemStatuses[l.itemId] || MirrorState.productStatus) === 'draft' ? 'selected' : ''}>Draft</option>
                      <option value="active" ${(MirrorState.itemStatuses[l.itemId] || MirrorState.productStatus) === 'active' ? 'selected' : ''}>Active</option>
                    </select>
                    ${(MirrorState.skuOverrides[l.itemId] || MirrorState.titleOverrides[l.itemId]) ? `<button class="btn btn-ghost btn-sm" onclick="pushToEbay('${l.itemId}')" style="font-size:11px;color:var(--ink-soft)" title="Push edited SKU/title back to eBay (uses ReviseItem)">↑ Push to eBay</button>` : ''}
                  </div>

function renderMetafieldPanel(l) {
  const expanded = MirrorState.expandedRows.has(l.itemId);
  const defs = MirrorState.metafieldDefs || [];
  const itemMfs = MirrorState.perItemMetafields[l.itemId] || {};
  const computed = metafieldsForListing(l);
  const computedMap = {};
  for (const mf of computed) computedMap[`${mf.namespace}.${mf.key}`] = mf.value;

  const filledCount = computed.length;
  const itemTag = MirrorState.itemTags[l.itemId];
  const itemProfile = MirrorState.itemShippingProfileIds[l.itemId];
  const itemTemplate = MirrorState.itemTemplateSuffixes[l.itemId];
  const overridesCount = (itemTag != null ? 1 : 0) + (itemProfile != null ? 1 : 0) + (itemTemplate != null ? 1 : 0);

  const button = `<button class="btn btn-ghost btn-sm" onclick="toggleMetafieldRow('${l.itemId}')" style="margin-top:10px;font-size:12px;color:var(--ink-soft)">
    ${expanded ? '▾' : '▸'} Per-listing settings & metafields ${filledCount ? `· <span style="color:var(--green);font-weight:600">${filledCount} metafields</span>` : ''} ${overridesCount ? `· <span style="color:var(--red);font-weight:600">${overridesCount} overrides</span>` : ''}
  </button>`;

  if (!expanded) return button;

  const profiles = MirrorState.deliveryProfiles || [];
  const tagVal = itemTag != null ? itemTag : MirrorState.commonTags;
  const profileVal = itemProfile != null ? itemProfile : MirrorState.commonShippingProfileId;
  const templateVal = itemTemplate != null ? itemTemplate : MirrorState.commonTemplateSuffix;

  const settingsBlock = `
    <div style="background:var(--bg-soft);padding:12px;border-radius:6px;margin-top:8px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Per-listing settings (override bulk values for this listing only)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--ink-soft);margin-bottom:4px">Tags ${itemTag != null ? '<span style="color:var(--red)">·override</span>' : ''}</div>
          <input type="text" value="${escapeAttr(tagVal)}" placeholder="${escapeAttr(MirrorState.commonTags || 'no tags')}" oninput="setItemTag('${l.itemId}',this.value)" style="font-size:12px">
        </div>
        <div>
          <div style="font-size:11px;color:var(--ink-soft);margin-bottom:4px">Product template ${itemTemplate != null ? '<span style="color:var(--red)">·override</span>' : ''}</div>
          <select onchange="setItemTemplate('${l.itemId}',this.value)" style="font-size:12px">
            <option value="" ${templateVal === '' ? 'selected' : ''}>Default product</option>
            <option value="large-parts" ${templateVal === 'large-parts' ? 'selected' : ''}>large-parts</option>
          </select>
        </div>
        <div style="grid-column:1 / -1">
          <div style="font-size:11px;color:var(--ink-soft);margin-bottom:4px">Shipping profile ${itemProfile != null ? '<span style="color:var(--red)">·override</span>' : ''}</div>
          <select onchange="setItemProfile('${l.itemId}',this.value)" style="font-size:12px;width:100%">
            <option value="" ${profileVal === '' ? 'selected' : ''}>No override (use bulk setting or Shopify default)</option>
            ${profiles.map(p => `<option value="${escapeAttr(p.id)}" ${profileVal === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      ${overridesCount ? `<button class="btn btn-ghost btn-sm" onclick="clearItemOverrides('${l.itemId}')" style="font-size:11px;margin-top:8px;color:var(--ink-soft)">↺ Clear all per-listing overrides</button>` : ''}
    </div>
  `;

  if (!defs.length) {
    return button + settingsBlock + `<div style="background:var(--bg-soft);padding:12px;border-radius:6px;font-size:12px;color:var(--ink-soft)">No metafield definitions found on Shopify. Add them in Shopify admin → Settings → Custom data → Products, then re-pull.</div>`;
  }

  const rows = defs.map(d => {
    const nsKey = `${d.namespace}.${d.key}`;
    const perItemVal = itemMfs[nsKey];
    const computedVal = computedMap[nsKey] || '';
    const displayVal = perItemVal != null ? perItemVal : computedVal;
    const isOverride = perItemVal != null && perItemVal !== '';
    return `
      <div style="display:grid;grid-template-columns:180px 1fr 36px;gap:8px;align-items:center;margin-bottom:6px">
        <div style="font-size:12px;color:var(--ink-soft)" title="${escapeAttr(d.namespace)}.${escapeAttr(d.key)}">${escapeHtml(d.name)}${isOverride?' <span style="color:var(--red)">·</span>':''}</div>
        <input type="text" value="${escapeAttr(displayVal)}" placeholder="${escapeAttr(computedVal || '(empty — falls back to common metafield)')}" oninput="setItemMetafield('${l.itemId}','${escapeAttr(nsKey)}',this.value)" style="font-size:12px">
        ${isOverride ? `<button class="btn btn-ghost btn-sm" onclick="clearItemMetafield('${l.itemId}','${escapeAttr(nsKey)}')" title="Reset to common metafield value" style="color:var(--ink-soft)">↺</button>` : '<div></div>'}
      </div>

  }).join('');

  const quickFill = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <button class="btn btn-outline btn-sm" onclick="quickFillFromListing('${l.itemId}','sku')" title="Fill Part Number = SKU">Auto-fill Part Number from SKU</button>
      <button class="btn btn-outline btn-sm" onclick="autoDetectSide('${l.itemId}')" title="Detect Left/Right from title">Auto-detect Side from title</button>
    </div>
  `;

  return button + settingsBlock + `
    <div style="background:var(--bg-soft);padding:12px;border-radius:6px">
      <div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Metafields for this listing</div>
      ${quickFill}
      ${rows}
    </div>
  `;
}

function setItemTag(itemId, value) {
  if (value === MirrorState.commonTags) delete MirrorState.itemTags[itemId];
  else MirrorState.itemTags[itemId] = value;
  scheduleSaveOverride(itemId);
}
function setItemProfile(itemId, value) {
  if (value === MirrorState.commonShippingProfileId) delete MirrorState.itemShippingProfileIds[itemId];
  else MirrorState.itemShippingProfileIds[itemId] = value;
  scheduleSaveOverride(itemId);
}
function setItemTemplate(itemId, value) {
  if (value === MirrorState.commonTemplateSuffix) delete MirrorState.itemTemplateSuffixes[itemId];
  else MirrorState.itemTemplateSuffixes[itemId] = value;
  scheduleSaveOverride(itemId);
}
function clearItemOverrides(itemId) {
  delete MirrorState.itemTags[itemId];
  delete MirrorState.itemShippingProfileIds[itemId];
  delete MirrorState.itemTemplateSuffixes[itemId];
  scheduleSaveOverride(itemId);
  paintMirrorList();
}

function toggleMetafieldRow(itemId) {
  if (MirrorState.expandedRows.has(itemId)) MirrorState.expandedRows.delete(itemId);
  else MirrorState.expandedRows.add(itemId);
  paintMirrorList();
}
function setItemMetafield(itemId, nsKey, value) {
  if (!MirrorState.perItemMetafields[itemId]) MirrorState.perItemMetafields[itemId] = {};
  if (value === '' || value == null) delete MirrorState.perItemMetafields[itemId][nsKey];
  else MirrorState.perItemMetafields[itemId][nsKey] = value;
  scheduleSaveOverride(itemId);
}
function clearItemMetafield(itemId, nsKey) {
  if (MirrorState.perItemMetafields[itemId]) {
    delete MirrorState.perItemMetafields[itemId][nsKey];
    scheduleSaveOverride(itemId);
    paintMirrorList();
  }
}
function quickFillFromListing(itemId, source) {
  const l = MirrorState.listings.find(x => x.itemId === itemId);
  if (!l) return;
  // Find a "Part Number" metafield definition
  const def = MirrorState.metafieldDefs.find(d =>
    /part.?number/i.test(d.name) || /part.?number/i.test(d.key)
  );
  if (!def) { toast('No "Part Number" metafield defined on Shopify', 'warn'); return; }
  const sku = MirrorState.skuOverrides[itemId] || l.sku || '';
  setItemMetafield(itemId, `${def.namespace}.${def.key}`, sku);
  paintMirrorList();
}
function autoDetectSide(itemId) {
  const l = MirrorState.listings.find(x => x.itemId === itemId);
  if (!l) return;
  const title = (MirrorState.titleOverrides[itemId] || l.title || '').toUpperCase();
  let side = '';
  if (/\bLEFT\b|\bN\/?S\b|\bNEARSIDE\b|\bLH\b/.test(title)) side = 'Left';
  else if (/\bRIGHT\b|\bO\/?S\b|\bOFFSIDE\b|\bRH\b/.test(title)) side = 'Right';
  else { toast('Could not detect Left/Right in title', 'warn'); return; }
  // Find a "Position" or "Side" metafield
  const def = MirrorState.metafieldDefs.find(d =>
    /^position$/i.test(d.name) || /^side$/i.test(d.name) || /^position$/i.test(d.key) || /^side$/i.test(d.key)
  );
  if (!def) { toast('No "Position" or "Side" metafield defined on Shopify', 'warn'); return; }
  setItemMetafield(itemId, `${def.namespace}.${def.key}`, side);
  paintMirrorList();
}
function populateShippingProfileDropdown() {
  const sel = el('mr-shipping-profile');
  if (!sel) return;
  const profiles = MirrorState.deliveryProfiles || [];
  // Show every profile the API returns. The user can pick whichever they want.
  // Label any profile whose name suggests it's the catch-all default.
  sel.innerHTML = '<option value="">No override (uses Shopify default for the product)</option>' +
    profiles.map(p => {
      const isDefault = /all other products|store default|general profile/i.test(p.name);
      const label = escapeHtml(p.name) + (isDefault ? ' (default)' : '');
      return `<option value="${escapeAttr(p.id)}">${label}</option>`;
    }).join('');
}

function setStatusFilter(v) {
  MirrorState.statusFilter = v;
  paintMirrorList();
}

function toggleHideTemplates(on) {
  MirrorState.hideTemplateImages = !!on;
  // Filter listings' picture lists: when hiding, remove TMPL urls; when re-showing, restore from imageMeta
  for (const l of MirrorState.listings) {
    if (!l._originalPictureUrls) l._originalPictureUrls = [...l.pictureUrls];
    if (!l._originalImageMeta) l._originalImageMeta = l.imageMeta ? [...l.imageMeta] : null;
    if (on) {
      const meta = l._originalImageMeta || [];
      l.pictureUrls = l._originalPictureUrls.filter((_, i) => !(meta[i]?.likelyTemplate));
      l.imageMeta = meta.filter(m => !m.likelyTemplate);
    } else {
      l.pictureUrls = [...l._originalPictureUrls];
      l.imageMeta = l._originalImageMeta ? [...l._originalImageMeta] : null;
    }
    // Reset selection to first photo of the (possibly filtered) list
    MirrorState.selectedImages[l.itemId] = new Set(l.pictureUrls.length ? [l.pictureUrls[0]] : []);
  }
  paintMirrorList();
  toast(on ? 'Template images hidden everywhere' : 'Template images visible again', 'success');
}

function setItemStatus(itemId, status) {
  if (status === MirrorState.productStatus) delete MirrorState.itemStatuses[itemId];
  else MirrorState.itemStatuses[itemId] = status;
  paintMirrorList();
}

async function pushToEbay(itemId) {
  const l = MirrorState.listings.find(x => x.itemId === itemId);
  if (!l) return;
  const newSku = MirrorState.skuOverrides[itemId];
  const newTitle = MirrorState.titleOverrides[itemId];
  if (!newSku && !newTitle) {
    toast('No edits to push for this listing', 'warn');
    return;
  }
  const changes = [];
  if (newTitle && newTitle !== l.title) changes.push(`Title:\n  was: ${l.title}\n  new: ${newTitle}`);
  if (newSku && newSku !== l.sku) changes.push(`SKU:\n  was: ${l.sku || '(none)'}\n  new: ${newSku}`);
  if (!changes.length) {
    toast('Edits match the eBay listing already — nothing to push', 'info');
    return;
  }
  const ok = confirm(
    `Push these changes to eBay?\n\n${changes.join('\n\n')}\n\n` +
    `⚠ Each revision counts toward eBay's per-listing edit limit. Major title changes can affect search ranking and watcher notifications.`
  );
  if (!ok) return;
  try {
    await Api.post('/api/listings/push-to-ebay', {
      itemId,
      sku: newSku !== l.sku ? newSku : undefined,
      title: newTitle !== l.title ? newTitle : undefined,
    });
    // Update the in-memory listing so it reflects what's now on eBay
    if (newSku) l.sku = newSku;
    if (newTitle) l.title = newTitle;
    delete MirrorState.skuOverrides[itemId];
    delete MirrorState.titleOverrides[itemId];
    paintMirrorList();
    toast('Pushed to eBay', 'success');
  } catch (e) {
    toast('Push failed: ' + (e.data?.message || e.message), 'error');
  }
}

function escapeHtml(s) { return String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function escapeAttr(s) { return String(s||'').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function toggleListing(itemId, on) {
  if (on) MirrorState.selected.add(itemId);
  else MirrorState.selected.delete(itemId);
  paintMirrorList();
}
function toggleImage(itemId, url, on) {
  const set = MirrorState.selectedImages[itemId] || new Set();
  if (on) set.add(url); else set.delete(url);
  MirrorState.selectedImages[itemId] = set;
  // Update count label without full repaint
  const row = document.querySelector(`[data-row="${itemId}"]`);
  if (row) {
    const label = row.querySelector('div[style*="Photos to import"]');
    if (label) {
      const total = MirrorState.listings.find(l => l.itemId == itemId)?.pictureUrls.length || 0;
      label.textContent = `Photos to import (${set.size} of ${total} selected)`;
    }
  }
}
function selectAll(on) {
  if (on) MirrorState.selected = new Set(MirrorState.listings.map(l => l.itemId));
  else MirrorState.selected.clear();
  paintMirrorList();
}
function updateMirrorCounter() {
  const n = MirrorState.selected.size;
  const t = MirrorState.listings.length;
  const c = el('mr-counter');
  if (c) c.textContent = `${n} of ${t} selected`;
}

async function mirrorSelected() {
  const selected = MirrorState.listings.filter(l => MirrorState.selected.has(l.itemId));
  if (!selected.length) { toast('Nothing selected', 'warn'); return; }

  // Check SKU using overrides
  const effectiveSku = (l) => MirrorState.skuOverrides[l.itemId] != null ? MirrorState.skuOverrides[l.itemId] : l.sku;
  const missingSku = selected.filter(l => !effectiveSku(l));
  if (missingSku.length) {
    if (!confirm(`${missingSku.length} listing(s) have no SKU and will be skipped. Continue with the rest?`)) return;
  }
  const valid = selected.filter(l => effectiveSku(l));

  // Check Shopify for conflicts
  toast('Checking Shopify for existing products…', 'info');
  let conflicts = [];
  try {
    const r = await Api.post('/api/listings/check-conflicts', { skus: valid.map(l => effectiveSku(l)) });
    conflicts = r.conflicts || [];
  } catch (e) {
    toast('Conflict check failed: ' + e.message, 'error');
    return;
  }

  let overwriteConflicts = false;
  if (conflicts.length) {
    overwriteConflicts = confirm(
      `${conflicts.length} of these SKUs already exist on Shopify:\n\n` +
      conflicts.slice(0, 10).map(c => `• ${c.sku} — ${c.title}`).join('\n') +
      (conflicts.length > 10 ? `\n…and ${conflicts.length - 10} more` : '') +
      '\n\nClick OK to OVERWRITE these (replaces title, price, and images).\nClick Cancel to SKIP them and only mirror the new ones.'
    );
  }

  // Build payload — per-item overrides fall back to common bulk values
  const items = valid.map(l => ({
    itemId: l.itemId,
    sku: MirrorState.skuOverrides[l.itemId] != null ? MirrorState.skuOverrides[l.itemId] : l.sku,
    title: MirrorState.titleOverrides[l.itemId] != null ? MirrorState.titleOverrides[l.itemId] : l.title,
    price: computeShopifyPrice(l),
    imageUrls: Array.from(MirrorState.selectedImages[l.itemId] || []),
    status: MirrorState.itemStatuses[l.itemId] || MirrorState.productStatus,
    metafields: metafieldsForListing(l),
    qty: l.quantityAvailable != null ? l.quantityAvailable : null,
    tags: MirrorState.itemTags[l.itemId] != null ? MirrorState.itemTags[l.itemId] : (MirrorState.commonTags || null),
    templateSuffix: MirrorState.itemTemplateSuffixes[l.itemId] != null ? MirrorState.itemTemplateSuffixes[l.itemId] : (MirrorState.commonTemplateSuffix || null),
    shippingProfileId: MirrorState.itemShippingProfileIds[l.itemId] != null ? MirrorState.itemShippingProfileIds[l.itemId] : (MirrorState.commonShippingProfileId || null),
  }));

  toast(`Mirroring ${items.length} listings to Shopify…`, 'info');
  try {
    const r = await Api.post('/api/listings/mirror', { items, overwriteConflicts });
    let msg = `Created: ${r.created}, Updated: ${r.updated}, Skipped: ${r.skipped}`;
    if (r.errors && r.errors.length) msg += `, Errors: ${r.errors.length}`;
    toast(msg, r.errors?.length ? 'warn' : 'success');
    if (r.errors?.length) console.warn('Mirror errors:', r.errors);
  } catch (e) {
    toast('Mirror failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function findShopifyLocations() {
  const out = el('shopify-result');
  if (out) out.innerHTML = 'Loading…';
  try {
    const r = await Api.get('/api/settings/shopify-locations');
    if (out) {
      out.innerHTML = '<strong>Locations on your Shopify store:</strong><br>' +
        r.locations.map(l => `<code style="display:inline-block;padding:2px 6px;background:var(--line-2);border-radius:4px;margin:2px 4px 2px 0">${l.id}</code> — ${l.name}${l.address1 ? ' (' + l.address1 + ')' : ''}`).join('<br>') +
        '<br><br>Copy the ID for your <strong>warehouse location</strong>, then add it as <code>SHOPIFY_LOCATION_ID</code> in Railway env vars and redeploy.';
    }
  } catch (e) {
    if (out) out.innerHTML = '<span style="color:var(--red)">Failed: ' + (e.data?.error || e.message) + '. Make sure SHOPIFY_STORE_DOMAIN and SHOPIFY_ADMIN_TOKEN are set in Railway.</span>';
  }
}

async function clearCatalogue() {
  if (!confirm('This will permanently delete ALL products, locations, sales, returns, and stock movements from the warehouse database.\n\nUsers, settings, schedule and key information will be kept.\n\nThis is intended to wipe demo/seed data before importing real Shopify data.\n\nContinue?')) return;
  if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
  const out = el('shopify-result');
  if (out) out.innerHTML = 'Clearing…';
  try {
    await Api.post('/api/settings/clear-catalogue');
    await Store.refresh('products');
    await Store.refresh('locations');
    if (out) out.innerHTML = '<strong style="color:var(--green)">Catalogue cleared.</strong> You can now run Import all products to pull a fresh catalogue from Shopify.';
    toast('Catalogue cleared', 'success');
  } catch (e) {
    if (out) out.innerHTML = '<span style="color:var(--red)">Failed: ' + (e.data?.message || e.message) + '</span>';
  }
}

async function importFromShopify() {
  if (!confirm('Pull all products from Shopify into the warehouse? Safe to re-run — existing products will be updated.')) return;
  const out = el('shopify-result');
  if (out) out.innerHTML = 'Importing… this can take a minute for large catalogues.';
  try {
    const r = await Api.post('/api/settings/import-shopify');
    if (out) {
      out.innerHTML = `<strong style="color:var(--green)">Done.</strong> Inserted <strong>${r.inserted}</strong>, updated <strong>${r.updated}</strong>` +
        (r.errors && r.errors.length ? `, <span style="color:var(--red)">${r.errors.length} errors</span>` : '') +
        '. Refresh Inventory to see them.';
    }
    await Store.refresh('products');
    toast('Shopify import complete', 'success');
  } catch (e) {
    if (out) out.innerHTML = '<span style="color:var(--red)">Import failed: ' + (e.data?.message || e.message) + '</span>';
  }
}

async function loadPricingConfig() {
  try {
    const r = await Api.get('/api/settings/pricing-config');
    const setVal = (id, v) => { const e = el(id); if (e) e.value = v; };
    const setChk = (id, v) => { const e = el(id); if (e) e.checked = !!v; };
    setVal('set-cash', r.cashDiscountPct);
    setVal('set-bank', r.bankTransferPct);
    setVal('set-ebaymarkup', r.ebayBuyerProtectionMarkup);
    setVal('set-freedelivery', r.shopifyFreeDeliveryOver);
    setVal('set-vat', r.vatRate);
    setChk('set-vatreg', r.vatRegistered);
    setVal('set-vatnum', r.vatNumber);
    setVal('set-address', r.companyAddress);
    setVal('set-phone', r.companyPhone);
    setVal('set-email', r.companyEmail);
    setVal('set-website', r.companyWebsite);
    setVal('set-regno', r.companyRegNo);
    setVal('set-bankname', r.bankAccountName);
    setVal('set-banksort', r.bankSortCode);
    setVal('set-bankacc', r.bankAccountNumber);
    // Show VAT number field if VAT-registered
    const vatNumWrap = el('set-vatnum-wrap');
    if (vatNumWrap) vatNumWrap.style.display = r.vatRegistered ? '' : 'none';
    const vatReg = el('set-vatreg');
    if (vatReg && vatNumWrap) {
      vatReg.addEventListener('change', () => { vatNumWrap.style.display = vatReg.checked ? '' : 'none'; });
    }
    State.pricingConfig = r;
  } catch (e) { console.warn('loadPricingConfig:', e); }
}

async function savePricingConfig() {
  const getNum = (id) => { const e = el(id); return e && e.value !== '' ? parseFloat(e.value) : undefined; };
  const getStr = (id) => { const e = el(id); return e ? e.value : undefined; };
  const payload = {
    cashDiscountPct: getNum('set-cash'),
    bankTransferPct: getNum('set-bank'),
    ebayBuyerProtectionMarkup: getNum('set-ebaymarkup'),
    shopifyFreeDeliveryOver: getNum('set-freedelivery'),
    vatRate: getNum('set-vat'),
    vatRegistered: el('set-vatreg') ? el('set-vatreg').checked : undefined,
    vatNumber: getStr('set-vatnum'),
    companyAddress: getStr('set-address'),
    companyPhone: getStr('set-phone'),
    companyEmail: getStr('set-email'),
    companyWebsite: getStr('set-website'),
    companyRegNo: getStr('set-regno'),
    bankAccountName: getStr('set-bankname'),
    bankSortCode: getStr('set-banksort'),
    bankAccountNumber: getStr('set-bankacc'),
  };
  // Strip undefined
  for (const k of Object.keys(payload)) if (payload[k] === undefined) delete payload[k];
  try {
    await Api.post('/api/settings/pricing-config', payload);
    if (el('set-thresh')) {
      try { await Api.patch('/api/settings', { lowStockDefault: parseInt(el('set-thresh').value) }); } catch (e) {}
    }
    toast('Saved', 'success');
    await loadPricingConfig();
  } catch (e) {
    toast('Save failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function resetSyncCursor() {
  const days = parseInt(el('resync-days').value) || 30;
  const channel = el('resync-channel').value;
  if (!confirm(`Rewind the ${channel === 'all' ? 'Shopify and eBay' : channel} sync cursor by ${days} days, then run a sync?`)) return;
  try {
    await Api.post('/api/settings/reset-sync-cursor', { channel, days });
    toast(`Cursor rewound. Running sync…`, 'info');
    await syncNow();
  } catch (e) {
    toast('Reset failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function hydrateEbayPrices() {
  if (!confirm('This will fetch all active eBay listings (~1-2 minutes) and update eBay prices on your warehouse products. Continue?')) return;

  }
}
async function resetData() {
  // In production mode this is disabled — wiping a real DB requires using
  // psql or running `npm run seed -- --force` from the server.
  toast('Reset disabled in production. Use server-side scripts.', 'warn');
}

/* ==========================================================
   UTILITIES
   ========================================================== */
function el(id) { return document.getElementById(id); }
async function syncNow() {
  toast('Pulling new orders from Shopify and eBay, pushing stock to Shopify…', 'info');
  try {
    const result = await Api.post('/api/settings/sync-now');
    const r = result.result || {};
    const lines = [];
    if (r.shopify) {
      const s = r.shopify;
      if (s.skipped) lines.push('• Shopify orders: not configured (set SHOPIFY env vars)');
      else if (s.inserted > 0) lines.push(`✓ ${s.inserted} new Shopify order${s.inserted === 1 ? '' : 's'} imported`);
      else lines.push('• Shopify: no new orders since last sync');
    }
    if (r.ebay) {
      const e = r.ebay;
      if (e.skipped) lines.push('• eBay orders: not configured');
      else if (e.inserted > 0) lines.push(`✓ ${e.inserted} new eBay order${e.inserted === 1 ? '' : 's'} imported`);
      else lines.push('• eBay: no new orders since last sync');
    }
    if (r.shopifyStock && !r.shopifyStock.skipped) {
      const ss = r.shopifyStock;
      lines.push(`✓ Stock pushed to Shopify: ${ss.pushed} of ${ss.total} products`);
    }
    const msg = lines.length
      ? 'Sync complete:\n' + lines.join('\n')
      : 'Sync complete. No new data.';
    toast(msg, 'success', 6000);
    await Store.refreshAll();
    if (typeof renderDashboard === 'function' && State.page === 'dashboard') renderDashboard();
    if (State.page === 'sales' && typeof renderSales === 'function') renderSales();
  } catch (e) {
    toast('Sync failed: ' + (e.data?.message || e.message), 'error', 6000);
  }
}
function toast(msg, type='', duration=3000) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  // Support multi-line toasts
  if (msg.includes('\n')) {
    t.style.whiteSpace = 'pre-line';
    t.style.lineHeight = '1.5';
  }
  t.textContent = msg;
  el('toast-host').appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),200); }, duration);
}
function modal({ title, body, actions=[] }) {
  el('modal-title').textContent = title;
  el('modal-body').innerHTML = body;
  el('modal-foot').innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn ' + (a.primary ? 'btn-primary' : 'btn-outline');
    b.textContent = a.label;
    b.onclick = a.onClick;
    el('modal-foot').appendChild(b);
  });
  el('modal-overlay').classList.add('open');
}
function closeModal() { el('modal-overlay').classList.remove('open'); }
el('modal-close').addEventListener('click', closeModal);
el('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });

// Boot
init();
</script>
