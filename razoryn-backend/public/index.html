<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#c8202d">
<title>Razoryn Warehouse Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --red: #c8202d;
    --red-dark: #a51823;
    --red-light: #fce8ea;
    --ink: #0f1115;
    --ink-2: #1c1f26;
    --ink-soft: #4a5260;
    --line: #e6e8ec;
    --line-2: #f0f2f5;
    --bg: #fafbfc;
    --white: #ffffff;
    --green: #1a7f3e;
    --green-light: #e3f4e9;
    --amber: #b76b00;
    --amber-light: #fff4e0;
    --blue: #1e5ae8;
    --blue-light: #e8eefd;
    --shadow: 0 1px 2px rgba(15,17,21,.04), 0 4px 12px rgba(15,17,21,.04);
    --shadow-lg: 0 8px 32px rgba(15,17,21,.12);
    --radius: 10px;
    --radius-sm: 6px;
  }
  [data-theme="dark"] {
    --red: #e94654;
    --red-dark: #c8202d;
    --red-light: #3a1418;
    --ink: #f0f2f5;
    --ink-2: #d4d8df;
    --ink-soft: #8a93a3;
    --line: #2a2e36;
    --line-2: #1f232a;
    --bg: #0d0f13;
    --white: #161a21;
    --green: #4ade80;
    --green-light: #0e2a18;
    --amber: #f0a040;
    --amber-light: #2e1f0a;
    --blue: #6b8fff;
    --blue-light: #131a30;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.3);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
  }
  [data-theme="dark"] img { filter: brightness(.92); }
  html { color-scheme: light; }
  html[data-theme="dark"] { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, select, textarea {
    font-family: inherit; font-size: 14px; color: var(--ink);
    background: var(--white); border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 10px;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--red); }
  input:disabled, select:disabled, textarea:disabled { opacity: .6; cursor: not-allowed; }
  input::placeholder, textarea::placeholder { color: var(--ink-soft); opacity: .7; }
  input[type="checkbox"], input[type="radio"] { padding: 0; width: auto; height: auto; accent-color: var(--red); }
  /* Override autofill so it picks up dark theme colours */
  input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 30px var(--white) inset !important;
    -webkit-text-fill-color: var(--ink) !important;
    caret-color: var(--ink);
  }
  a { color: var(--red); text-decoration: none; }

  /* ==================== LOGIN ==================== */
  .login-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #0f1115 0%, #1c1f26 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 1000;
  }
  .login-card {
    background: var(--white); border-radius: 16px;
    padding: 40px; width: 100%; max-width: 380px;
    box-shadow: var(--shadow-lg);
  }
  .login-logo {
    text-align: center; margin-bottom: 28px;
  }
  .login-logo .mark {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 800; font-size: 22px; letter-spacing: -0.02em;
  }
  .login-logo .mark .dot {
    width: 28px; height: 28px; background: var(--red); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px;
  }
  .login-logo .sub {
    font-size: 12px; color: var(--ink-soft); margin-top: 6px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .login-tabs {
    display: flex; background: var(--line-2); border-radius: 8px;
    padding: 4px; margin-bottom: 24px;
  }
  .login-tab {
    flex: 1; padding: 8px; border-radius: 6px;
    font-size: 13px; font-weight: 600; color: var(--ink-soft);
  }
  .login-tab.active { background: var(--white); color: var(--ink); box-shadow: var(--shadow); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--ink-soft); }
  .field input, .field select, .field textarea {
    width: 100%; padding: 11px 14px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--white); transition: border .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--red); }
  .btn {
    padding: 11px 18px; border-radius: 8px; font-weight: 600;
    font-size: 14px; transition: all .15s; display: inline-flex;
    align-items: center; gap: 8px; justify-content: center;
  }
  .btn-primary { background: var(--red); color: white; }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-secondary { background: var(--ink); color: white; }
  .btn-ghost { background: transparent; color: var(--ink-soft); }
  .btn-ghost:hover { background: var(--line-2); color: var(--ink); }
  .btn-outline { background: var(--white); color: var(--ink); border: 1px solid var(--line); }
  .btn-outline:hover { border-color: var(--ink); }
  .btn-block { width: 100%; }
  .btn-sm { padding: 7px 12px; font-size: 12px; }
  .btn-danger { background: var(--red); color: white; }
  .btn-success { background: var(--green); color: white; }

  /* PIN pad */
  .pin-display {
    display: flex; justify-content: center; gap: 10px; margin: 20px 0;
  }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--line); transition: all .15s;
  }
  .pin-dot.filled { background: var(--red); border-color: var(--red); }
  .pin-pad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .pin-key {
    height: 56px; background: var(--line-2); border-radius: 10px;
    font-size: 20px; font-weight: 600; color: var(--ink);
    transition: background .1s;
  }
  .pin-key:active { background: var(--line); }
  .pin-hint { text-align: center; color: var(--ink-soft); font-size: 12px; margin-top: 14px; }
  .pin-error { color: var(--red); text-align: center; font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* ==================== APP SHELL ==================== */
  .app { display: none; height: 100vh; flex-direction: column; }
  .app.active { display: flex; }

  .topbar {
    height: 56px; background: var(--white); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; padding: 0 16px; gap: 16px;
    flex-shrink: 0;
  }
  .topbar .logo {
    display: flex; align-items: center; gap: 14px;
    font-weight: 800; font-size: 16px; letter-spacing: -0.02em;
  }
  .topbar .logo img.brand-logo {
    width: auto;
    height: 36px;          /* sized to fit ~220x50 area at native 4.47:1 ratio */
    max-width: 220px;
    object-fit: contain;
    display: block;
  }
  /* Use the dark-mode variant (light E-PARTS) when the app is in dark mode */
  .topbar .logo img.brand-logo.light { display: block; }
  .topbar .logo img.brand-logo.dark  { display: none; }
  [data-theme="dark"] .topbar .logo img.brand-logo.light { display: none; }
  [data-theme="dark"] .topbar .logo img.brand-logo.dark  { display: block; }
  .topbar .logo .sub {
    color: var(--ink-soft); font-weight: 500; font-size: 12px;
    padding-left: 14px; border-left: 1px solid var(--line);
  }
  .topbar .spacer { flex: 1; }
  .menu-btn.icon-btn { display: none; width: 36px; height: 36px; border-radius: 8px; align-items: center; justify-content: center; }
  .menu-btn.icon-btn:hover { background: var(--line-2); }

  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); position: relative;
  }
  .icon-btn:hover { background: var(--line-2); color: var(--ink); }
  .badge {
    position: absolute; top: 4px; right: 4px;
    background: var(--red); color: white;
    font-size: 10px; font-weight: 700;
    min-width: 16px; height: 16px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 4px; border-radius: 18px; background: var(--line-2);
  }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--red); color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px;
  }
  .user-chip .name { font-size: 13px; font-weight: 600; }
  .user-chip .role { font-size: 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; }

  .body-wrap { flex: 1; display: flex; overflow: hidden; }

  .sidebar {
    width: 240px; background: var(--white); border-right: 1px solid var(--line);
    overflow-y: auto; flex-shrink: 0;
  }
  .nav-section { padding: 12px 8px; }
  .nav-label {
    padding: 8px 12px 6px; font-size: 11px; font-weight: 700;
    color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px; font-size: 14px;
    color: var(--ink-2); font-weight: 500; width: 100%; text-align: left;
    cursor: pointer; margin-bottom: 1px;
  }
  .nav-item:hover { background: var(--line-2); }
  .nav-item.active { background: var(--red-light); color: var(--red); font-weight: 600; }
  .nav-item .ic { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item .ct {
    margin-left: auto; background: var(--line-2); color: var(--ink-soft);
    font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 10px;
  }
  .nav-item.active .ct { background: var(--red); color: white; }
  .nav-item.alert .ct { background: var(--amber); color: white; }

  .content {
    flex: 1; overflow-y: auto; padding: 24px;
    -webkit-overflow-scrolling: touch;
  }
  .page { max-width: 1280px; margin: 0 auto; }
  .page-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .page-head h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
  }
  .page-head .desc { color: var(--ink-soft); margin-top: 2px; font-size: 13px; }
  .page-head .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Cards & generic blocks */
  .card {
    background: var(--white); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow);
  }
  .card-head {
    padding: 16px 18px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .card-head h3 { font-size: 15px; font-weight: 600; }
  .card-body { padding: 18px; }

  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }

  .stat {
    background: var(--white); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px;
  }
  .stat .label { font-size: 12px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .stat .value { font-size: 24px; font-weight: 700; margin-top: 4px; letter-spacing: -0.02em; }
  .stat .delta { font-size: 12px; margin-top: 2px; color: var(--green); font-weight: 600; }
  .stat .delta.down { color: var(--red); }
  .stat-clickable { cursor: pointer; transition: transform .12s, border-color .12s, box-shadow .12s; }
  .stat-clickable:hover { transform: translateY(-2px); border-color: var(--ink-soft); box-shadow: var(--shadow-lg); }
  .stat-clickable:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
  .stat .icon-wrap {
    width: 36px; height: 36px; border-radius: 8px; background: var(--red-light);
    color: var(--red); display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  .table { width: 100%; border-collapse: collapse; }
  .table th, .table td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--line); font-size: 13px; }
  .table th { background: var(--line-2); font-weight: 600; color: var(--ink-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; position: sticky; top: 0; }
  .table tr:hover td { background: var(--bg); }
  .table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 12px; font-size: 11px;
    font-weight: 600; background: var(--line-2); color: var(--ink-soft);
  }
  .pill.red { background: var(--red-light); color: var(--red); }
  .pill.green { background: var(--green-light); color: var(--green); }
  .pill.amber { background: var(--amber-light); color: var(--amber); }
  .pill.blue { background: var(--blue-light); color: var(--blue); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Search/filter bar */
  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
    align-items: center;
  }
  .search-input {
    flex: 1; min-width: 200px; max-width: 400px;
    padding: 9px 14px 9px 36px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--white); color: var(--ink);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%234a5260' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");
    background-repeat: no-repeat; background-position: 12px center;
  }
  .filter-select {
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--white); color: var(--ink); font-size: 13px;
  }

  .seg {
    display: inline-flex; background: var(--line-2); border-radius: 8px; padding: 3px;
  }
  .seg button {
    padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--ink-soft);
  }
  .seg button.active { background: var(--white); color: var(--ink); box-shadow: var(--shadow); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15,17,21,.5);
    z-index: 999; display: flex; align-items: center; justify-content: center;
    padding: 16px; backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity .15s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--white); border-radius: 14px;
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    transform: scale(.96); transition: transform .15s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-head {
    padding: 18px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 20px; }
  .modal-foot {
    padding: 14px 20px; border-top: 1px solid var(--line);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .modal-large { max-width: 720px; }

  /* Toast */
  .toast-host {
    position: fixed; top: 70px; right: 16px; z-index: 1100;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: #1c1f26; color: white; padding: 12px 16px;
    border-radius: 10px; box-shadow: var(--shadow-lg);
    font-size: 13px; font-weight: 500; max-width: 320px;
    display: flex; align-items: center; gap: 10px;
    pointer-events: auto;
    animation: slide .25s ease-out;
  }
  [data-theme="dark"] .toast { background: #2a2e36; border: 1px solid #3a3e48; }
  .toast.success { background: var(--green); color: white; }
  .toast.error { background: var(--red); color: white; }
  .toast.warn { background: var(--amber); color: white; }
  .toast.info { background: var(--blue); color: white; }
  [data-theme="dark"] .toast.success,
  [data-theme="dark"] .toast.error,
  [data-theme="dark"] .toast.warn,
  [data-theme="dark"] .toast.info { color: white; border: none; }
  @keyframes slide {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Scanner */
  #scanner-region { width: 100%; min-height: 280px; background: #000; border-radius: 8px; overflow: hidden; }

  /* Locations */
  .loc-card {
    background: var(--white); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: transform .15s, box-shadow .15s;
  }
  .loc-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .loc-img {
    width: 100%; aspect-ratio: 4/3; background: var(--line-2);
    display: flex; align-items: center; justify-content: center; color: var(--ink-soft);
    background-size: cover; background-position: center;
  }
  .loc-meta { padding: 12px; }
  .loc-title { font-weight: 600; font-size: 13px; }
  .loc-desc { color: var(--ink-soft); font-size: 12px; margin-top: 2px; }

  /* Schedule */
  .task-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    border-bottom: 1px solid var(--line);
  }
  .task-check {
    width: 22px; height: 22px; border: 2px solid var(--line);
    border-radius: 6px; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center;
  }
  .task-check.done { background: var(--green); border-color: var(--green); color: white; }
  .task-row.done .task-title { text-decoration: line-through; color: var(--ink-soft); }
  .task-info { flex: 1; }
  .task-title { font-weight: 500; font-size: 13px; }
  .task-meta { color: var(--ink-soft); font-size: 12px; margin-top: 2px; }

  /* Returns */
  .return-photos {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 6px; margin-top: 8px;
  }
  .return-photos img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; }

  /* Knowledge base */
  .kb-card {
    background: var(--white); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px; cursor: pointer; transition: border-color .15s;
  }
  .kb-card:hover { border-color: var(--ink); }
  .kb-card .kb-cat {
    font-size: 11px; font-weight: 700; color: var(--red);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .kb-card .kb-title { font-weight: 600; margin-top: 4px; font-size: 14px; }
  .kb-card .kb-desc { color: var(--ink-soft); font-size: 12px; margin-top: 4px; }
  .kb-locked {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px;
    background: var(--amber-light); color: var(--amber);
    border-radius: 4px; font-size: 10px; font-weight: 700; margin-top: 6px;
  }

  /* Videos */
  .video-card { cursor: pointer; }
  .video-thumb {
    width: 100%; aspect-ratio: 16/9; background: var(--ink-2);
    border-radius: var(--radius); display: flex; align-items: center;
    justify-content: center; color: white; position: relative;
    background-size: cover; background-position: center;
  }
  .video-thumb::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,.3); border-radius: var(--radius);
  }
  .video-thumb svg { position: relative; z-index: 1; opacity: .95; }
  .video-meta { padding-top: 10px; }
  .video-title { font-weight: 600; font-size: 14px; }
  .video-desc { color: var(--ink-soft); font-size: 12px; margin-top: 2px; }

  /* Pricing tool */
  .pt-result {
    display: grid; gap: 10px; margin-top: 16px;
  }
  .pt-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px; border: 1px solid var(--line); border-radius: var(--radius);
  }
  .pt-row.featured { background: var(--red-light); border-color: var(--red); }
  .pt-row .ch-name { font-weight: 600; font-size: 13px; }
  .pt-row .ch-meta { color: var(--ink-soft); font-size: 12px; }
  .pt-row .ch-price { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }

  /* Empty state */
  .empty {
    text-align: center; padding: 48px 20px;
    color: var(--ink-soft);
  }
  .empty svg { opacity: .3; margin-bottom: 12px; }
  .empty .t { font-weight: 600; font-size: 15px; color: var(--ink); margin-bottom: 4px; }

  /* Switch */
  .switch {
    position: relative; display: inline-block; width: 38px; height: 22px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch span {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--line); border-radius: 22px; transition: .15s;
  }
  .switch span::before {
    content: ''; position: absolute; height: 16px; width: 16px;
    left: 3px; top: 3px; background: white; border-radius: 50%; transition: .15s;
  }
  .switch input:checked + span { background: var(--green); }
  .switch input:checked + span::before { transform: translateX(16px); }

  .perm-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--line);
  }
  .perm-row:last-child { border-bottom: none; }
  .perm-row .perm-name { font-weight: 500; font-size: 13px; }
  .perm-row .perm-desc { color: var(--ink-soft); font-size: 12px; }

  /* Mobile */
  @media (max-width: 900px) {
    .menu-btn.icon-btn { display: flex; }
    .sidebar {
      position: fixed; top: 56px; bottom: 0; left: 0; z-index: 90;
      transform: translateX(-100%); transition: transform .2s;
      box-shadow: var(--shadow-lg);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop {
      position: fixed; inset: 56px 0 0 0; background: rgba(0,0,0,.4);
      z-index: 80; display: none;
    }
    .sidebar-backdrop.open { display: block; }
    .content { padding: 16px; }
    .user-chip .name { display: none; }
    .user-chip .role { display: none; }
    .user-chip { padding: 4px; }
    .topbar .logo .sub { display: none; }
  }
  @media (max-width: 540px) {
    .page-head h1 { font-size: 18px; }
    .stat .value { font-size: 20px; }
    .table th, .table td { padding: 10px; font-size: 12px; }
  }

  /* Hide on mobile - admin-only desktop features */
  .admin-only { display: none; }
  body.is-admin .admin-only { display: initial; }
  body.is-admin .nav-item.admin-only { display: flex; }

<script>
/* ==========================================================
   STATE & STORAGE
   ========================================================== */
const State = {
  user: null,
  page: 'dashboard',
  products: [],
  sales: [],
  returns: [],
  staff: [],
  schedule: [],
  videos: [],
  knowledge: [],
  notifications: [],
  settings: {
    lowStockDefault: 3,
    cashDiscount: 10, // percentage off eBay price for cash
    shopifyConnected: true,
    ebayConnected: true,
    showLoginsToWarehouse: false,
  }
};

/* ==========================================================
   API CLIENT — talks to the Express backend.
   When window.location.origin matches the API host, requests
   are same-origin and cookies handle auth. JWT is stored in
   window.storage as a fallback for when cookies are blocked.
   ========================================================== */
const API_BASE = ''; // same-origin
let API_TOKEN = null;

const Api = {
  async _req(method, path, body, isMultipart = false) {
    const headers = {};
    if (!isMultipart) headers['Content-Type'] = 'application/json';
    if (API_TOKEN) headers['Authorization'] = 'Bearer ' + API_TOKEN;
    const res = await fetch(API_BASE + path, {
      method,
      headers,
      credentials: 'include',
      body: body ? (isMultipart ? body : JSON.stringify(body)) : undefined,
    });
    if (res.status === 401) {
      API_TOKEN = null;
      try { await window.storage.delete('rzn_token'); } catch (_) {}
      throw new Error('unauthorized');
    }
    let data = null;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) data = await res.json();
    if (!res.ok) {
      const msg = (data && data.error) ? data.error : ('http_' + res.status);
      const err = new Error(msg);
      err.status = res.status;
      err.data = data;
      throw err;
    }
    return data;
  },
  get(path)         { return this._req('GET', path); },
  post(path, body)  { return this._req('POST', path, body); },
  patch(path, body) { return this._req('PATCH', path, body); },
  delete(path)      { return this._req('DELETE', path); },
  postForm(path, formData) { return this._req('POST', path, formData, true); },

  // ----- auth -----
  auth: {
    async loginPin(pin) {
      const r = await Api.post('/api/auth/login-pin', { pin });
      API_TOKEN = r.token;
      try { await window.storage.set('rzn_token', r.token); } catch(_) {}
      return r.user;
    },
    async loginEmail(email, password) {
      const r = await Api.post('/api/auth/login', { email, password });
      API_TOKEN = r.token;
      try { await window.storage.set('rzn_token', r.token); } catch(_) {}
      return r.user;
    },
    async logout() {
      try { await Api.post('/api/auth/logout'); } catch(_) {}
      API_TOKEN = null;
      try { await window.storage.delete('rzn_token'); } catch(_) {}
    },
    async me() {
      const r = await Api.get('/api/auth/me');
      return r.user;
    },
  },
};

/* Legacy shape adapters — convert API responses (snake_case, single qty)
   into the field names the existing render functions expect. */
function adaptProduct(p) {
  return {
    id: p.id,
    sku: p.sku,
    barcode: p.barcode,
    title: p.title,
    brand: p.brand,
    model: p.model,
    position: p.position,
    partNumber: p.part_number,
    priceShopify: parseFloat(p.price_shopify || 0),
    priceEbay: parseFloat(p.price_ebay || 0),
    qtyShopify: p.qty_on_hand,
    qtyEbay: p.qty_on_hand,
    qtyOnHand: p.qty_on_hand,
    lowThresh: p.low_stock_threshold,
    location: p.location_name || (p.location_code ? `(${p.location_code})` : ''),
    locationCode: p.location_code,
    locationId: p.location_id,
    locationDesc: '',
    locationPhoto: null,
    imageUrl: p.image_url,
    shopifyProductId: p.shopify_product_id,
    shopifyVariantId: p.shopify_variant_id,
  };
}
function adaptSale(s) {
  const channelMap = {
    shopify: 'shopify', ebay_em: 'ebay', ebay_cl: 'ebay',
    direct_cash: 'cash', direct_bank: 'bank',
  };
  // Compose a meaningful item label.
  // Single-item sales → just the title. Multi-item → "Title +N more"
  const itemCount = s.item_count || 0;
  const firstTitle = s.first_item_title;
  const itemLabel = firstTitle
    ? (itemCount > 1 ? `${firstTitle} +${itemCount - 1} more` : firstTitle)
    : (s.notes || '(no items)');
  return {
    id: s.id,
    productId: null,
    sku: s.first_item_sku || s.sku || '',
    title: itemLabel,
    itemCount,
    channel: channelMap[s.channel] || s.channel,
    amount: parseFloat(s.total),
    date: s.occurred_at,
    customer: s.customer_name || '—',
    customerEmail: s.customer_email || '',
    customerPhone: s.customer_phone || '',
    shippingAddress: s.shipping_address || '',
    orderNumber: s.order_number || '',
    externalOrderId: s.external_order_id || '',
    invoice: s.invoice_number || s.payment_reference || (s.external_order_id ? '#' + s.external_order_id : '—'),
    apiChannel: s.channel,
    isEstimate: !!s.is_estimate,
    paymentMethod: s.payment_method,
    paymentReference: s.payment_reference,
    status: s.status,
    subtotal: parseFloat(s.subtotal || 0),
    vat: parseFloat(s.vat || 0),
    shipping: parseFloat(s.shipping || 0),
  };
}
function adaptReturn(r) {
  return {
    id: r.id,
    saleId: r.sale_id,
    productId: r.product_id,
    sku: r.sku,
    title: r.title,
    channel: r.channel,
    qty: r.qty,
    reason: r.reason,
    resolution: r.resolution,
    refundAmount: parseFloat(r.refund_amount || 0),
    status: r.status,
    notes: r.notes,
    photos: [],
    date: r.created_at,
  };
}
function adaptTask(t) {
  return {
    id: t.id,
    task: t.title,                     // legacy field name
    title: t.title,
    type: t.task_type,
    when: t.due_time ? t.due_time.slice(0, 5) : '',
    time: t.due_time,
    date: t.scheduled_for,
    done: t.status === 'done',
    status: t.status,
    assigneeId: t.assigned_to || null,
    assignee: t.assignee_name || (t.assigned_to ? '#' + t.assigned_to : null),
    frequency: t.recurrence || 'none',
    recurrence: t.recurrence,
  };
}
function adaptUser(u) {
  return {
    id: u.id,
    name: u.name,
    email: u.email,
    role: u.role,
    perms: u.permissions || {},          // legacy
    permissions: u.permissions || {},
    pin: '••••',
    active: u.active,
  };
}
function adaptKb(k) {
  return {
    id: k.id,
    title: k.title,
    cat: k.category || 'General',         // legacy
    category: k.category,
    desc: (k.body || '').split('\n')[0].slice(0, 120),  // legacy short desc
    body: k.body,
    content: k.body,                       // legacy
    sensitive: k.sensitive,
  };
}
function adaptVideo(v) {
  // Format duration_seconds (e.g. 225) into "3:45"
  let dur = '';
  if (v.duration_seconds) {
    const m = Math.floor(v.duration_seconds / 60);
    const s = String(v.duration_seconds % 60).padStart(2, '0');
    dur = `${m}:${s}`;
  }
  return {
    id: v.id,
    title: v.title,
    desc: v.description || '',                  // legacy field
    description: v.description || '',
    category: v.category,
    url: v.video_url,
    videoUrl: v.video_url,
    thumb: v.thumbnail_url || 'var(--red)',     // legacy
    duration: dur,
    durationSeconds: v.duration_seconds,
  };
}
function adaptNotification(n) {
  return {
    id: n.id,
    type: n.type,
    title: n.title,
    body: n.body,
    severity: n.severity,
    read: !!n.read_at,
    date: n.created_at,
  };
}

/* ==========================================================
   STORE — refreshes State from API on every page navigation
   that needs fresh data. Each mutation calls the API and then
   refreshes the relevant slice of state.
   ========================================================== */
const Store = {
  async refreshAll() {
    // Fan out — if any single endpoint fails, log it but keep going so a
    // single broken slice doesn't take down the whole UI.
    const calls = [
      ['products',      () => Api.get('/api/products?pageSize=200').then(r => r.products.map(adaptProduct))],
      ['sales',         () => Api.get('/api/sales?pageSize=200').then(r => r.sales.map(adaptSale))],
      ['returns',       () => Api.get('/api/returns').then(r => r.returns.map(adaptReturn))],
      ['schedule',      () => Api.get('/api/schedule').then(r => r.tasks.map(adaptTask))],
      ['videos',        () => Api.get('/api/videos').then(r => r.videos.map(adaptVideo))],
      ['knowledge',     () => Api.get('/api/kb').then(r => r.entries.map(adaptKb))],
      ['notifications', () => Api.get('/api/notifications').then(r => r.notifications.map(adaptNotification))],
    ];
    if (State.user && State.user.role === 'admin') {
      calls.push(['staff', () => Api.get('/api/staff').then(r => r.users.map(adaptUser))]);
    }
    const settingsCall = Api.get('/api/settings').then(r => ({
      lowStockDefault: 3,
      cashDiscount: parseFloat(r.settings.cash_discount_pct || 10),
      vatRate: parseFloat(r.settings.vat_rate || 20),
      freeDeliveryThreshold: parseFloat(r.settings.free_delivery_threshold || 50),
      shopifyConnected: true,
      ebayConnected: true,
    })).catch(() => State.settings);

    const results = await Promise.all(calls.map(async ([k, fn]) => {
      try { return [k, await fn()]; }
      catch (e) { console.warn('[store] failed to load', k, e.message); return [k, State[k]]; }
    }));
    for (const [k, v] of results) State[k] = v;
    State.settings = await settingsCall;
  },

  async refresh(key) {
    const map = {
      products:      () => Api.get('/api/products?pageSize=200').then(r => r.products.map(adaptProduct)),
      sales:         () => Api.get('/api/sales?pageSize=200').then(r => r.sales.map(adaptSale)),
      returns:       () => Api.get('/api/returns').then(r => r.returns.map(adaptReturn)),
      schedule:      () => Api.get('/api/schedule').then(r => r.tasks.map(adaptTask)),
      videos:        () => Api.get('/api/videos').then(r => r.videos.map(adaptVideo)),
      knowledge:     () => Api.get('/api/kb').then(r => r.entries.map(adaptKb)),
      notifications: () => Api.get('/api/notifications').then(r => r.notifications.map(adaptNotification)),
      staff:         () => Api.get('/api/staff').then(r => r.users.map(adaptUser)),
    };
    if (!map[key]) return;
    try { State[key] = await map[key](); } catch (e) { console.warn('[store] refresh', key, e.message); }
  },

  // No-ops kept for backwards compatibility with any older calls.
  async load(_key, def) { return def; },
  async save(_key, _val) { /* mutations now go through Api.* */ },
};

   ========================================================== */
async function init() {
  // Theme: load saved preference or fall back to system preference
  await loadTheme();

  // Try to restore an existing session via the API. If we have a token saved
  // OR the cookie is still valid, /me will return the user and we can skip login.
  try {
    const saved = await window.storage.get('rzn_token').catch(() => null);
    if (saved && saved.value) API_TOKEN = saved.value;
    const me = await Api.auth.me();
    State.user = me;
    await Store.refreshAll();
    try { State.pricingConfig = await Api.get('/api/settings/pricing-config'); } catch (e) {}
    enterApp();
    return;
  } catch (e) {
    // Not logged in — show login screen
  }

  bindLogin();
}

/* ==================== THEME ==================== */
async function loadTheme() {
  let theme = null;
  try {
    const r = await window.storage.get('theme');
    if (r && r.value) theme = r.value;
  } catch (e) { /* not set yet */ }
  if (!theme) {
    theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  applyTheme(theme);
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', async (e) => {
      try {
        const r = await window.storage.get('theme-user-set');
        if (r && r.value === '1') return;
      } catch (_) {}
      applyTheme(e.matches ? 'dark' : 'light');
    });
  }
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme === 'dark' ? '#0d0f13' : '#c8202d');
  const lightIcon = document.querySelector('.theme-icon-light');
  const darkIcon = document.querySelector('.theme-icon-dark');
  if (lightIcon && darkIcon) {
    lightIcon.style.display = theme === 'dark' ? 'none' : '';
    darkIcon.style.display  = theme === 'dark' ? '' : 'none';
  }
}
async function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  try {
    await window.storage.set('theme', next);
    await window.storage.set('theme-user-set', '1');
  } catch (e) { /* non-fatal */ }
}

// All mutations now go through Api directly. persistAll is kept as a stub
// so any legacy callers don't break — it just refreshes from the server.
async function persistAll() {
  await Store.refreshAll();
}

/* ==========================================================
   LOGIN
   ========================================================== */
function bindLogin() {
  const tabs = document.querySelectorAll('.login-tab');
  const pinView = document.getElementById('login-pin');
  const emailView = document.getElementById('login-email');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    if (t.dataset.mode === 'pin') { pinView.style.display='block'; emailView.style.display='none'; }
    else { pinView.style.display='none'; emailView.style.display='block'; }
  }));

  let pin = '';
  const dots = document.querySelectorAll('.pin-dot');
  function renderDots() {
    dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
  }
  async function tryPin() {
    const errEl = document.getElementById('pin-error');
    errEl.textContent = '';
    try {
      const user = await Api.auth.loginPin(pin);
      State.user = user;
      pin = ''; renderDots();
      await Store.refreshAll();
      enterApp();
    } catch (e) {
      errEl.textContent = e.message === 'unauthorized' || e.status === 401
        ? 'Invalid PIN' : 'Login failed — check your connection';
      pin = ''; renderDots();
      setTimeout(() => errEl.textContent = '', 2500);
    }
  }
  document.querySelectorAll('.pin-key').forEach(k => k.addEventListener('click', () => {
    const act = k.dataset.act;
    if (act === 'clear') { pin = pin.slice(0, -1); renderDots(); return; }
    if (act === 'enter') { if (pin.length === 4) tryPin(); return; }
    if (pin.length < 4) { pin += k.textContent; renderDots(); }
    if (pin.length === 4) setTimeout(tryPin, 150);
  }));

  document.getElementById('email-login').addEventListener('click', async () => {
    const email = document.getElementById('email-input').value.trim();
    const pwd = document.getElementById('pwd-input').value;
    if (!email || !pwd) { toast('Email and password required', 'error'); return; }
    try {
      const user = await Api.auth.loginEmail(email, pwd);
      State.user = user;
      await Store.refreshAll();
      enterApp();
    } catch (e) {
      toast(e.status === 401 ? 'Invalid email or password' : 'Login failed', 'error');
    }
  });
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.body.classList.toggle('is-admin', State.user.role === 'admin');

  document.getElementById('user-avatar').textContent = State.user.name.charAt(0).toUpperCase();
  document.getElementById('user-name').textContent = State.user.name;
  document.getElementById('user-role').textContent = State.user.role === 'admin' ? 'Admin' : 'Warehouse';

  bindNav();
  bindHeader();
  routeTo('dashboard');
  refreshNavCounts();

  toast('Welcome, ' + State.user.name + ' 👋', 'success');

  // Auto-refresh: every 60s pull new data and detect new sales for notifications.
  // Repaint visible pages so user sees fresh data without manual refresh.
  if (window._rznRefreshTimer) clearInterval(window._rznRefreshTimer);
  // Try to request notification permission (Web Notifications API)
  try {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().catch(() => {});
    }
  } catch (e) {}

  let lastSalesIds = new Set((State.sales || []).map(s => s.id));
  window._rznRefreshTimer = setInterval(async () => {
    if (!State.user || document.hidden) return;
    try {
      await Store.refresh('notifications');
      if (['dashboard','inventory'].includes(State.page)) await Store.refresh('products');
      if (State.page === 'sales' || State.page === 'dashboard') {
        await Store.refresh('sales');
        // Detect new sales
        const currentIds = new Set((State.sales || []).map(s => s.id));
        const newOnes = (State.sales || []).filter(s => !lastSalesIds.has(s.id));
        if (newOnes.length && lastSalesIds.size > 0) {
          for (const s of newOnes) notifyNewSale(s);
        }
        lastSalesIds = currentIds;
      }
      if (State.page === 'returns') await Store.refresh('returns');
      if (State.page === 'schedule') await Store.refresh('schedule');
      // Repaint the current page so changes are visible
      const repaintMap = {
        dashboard: typeof renderDashboard === 'function' ? renderDashboard : null,
        inventory: typeof renderInventory === 'function' ? renderInventory : null,
        sales: typeof renderSales === 'function' ? renderSales : null,
        returns: typeof renderReturns === 'function' ? renderReturns : null,
        schedule: typeof renderSchedule === 'function' ? renderSchedule : null,
      };
      if (repaintMap[State.page]) repaintMap[State.page]();
      refreshNavCounts();
    } catch (e) {
      // silent — surfacing every poll failure would be noisy
    }
  }, 60_000);
}

function notifyNewSale(sale) {
  const channel = (sale.channel || '').replace('_', ' ');
  const title = `New ${channel} order · £${parseFloat(sale.total || 0).toFixed(2)}`;
  const body = `${sale.customer_name || 'Customer'} · ${sale.external_order_id || sale.invoice_number || ''}`;
  // Browser notification
  try {
    if ('Notification' in window && Notification.permission === 'granted') {
      const n = new Notification(title, { body, icon: '/logo.png', tag: 'sale-' + sale.id });
      n.onclick = () => { window.focus(); routeTo('sales'); };
    }
  } catch (e) {}
  // Vibrate (mobile)
  try { if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]); } catch (e) {}
  // Play a short ping sound
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = 0.1;
    o.start(); o.stop(ctx.currentTime + 0.15);
  } catch (e) {}
  toast(title + ' · ' + body, 'success');
}

function hasPerm(page) {
  if (State.user.role === 'admin') return true;
  const map = { dashboard:true, inventory:'inventory', scan:'scan', locations:'locations',
    returns:'returns', sales:'sales', pricing:'pricing', schedule:'schedule',
    videos:'videos', kb:'kb', notifications:true, staff:false, settings:false };

  if (v === true) return true;

  State.page = page;

function isToday(iso) {
  const d = new Date(iso); const now = new Date();
  return d.toDateString() === now.toDateString();
}
function totalQty(p) { return p.qtyShopify; /* eBay & Shopify share the same physical stock */ }

function channelPill(ch) {
  const map = {
    shopify: ['green', 'Shopify'],
    ebay: ['blue', 'eBay'],
    cash: ['amber', 'Cash'],
    bank: ['amber', 'Bank']
  };
  const [c, l] = map[ch] || ['', ch];
  return `<span class="pill ${c}"><span class="dot"></span>${l}</span>`;
}

async function bulkDeleteSelected() {
  const ids = Array.from(State.invSelected);
  if (!ids.length) return;
  const choice = prompt(
    `Delete ${ids.length} product${ids.length>1?'s':''}?\n\n` +
    `Type one of:\n` +
    `  1 = remove from warehouse only (keep on Shopify)\n` +
    `  2 = remove from BOTH warehouse AND Shopify\n` +
    `  (anything else cancels)`
  );
  if (choice !== '1' && choice !== '2') return;
  const removeFromShopify = choice === '2';
  const ok = confirm(
    removeFromShopify
      ? `Confirm: PERMANENTLY delete ${ids.length} product${ids.length>1?'s':''} from BOTH warehouse and Shopify. This cannot be undone.`
      : `Confirm: remove ${ids.length} product${ids.length>1?'s':''} from the warehouse only. Shopify untouched.`
  );
  if (!ok) return;
  toast(`Deleting ${ids.length} products…`, 'info');
  try {
    const r = await Api.post('/api/products/bulk-delete', { ids, hard: true, shopify: removeFromShopify });
    let msg = `Deleted ${r.deleted} from warehouse`;
    if (removeFromShopify) msg += ` · ${r.shopifyDeleted} from Shopify`;
    if (r.errors?.length) msg += ` · ${r.errors.length} errors`;
    toast(msg, r.errors?.length ? 'warn' : 'success');
    if (r.errors?.length) console.warn('Bulk delete errors:', r.errors);
    State.invSelected.clear();
    await Store.refresh('products');
    renderInventory();
  } catch (e) {
    toast('Bulk delete failed: ' + (e.data?.message || e.message), 'error');
  }
}

async function deleteProduct(id, title) {
  // Two-step confirm: first ask local-only or also remove from Shopify
  const choice = prompt(
    `Delete "${title}"?\n\n` +
    `Type one of:\n` +
    `  1 = remove from warehouse only (keep on Shopify)\n` +
    `  2 = remove from BOTH warehouse AND Shopify\n` +
    `  (anything else cancels)`
  );
  if (choice !== '1' && choice !== '2') return;
  const removeFromShopify = choice === '2';
  const confirmed = confirm(
    removeFromShopify
      ? `Confirm: PERMANENTLY delete "${title}" from Shopify and the warehouse. This cannot be undone.`
      : `Confirm: remove "${title}" from the warehouse (Shopify untouched).`
  );
  if (!confirmed) return;
  try {
    const url = `/api/products/${id}?hard=true${removeFromShopify ? '&shopify=true' : ''}`;
    await Api.delete(url);
    await Store.refresh('products');
    renderInventory();
    toast(removeFromShopify ? 'Deleted from warehouse and Shopify' : 'Removed from warehouse', 'success');
  } catch (e) {
    toast('Delete failed: ' + (e.data?.message || e.message), 'error');
  }
}

let scanner = null;
function renderScan() {
  const isMobile = /android|iphone|ipad/i.test(navigator.userAgent);
  el('content').innerHTML = `
    <div class="page">
      <div class="page-head">
        <div><h1>Stock Check & Scan</h1><div class="desc">${isMobile ? 'Use your camera to scan' : 'Use a USB barcode scanner or your camera'}</div></div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-head"><h3>Scanner</h3><div class="seg">
            <button class="active" data-method="cam" onclick="switchScanMethod('cam')">📷 Camera</button>
            <button data-method="usb" onclick="switchScanMethod('usb')">⌨️ USB scanner</button>
          </div></div>
          <div class="card-body">
            <div id="scan-cam">
              <div id="scanner-region"></div>
              <div style="display:flex;gap:8px;margin-top:12px">
                <button class="btn btn-primary" id="scan-start">Start camera</button>
                <button class="btn btn-outline" id="scan-stop" style="display:none">Stop</button>
              </div>
            </div>
            <div id="scan-usb" style="display:none">
              <div class="field">
                <label>Click here, then scan</label>
                <input id="scan-input" placeholder="Barcode will appear here..." autofocus style="font-size:18px;padding:14px">
              </div>
              <div style="color:var(--ink-soft);font-size:12px">USB scanners type the barcode + Enter automatically. Just point and shoot.</div>
            </div>
            <div style="margin-top:14px;padding:12px;background:var(--line-2);border-radius:8px;font-size:12px;color:var(--ink-soft)">
              <strong>No barcode?</strong> Search by SKU below.
            </div>
            <div class="field" style="margin-top:8px">
              <input id="scan-manual" placeholder="Type SKU or part number...">
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><h3>Last scanned</h3></div>
          <div class="card-body" id="scan-result">
            <div class="empty">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
              <div class="t">Ready to scan</div>
              No item scanned yet
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  el('scan-start').addEventListener('click', startCamera);
  el('scan-stop').addEventListener('click', stopCamera);
  el('scan-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') { handleScan(el('scan-input').value); el('scan-input').value=''; }
  });
  el('scan-manual').addEventListener('keypress', e => {
    if (e.key === 'Enter') { handleManualSearch(el('scan-manual').value); el('scan-manual').value=''; }
  });
}
function switchScanMethod(m) {
  document.querySelectorAll('.seg button[data-method]').forEach(b => b.classList.toggle('active', b.dataset.method===m));
  el('scan-cam').style.display = m==='cam' ? 'block' : 'none';
  el('scan-usb').style.display = m==='usb' ? 'block' : 'none';
  if (m==='usb') setTimeout(()=>el('scan-input').focus(), 100);
  if (m!=='cam') stopCamera();
}
function startCamera() {
  if (typeof Html5Qrcode === 'undefined') { toast('Scanner library not loaded', 'error'); return; }
  if (scanner && scanner.isScanning) return;
  scanner = new Html5Qrcode("scanner-region");
  el('scan-start').style.display='none';
  el('scan-stop').style.display='inline-flex';
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 150 } },
    (decoded) => { handleScan(decoded); },
    () => {}
  ).catch(err => {
    toast('Camera access denied', 'error');
    el('scan-start').style.display='inline-flex';
    el('scan-stop').style.display='none';
  });
}
function stopCamera() {
  if (scanner && scanner.isScanning) scanner.stop().then(()=>scanner.clear()).catch(()=>{});
  el('scan-start').style.display='inline-flex';
  el('scan-stop').style.display='none';
}
function handleScan(code) {
  const p = State.products.find(x => x.barcode === code || x.sku === code);
  if (!p) {
    el('scan-result').innerHTML = `<div class="empty"><div class="t">Not found: ${code}</div>No product matches this barcode. <br><br><button class="btn btn-primary admin-only" onclick="openProductModal()">+ Add as new product</button></div>`;
    toast('Barcode not in inventory', 'warn');
    return;
  }
  toast('Found: ' + p.title, 'success');
  showProductScanCard(p);
}
function handleManualSearch(q) {
  q = q.trim().toLowerCase(); if (!q) return;
  const p = State.products.find(x => x.sku.toLowerCase().includes(q) || x.partNumber?.toLowerCase().includes(q) || x.title.toLowerCase().includes(q));
  if (!p) { toast('No match found', 'warn'); return; }
  showProductScanCard(p);
}
function showProductScanCard(p) {
  el('scan-result').innerHTML = `
    <div style="font-weight:600;font-size:15px;margin-bottom:4px">${p.title}</div>
    <div style="color:var(--ink-soft);font-size:12px;margin-bottom:14px">${p.sku} · ${p.partNumber||''}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div style="padding:10px;background:var(--line-2);border-radius:8px"><div style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;font-weight:600">Stock</div><div style="font-size:22px;font-weight:700">${totalQty(p)}</div></div>
      <div style="padding:10px;background:var(--line-2);border-radius:8px"><div style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;font-weight:600">Location</div><div style="font-size:13px;font-weight:600;margin-top:2px">${p.location||'—'}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-success" onclick="adjustStock('${p.id}', 'check')">✓ Stock matches</button>
      <button class="btn btn-outline" onclick="adjustStock('${p.id}', 'adjust')">Adjust qty</button>
      <button class="btn btn-outline" onclick="adjustStock('${p.id}', 'damaged')">Mark damaged</button>
      <button class="btn btn-outline" onclick="adjustStock('${p.id}', 'sold')">Mark sold (cash)</button>
    </div>
  `;
}
function adjustStock(id, action) {
  const p = State.products.find(x => x.id == id);
  if (action === 'check') { toast('✓ ' + p.sku + ' confirmed', 'success'); return; }
  if (action === 'adjust') {
    modal({
      title: 'Adjust stock — ' + p.sku,
      body: `
        <div class="field"><label>Current stock</label><div style="padding:10px;background:var(--line-2);border-radius:8px">${totalQty(p)}</div></div>
        <div class="field"><label>New stock count</label><input id="adj-qty" type="number" value="${totalQty(p)}"></div>
        <div class="field"><label>Reason</label><select id="adj-reason"><option>Stock count correction</option><option>Damaged</option><option>Lost</option><option>Cash sale</option><option>Bank transfer sale</option><option>Replacement</option><option>Other</option></select></div>
        <div class="field"><label>Notes (optional)</label><textarea id="adj-notes" rows="2"></textarea></div>`,
      actions: [
        { label: 'Save', primary: true, onClick: async () => {
          const newQ = +el('adj-qty').value;
          const reason = el('adj-reason').value;
          const delta = newQ - (p.qtyOnHand ?? totalQty(p));
          if (delta === 0) { closeModal(); return; }
          try {
            await Api.post('/api/products/' + p.id + '/adjust-stock', {
              delta, reason: reason.toLowerCase().replace(/\s+/g, '_'),
              notes: el('adj-notes').value,
            });
            await Store.refresh('products');
            const updated = State.products.find(x => x.id === p.id);
            closeModal();
            toast(`Updated ${p.sku} → ${newQ} (${reason})`, 'success');
            if (updated) showProductScanCard(updated);
            refreshNavCounts();
          } catch (e) { toast('Failed: ' + e.message, 'error'); }
        }},
        { label: 'Cancel', onClick: closeModal }
      ]
    });
  }
  if (action === 'damaged') {
    modal({
      title: 'Mark as damaged — ' + p.sku,
      body: `<div class="field"><label>How many damaged?</label><input id="dmg-qty" type="number" value="1" min="1" max="${totalQty(p)}"></div><div class="field"><label>Notes</label><textarea id="dmg-notes" rows="2" placeholder="Where on the part is the damage? Cause?"></textarea></div>`,
      actions: [
        { label: 'Mark damaged', primary: true, onClick: async () => {
          const q = +el('dmg-qty').value;
          try {
            await Api.post('/api/products/' + p.id + '/adjust-stock', {
              delta: -q, reason: 'damage', notes: el('dmg-notes').value,
            });
            await Store.refresh('products');
            const updated = State.products.find(x => x.id === p.id);
            closeModal();
            toast(`Marked ${q} damaged. Stock reduced.`, 'warn');
            if (updated) showProductScanCard(updated);
          } catch (e) { toast('Failed: ' + e.message, 'error'); }
        }},
        { label: 'Cancel', onClick: closeModal }
      ]
    });
  }
  if (action === 'sold') {
    modal({
      title: 'Cash sale — ' + p.sku,
      body: `
        <div class="field"><label>Channel</label><select id="sold-ch"><option value="direct_cash">Cash on collection</option><option value="direct_bank">Bank transfer</option></select></div>
        <div class="field"><label>Amount (£)</label><input id="sold-amt" type="number" step="0.01" value="${(p.priceEbay/0.9).toFixed(2)}"></div>
        <div class="field"><label>Customer name / reference</label><input id="sold-cust" placeholder="Walk-in / company name"></div>`,
      actions: [
        { label: 'Record sale', primary: true, onClick: async () => {
          try {
            const channel = el('sold-ch').value;
            const unit = +el('sold-amt').value;
            // Backend computes VAT itself; pass unit price and let it derive subtotal/vat.
            // Quick path: send the unit price as ex-VAT and let backend add 20%.
            // For simplicity, treat the entered amount as inc-VAT and back out the subtotal.
            const vatRate = (State.settings.vatRate ?? 20) / 100;
            const subtotalUnit = +(unit / (1 + vatRate)).toFixed(2);
            await Api.post('/api/sales', {
              channel,
              customerName: el('sold-cust').value || 'Walk-in',
              items: [{ productId: p.id, qty: 1, unitPrice: subtotalUnit }],
              shipping: 0,
            });
            await Store.refresh('products');
            await Store.refresh('sales');
            const updated = State.products.find(x => x.id === p.id);
            closeModal();
            toast('Sale recorded · stock decremented · syncing', 'success');
            if (updated) showProductScanCard(updated);
          } catch (e) { toast('Failed: ' + (e.data?.error || e.message), 'error'); }
        }},
        { label: 'Cancel', onClick: closeModal }
      ]
    });
  }
}

      </div>
    `,

      { label: 'Save', primary: true, onClick: async () => {
        // Per-product location text + photos require a schema field that isn't in the
        // backend yet. The Locations admin page (via /api/locations with code/name/photo)
        // is the canonical place to manage where things are stored.

        closeModal();
      }},
      { label: 'Cancel', onClick: closeModal }
    ]
  });

    const photoInput = el('lm-photo');
    if (photoInput) photoInput.addEventListener('change', async e => {
      const file = e.target.files[0]; if (!file) return;
      const url = await fileToDataUrl(file);
      const preview = el('lm-preview');
      if (preview) preview.style.backgroundImage = `url(${url})`;
    });
  }, 50);

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function emailSingleInvoice(id) {
  const sale = State.sales.find(s => s.id == id);
  const defaultEmail = sale?.customerEmail || '';
  const to = prompt('Send invoice to which email?', defaultEmail);
  if (!to) return;
  try {
    const r = await Api.post('/api/sales/' + id + '/email', { to });
    toast('Email sent to ' + to, 'success');
  } catch (e) {
    if (e.data?.error === 'email_not_configured') {
      alert('Email sending not configured.\n\n' + e.data.message);
    } else {
      toast('Email failed: ' + (e.data?.message || e.message), 'error');
    }
  }
}

async function convertEstimateToInvoice(id) {
  const paymentMethod = prompt('Payment received via — type one of:\ncash, bank, card', 'cash');
  if (!paymentMethod || !['cash','bank','card'].includes(paymentMethod.toLowerCase())) return;
  try {
    const r = await Api.post('/api/sales/' + id + '/convert-to-invoice', { paymentMethod: paymentMethod.toLowerCase() });
    toast('Converted to paid invoice — opening…', 'success');
    await Store.refresh('sales');
    await Store.refresh('products');
    renderSales();
    setTimeout(() => window.open('/api/sales/' + id + '/invoice.html', '_blank'), 200);
  } catch (e) {
    if (e.data?.error === 'insufficient_stock') toast('Cannot convert: insufficient stock for ' + e.data.sku, 'error');
    else toast('Convert failed: ' + (e.data?.message || e.message), 'error');
  }
}

function exportSalesCsv() {

function exportSalesXlsx() {
  toast('Generating Excel workbook…', 'info');
  // Use fetch + blob so we can show errors (xlsx route may return JSON error)
  fetch('/api/sales/export.xlsx', { headers: API_TOKEN ? { Authorization: 'Bearer ' + API_TOKEN } : {} })
    .then(async r => {
      const ct = r.headers.get('content-type') || '';
      if (!r.ok || ct.includes('application/json')) {
        const j = await r.json().catch(() => ({}));
        throw new Error(j.message || 'Export failed (status ' + r.status + ')');
      }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'sales-all-channels.xlsx';
      document.body.appendChild(a); a.click();
      setTimeout(() => { a.remove(); URL.revokeObjectURL(url); }, 100);
      toast('Excel workbook downloaded', 'success');
    })
    .catch(e => toast(e.message, 'error'));
}
async function printSelectedInvoices() {
  const ids = Array.from(State.salesSelected);
  if (!ids.length) return;
  if (ids.length === 1) return printSingleInvoice(ids[0]);
  // Open each invoice in its own tab so they can all be printed
  if (!confirm(`Open ${ids.length} invoice tabs for printing?`)) return;
  let opened = 0;
  for (const id of ids) {
    const w = window.open('/api/sales/' + id + '/invoice.html', '_blank');
    if (w) opened++;

function manualSaleAddRow() {
  const wrap = el('ms-items');
  if (!wrap) return;
  const idx = wrap.children.length;
  const row = document.createElement('div');
  row.style.cssText = 'display:grid;grid-template-columns:1fr 80px 110px 36px;gap:6px;margin-bottom:6px;align-items:center';
  row.dataset.idx = idx;
  row.innerHTML = `
    <select class="ms-prod" onchange="manualSaleRecalc()">
      <option value="">— pick product —</option>
      ${State.products.map(p => `<option value="${p.id}" data-price="${p.priceShopify || 0}" data-qty="${totalQty(p)}">${p.title} · ${p.sku} (${totalQty(p)} in stock)</option>`).join('')}
    </select>
    <input type="number" class="ms-qty" value="1" min="1" step="1" onchange="manualSaleRecalc()">
    <input type="number" class="ms-price" placeholder="Unit £" step="0.01" min="0" onchange="manualSaleRecalc()">
    <button class="btn btn-ghost btn-sm" onclick="this.parentElement.remove();manualSaleRecalc()">×</button>
  `;
  wrap.appendChild(row);
  // Pre-fill unit price from the selected product when chosen
  row.querySelector('.ms-prod').addEventListener('change', (e) => {
    const opt = e.target.selectedOptions[0];
    const priceInput = row.querySelector('.ms-price');
    if (opt && opt.dataset.price && !priceInput.value) priceInput.value = opt.dataset.price;
    // For trade channel, suggest bank price (% off eBay)
    manualSalePrefillPrice(row);
    manualSaleRecalc();
  });
}

function manualSalePrefillPrice(row) {
  const opt = row.querySelector('.ms-prod').selectedOptions[0];
  if (!opt || !opt.value) return;
  const product = State.products.find(p => p.id == opt.value);
  if (!product) return;
  const payment = el('ms-payment')?.value || 'cash';
  const cfg = State.pricingConfig || {};
  const ebayPrice = product.priceEbay || product.priceShopify || 0;
  let suggested = product.priceShopify || 0;
  if (payment === 'cash' && cfg.cashDiscountPct != null) {
    suggested = +(ebayPrice * (1 - cfg.cashDiscountPct / 100)).toFixed(2);
  } else if (payment === 'bank' && cfg.bankTransferPct != null) {
    suggested = +(ebayPrice * (1 - cfg.bankTransferPct / 100)).toFixed(2);
  } else if (payment === 'card') {
    suggested = product.priceShopify || 0; // card = shopify price (no discount)
  }
  if (suggested > 0) row.querySelector('.ms-price').value = suggested;
}

function manualSaleRecalc() {
  const rows = document.querySelectorAll('#ms-items > div');
  let subtotal = 0;
  for (const r of rows) {
    const qty = parseFloat(r.querySelector('.ms-qty').value) || 0;
    const price = parseFloat(r.querySelector('.ms-price').value) || 0;
    subtotal += qty * price;
  }
  const shipping = parseFloat(el('ms-shipping')?.value || 0);
  const cfg = State.pricingConfig || {};
  // Only apply VAT if VAT-registered; line-item prices are entered tax-inclusive
  const vatRegistered = !!cfg.vatRegistered;
  const vatRate = vatRegistered ? (cfg.vatRate || 20) / 100 : 0;
  const vat = +(subtotal * vatRate).toFixed(2);
  const total = +(subtotal + vat + shipping).toFixed(2);
  const sum = el('ms-summary');
  if (sum) {
    sum.innerHTML = `
      <div style="display:flex;justify-content:space-between"><span>Subtotal</span><strong>${gbp(subtotal)}</strong></div>
      ${vatRegistered ? `<div style="display:flex;justify-content:space-between"><span>VAT (${(vatRate*100).toFixed(0)}%)</span><strong>${gbp(vat)}</strong></div>` : '<div style="font-size:11px;color:var(--ink-soft)">(Not VAT-registered — no VAT charged)</div>'}
      <div style="display:flex;justify-content:space-between"><span>Shipping</span><strong>${gbp(shipping)}</strong></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:6px;padding-top:6px;font-size:15px"><span>Total</span><strong>${gbp(total)}</strong></div>
    `;
  }
}

async function submitManualSale() {
  const paymentMethod = el('ms-payment').value;
  const isEstimate = el('ms-doctype').value === 'estimate';
  // Channel must be one of the manual channels — pick bank for non-cash payments
  const channel = paymentMethod === 'cash' ? 'direct_cash' : 'direct_bank';

  const rows = document.querySelectorAll('#ms-items > div');
  const items = [];
  for (const r of rows) {
    const productId = r.querySelector('.ms-prod').value;
    const qty = parseInt(r.querySelector('.ms-qty').value);
    const unitPrice = parseFloat(r.querySelector('.ms-price').value);
    if (!productId || !qty || !unitPrice) continue;
    items.push({ productId, qty, unitPrice });
  }
  if (!items.length) { toast('Add at least one line item', 'warn'); return; }
  const payload = {
    channel,
    paymentMethod,
    isEstimate,
    customerName: el('ms-cust').value || null,
    customerPhone: el('ms-phone').value || null,
    customerEmail: el('ms-email').value || null,
    shippingAddress: el('ms-address').value || null,
    orderNumber: el('ms-ordernum').value || null,
    vehicleReg: el('ms-reg').value || null,
    items,
    shipping: parseFloat(el('ms-shipping').value) || 0,
    notes: el('ms-notes').value || null,
  };
  try {
    const r = await Api.post('/api/sales', payload);
    closeModal();
    toast(isEstimate ? 'Estimate saved' : 'Sale recorded — opening document…', 'success');
    await Store.refresh('sales');
    await Store.refresh('products');
    renderSales();
    // Open the freshly created document
    setTimeout(() => {
      const w = window.open('/api/sales/' + r.sale.id + '/invoice.html', '_blank');
      if (!w) toast('Pop-up blocked — find document in Sales tab', 'warn');
    }, 200);
  } catch (e) {
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

function generateInvoice(id) {

function quotePrice(id) {
  const p = State.products.find(x => x.id == id);
  const cfg = State.pricingConfig || { cashDiscountPct: State.settings.cashDiscount || 10, bankTransferPct: 10, ebayBuyerProtectionMarkup: 0, shopifyFreeDeliveryOver: 50 };
  // If price_ebay is missing (products imported from Shopify only), fall back to Shopify price
  // as the eBay basis. This way Cash / Bank / eBay quotes still compute reasonably until
  // eBay listings are mirrored back to populate price_ebay properly.
  const ebayBasis = (p.priceEbay && p.priceEbay > 0) ? p.priceEbay : (p.priceShopify || 0);
  const ebayBasisIsFromShopify = !(p.priceEbay && p.priceEbay > 0) && (p.priceShopify || 0) > 0;
  const cashPrice = ebayBasis * (1 - cfg.cashDiscountPct/100);
  const bankPrice = ebayBasis * (1 - cfg.bankTransferPct/100);
  const ebayProtectedPrice = ebayBasis * (1 + cfg.ebayBuyerProtectionMarkup/100);
  el('pt-detail').innerHTML = `
    <div style="height:16px"></div>
    <div class="card">
      <div class="card-head"><h3>Quote for: ${p.title}</h3></div>
      <div class="card-body">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
          <span class="pill ${totalQty(p)>0?'green':'red'}">${totalQty(p)>0 ? totalQty(p) + ' in stock' : 'Out of stock'}</span>
          <span style="color:var(--ink-soft);font-size:13px">${p.location || ''}</span>
        </div>
        ${ebayBasisIsFromShopify ? `<div style="font-size:11px;color:var(--amber);background:var(--amber-light);padding:8px 12px;border-radius:6px;margin-bottom:12px">⚠️ No eBay price on file — using Shopify price as the basis. Mirror this listing from eBay to set the proper eBay price.</div>` : ''}
        <div class="pt-result">
          <div class="pt-row featured">
            <div><div class="ch-name">💰 Cash on collection</div><div class="ch-meta">${ebayBasisIsFromShopify ? 'Shopify' : 'eBay'} price minus ${cfg.cashDiscountPct}% — best price for the customer</div></div>
            <div class="ch-price">${gbp(cashPrice)}</div>
          </div>
          <div class="pt-row">
            <div><div class="ch-name">🛒 Shopify (online order)</div><div class="ch-meta">Free delivery on orders over £${cfg.shopifyFreeDeliveryOver}</div></div>
            <div class="ch-price">${gbp(p.priceShopify)}</div>
          </div>
          <div class="pt-row">
            <div><div class="ch-name">📦 eBay listing</div><div class="ch-meta">If they want eBay buyer protection${cfg.ebayBuyerProtectionMarkup ? ` (+${cfg.ebayBuyerProtectionMarkup}%)` : ''}</div></div>
            <div class="ch-price">${gbp(ebayProtectedPrice)}</div>
          </div>
          <div class="pt-row">
            <div><div class="ch-name">🏦 Bank transfer (trade)</div><div class="ch-meta">${ebayBasisIsFromShopify ? 'Shopify' : 'eBay'} price minus ${cfg.bankTransferPct}% — invoiced</div></div>
            <div class="ch-price">${gbp(bankPrice)}</div>
          </div>
        </div>
        <div style="margin-top:16px;padding:12px;background:var(--amber-light);border-radius:8px;font-size:13px;color:var(--amber)">
          <strong>📞 Reminder:</strong> Confirm fitment (year + model + position) before quoting. Same-day dispatch if confirmed before 12:00.
        </div>
      </div>
    </div>
  `;
}

function renderSchedule() {

  el('content').innerHTML = `

        <div><h1>Schedule</h1><div class="desc">Daily and recurring tasks · assigned to specific staff</div></div>

      </div>

        <button data-sf="all" ${State.scheduleStaffFilter==='all'?'class="active"':''}>All tasks</button>
        <button data-sf="mine" ${State.scheduleStaffFilter==='mine'?'class="active"':''}>My tasks</button>
        <button data-sf="unassigned" ${State.scheduleStaffFilter==='unassigned'?'class="active"':''}>Unassigned</button>
      </div>
      <div class="card">
        <div id="sched-list"></div>
      </div>
    </div>
  `;
  document.querySelectorAll('[data-sf]').forEach(b => b.addEventListener('click', () => {
    State.scheduleStaffFilter = b.dataset.sf;
    document.querySelectorAll('[data-sf]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    paintSchedule();
  }));
  paintSchedule();
}
function paintSchedule() {
  const list = el('sched-list');
  if (!list) return;
  const filter = State.scheduleStaffFilter || 'all';
  const myId = State.user?.id;
  const filtered = State.schedule.filter(t => {
    if (filter === 'mine') return String(t.assigneeId) === String(myId);
    if (filter === 'unassigned') return !t.assigneeId;
    return true;
  });
  list.innerHTML = filtered.length ? filtered.map(t => `
    <div class="task-row ${t.done?'done':''}">
      <button class="task-check ${t.done?'done':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button>
      <div class="task-info">
        <div class="task-title">${t.task}</div>
        <div class="task-meta">${t.when} · ${t.frequency} · <strong>${t.assignee || 'unassigned'}</strong></div>
      </div>
      ${State.user?.role === 'admin' ? `<button class="btn btn-ghost btn-sm" onclick="deleteTask('${t.id}')">Remove</button>`:''}
    </div>
  `).join('') : '<div class="empty"><div class="t">No tasks ' + (filter==='mine'?'assigned to you':filter==='unassigned'?'without an assignee':'') + '</div></div>';
}
async function toggleTask(id) {
  const t = State.schedule.find(x => x.id == id);
  if (!t) return;
  const newStatus = t.done ? 'pending' : 'done';
  try {
    await Api.patch('/api/schedule/' + id, { status: newStatus });
    await Store.refresh('schedule');
    paintSchedule();
  } catch (e) { toast('Update failed: ' + e.message, 'error'); }
}
async function deleteTask(id) {
  try {
    await Api.delete('/api/schedule/' + id);
    await Store.refresh('schedule');
    paintSchedule();
  } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
}

function renderKB() {
  const isAdmin = State.user.role === 'admin';

  el('content').innerHTML = `

      <div class="page-head">

    });

    items.forEach(k => { (groups[k.cat] = groups[k.cat] || []).push(k); });

        `).join('')}

    `).join('') || '<div class="empty"><div class="t">No entries</div></div>';
  }
  paint();
  el('kb-search').addEventListener('input', paint);

// Token substitution helpers — values like "{{sku}} {{title}}" get filled per listing
function substituteTokens(template, listing) {
  if (!template) return template;
  const sku = MirrorState.skuOverrides[listing.itemId] || listing.sku || '';
  const title = MirrorState.titleOverrides[listing.itemId] || listing.title || '';
  return String(template)
    .replace(/\{\{\s*sku\s*\}\}/gi, sku)
    .replace(/\{\{\s*title\s*\}\}/gi, title)
    .replace(/\{\{\s*item_id\s*\}\}/gi, listing.itemId || '')
    .replace(/\{\{\s*ebay_price\s*\}\}/gi, String(listing.priceEbay || ''))
    .replace(/\{\{\s*qty\s*\}\}/gi, String(listing.quantityAvailable || 0));
}

// Get the metafields to send for a listing — common (with tokens substituted) + per-item overrides
function metafieldsForListing(listing) {
  const out = [];
  // Common metafields (fixed or token-templated)
  for (const mf of MirrorState.metafields) {
    if (!mf.key) continue;
    const value = substituteTokens(mf.value, listing);
    if (!value) continue;
    out.push({ namespace: mf.namespace || 'custom', key: mf.key, value, type: mf.type || 'single_line_text_field' });
  }
  // Per-item overrides — replace any matching common metafield
  const perItem = MirrorState.perItemMetafields[listing.itemId] || {};
  for (const [nsKey, val] of Object.entries(perItem)) {
    if (val == null || val === '') continue;
    const [namespace, key] = nsKey.split('.', 2);
    // Find the type from definitions or default
    const def = MirrorState.metafieldDefs.find(d => d.namespace === namespace && d.key === key);
    const type = def ? def.type : 'single_line_text_field';
    // Remove any common entry with same ns.key
    const existingIdx = out.findIndex(o => o.namespace === namespace && o.key === key);
    if (existingIdx >= 0) out.splice(existingIdx, 1);
    out.push({ namespace, key, value: substituteTokens(val, listing), type });
  }
  return out;
}

// Debounce-save an override to backend
function scheduleSaveOverride(itemId) {
  clearTimeout(MirrorState.saveTimers[itemId]);
  MirrorState.saveTimers[itemId] = setTimeout(async () => {
    try {
      await Api.post('/api/listings/save-override', {
        itemId,
        overrideSku: MirrorState.skuOverrides[itemId] || null,
        overrideTitle: MirrorState.titleOverrides[itemId] || null,
        customPrice: MirrorState.customPrices[itemId] != null ? MirrorState.customPrices[itemId] : null,
      });
      // small visual indicator: badge on row
      const row = document.querySelector(`[data-row="${itemId}"]`);
      if (row) {
        let saved = row.querySelector('.saved-indicator');
        if (!saved) {
          saved = document.createElement('span');
          saved.className = 'saved-indicator';
          saved.style.cssText = 'font-size:11px;color:var(--green);margin-left:8px;opacity:0;transition:opacity .2s';
          saved.textContent = '✓ Saved';
          const titleField = row.querySelector('input[type="text"]');
          if (titleField && titleField.parentNode) titleField.parentNode.appendChild(saved);
        }
        saved.style.opacity = '1';
        setTimeout(() => { if (saved) saved.style.opacity = '0'; }, 1500);
      }
    } catch (e) {
      console.warn('save override failed', e);
    }
  }, 600);
}

async function pullEbayListings() {
  toast('Pulling eBay listings + photos… ~1-2 min for big stores', 'info');
  // Load metafield definitions and delivery profiles in parallel
  Api.get('/api/listings/metafield-definitions').then(r => {
    MirrorState.metafieldDefs = r.definitions || [];
    paintMetafields();
  }).catch(() => {});
  Api.get('/api/listings/delivery-profiles').then(r => {
    MirrorState.deliveryProfiles = r.profiles || [];
    populateShippingProfileDropdown();
  }).catch(() => {});
  try {
    const r = await Api.get('/api/listings/ebay-active');
    MirrorState.listings = r.listings || [];
    MirrorState.selected = new Set(MirrorState.listings.map(l => l.itemId));
    MirrorState.selectedImages = {};
    MirrorState.customPrices = {};
    MirrorState.titleOverrides = {};
    MirrorState.skuOverrides = {};

    // Seed in-memory overrides from server-side persisted data
    for (const l of MirrorState.listings) {
      if (l.overrideSku != null) MirrorState.skuOverrides[l.itemId] = l.overrideSku;
      if (l.overrideTitle != null) MirrorState.titleOverrides[l.itemId] = l.overrideTitle;
      if (l.customPrice != null) MirrorState.customPrices[l.itemId] = l.customPrice;
      MirrorState.selectedImages[l.itemId] = new Set(l.pictureUrls.length ? [l.pictureUrls[0]] : []);
    }
    el('mirror-empty').style.display = 'none';
    el('mirror-toolbar').style.display = 'block';
    paintMirrorList();
    paintMetafields();
    const noPhotos = MirrorState.listings.filter(l => !l.pictureUrls.length).length;
    const onShopify = MirrorState.listings.filter(l => l.existsOnShopify).length;
    let msg = `Loaded ${MirrorState.listings.length} listings`;
    if (onShopify) msg += ` · ${onShopify} already on Shopify`;
    if (noPhotos) msg += ` · ${noPhotos} no photos`;
    toast(msg, 'success');
  } catch (e) {
    toast('Failed: ' + (e.data?.message || e.message), 'error');
  }
}

function resetPhotoSelections(mode) {
  // mode: 'first' | 'all' | 'none'
  for (const l of MirrorState.listings) {
    if (mode === 'first') {
      MirrorState.selectedImages[l.itemId] = new Set(l.pictureUrls.length ? [l.pictureUrls[0]] : []);
    } else if (mode === 'all') {
      MirrorState.selectedImages[l.itemId] = new Set(l.pictureUrls);
